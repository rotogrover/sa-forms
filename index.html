platelet count of 75,000/mmJ, and leukocyte count of 32,000/mm³, the majority of which are immature granulocytes. Prothrombin and partial thromboplastin times are prolonged. A peripheral blood smear is shown. Which of the following is the most likely diagnosis?","choices":{"A":"Acute lymphocyt1c leukemia","B":"Chronic lymphocytic leukemia","C":"Chronic myelogenous leukemia","D":"Hairy cell leukemia","E":"Promyelocytic leukemia"},"correct":"E","explanation":"The peripheral blood smear indicates circulating myeloblasts, which are charactenzed by abnormal nuclear to cytoplasmic ratio, and may exhibit the presence of Auer rods. This is most consistent with a diagnosis of acute myelocytic leukemia (AML). Acute promyelocytic leukemia (APL) is a subtype of AML that is characterized by a high rate of response to treatment with all-trans retinoic acid (ATRA), which induces differentiation of malignant blasts. In general, for all types of AML, common presenting symptoms include malaise, weight loss, and easy bruising. Laboratory studies often show anemia and thrombocytopenia with leukocytosis. Peripheral smear can distinguish between AML and acute lymphoblastic leukemia (ALL) as the cells have different morphologic characteristics. Myeloblasts tend to have a lower nuclear to cytoplasm ratio and are larger as compared to lymphoblasts. Auer rods, if present, are strongly suggestive of APL but can occur in other subtypes or AML as well. Incorrect Answers: A, B, C, and D. Acute lymphocytic leukemia (Choice A) is more common in pediatric patients than AML and presents with similar symptoms, including weight loss, fevers, and malaise. Anemia and thrombocytopenia occur. Circulating blasts appear different, and tend to be smaller, darker, with a prominent nucleus. and a higher nuclear to cytoplasm ratio. Chronic lymphocytic leukemia (Choice B) most commonly occurs in adults over 60 years of age Patients are often asymptomatic and demonstrate slow progression, with characteristic ruptured lymphocytes on peripheral blood smear. Diffuse, non-tender lymphadenopathy is a characteristic feature. Chronic myelogenous leukemia (Choice C) is defined by the presence of the Philadelphia (Ph) chromosome, which is created by a translocation between chromosomes 9 and 22, resulting in constitutive activation of the ASL 1 tyrosine kinase. Peripheral smear will show a diverse set of immature or partially mature cells of the granulocytic cell lineage with basophilia. Hairy cell leukemia (Choice D) is typically a disease of older adults and is diagnosed in the setting of pancytopenia, lymphocytes with cytoplasmic projections on peripheral smear. and positive tartrate resistant acid phosphatase (TRAP). Malaise, abdominal distention, early satiety, and pain from splenomegaly are common presenting complaints. Treatment is reserved for symptomatic patients.","edu_obj":"Acute promyelocytic leukemia, a subtype of acute myelocytic leukemia, commonly presents with malaise, fever, and weight loss with thrombocytopenia, anemia, and leukocytosis. Peripheral blood smear shows circulating myeloblasts, which are characterized by a lower nuclear to cytoplasmic ratio than lymphoblasts and occasionally exhibit the presence of Auer rods."},{"block":2,"item":42,"image_alt":"","image_url":"","stem":"A 65-year-old woman comes to the physician because of a 10-week history of low-grade fever, fatigue, and pain in her right arm. She recalls no trauma to the arm. She has a history of cancer treated with radiation therapy. Her temperature is 37.l°C (99.8°F). Physical examination shows tenderness of the right distal humerus. Laboratory studies show anemia. An x-ray of the right upper extremity is shown. This patient most likely has an abnormality of which of the following cell types?","choices":{"A":"Hematopoietic stem cells","B":"Monomyelocytic stem cells","C":"Natural killer cells","D":"Osteoclasts"},"correct":"E","explanation":"Multiple myeloma is a malignancy caused by the neoplastic proliferation of plasma cells, and presents with a characteristic syndrome of hypercalcemia, bone pain, anemia, frequent infections, and renal failure. Neoplastic proliferation within bone marrow and osteoclast activation by immunoglobulin and cytokine productiOn causes hypercalcemia, bone pain, and lytic bone lesions caused by degradation of surrounding, otherwise healthy bone. Replacement of healthy marrow by clonal proliferation limitsproductionof normalleukocytesand immunoglobulins and limitsavailablemarrowfor erythropoiesis.Immunoglobulin chainsdepositin the kidney,disruptingnormal function and leading to kidney failure. Risk factors for multiple myeloma include a history of radiation exposure, family history, history of monoclonal gammopathy of undetermined significance, and history of Waldenstrom macroglobulinemia. The diagnosis is confirmed with bone marrow biopsy, immunohistochemistry, and flow cytometry to establish plasma cell monoclonality. Other diagnostic measures include serum protein electrophoresis with demonstration of an M spike, peripheral blood smear with rouleaux formation of erythrocytes, and urinalysis demonstrating Bence Jones protein, a monoclonal immunoglobulin light chain. A skeletal survey typically demonstrates lytic bone lesions. Treatment involves combination systemic chemotherapy, often with a proteasome inhibitor, suppoI1ive treatment, and occasionally stem cell transplant. Incorrect Answers: A, B, C, and D. Hematopoietic stem cells (Choice A) can undergo malignant transformation, producing acute or chronic myeloid leukemia. Patients typically present with disturbances in multiple hematopoietic lineages, which may present with pancytopenia or leukocytosis. Circulating blasts may be present. Lytic bone lesions are atypical of both acute and chronic myeloid leukemia. Monomyelocytic stem cells (Choice B) may undergo malignant transformation, producing chronic myetomonocytic leukemia (CMML). CMML is characterized by clonal proliferation of monocytes. CMML presents with constitutional symptoms of fatigue, fever, weight loss, anemia, splenomegaly, and oppoI1unistic infection. Lytic bone lesions are not typically present. Natural killer (NK) cells (Choice C) may produce aggressive NK-cell leukemia, a rare malignancy that is associated with prior infection with Epstein-Barr virus. It does not typically produce lytic bone lesions. Osteoclasts (Choice D) promote bone resorption following stimulation by various cytokines including IL-1, tumor necrosis factor-a, macrophage inflammatory protein, and receptor activator of nuclear factor-KB ligand (RANKL). While normal osteoclasts play a role in the production of tytic bone lesions in the context of multiple myeloma, the underlying abnormality is a plasma cell neoplasm, whereas the osteoclast itself is responding appropriately to an abnormal cytokine signal.","edu_obj":"Multiple myetoma is a malignancy caused by the neoplastic proliferation of plasma cells. Patients typically present with fatigue, weight toss. bone pain, hypercalcemia, anemia, renal failure, or with opportunistic infections. Lytic bone lesions may be noted on x-rays. Radiation exposure is one of several risk factors for this condition."},{"block":2,"item":43,"image_alt":"","image_url":"","stem":"A 21-year-old college student comes to the physician because of a 3-month history of depressed mood and insomnia. During this period, her school performance has deteriorated, and she has not kept up with stamp collecting, a hobby she used to enjoy. Two years ago, she had a 1-month episode of euphoric mood during which she barely slept and had promiscuous encounters with strangers. Physical examination today shows no abnormalities. Mental status examination shows psychomotor retardation and suicidal ideation. Which of the following is the rost likely diagnosis?","choices":{"A":"Bipolar disorder","B":"Chronic fatigue syndrome","C":"Cyclothymic disorder","D":"HIV infection","E":"Major depressive disorder"},"correct":"A","explanation":"This patient presents with a depressive episode and a history of a previous hypomanic episode. These symptoms are most consistent with bipolar disorder, which can be divided into two subtypes. Bipolar I disorder presents with episodes of mania and frequently includes hypomanic and depressive episodes. Bipolar II disorder. in contrast. always presents with hypomanic and depressive episodes. but not manic episodes. These episodes can transition from one to the other, or the patient can be euthymic between episodes. According to the DSM-5, mania is characterized by a persistently elevated or irritable mood with increased energy that lasts at least 1 week or requires hospitalization. It is accompanied by three or more of the following: increased self-esteem, decreased sleep, pressured speech. racing thoughts, distractibility, psychomotor agitation or hyperactivity, and disinhibition or impulsivity (eg, gambling, sexual promiscuity, frivolous spending). Delusions and hallucinations can occur during manic episodes. Hypomanic episodes are similar to manic episodes but are less severe and do not markedly impair social functioning or require hospitalization. Depressive episodes can occur with bipolar disorder and are classically characterized by depressed mood, anhedonia, feelings of guilt, changes to sleep patterns (eg, sleeping too much or too little), decreased energy, poor concentration, decreased appeme, psychomotor slowing, and suicidal ideation. Both depressive and manic episodes are treated with mood stabilizers (eg, lithium, valproate) or antipsychotic medications, which also serve to prevent future mood episodes when patients are euthymic. Incorrect Answers: B, C, D, and E. Chronic fatigue syndrome (Choice B) is a syndrome with unclear pathophysiology that presents with pervasive fatigue, post-exertional malaise, cognitive impairment, unrefreshing sleep, and orthostatic intolerance. It may present with depressive symptoms: however manic episodes are inconsistent with chronic fatigue syndrome. Cyclothymic disorder (Choice C) presents with hypomanic and depressive symptoms that fail to meet diagnostic criteria for a hypomanic or depressive episode. Symptoms must last for at least 2 years and not cause significant impairment. This patient's symptoms are consistent with a manic episode, which makes bipolar disorder more likely. HIV infection (Choice D) can be associated with manic and depressive symptoms. However, HIV-induced mania commonly occurs in late-stage infection, and this patient does not demonstrate signs of advanced HIV infection. Additionally. discrete periods of depression, mania, and euthymia are more consistent with bipolar disorder. MaJor depressive disorder (Choice E) presents classically with five of the following symptoms: depressed mood, anhedonia, feelings of guilt, insomnia or hypersomnia. decreased or increased appetite, fatigue, impaired concentration, anorexia, psychomotor slowing, and suicidal ideation. Though this patient presents with features of a major depressive episode, history of a manic episode signifies an underlying bipolar disorder diagnosis rather than (unipolar) major depressive disorder.","edu_obj":"Bipolar disorder consists of episodes of hypomania or mania, frequently in addition to depressive episodes. Manic and hypomanic episodes are characterized by a persistently elevated mood with increased energy, increased self-esteem, decreased sleep, pressured speecl1, racing thoughts, distractibility, psychomotor agitation or hyperactivity, and disinhibition or impulsivity."},{"block":2,"item":44,"image_alt":"","image_url":"","stem":"An 8-year-old boy is brought to the physician by his mother because of a 6-month history of difficulty reading and impulsive behavior. His full-scale IQ is 103, and his reading and math achievement scores are 101 and 97, respectively. The Conners Rating Scales and Child Behavior Checklist show clinically significant levels of inattention. impulsivity, and hyperactivity. Mood disorder scales and results of a hearing loss test and a vision test are within the reference ranges. The most appropriate therapy for this patient is a drug that affects which of the following neurotransmitters?","choices":{"A":"Acetylcholine","B":"y-Aminobutyric acid","C":"Glutamate","D":"Norepinephrine","E":"Serotonin"},"correct":"D","explanation":"Attention-deficiVhyperactivity disorder (ADHD) presents with chronic symptoms of hyperactivity, impulsivity, and/or inattention that occur in more than one setting and impair academic, social, and/or emotional function. Children with predominant hyperactivity symptoms are unable to sit still and may have difficulty taking turns (postulated to result from a dysregulated dopamine reward pathway), whereas children with predominant inattentive symptoms tend to daydream, process information slowly, and demonstrate difficulty in completing tasks (related to norepinephrine dysregulation). Stimulants, which include amphetamine salts and methylphenidate, are first-line agents that increase synaptic dopamine and norepinephrine. In patients unable to tolerate or benefit from stimulants, second-line agents include norepinephrine reuptake inhibitors (eg, atomoxetine) or alpha-2 agonists (eg, clonidine, guanfacine). Incorrect Answers: A, B, C, and E. Acetylcholine (Choice A) is a neuromodulator that mediates attention, learning, and memory. Acetylcholinesterase inhibitors (eg, donepezil, rivastigmine) are utilized to improve cognition in patients with dementia. y-Aminobutyric acid (GABA) (Choice B) and GABAA receptors are the targets of sedative agents such as benzodiazepines and barbiturates. Benzodiazepines can be used for panic disorder. However, these medications are not effective for treatment of ADHD symptoms. Glutamate (Choice C) is the main excitatory neurotransmitter in the brain. N-methyl-o-aspartate (NMDA) glutamate receptor antagonists (eg, memantine) protect the brain from excitotoxicity and are useful for dementia. Other NMDA antagonists (eg, ketamine or phencyclidine) lead to dissociation. None are useful in the treatment of ADHD. Serotonin (Choice E) reuptake inhibitors are antidepressant medications commonly used for anxiety and depressive disorders. Some serotonergic antidepressants also increase noradrenergic signaling (eg, serotonin-norepinephrine reuptake inhibitors or tricyclic antidepressants) and are used as third-line agents to concurrently treat depressive disorders and ADHD, but stimulants are the first-line treatment for isolated ADHD symptoms.","edu_obj":"Attention-deficiVhyperactivity disorder (ADHD) presents with chronic symptoms of hyperactivity, impulsivity, and/or inattention resulting from dysregulated norepinephrine and dopamine signaling. Stimulants, which increase synaptic norepinephrine and dopamine, are first-line medications for ADHD."},{"block":2,"item":45,"image_alt":"","image_url":"","stem":"A 37-year-old man who is addicted to heroin begins methadone therapy. Which of the following pharmacologic approaches best describes this type of therapy?","choices":{"A":"~bslitutlon with a longer-acting agonist","B":"Substitution with a mixed agonisUantagonist","C":"Substitution with a preparation with quicker elimination","D":"Symptomatic treatment of piloerection","E":"Symptomatic treatment of withdrawal"},"correct":"A","explanation":"Opioid use disorder refers to recurrent misuse of opioids with associated loss of control, cravings, failed obligations, tolerance, and withdrawal. There are several options for treating opioid use disorder, including methadone, buprenorphine-naloxone, and naltrexone. The first two options work as opioid substitution therapy in that they satisfy cravings for opiolds without causing the euphOrla that commonly leads to opioid misuse. Methadone is an opioid receptor agonlst with a long half-life. Incorrect Answers: B, C, D, and E. Substitution with a mixed agonisVantagonist (Choice B) describes the mechanism of buprenorphine-naloxone. Buprenorphine is a partial agonist of the opioid receptor, whereas naloxone is a short-acting opioid receptor antagonist, which is included in the compound to reduce opportunities for misuse. Substitution with a preparation with quicker elimination (Choice C) is not a known mechanism for treatment of opioid use disorder. Symptomatic treatment of piloerection (Choice D) is not a current treatment strategy for opioid withdrawal or opiate use disorder. Though patients withdrawing from opioids may experience piloerection, there is no treatment that targets piloerection specifically. Symptomatic treatment of withdrawal (Choice E) may include benzodiazepines, clonidine, loperamide, and/or antiemetics, which target specific withdrawal symptoms. Though opioid agonists such as methadone are sometimes used to assist with acute withdrawal, they are not considered symptomatic treatment and are commonly used as long-term maintenance medications for opioid use disorder.","edu_obj":"Methadone is a common maintenance treatment for opioid use disorder that works as a long-acting opioid receptor agonist."},{"block":2,"item":46,"image_alt":"","image_url":"","stem":"A 52-year-old man comes to the physician because of a 2-week history of clumsiness of his left foot when playing soccer. He also has a 2-month history of intermitt!nt tingling in his left leg. Sensation to fine touch, vibration, and position is decreased in the left lower extremity. Muscle strength and deep tendon reflexes are normal throughout. An MRI of the spine is most likely to show a lesion compressing which of the following regions of the spinal cord?","choices":{"A":"Anterolateral funiculus on the left at C2","B":"Anterolateral funiculus on the right at C2","C":"Anterolateral funiculus on the left at TS","D":"Anterolateral funiculus on the right at TS","E":"Dorsal funiculus on the left at C2","F":"Dorsal funiculus on the right at C2","G":"Dorsal funiculus on the left at TS","H":"Dorsal funiculus on the right at TS"},"correct":"G","explanation":"This patient demonstrates localized sensory symptoms consistent with a dorsal column-medial lemniscus (DCML) tract lesion. His left foot incoordination is likely secondary to impaired proprioception. The dorsal funiculus carries white matter fibers of the 0CML tract. The DCML tract carries sensory fibers that mediate fine touch, pressure, vibration. and proprioception. These fibers travel ipsilaterally in the spinal cord before decussating in the medulla, signifying that a spinal cord lesion would produce ipsilateral symptoms at the level of the lesion and below. Therefore, this patient with left lower extremity sensory symptoms most likely has a left-sided thoracic or lumbar spine lesion at TS. The insidious onset of this patient's sensory symptoms is concerning for a space-occupying lesion such as a tumor. Incorrect Answers: A. B, C, 0, E, F, and H. Lesions of the anterolateral funiculus on the left at C2 (Choice A), anterolateral funiculus on the right at C2 (Choice B), dorsal funiculus on the left at C2 (Choice E), and dorsal funiculus on the right at C2 (Choice F) lead to upper extremity neurologic symptoms in addition to lower extremity symptoms. Additionally, the anterolateral funiculus carries motor fibers from the corticospinal tract. Lesions of the anterolateral funiculus lead to ipsilateral weakness and decreased deep tendon reflexes, not sensory symptoms. Lesions of the anterolateral funiculus on the left at TB (Choice C) and anterolateral funiculus on the right at TB (Choice D) lead to ipsilateral lower extremity weakness and decreased deep tendon reflexes. Sensory symptoms would be atypical. Lesions of the dorsal funiculus on the right at TS (Choice H) lead to sensory symptoms of the right lower extremity.","edu_obj":"The dorsal funiculus of the spinal cord carries sensory fibers of the dorsal column-medial lemniscus spinal tract. These sensory fibers mediate ipsilateral fine touch, pressure, vibration. and proprioception."},{"block":2,"item":47,"image_alt":"","image_url":"","stem":"The figure shows the effects of drug X, administered intravenously, on heart rate, atrioventricular (AV) conduction velocity, and force of ventricular contraction. Drug X most likely has which of the following actions?","choices":{"A":"α-Adrenergic agonist","B":"α-Adrenergic antagonist","C":"β-Adrenergic agonist","D":"β-Adrenergic antagonist","E":"Muscarinic agonist","F":"Muscarinic antagonist"},"correct":"F","explanation":"The autonomic nervous system is responsible for controlling heart rate. atrioventricular (AV) conduction velocity, and the force of ventricular contraction through its action on a variety of receptors. The sympathetic nervous system primarily acts through a- and 13-adrenergicreceptors, which are stimulated by dopamine, epinephrine, and norepinephrine. In the cardiovascular system, the a 1 receptor leads to smooth muscle contraction. especially of the vasculature, which increases blood pressure by increasing systemic vascular resistance. The 02-adrenergic receptor can decrease sympathetic lone and heart rate. The 131receptor, in comparison, causes increases in heart rate. myocardial contractility. and renin release. which all lead to increases in blood pressure. whereas the 13 2 receptor causes vasodilation. The parasympathetic nervous system, in contrast, acts primarily on muscarinic receptors in the heart. Muscarinic receptors. particularly M2, are also present in the heart, with M2 receptors decreasing heart rate and atrial contraction via their effects at the sinoatrial and AV nodal cells. In this figure, heart rate and AV conduction velocity increase while the force of ventricular contraction remains the same, which are effects that would be seen with a muscarinic antagonist. Incorrect Answers: A, B, C, D, and E. α-Adrenergic agonists (Choice A) can cause vasoconstriction if there is activation of the a 1 receptor compared to the a2 receptor, as with phenylephrine. This vasoconstriction results in a reflex bradycardia. In contrast, if the a 2 receptor is preferentially activated as it is in medications such as clonidine then hypotension and bradycardia can develop. α-Adrenergic antagonists (Choice B) include medications such as phentolamine. tamsulosin, and mirtazapine, with varying levels of effects on the different α-adrenergic receptors. These medications can cause orthostatic hypotension as a result of venous pooling with reflex tachycardia resulting. However, this tachycardia is caused by an increase in sympathetic stimulation to the heart to maintain cardiac output and would be associated with an increased force of ventricular contraction as well. 13-Adrenergicagonists (Choice C) can cause a variety of symptoms depending on their primary target Medications that target 131, such as dobutamine and epinephrine, result in an increase in heart rate and ventricular contraction. Medications that target 13 2 , such as albuterol, do not have significant effects on heart rate and ventricular contraction until a large enough dose has been given that the 131effects are displayed. 13-Adrenergicantagonists (Choice D) include medications such as carvedilol, metoprolol, and propranolol. They most commonly cause a decrease in heart rate and ventricular contractility and are used in the treatment of hypertension and arrhythmias. Muscarinic agonists (Choice E) have a variety of uses in medicine and include medications such as bethanechol, pilocarpine, and methacholine. These medications cause bradycardia, rather than tachycardia. because of their action at the sinoatrial node and AV junction.","edu_obj":"The autonomic nervous system is responsible for controlling heart rate, atrioventricular (AV) conduction velocity, and the force of ventricular contraction through its action on a variety of receptors. Muscarinic receptors are present in the sinoatrial node and AV junction, and when stimulated, lead to decreased heart rate and delayed AV conduction. In contrast, muscarinic antagonists cause tachycardia with an increase in AV conduction. Muscarinic receptors do not change the force of ventricular contraction."},{"block":2,"item":48,"image_alt":"Block 2 Q48 — Blood pressure response graph (Control, Prazosin, Cocaine)","image_url":"https://rotogrover.github.io/sa-forms/images/CBSSA31_B2Q48_graph.jpg","stem":"Drug X is injected intravenously into three subjects (including one control subject). The control subject is not pretreated, whereas the other two subjects are pretreated with either prazosin or cocaine. Blood pressure is recorded directly from the brachial artery (see graph). Drug X is most likely which of the following?","choices":{"A":"Epinephrine","B":"lsoproterenol","C":"Phenylephrine","D":"Physostigmlne","E":"Tyra mine"},"correct":"A","explanation":"The autonomic nervous system is responsible for controlling heart rate, the force of ventricular contraction, and vascular tone via a- and [3-adrenergic receptors. The a 1 receptor leads to smooth muscle contraction, especially of the vasculature, which increases blood pressure by increasing systemic vascular resistance. The [31 receptor, in comparison, causes increases in heart rate, myocardial contractility, and renin release, whereas the [32 receptor causes vasodilation. Many medications work simultaneously on multiple receptors, with a stronger affinity for one over the other. However, if one of the receptors is blocked, the effects on the other receptor will dominate. For example, epinephrine is a direct sympathomimetic that exerts its effects with a greater affinity for [3-adrenergic receptors than for α-adrenergic receptors, except for at high doses where its effects on α-adrenergic receptors predominate. In this scenario, prazosin, which is a selective a 1-adrenergic receptor antagonist, causes Drug X to have the opposite effect than it has in the control subject. Cocaine is a sympathomimetic that causes prolongation of the action of Drug X. When challenged with epinephrine, increased blood pressure is expected in both the control subject and the subject pretreated with cocaine. However, when the α-adrenergic receptors are blocked, epinephrine's [3-adrenergic receptor effects predominate. This leads to vasodilation and decreased blood pressure secondary to f32\"adrenergic activation despite an increase in heart rate and ventricular contractility from [31-receptor activation. Despite the contrasting actions of these receptors, vasodilation predominates, leading to a decrease in blood pressure in the subject receiving prazosin, an a 1 receptor antagonist. Incorrect Answers: B, C, D, and E. lsoproterenol (Choice B) is solely a [3-adrenergic agonist with similar effects on both [31 and [32 receptors. Similar to epinephrine's actions after a receptors have been blocked, isoproterenol causes vasodilation in excess of its increase in heart rate and ventricular contractility. Therefore, the control subject would not have an increase in blood pressure after administration of isoproterenol. Phenylephrine (Choice C) is primarily an a 1-receptor agonist. Its main action is to increase blood pressure, as seen in the control subject. However, as it only works on a- receptors, pretreatment with prazosin would prevent it from having any effect at all. If Drug X were phenylephrine, there would be no change in the blood pressure in the subject pretreated with prazosin. Physostigmine (Choice D) is an acetylcholinesterase inhibitor primarily used in the treatment of anticholinergic toxicity. It causes increased acetylcholine concentration at nicotinic and muscarinic receptors throughout the body and results in decreased heart rate and blood pressure. Tyramine (Choice E) can cause increases in blood pressure, especially in those taking monoamine-oxidase inhibitors. When ingested, tyramine displaces norepinephrine into the synaptic cleft, leading to an increased blood pressure. Norepinephrine acts at α-adrenergic receptors with minor effects at the [31 receptor, so a less prominent decrease in blood pressure or even an increase could be seen in the prazosin subject because of increases in heart rate and contractility.","edu_obj":"The autonomic nervous system is responsible for controlling heart rate, the force of ventricular contraction, and vascular tone via a- and [3- adrenergic receptors. Many medications work simultaneously on multiple receptors with affinity for one over the other. If one target receptor is blocked, the effects on the other receptor will dominate. If a-receptors are blocked, epinephrine will lead to vasodilation and decreased blood pressure through its [32 effects exceeding its effects on f31-receptors."},{"block":2,"item":49,"image_alt":"","image_url":"","stem":"A 54-year-old man with severe hypertension suddenly collapses and loses consciousness while having an argument on the telephone. Physical examination shows pinpoint pupils and decorticate posturing. A CT scan of the head Is most likely to show which of the following types of hemorrhage?","choices":{"A":"Epidural","B":"lntraparenchymal","C":"lntraventricular","D":"Subarachnoid","E":"Subdural"},"correct":"B","explanation":"lntraparenchymal hemorrhages (IPH) occur most often in the setting of uncontrolled hypertension. IPHs often occur in the putamen, thalamus, pons, and cerebellum. Clinical presentation varies based on the location of the hemorrhage. This patient presenting with collapse, pinpoint pupils, and decorticate posturing most likely has a thalamic hemorrhage. Decorticate (flexor) posturing presents with flexion of the upper extremities and extension of the lower extremities. The rubrospinal tract carries signals from the red nucleus to the spinal motor neurons, which results in flexion of the upper extremities. Typical inhibitory signals from the cerebral cortex prevent this flexion from occurring. Lesions above the red nucleus interfere with these inhibitory signals, leading to disinhibition of the red nucleus and resultant flexor posturing. Incorrect Answers: A, C, D, and E. Epidural (A) hematomas present on CT scans as lens-shaped, bi-convex hyperdense collections abutting the inner table of the calvarium and are classically associated with trauma to the middle meningeal artery. Patients may present with initial loss of consciousness followed by a lucid interval and then progressive decline in mental status. lntraventricular (Choice C) hemorrhages are rare as a primary entity and are seen most commonly with an intraparenchymal or subarachnoid hemorrhage. Subarachnoid (Choice D) hemorrhage most often occurs because of aneurysmal rupture of an artery in the subarachnoid space or from traumatic injury Patients may present with an acute, severe headache, photophobia, and stupor or coma in severe cases. CT scan of the head discloses hyperdense blood products in the cerebral sulci and basal cisterns. Subdural (Choice E) hematomas (SDH) can be acute or chronic. Acute SDH is usually a result of trauma leading to rupture of the bridging veins. Patients are often elderly and may present with headache, vomiting, meningismus, or upper motor neuron exam findings. SDH appears as a crescent-shaped collection abutting the internal surface of the calvarium, not bound by suture lines.","edu_obj":"lntraparenchymal hemorrhage often occurs in the setting of uncontrolled hypertension and clinical manifestations depend on the location of the hemorrhage. Lesions above the red nucleus, such as a thalamic hemorrhage, can present with decorticate posturing."},{"block":2,"item":50,"image_alt":"","image_url":"","stem":"A 62-year-old woman Is brought to the emergency department 1 hour after she collapsed suddenly at nome. A normal AP CT ang10gram of a portion of !he cerebral arterial circulation is shown; the arrow indicates the area of occlusion. Which of the following neurologic findings would be most likely in this patient?","choices":{"A":"Ataxic movements of the left extremities","B":"Ataxic movements of the right extremities","C":"Left homonymous hemianopia","D":"Right homonymous hemlanopla","E":"Weakness of the left lower extremity","F":"weakness of the right lower extremity"},"correct":"F","explanation":"An occlusion of the anterior cerebral artery (ACA) leads to weakness of tile contralateral lower extremity. Cerebrovascular accidents (CVAs, also known as strokes) occur because of ischemic or hemorrhagic loss of blood supply to the brain. Approximately 80 to 85% of CVAs are ischemic, commonly arising from thromboembolic disease, whereas 15 to 20% of CVAs are hemorrhagic caused by blood vessel rupture. Risk factors for CVAs include smoking, hypertension, diabetes, carotid or intracranial atherosclerotic disease, history of hypercoagulability, atrial fibrillation, and advanced age. Classically, CVAs manifest as a neurologic deficit related to the affected part of the brain. The ACA supplies the medial frontal and parietal lobes (primary motor and sensory cortices), which control the motor and sensory function of the lower extremities. As motor and sensory tracts decussate in the caudal medulla or the spinal cord rostral to the innervated body area, brain lesions will produce contralateral neurologic symptoms. Thus, occlusion of the left ACA leads to weakness and sensory deficit of the right lower extremity. Incorrect Answers: A, B, C, D, and E. Ataxic movements of the left (Choice A) or right (Choice B) extremities are caused by occlusion of the anterior inferior cerebellar artery or posterior inferior cerebellar artery and consequent injury of the cerebellar peduncles or cerebellum. Lesions of the anterior cerebral artery do not lead to cerebellar dysfunction. Left (Choice C) and right (Choice D) homonymous hemianopia are commonly caused by occlusion of the posterior cerebral artery and consequent injury of the visual cortex in the occipital lobe or visual tracts distal to the optic chiasm. Lesions of the anterior cerebral artery do not lead to visual impairment. Weakness of the left lower extremity (Choice E) is caused by occlusion of the right ACA, right middle cerebral artery, or nght internal carotid artery, as these vessels supply the corticospinal tract or primary motor cortex. As motor and sensory tracts decussate in the caudal medulla or t11espinal cord rostral to the innervated body area, brain lesions will produce contralateral neurologic symptoms. Thus, weakness of the left lower extremity would be caused by occlusion of right-sided arteries.","edu_obj":"The anterior cerebral artery (ACA) supplies the medial frontal and parietal lobes (primary motor and sensory cortices), which control the motor and sensory function of the lower extremities. Occlusion typically leads to weakness and sensory deficits of the contra lateral lower extremity."},{"block":3,"item":1,"image_alt":"","image_url":"","stem":"A 31-year-old man comes to the physician 1 day after he noticed that the right side of his face was lower than the left while shaving. On physical examination, he is unable to grimace his right cheek or elevate his right eyebrow. Neurologic examination shows impaired facial expression and loss of taste in the anterior two thirds of the tongue. Which of the following additional neurologic findings is most likely in this patient?","choices":{"A":"Double vision","B":"Hoarseness","C":"Hyperacusis","D":"Impaired facial sensation","E":"Impaired sweating"},"correct":"C","explanation":"The facial (seventh cranial) nerve provides motor innervation to the muscles of the face. mediates taste by the anterior two-thirds of the tongue. and supplies parasympathetic innervation to the lacrimal, submandibular, and sublingual salivary glands. The facial nerve also supplies the stapedius muscle, which dampens oscillation of the stapes bone. limiting the amplitude of sound transmitted. An abnormality of the facial nerve is the most likely cause of this patient's left facial droop. Involvement of the forehead strongly suggests a peripheral nerve injury as opposed to a central nervous system injury, such as a cerebral infarction, which would cause an upper motor neuron pattern of facial weakness, sparing the muscles of the forehead. Abnormalities of lacrimation and taste can also occur. Hyperacusis may also result if stapedius action is limited. When complete ipsilateral facial nerve palsy occurs, it is known as Bell palsy. Bell palsy is commonly related to the reactivation of herpes simplex virus though it is often idiopathic. It is typically a benign condition that gradually improves over time although treatment with oral steroids and occasionally with acyclovir is indicated to expedite recovery. Incorrect Answers: A. B, D. and E. Double vision (Choice A) is caused by injury to the ocutomotor (third), trochtear (fourth), and abducens (sixth) cranial nerves. These nerves innervate the muscles of the eye. Bell patsy affects the facial cranial nerve. Hoarseness (Choice B) may be caused by injury to the recurrent laryngeal nerve, a branch of the vagus (tenth) cranial nerve that mediates voice production. Impaired facial sensation (Choice D) is caused by inJury to the trigeminat (fifth) cranial nerve. Impaired sweating (Choice E) occurs when sympathetic nerve fibers in the brainstem are injured, as in Horner syndrome.","edu_obj":"Bell palsy refers to isolated facial nerve palsy that is typically secondary to the reactivation of herpes simplex virus. Patients present with complete ipsilateral facial weakness that involves the forehead and can also experience taste and hearing abnormalities."},{"block":3,"item":2,"image_alt":"","image_url":"","stem":"A 3-year-old boy is brought to the physician because of a 6-month history of a sway back when standing. His brother had a history of muscle weakness and died of pneumonia at the age of 12 years. Physical examination shows hip girdle weakness. His serum creatine kinase concentration is markedly increased. This patient's symptoms are mJst likely caused by the accumulation of a defective protein in which of the following locations in muscle cells?","choices":{"A":"Cytoplasm","B":"Lysosome","C":"Mitochondria","D":"Nuclear membrane","E":"Peroxisome","F":"Smooth endoplasmic reticulum"},"correct":"A","explanation":"This patient exemplifies the history and examination findings classically seen with Duchenne muscular dystrophy, an X-linked disease often seen in male children. The disorder arises from a mutation in the DMD gene encoding dystrophin, a cytoplasmic protein that plays an important role in anchoring muscle actin filaments to the plasma membrane. Dystrophin dysfunction leads to muscle faligability, instability, and eventually to myonecrosis with replacement by adipose and connective tissue. Children with Duchenne muscular dystrophy typically have an unremarkable birth history. then begin to exhibit signs of proximal muscle weakness early in childhood. Physical examination reveals difficulty rising from squatting position, calf pseudohypertrophy, and a Gower sign (ie, using hands to \"climb up\" the lower extremities when rising from the floor). Muscle biopsy used to be a mainstay of diagnosis, but genetic testing has limited the utility of biopsy. Most affected patients will require the use of a wheelchair by early adolescence. Additional late findings include dilated cardiomyopathy and respiratory failure, which may be the cause of death in these patients. Incorrect Answers: B. C, D, E, and F. Lysosomes (Choice B) are the site of dysfunction in lysosomal storage disorders, including Gaucher disease, mucopolysaccharidosis I and II, Niemann-Pick disease, and Tay-Sachs disease. Mitochondria (Choice C) are the site of dysfunction in neurologic and muscular diseases such as Leber hereditary optic neuropathy, maternally inherited diabetes and deafness. myoclonic epilepsy with ragged red fiber, and MELAS syndrome. The nuclear membrane (Choice D) has recently been appreciated as the site of dysfunction in several rare neural and muscular disorders collectively known as nuclear envelopathies, including Emery-Dreifuss muscular dystrophy, autosomal dominant limb-girdle muscular dystrophy, dilated cardiomyopathy with conduction system disease, and particular forms of Charcot-Marie-Tooth disease. The peroxisome (Choice E) is the site of the peroxisomal storage disorders, including Zellweger syndrome, infantile and adult Refsum disease, and neonatal leukodystrophy. The smooth endoplasmic reticulum (Choice F) is the site of dysfunction in glycogen storage disease, type I.","edu_obj":"Duchenne muscular dystrophy is an X-linked recessive condition that is caused by mutations in the DMD gene encoding dystrophin, a cytoplasmic protein that plays an important role in anchoring muscle actin filaments to the plasma membrane. Duchenne muscular dystrophy results in progressive proximal muscle weakness after a period of relatively normal development. Symptoms include an inability to rise from a squatting position and weakness of the lower limb girdle. Late complications include dilated cardiomyopathy and respiratory insufficiency."},{"block":3,"item":3,"image_alt":"Block 3 Q3 — Photograph of brainstem with labeled cranial nerves A–E","image_url":"https://drive.google.com/uc?id=REPLACE_B3Q3_FILE_ID","stem":"A previously healthy 50-year-old man is brought to the physician because of a 2-week history of blurred vision. Neurologic examination shows inability of the left eye to look to the left. The right eye movement shows no abnormalities. This patient most likely has a lesion in which of the following labeled cranial nerves in the photograph of the brain stem shown?","choices":{"A":"(Oculomotor nerve)","B":"(Trigeminal nerve)","C":"(Abducens nerve)","D":"(Facial nerve)","E":"(Glossopharyngeal nerve)"},"correct":"C","explanation":"The abducens nerve arises from the midpons and exits the brainstem ventrally at the pontomedullary junction. It ascends steeply through the subarachnoid space across the clivus before entering the cavernous sinus. It exits the cavernous sinus through the superior orbital fissure before reaching its target, the lateral rectus muscle, in the lateral orbit. The most common causes of acute abducens nerve palsy in adults include microvascular ischemia, idiopathic causes, increased intracranial pressure, and trauma. The abducens nerve is fragile and vulnerable to injury as it crosses the clivus by any mechanism causing downward traction, such as brain herniation. Abducens nerve palsy presents with horizontal diplopia and ipsilateral abduction deficits of the affected eye. Treatment includes systemic workup for vasculopathic risk factors, neurosurgical intervention to alleviate intracranial pressure or herniation, and patching to reduce diplopia. Abducens nerve palsy secondary to microvascular disease may resolve spontaneously over several months.

Incorrect Answers: A, B, D, and E.

Choice A indicates the oculomotor nerve. The oculomotor nerve is responsible for motor innervation of the levator palpebrae superioris; the superior, medial, and inferior rectus muscles; as well as the inferior oblique muscle. Deficits of the oculomotor nerve present with ptosis, exotropia, and hypotropia.

Choice B indicates the trigeminal nerve. The trigeminal nerve provides somatic sensory innervation to the face and scalp. The mandibular nerve (ie, the V3 branch of the trigeminal nerve) additionally controls the muscles of mastication and mediates pain and temperature sensation in the anterior two-thirds of the tongue.

Choice D indicates the facial nerve. The facial nerve provides motor innervation to the muscles of the face, parasympathetic innervation to the lacrimal, submandibular, and sublingual salivary glands, and sensory innervation to the anterior tongue and the external auditory canal.

Choice E indicates the glossopharyngeal nerve. The glossopharyngeal nerve provides motor innervation to the stylopharyngeus muscle. It also stimulates secretion from the parotid gland.","edu_obj":"The abducens nerve exits the brainstem ventrally at the pontomedullary junction. The abducens nerve innervates the lateral rectus muscle of the eye. Abducens nerve palsy may result from microvascular ischemia and presents with binocular horizontal diplopia and ipsilateral abduction deficits of the affected eye."},{"block":3,"item":4,"image_alt":"","image_url":"","stem":"A 55-year-old man comes to the office because of a 2-week history of an increasingly large and painful lump on his right shoulder. The lump began as a pea-sized red bump. He has no history of serious illness and takes no medications. Temperature is 38.0°C (100.4°F); all other vital signs are within normal limits. Physical examination shows a 5-cm, inflamed carbuncle on the right shoulder. Treatment with a 7-day course of cephalexin is initiated. The carbuncle in this patient Is most likely located in the layer of skin that has which of the following embryologic precursors? ~","choices":{"A":"Dermatome","C":"Neurotome","D":"Sclerotome","E":"Syndetome"},"correct":"A","explanation":"Embryologically, a dermatome describes the primordial tissue that gives rise to the dermis, which in the developed form includes nerves, blood vessels, connective tissue. sweat glands, and hair follicles. A carbuncle describes a group of infected hair follicles, generally from the Staphylococcusspecies, and is commonly referred to as a \"boil.\" Infection within the dermis is therefore located in a layer of skin that began as an embryologic dermatome. In the developed organism, a dermatome describes an area of skin supplied by a spinal nerve ganglion. Nerve fibers from the dermatome send afferent signals to the central nervous system which then responds with efferent signals causing the patient pain in the affected area. Incorrect Answers: B, C. D, and E. A myotome (Choice B) describes the muscles supplied by a spinal nerve root in the developed organism. In embryologic terms, a myotome is the primordial tissue that gives rise to a muscle or group of muscles. The myotome would not be affected by a superficial skin infection or abscess. Deep abscesses can extend through to involve muscle; however, there is no evidence of abscess in this case. A neurotome (Choice C) or neuromere describes components of the neural tube that help establish the embryonic brain during development. A sclerotome (Choice D) describes the part of the developing embryo giving rise to bones and musculoskeletal tissue. A syndetome (Choice E) describes the component of the somite comprising tendon progenitor cells. These components would not be affected by a superficial skin infection.","edu_obj":"A dermatome refers to the embryologic precursor that gives rise to the dermis, and in the developed form. refers to the area of dermis innervated by a single spinal sensory nerve. Afferent fibers travel from the dermatome and provide sensory signals to the central nervous system, triggering an efferent response. This response may cause sensations including pain. Carbuncles, which are commonly caused by the Staphylococcusspecies, form within the dermis."},{"block":3,"item":5,"image_alt":"Block 3 Q5 — Dermatomal blistering rash on back (herpes zoster)","image_url":"https://rotogrover.github.io/sa-forms/images/CBSSA31_B3Q5_skin.jpg","stem":"A 55-year-old man with a 10-day history of a blistering rash on his back comes to the physician for a follow-up examination. He completed a course of antiviral medication 3 days ago, and he continues to have moderate pain. His vital signs are within normal limits. Physical examination shows the findings in the photograph. This rash is most likely located in which of the following dermatomes?","choices":{"A":"T4","B":"T7","C":"T11","D":"L1","E":"S1"},"correct":"D","explanation":"A dermatome describes an area of skin supplied by a spinal nerve ganglion. Nerve fibers from the dermatome send afferent signals to the central nervous system which responds with efferent signals causing pain in the affected area. The T11 dermatome travels in a band-like arc from the lower thoracic spine to the anterior abdomen, terminating just below the umbilicus. Herpes zoster, which is a reactivation of latenUdormant varicella virus, often affects thoracic derrnatomes, though any derrnatome can be affected. It initially presents as pain and paresthesia in a dermatomal pattern that progresses to a group of clustered vesicles on an erythematous base over several days. As the rash evolves, the vesicles rupture and become crusted. Following resolution of the infection, the skin changes also resolve. Patients may experience post- herpetic neuralgia and persistent pain at the site of reactivation, even after resolution of herpes zoster. Herpes zoster infection, when localized, generally affects only one dermatome because the virus replicates in the dorsal root ganglion of a single spinal nerve. Disseminated zoster infection across multiple dermatomes can occur in the setting of severe infection or immunocompromise. Herpes zoster is generally treated with antiviral medications, including acyclovir or valacyclovir. as well as medication for pain management. Incorrect Answers: A, B, D, and E. The T4 (Choice A) dermatome extends from the upper thoracic spine to the areola anteriorly. It is superior to the T11 dermatome. The T7 (Choice B) dermatome extends from the mid thoracic spine to the skin between the areola and umbilicus. It is superior to the T11 dermatome. The L1 (Choice D) dermatome extends from the upper lumbar spine to the inguinal area. It is inferior to the T11 dermatome. The S1 {Choice E) dermatome extends from the upper sacrum down the lower extremities. It is inferior to the T11 dermatome. Sarcoptesscabiei is a mite that is transmissible by skin-to-skin contact, typically by family members or sexual partners. Skin infestation typically occurs on the sides or webs of the fingers, wrists, axillae, areolae, or genitalia, and leads to intense pruritus. Physical examination commonly shows several small, erythematous papules that are frequently excoriated from scratching and may reveal mite burrows. In some cases, lesions have a crusted appearance. Diagnosis of scabies is confirmed by microscopic examination showing mites, eggs, or feces. Scabies is managed with topical or oral antiparasitic agents, such as permethrin. Incorrect Answers: A, B. c, and E. Leishmaniadonovani (Choice A) is a member of the protozoa genus Leis/Jmaniaand is one of several species associated with development of leishmaniasis. Leishmaniasis has cutaneous and visceral forms. The vector for leishmaniasis is the sandfly. A pink papule with overlying crust may develop al the site of a bile on uncovered skin. Additional cutaneous lesions may develop and spread along the draining lymphatics. In leishmaniasis, histopathologic visualization of amastigotes within macrophages on blood smear or tissue biopsy is diagnostic. Loa Joa(Choice B) is a parasitic worm passed to humans from deerflies and is native to west and central Africa. Loiasis is caused by loa loa infection and presents with itchy, non-painful swellings commonly involving the skin surrounding joints. as well as the eyelids. Ma/assezia furtur(Choice CJ causes tinea versicolor, which clinically presents with hypopigmented and hyperpigmented macules and patches with a fine scale, and at sites of high sebum production, including the chest and back. A KOH preparation of a skin scraping is diagnostic and will show fungal spores and short hyphae along the edges of epidermal cells. Tinea versicolor may be treated using topical antifungal preparations, including topical ketoconazole or selenium sulfide preparations. Trichophyton mentagrophytes (Choice E) is a dermatophyte that can cause superficial infection on any part of the skin. but most commonly affects the scalp (tinea capilis), trunk or extremities (tinea corporis). nail (tinea unguium), groin (tinea cruris). and foot (tinea pedis). This may be treated using topical antifungal preparations, including topical ketoconazole.","edu_obj":"Herpes zoster infection presents in a dermatomal distribution and results from varicella virus reactivation in the dorsal root ganglion of a nerve. The T11 dermatome extends from the inferior thoracic spine to the inferior abdominal wall below the umbilicus."},{"block":3,"item":6,"image_alt":"Block 3 Q6 — Photomicrograph of skin scraping (KOH preparation)","image_url":"https://drive.google.com/uc?id=REPLACE_B3Q6_FILE_ID","stem":"An 8-year-old boy is brought to the physician because of an itchy rash for 3 days. Physical examination shows an excoriated rash over the right wrist and around the waist. A 1.5-cm linear tunnel is seen over the right wrist. A photomicrograph of scrapings from the affected area is shown. Which of the following is the most likely causal organism?","choices":{"A":"Leishmania donovani","B":"Loa loa","C":"Malassezia furfur","D":"Sarcoptes scabiei","E":"Trichophyton mentagrophytes"},"correct":"D","explanation":"Sarcoptes scabiei is a mite that is transmissible by skin-to-skin contact, typically by family members or sexual partners. Skin infestation typically occurs on the sides or webs of the fingers, wrists, axillae, areolae, or genitalia, and leads to intense pruritus. Physical examination commonly shows several small, erythematous papules that are frequently excoriated from scratching and may reveal mite burrows. In some cases, lesions have a crusted appearance. Diagnosis of scabies is confirmed by microscopic examination showing mites, eggs, or feces. Scabies is managed with topical or oral antiparasitic agents, such as permethrin. Incorrect Answers: A, B, C, and E. Leishmania donovani (Choice A) is a member of the protozoa genus Leishmania and is one of several species associated with development of leishmaniasis. Leishmaniasis has cutaneous and visceral forms. The vector for leishmaniasis is the sandfly. A pink papule with overlying crust may develop at the site of a bite on uncovered skin. Additional cutaneous lesions may develop and spread along the draining lymphatics. In leishmaniasis, histopathologic visualization of amastigotes within macrophages on blood smear or tissue biopsy is diagnostic. Loa loa (Choice B) is a parasitic worm passed to humans from deerflies and is native to west and central Africa. Loiasis is caused by loa loa infection and presents with itchy, non-painful swellings commonly involving the skin surrounding joints, as well as the eyelids. Malassezia furfur (Choice C) causes tinea versicolor, which clinically presents with hypopigmented and hyperpigmented macules and patches with a fine scale, and at sites of high sebum production, including the chest and back. A KOH preparation of a skin scraping is diagnostic and will show fungal spores and short hyphae along the edges of epidermal cells. Tinea versicolor may be treated using topical antifungal preparations, including topical ketoconazole or selenium sulfide preparations. Trichophyton mentagrophytes (Choice E) is a dermatophyte that can cause superficial infection on any part of the skin, but most commonly affects the scalp (tinea capitis), trunk or extremities (tinea corporis), nail (tinea unguium), groin (tinea cruris), and foot (tinea pedis). This may be treated using topical antifungal preparations, including topical ketoconazole.","edu_obj":"Scabies is a skin infestation by the mite Sarcoptes scabiei, which is transmissible by skin-to-skin contact, typically by family members or sexual partners. Scabies occurs on the sides or webs of the fingers, wrists, axillae, areolae, or genitalia and is associated with intense pruritus. Physical examination commonly shows several small, erythematous papules that are frequently excoriated, and diagnosis is confirmed by microscopic examination of a skin scraping showing mites, eggs, or feces. Scabies is managed with topical or oral antiparasitic agents including permethrin."},{"block":3,"item":7,"image_alt":"","image_url":"","stem":"A 32-year-old woman comes to the physician because of a 6-week history of pain at the base of her right thumb. She does not recall any trauma but says that she typically carries her heavy 6-month-old son with her right arm. Her vital signs are within normal limits. A test involving flexion of the fingers over the thumb to make a fist, followed by ulnar deviation, Is positive on the right. Which of the following is the most likely cause of this patient's pain?","choices":{"A":"Bursitis","B":"Enthesitis ~","C":"Osteoarthritis","D":"Osteomyelitis","E":"Tenosynovitis"},"correct":"E","explanation":"Tenosynovitis of the thumb, also termed de Quervain tenosynovitis. involves the first dorsal extensor compartment, which contains the extensor pollicis brevis and abductor pollicis longus tendons. Overuse of these tendons causes inflammation of the compartment, leading to pain at the base of the thumb that can radiate up the thumb or forearm. Tenosynovitis refers to inflammation of tendon, tendon sheath, and associated synovial tissue. It is commonly seen in mothers who hold their babies with their thumb extended and abducted. Diagnosis is performed with the Finkelstein test, in which the patient grasps their thumb in a closed fist, and the provider deviates their wrist in an ulnar (medial) direction. Pain elicited along the base of the thumb or radial aspect of the wrist is suggestive of de Quervain tenosynovitis. Treatment is typically conservative and includes activity modification, NSAIDs, splinting, and steroid injection. Incorrect Answers: A, B, C, and D. Bursitis (Choice A) is inflammation of the thin, sac-like, fluid-filled structures that reduce friction and permit motion between layers of connective tissue, generally between tendons, ligaments, and bones. It is more commonly associated with larger structures, such as the greater trochanter and olecranon, but rarely occurs in the hand. It presents with localized tenderness, swelling, erythema, and warmth, and can be diagnosed with ultrasonography or MRI. Enthesitis (Choice B) is inflammation of the sites where tendons and ligaments insert into bone. It is associated with seronegative spondyloarthropathies, such as psorialic arthritis and ankylosing spondylitis. Because it commonly presents as part of a larger systemic inflammatory process, treatment includes NSAIDs and disease modifying anti-rheumatic drugs. Osteoarthritis (Choice C) of the carpal-metacarpal (CMC) joint of the thumb is more common in older patients. It presents with pain localized to the base of the thumb and difficulty with grasping and pinching motions. Pain elicited by a CMC grind test is suggestive of this diagnosis, which can be confirmed with evidence of osteoarthritis on x- ray. Osteomyelitis (Choice D) is an infection of bone and bone marrow that occurs in acute, subacute, and chronic variants. Caused by direct inoculation or hematogenous spread of bacteria, patients typically present with localized pain and inflammation, low-grade fever, and increased inflammatory markers (eg, C-reactive protein). MRI is the best modality for diagnosis, but x-rays can reveal localized erosion in subacute and chronic disease.","edu_obj":"De Quervain tenosynovitis of the thumb is classically seen in young mothers due to the repetitive strain caused by carrying infants. Tenosynovitis refers to inflammation of the tendon, tendon sheath, and associated synovial tissue. Diagnosis can be confirmed by a positive Finkelstein test. Treatment is typically conservative and includes activity modification, NSAIDs, splinting, and steroid injection."},{"block":3,"item":8,"image_alt":"","image_url":"","stem":"A 35-year-old man comes lo the office because of a 3-month history of an enlarging, painless lump on the back of his left thigh. He also has had weakness in his left thigh and leg. Phystcal examinauon shows a 7-cm, hard, nonmoblle swelling on tile left posterior thigh. sensation to plnpriCI<1sdecreased along the posterior tl'llgh and below the knee. Sagiltal and axial views from a CT scan of the left thigh are shown. A biopsy specimen of the lump confirms a rhabdomyosarcoma. The most likely cause ot the findings in this patient Is compression of which of the following nerves? mi4ui•ibii Nih•H,t•i!llmi","choices":{"C":"Lateral femoral cutaneous"},"correct":"F","explanation":"Rhabdomyosarcoma is a rare, aggressive neoplasm of mesenchymal skeletal muscle precursors that may occur in the orbit, head and neck, genitourinary tract, and musculoskeletal system. Histology shows small, round. blue cells that are desmin positive. Neoplasms of the lower extremities can compress peripheral nerves. the affected nerve can often be identified by the pattern of weakness and sensory loss. The sciatic nerve is a large nerve that originates from the lumbosacral plexus (L4 to S₃) and travels down the posterior thigh to the popliteal fossa. Above the knee, it provides motor innervation to the posterior compartment (eg, hamstrings) and sensory innervation to the posterior thigh. The sciatic nerve splits into the common peroneal and tibial nerves at the popliteal fossa These branches supply all muscles of the lower extremity below the knee and provide sensory innervation to the entire lower extremity below the knee except for the medial leg. Compression of the sciatic nerve presents with weakness of hip extension, knee ftexion, and ankle dorsiflexion, plantarflexion. eversion. and inversion. as well as impaired sensation in its territory. Incorrect Answers: A, B, C, D, and E. The femoral nerve (Choice A) arises from the lumbar plexus (L2 to L4). It innervates the anterior compartment of the thigh (eg, quadriceps muscles, sartorius) and provides sensation for the anterior thigh and anteromedial leg via the saphenous branch. Femoral nerve compression presents with weakness of hip flexion and knee extension, diminished patellar reflex, and impaired sensation of the anterior thigh. The ilioinguinal nerve (Choice B) supplies sensation to the base of the penis and anterior scrotum and is also involved in the cremasteric reflex arc. It does not innervate the lower extremity. The lateral femoral cutaneous nerve (Choice C) originates from the lumbar plexus (L2 to L3) and supplies sensation to the lateral thigh. Impingement can cause impaired sensation and paresthesia in its territory. The obturator nerve (Choice D) arises from the lumbar plexus (L2 to L4). It innervates the medial compartment of the thigh (eg, adductor muscles, gracilis muscle) and provides sensation for the medial thigh. Obturator nerve compression typically presents with impairment in hip adduction and sensation of the medial proximal thigh. Impaired sensation of the posterior thigh and distal lower extremity would be atypical. The posterior cluneal nerves (Choice E) arise from the lumbosacral plexus and provide sensory innervation to the skin of the buttocks. Compression results in paresthesia and impaired sensation of the lower back and buttocks regions.","edu_obj":"The sciatic nerve travels down the posterior thigh and splits into the common peroneal and tibial nerves. It innervates the hamstrings as well as all muscles below the knee and provides sensory innervation to the entire lower extremity below the knee except for the medial leg. Compression of the sciatic nerve presents with weakness of hip extension, knee flexion, and ankle dorsiflexion, plantarflexion, eversion, and inversion, as well as impaired sensation in its territory."},{"block":3,"item":9,"image_alt":"","image_url":"","stem":"An 8-year-old boy is brought to the physician after his teacher reported that he has difficulty sprinting. He is able to exercise normally at a less vigorous pace. After exercise of the right upper extremity, a blood sample obtained from the vein just proximal to the exercised muscle does not show the expected increase in serum lactic acid concentration. An inborn error of metabolism in which of the following pathways in skeletal muscle is most likely in this patient?","choices":{"A":"Beta oxidation","B":"Gluconeogenesis","C":"Glycogen synthesis","D":"Glycogenolysis","E":"Pentose phosphate pathway"},"correct":"D","explanation":"Glycogen storage disease type V (McArdle disease) presents with fatigue and muscle cramping during exertion, typically in a patient who is otherwise developmentally normal. It is caused by an inborn defect in glycogenolysis. which is necessary to supply the active cell with substrate for making adenosine triphosphate. Free glucose is consumed rapidly during the initial phase of exercise, after which muscle switches to degradation of glycogen for metabolism. Glyccgen storage disease type Vis caused by a deficiency in skeletal muscle glycogen phosphorylase (also termed myophosphorylase deficiency), which hydrolyzes 1,4-glycosidic bonds to liberate glucose-1- phosphate monomers from glycogen molecules. Inability to break down glycogen results in muscle cramping, fatigue, and mild rhabdomyolysis with myoglobinuria. Resting creatine kinase concentrations may be mildly increased. Muscle breakdown can lead to electrolyte abnormalities and consequent arrhythmias. Blood glucose concentrations usually remain normal. Generally, after the initial fatigue and cramping, patients can resume exercising because muscle blood flow increases. and alternative forms of energy are utilized via gluconeogenesis and protein catabolism. The diagnosis is suspected on history and confirmed by genetic testing and biopsy showing increased muscle glycogen and potentially absent myophosphorylase. Alternatively, the diagnosis can be confirmed with an exertional forearm exercise test. When deprived of glucose, exercising muscle will break down protein and generate ammonia. The increased serum ammonia and absence of lactate indicates impaired glycolysis from the absence of glucose. Incorrect Answers: A, B, C, and E. Beta oxidation (Choice A) is the process by which fatty acids are converted into ketones and citric acid cycle substrates. It is impaired in medium-chain acyl-CoA dehydrogenase deficiency, a defect in the ability to ccnvert fatty acids into acetyl CoA; this presents with hypoketotic hypoglycemia, liver dysfunction, vomiting, lethargy, and seizures, and can lead to sudden death. Gluconeogenesis (Choice B) is impaired along with glycogenolysis in the liver in glycogen storage disease type I (Von Gierke disease). Patients present with hepatomegaly because of a buildup of glycogen in the liver. severe fasting hypoglycemia, and increased serum lactate, triglycerides. and uric acid. Glycogen synthesis (Choice CJ is impaired in glycogen storage disease type IV (Anderson disease). It is caused by a defect in a-1,4-glucan branching enzyme, which breaks expanding chains of glucose polymers and shifts a small polymer from a 1,4-glycosidic linkage to a 1,6-glycosidic linkage, forming a side chain. An absence of branching enzyme results in abnormally long and structurally unsound glycogen polymers, leading to cellular inclusions and osmotic imbalances that characterize Anderson disease. The pentose phosphate pathway (Choice E), also known as the hexose-monophosphate shunt pathway, converts glucose-6-phosphate to pentoses, nicotinamide adenine dinucleotide phosphate (NADPH). and ribose-5-phosphate, a nucleotide precursor. This pathway is impaired in glucose-6-phosphate dehydrogenase deficiency, which presents with hemolytic anemia during times of oxidative stress, such as infections and ingesting oxidizing agents (eg, sulfa drugs, fava beans). A blood smear will show Heinz bodies and bite cells.","edu_obj":"Glycogen storage disease type V (McArdle disease) is caused by absent or insufficient myophosphorylase, which prevents the liberation of glucose monomers from muscle glyccgen during exercise. Symptoms include early muscle fatigue and cramping. Biochemical analysis may show increased ammonia and an absence of lactate following exercise."},{"block":3,"item":10,"image_alt":"","image_url":"","stem":"A 9-year-old boy is brought to the physician by his mother 1 day after he had severe leg cramps while playing soccer. The mother says that he also has a 2-month history of fatigue and clumsiness. and that his face lacks expression. He tires easily with exercise. He has a 3-year history of migraine. He is at the 60th percentile for height and weight. Vital signs are within normal limits. Physical examination shows bilateral ptosis and limited vertical and horizontal gaze. His speech is slightly slurred. Examination of a muscle biopsy specimen shows ragged red fibers. Which of the following is the most likely diagnosis?","choices":{"A":"Becker muscular dystrophy","B":"Duchenne muscular dystrophy","C":"Mitochondrial myopathy","D":"Myotonic dystrophy","E":"Spinal muscular atrophy type 1"},"correct":"C","explanation":"Mitochondrial myopathies are a group of disorders characterized by neurologic and muscular symptoms, mitochondrial inheritance, and ragged red fibers on muscle biopsy. The disorders include chronic progressive external ophthalmoplegia (CPEO); Kearns-Sayre syndrome; mitochondrial myopathy, encephalopathy, lactic acidosis, and stroke-like episodes (MELAS syndrome); and myoclonic epilepsy with ragged red fibers (MERRF syndrome). The mitochondrial myopathies are caused by mutations in a variety of mitochondrial enzymes involved in oxidative phosphorylation, or in mitochondrial RNA, RNA translation, trafficking and incorporation of respiratory protein complexes, and maintenance of the inner mitochondrial membrane. Failure of mitochondrial oxidative phosphorylation results in reduced availability of ATP throughout the body, although muscle and nerve cells are particularly sensitive to a reduced supply of ATP. Patients typically present in childhood or adolescence with symptoms that are unique to each disorder, although findings generally include neurologic features such as cognitive impairment, epilepsy, stroke, ataxia, headache, hearing loss, and muscular findings such as ptosis, ophthalmoplegia, fatigue, muscle weakness, myoclonus, and cardiac conduction abnormalities. Treatment of mitochondrial myopathies is primarily supportive. The prognosis varies widely across the group of disorders; some, such as MELAS syndrome, are typically fatal by adulthood, while others, such as CPEO, are associated with a normal life expectancy. Early diagnosis and appropriate supportive treatment are essential, as mortality caused by cardiac conduction defects can be prevented with implantation of a pacemaker. Incorrect Answers: A, B, D, and E. Becker muscular dystrophy (Choice A) is a disorder of progressive muscle degeneration caused by X-linked recessive mutations in the DMD gene encoding dystrophin. It presents with progressive proximal muscular weakness, muscular atrophy, calf pseudohypertrophy, Gower sign when standing, and respiratory distress. While closely related to Duchenne muscular dystrophy (Choice B), which is also caused by mutations in DMD and which presents with similar findings, Becker muscular dystrophy is characterized by a milder course, with most patients living to the fourth or fifth decade of life. In contrast, Duchenne muscular dystrophy is characterized by a progressive course with most patients dying of respiratory failure in the third decade of life. Myotonic dystrophy (Choice D) is a genetic disorder caused by expansion of a trinucleotide repeat characterized by muscle weakness, myotonia, cataracts, frontal balding, cardiac arrhythmias, and hypogonadism. The most frequently affected muscles include the facial muscles, sternocleidomastoids, distal forearm muscles, intrinsic hand muscles, and ankle dorsiflexors. Spinal muscular atrophy (SMA) type 1 (Choice E) is a particularly severe disease within the spectrum of SMA disorders, which are caused by mutations in the SMN1 gene. SMA is a group of autosomal recessive disorders characterized by motor neuron degeneration and resultant progressive hypotonia and areflexia. Patients with SMA exhibit difficulty with mobility and frequently experience respiratory distress and difficulty feeding. SMA type 1, also known as Werdnig-Hoffman SMA, is a severe, infantile-onset form of SMA that leads to hypotonia and respiratory failure within the first 6 months of life. Treatment is primarily supportive.","edu_obj":"Mitochondrial myopathies are a group of disorders characterized by neurologic and muscular symptoms, mitochondrial inheritance, and ragged red fibers on muscle biopsy. They are caused by mutations in mitochondrial enzymes involved in oxidative phosphorylation and mitochondrial function. Treatment is primarily supportive."},{"block":3,"item":11,"image_alt":"","image_url":"","stem":"During a study of exercise physiology, a healthy 30-year-old woman runs on a treadmill for 20 minutes at a rate of 7 miles per hour. At the end of the study. her cardiac output has increased from 5 L/min to 15 L/min; the cerebral perfusion pressure has remained relatively constant. Which of the following mechanisms best explains these findings?","choices":{"A":"Decreased intracranial pressure","B":"Increased cerebrospinal fluid reabsorption","C":"Increased venous drainage","D":"Myogenic arteriolar constriction","E":"Reflex bradycardia"},"correct":"D","explanation":"Cardiac output (CO) influences mean arterial pressure (MAP) via the following relationship: MAP= CO x SVR, where SVR is systemic vascular resistance. In most organs, when CO increases. MAP can be kept relatively stable by decreasing SVR. This is accomplished by relaxation of the arteriolar wall smooth muscle, which leads to vasodilation. When CO decreases, arterioles constrict and increase SVR, maintaining MAP. Under physiologic conditions, this variation in pressure and blood flow is accommodated by end organs. However. the compliance of the intracranial compartment and its contents are limited by the fixed, rigid space of the skull. Strict autoregulation of pressures inside this space is critical for maintenance of appropriate perfusion pressure to the brain. Cerebral perfusion pressure (CPP) is one of the primary determining factors of cerebral blood flow. CPP is the difference between intracranial pressure (ICP) and MAP, expressed as: CPP =MAP-ICP. Wl1ile mathematically, MAP can have a significant influence on CPP, cerebral autoregulation maintains CPP at a relatively stable level over a wide range of MAP (60 to 160 mm Hg in nonnotensive individuals). This is accomplished with vasoconstriction (myogenic arteriolar constriction) when MAP increases and vasodilation when MAP decreases. Incorrect Answers: A, B, C, and E. Decreased intracranial pressure (Choice A) can be achieved by shifting cerebrospinal fluid (CSF) into the spinal subarachnoid space or over a longer period of time, decreasing CSF production or increasing CSF reabsorption (Choice B) However, normal ICP ranges from 5 to 15 mm Hg The influence it exerts on CPP is small relative to that of arteriolar pressure and is mitigated by autoregulation. Changes in CSF dynamics will therefore not have a large effect on CPP under physiologic conditions. Increased venous drainage (Choice C) can enhance blood flow in other organs during exercise, but it is not a mechanism by which CPP is regulated. Venular tone has a lesser influence on MAP compared to arteriolar tone as there are minimal vascular smooth muscles in venules compared to arterioles. Reflex bradycardia (Choice E) is a mechanism by which MAP can be maintained during a significant increase in SVR. CO is affected by heart rate (HR) via the following equation: CO = SV x HR, where SV is stroke volume. Just like MAP, HR has little effect on CPP provided that MAP remains within the autoregulatory range. Extreme bradycardia or tachycardia leading to severe hypotension could decrease CPP.","edu_obj":"Because of cerebral autoregulation, changes in cardiac output have minimal impact on cerebral blood flow. Cerebral perfusion pressure (CPP) is maintained at a nearly constant level over a wide range of mean arterial pressure. Only blood pressures below or above the autoregulatory range of 60 to 160 mm Hg will affect CPP."},{"block":3,"item":12,"image_alt":"","image_url":"","stem":"An 84-year-old man is brought to the emergency department 30 minutes after an episode of syncope. Transthoracic echocardiography shows a 4-cm myxoma occupying the majority of the left atrium. The tumor will be excised using a robotically assisted operation via an oblique right atriotomy and transection of the interatrial septum. When making the incision into the left atr}lm to remove the myxoma, which of the following regions of the interatrial septum should be avoided in order to prevent injury to the cardiac conduction system?","choices":{"A":"Crista terminalis","C":"Posteroinferior region above the opening of the coronary sinus","D":"Superoanterior region above the limbus of the fossa ovalis","E":"Superoposterior region posterior to the fossa ovalis"},"correct":"C","explanation":"Normal cardiac conduction starts with an electrical impulse in the sinoatrial (SA) node located in the right atrium, which is depicted on a rhythm strip as the \"P wave.\" The electrical impulse is conducted throughout the atria, causing coordinated contraction of the right and left atria, with consequent active filling of the right and left ventricles. The electrical impulse also reaches the atrioventricular (AV) node located in the interatrial septum. Conduction is temporarily halted in the AV node to allow for complete active and passive filling of the ventricles, followed by conduction of the electrical impulse down the His-Purkinje system in the interventricular septum, then to the right and left bundle, and finally to the myocardial cells of the ventricles. This results in contraction of the right and left ventricles (QRS complex) with expulsion of blood into the pulmonary and systemic circulations, respectively. The ventricles subsequently repolarize (T wave) and relax to allow filling for the next cardiac cycle. The AV node is located in the posteroinferior region of the interatrial septum, more specifically, within Koch's triangle, which is formed by the opening of the coronary sinus, septal leaflet of the tricuspid valve, and membranous portion of the interatrial septum. Injury to the AV node may result in AV block, a conduction abnormality that that ranges in severity from benign prolongation of the PR interval (first-degree AV block) to dissociation between atrial and ventricular impulses (third-degree AV block), a life-threatening condition requiring prompt intervention with a pacemaker. Incorrect Answers: A, B, D, and E. The crista terminal is (Choice A) is a curved ridge in the posterolateral wall of the right atrium, not in the interatrial septum, that courses between the superior and inferior vena caval orifices. It corresponds with a groove in the external aspect of the right atrial wall known as the terminal sulcus. The SA node is located in the right atrial wall between these two structures. The Iossa ovalis region (Choice B) is a remnant of the foramen ovale, an opening in the interatrial septum that allows blood to shunt from the right to left atria in the fetal heart. After birth, fusion of the septum primum and septum secundum closes the foramen ovale and forms the fossa ovalis. Failure of closure results in a patent foramen ovale (PFO). The fossa ovalis (or a PFO, if present) can be transected to safely access the left atrium. The superoanterior region above the limbus of the fossa ovalis (Choice D) contains the Bachmann bundle before it leaves the interatrial septum to course along the left atrial wall. It is one of several pathways that

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CBSSA Self-Assessment Forms</title>
<style>
/* ── Reset & Base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --blue-dark:  #1a3a5c;
  --blue-mid:   #2d6fa5;
  --blue-light: #e8f2fb;
  --blue-bg:    #f0f6fc;
  --green:      #1e7e34;
  --green-bg:   #d4edda;
  --red:        #721c24;
  --red-bg:     #f8d7da;
  --yellow-bg:  #fff3cd;
  --gray-light: #f8f9fa;
  --gray-mid:   #dee2e6;
  --gray-text:  #495057;
  --radius:     8px;
  --shadow:     0 2px 8px rgba(0,0,0,0.10);
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  font-size: 15px;
  line-height: 1.6;
  background: var(--blue-bg);
  color: #212529;
  min-height: 100vh;
}

/* ── Header ── */
header {
  background: var(--blue-dark);
  color: white;
  padding: 0;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 6px rgba(0,0,0,0.3);
}
.header-inner {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 12px 20px;
  max-width: 960px;
  margin: 0 auto;
  flex-wrap: wrap;
}
header h1 { font-size: 1.15rem; font-weight: 700; flex: 1; min-width: 180px; }
header h1 span { color: #90caf9; }

/* ── Controls bar ── */
.controls {
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
}
select, input[type=text] {
  padding: 6px 10px;
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 6px;
  background: rgba(255,255,255,0.15);
  color: white;
  font-size: 13px;
}
select option { background: var(--blue-dark); color: white; }
input[type=text]::placeholder { color: rgba(255,255,255,0.6); }
input[type=text] { min-width: 180px; }

/* ── Progress ── */
.progress-bar-wrap {
  background: var(--blue-dark);
  padding: 4px 20px 8px;
}
.progress-inner { max-width: 960px; margin: 0 auto; }
.progress-text { font-size: 12px; color: rgba(255,255,255,0.7); margin-bottom: 3px; }
.progress-bar { height: 4px; background: rgba(255,255,255,0.15); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; background: #90caf9; border-radius: 2px; transition: width 0.3s; }

/* ── Main layout ── */
main { max-width: 960px; margin: 0 auto; padding: 20px 16px 60px; }

/* ── Question card ── */
.q-card {
  background: white;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  margin-bottom: 20px;
  overflow: hidden;
}
.q-header {
  background: var(--blue-mid);
  color: white;
  padding: 10px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 13px;
  font-weight: 600;
}
.q-badge {
  background: rgba(255,255,255,0.2);
  padding: 2px 8px;
  border-radius: 12px;
  font-size: 11px;
}
.q-body { padding: 18px 20px; }

/* ── Image ── */
.q-image {
  text-align: center;
  margin-bottom: 14px;
}
.q-image img {
  max-width: 100%;
  max-height: 340px;
  border-radius: 6px;
  border: 1px solid var(--gray-mid);
  box-shadow: 0 1px 4px rgba(0,0,0,0.1);
}
.q-image figcaption {
  font-size: 12px;
  color: var(--gray-text);
  margin-top: 6px;
  font-style: italic;
}

/* ── Stem ── */
.q-stem {
  font-size: 15px;
  line-height: 1.65;
  margin-bottom: 16px;
}

/* ── Lab values / table inside stem ── */
.q-stem pre, .q-stem code {
  font-family: 'SF Mono', Menlo, monospace;
  font-size: 13px;
  background: var(--gray-light);
  padding: 10px 14px;
  border-radius: 6px;
  white-space: pre-wrap;
  border: 1px solid var(--gray-mid);
  display: block;
  margin: 10px 0;
}

/* ── Choices ── */
.choices { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
.choice {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 10px 14px;
  border: 2px solid var(--gray-mid);
  border-radius: 6px;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  font-size: 14px;
  line-height: 1.5;
  text-align: left;
  width: 100%;
  background: white;
}
.choice:hover:not(:disabled) { border-color: var(--blue-mid); background: var(--blue-light); }
.choice.selected { border-color: var(--blue-mid); background: var(--blue-light); }
.choice.correct  { border-color: var(--green); background: var(--green-bg); }
.choice.wrong    { border-color: #c0392b; background: var(--red-bg); }
.choice-letter {
  font-weight: 700;
  min-width: 22px;
  color: var(--blue-mid);
  flex-shrink: 0;
}
.choice.correct .choice-letter { color: var(--green); }
.choice.wrong   .choice-letter { color: var(--red); }

/* ── Action buttons ── */
.q-actions { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
.btn {
  padding: 8px 18px;
  border-radius: 6px;
  border: none;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.15s;
}
.btn:hover { opacity: 0.85; }
.btn-primary   { background: var(--blue-mid); color: white; }
.btn-secondary { background: var(--gray-mid); color: #333; }
.btn-outline   { background: white; border: 2px solid var(--blue-mid); color: var(--blue-mid); }

/* ── Answer reveal ── */
.answer-section { display: none; }
.answer-section.visible { display: block; }
.answer-badge {
  display: inline-block;
  padding: 4px 12px;
  border-radius: 12px;
  font-weight: 700;
  font-size: 13px;
  margin-bottom: 12px;
}
.answer-badge.correct { background: var(--green-bg); color: var(--green); }
.answer-badge.not-available { background: var(--yellow-bg); color: #856404; }

/* ── Explanation blocks ── */
.expl-block {
  font-size: 14px;
  line-height: 1.7;
  color: #333;
  margin-bottom: 14px;
  padding: 14px 16px;
  background: var(--gray-light);
  border-radius: 6px;
  border-left: 3px solid var(--blue-mid);
}
.expl-label {
  font-weight: 700;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--blue-mid);
  margin-bottom: 6px;
}
.edu-block {
  font-size: 14px;
  line-height: 1.7;
  padding: 14px 16px;
  background: #eaf4f0;
  border-radius: 6px;
  border-left: 3px solid var(--green);
  margin-bottom: 14px;
}
.edu-block .expl-label { color: var(--green); }

/* ── Navigation ── */
.nav-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-top: 10px;
  border-top: 1px solid var(--gray-mid);
}
.nav-counter { font-size: 13px; color: var(--gray-text); }

/* ── Empty state ── */
.empty { text-align: center; padding: 60px 20px; color: var(--gray-text); }
.empty svg { width: 60px; height: 60px; opacity: 0.3; margin-bottom: 12px; }

/* ── Markdown table rendering ── */
.q-body table {
  border-collapse: collapse;
  width: 100%;
  font-size: 13px;
  margin: 12px 0;
}
.q-body th, .q-body td {
  border: 1px solid var(--gray-mid);
  padding: 7px 10px;
  text-align: left;
}
.q-body th { background: var(--blue-light); font-weight: 600; }
.q-body tr:nth-child(even) { background: var(--gray-light); }

/* ── Responsive ── */
@media (max-width: 600px) {
  .header-inner { padding: 10px 14px; }
  header h1 { font-size: 1rem; }
  main { padding: 14px 10px 50px; }
  .q-body { padding: 14px; }
  input[type=text] { min-width: 120px; }
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <h1>NBME CBSSA <span>Self-Assessment Forms</span></h1>
    <div class="controls">
      <select id="formSelect" onchange="filterQuestions()">
        <option value="31">Form 31</option>
      </select>
      <select id="blockSelect" onchange="filterQuestions()">
        <option value="0">All Blocks</option>
        <option value="1">Block 1</option>
        <option value="2">Block 2</option>
        <option value="3">Block 3</option>
        <option value="4">Block 4</option>
      </select>
      <input type="text" id="searchBox" placeholder="🔍 Search questions…" oninput="filterQuestions()">
    </div>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-inner">
      <div class="progress-text" id="progressText">Loading…</div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    </div>
  </div>
</header>

<main id="questionList"></main>

<script>
const ALL_QUESTIONS = [{"block":1,"item":1,"image_alt":"","image_url":"","stem":"A 29-year-old woman develops headache and shortness of breath 10 minutes after a transfusion of packed red blood cells is begun. Her temperature is 37.8°C (100°F), pulse is 100/min, respirations are 20/min, and blood pressure is 90/60 mm Hg. The transfusion is stopped immediately. Laboratory studies show free hemoglobin in urine and plasma. Which of the following erythrocyte blood group antigens is the most likely cause of this patient's transfusion reaction?","choices":{"A":"ABO","B":"Duffy","C":"Kell","D":"MN","E":"Rh"},"correct":"A","explanation":"Acute hemolytic transfusion reactions (AHTR) most often occur due to ABO incompatibility, which occurs when a patient receives an inappropriately typed and crossed transfusion product. When the patient receives an ABO incompatible blood product, preformed antibodies bind to antigens on the donor red blood cells. This leads to acute hemolysis as the patient's antibodies attack the transfused red blood cells (type II hypersensitivity reaction). Symptoms typically begin within an hour of the start of transfusion, and patients may present with fever, flank pain, chills, hypotension, and dark urine. If AHTR is suspected, the transfusion should be stopped immediately. Treatment involves supportive care with aggressive fluid administration, hemodynamic support, and pain management. Incorrect Answers: B, C, D. and E. Duffy (Choice B) and Kell (Choice C) are both antigens found on the surface of red blood cells. Transfusion of Duffy or Kell incompatible blood products can lead to severe AHTR. but the more common cause is ABO incompatibility. MN (Choice D) antigens are located on glycophorin A, which is a glycoprotein that is the primary determinant of the net negative charge of the red blood cell membrane. Transfusion reactions due to MN incompatibility are rare. Rh (Choice E) incompatibility is the most common cause of hemolytic disease of the newborn (HDN). HDN occurs in patients who are Rh(D)-positive and are born to mothers who are Rh(D)-negative but who were previously sensitized to Rh antigen either by a prior birth or blood transfusion.","edu_obj":"Acute hemolytic transfusion reactions (AHTR) most often occur due to ABO incompatibility, which occurs when a patient receives an inappropriately typed and crossed transfusion product. Patients will present with fever, flank pain, chills, hypotension, and dark urine within an hour of the start of the transfusion."},{"block":1,"item":2,"image_alt":"","image_url":"","stem":"A 62-year-old man with ischemic heart disease is admitted to the hospital because of a 4-day history of increasingly severe chest pain. Physical examination shows no abnormalities. Angiography shows a blockage in the anterior inte,ventricular (left anterior descending) artery. A stent is placed to relieve the obstruction. The stent contains paclitaxel. This drug works to decrease the incidence of restenosis through which of the following mechanisms of action?","choices":{"A":"Enhanced endothelial growth over the stent","B":"Increased adhesion of the stent to the atheromatous lesion","C":"Prevention of platelet adhesion to the stent","D":"Prevention of smooth muscle growth over the stent","E":"Stabilization of the cholesterol core of the atheromatous lesion"},"correct":"D","explanation":"Neointima formation is a common cause of vascular restenosis after percutaneous coronary intervention for coronary artery disease. The neointima is primarily composed of vascular smooth muscle cells in a rich extracellular matrix that have migrated into the stent to form a layer that shares some features with the tunica intima. Migration is promoted by macrophages and inflammatory cells in the setting of a foreign body reaction to the stent. The resulting neointima formation decreases the lumen diameter and may result in inadequate myocardial perfusion during exertion with recurrence of angina. Drug-eluting stents attempt to reduce the risk for neointima formation by the continuous, slow release of drugs that inhibit cell proliferation and the prevention of smooth muscle growth over the stent. Incorrect Answers: A, B, C, and E. Enhanced endothelial growth over the stent (Choice A) is not associated with paclitaxel and other drug-eluting stent agents. An endothelial lining does eventually grow over the stent material. acting like a normal arterial vessel and reducing the risk for stent thrombosis over time. Increased adhesion of the stent to the atheromatous lesion (Choice B) is not associated with paclitaxel. Early stent adhesion around the lesion and growth of the endothelial lining are important in the functioning of a successful stent. Prevention of platelet adhesion to the stent (Choice C) is a vital component of therapy, and patients are typically prescribed multiple antiplatelet agents in the initial period after the stent is placed, typically aspirin and a thienopyridine. Paclitaxel is not an antiplatelet agent. Stabilization of the cholesterol core of the atheromatous lesion (Choice E) is typically achieved with statins. Drug-eluting stents contain anti motility agents such as paclitaxel (an antimicrotubule agent) to prevent neointima formation in the initial phase after stent placement.","edu_obj":"Neointima formation is a common cause of vascular restenosis after percutaneous coronary intervention. Drug-eluting stents reduce the risk for neointima formation through inhibition of smooth muscle cell proliferation and growth over the stent."},{"block":1,"item":3,"image_alt":"","image_url":"","stem":"A newborn is delivered at 40 weeks' gestation. Physical examination shows ambiguous genitalia and testes in the inguinal canals. Chromosomal analysis shows a 46,XY karyotype. Serum studies show increased testosterone and decreased dihydrotestosterone concentrations, suggesting a decreased activity of steroid 5α-reductase 2. Hypoplasia of which of the following structures is most liKely in this patient?","choices":{"A":"Ductus deferens","B":"Ejaculatory ducts","C":"Epididymis","D":"Prostate","E":"Seminal vesicles"},"correct":"D","explanation":"5α-reductase 2 is an enzyme that catalyzes the metabolism of testosterone to dihydrotestosterone (DHT). Testosterone promotes the development of the mesonephric (Wolffian) duct that develops into the seminal vesicles, epididymis, vas deferens, and ejaculatory duct. DHT promotes the development of male external genitalia and the prostate from the genital tubercle and urogenital sinus. Individuals with 5α-reductase 2 deficiency have defective conversion of testosterone to DHT. leading to decreased concentrations of DHT and impaired development of the male urogenital tract and prostate. Individuals with 5α-reductase 2 deficiency may have ambiguous external genitalia or even female-appearing external genitalia, as well as undescended testes and prostate hypoplasia. These individuals otherwise have male-typical internal genitalia as a result of normal concentrations of testosterone. Incorrect Answers: A, B, C, and E. The ductus deferens (Choice A) are paired structures that convey sperm from the epididymis to the ejaculatory ducts. The development of the ductus deferens is promoted by testosterone, rather than DHT, and is therefore not affected by 5α-reductase 2 deficiency. The ejaculatory ducts (Choice B) are paired structures that form at the junction of the vas deferens and ducts of the seminal vesicles. The ducts empty into the prostatic urethra. Their development is promoted by testosterone. rather than DHT. The epididymis (Choice C) is a paired, coiled tubular structure in the male scrotum that connects each testis to its respective vas deferens. It is a site of sperm maturation. Like other internal male reproductive structures, its development is promoted by testosterone. The seminal vesicles (Choice E) are paired structures located in the pelvis posterior to the bladder that secrete the fluid that will constitute the bulk of semen into the ejaculatory duct. Like other internal male reproductive structures, their development is promoted by testosterone.","edu_obj":"5α-reductase 2 catalyzes the metabolism of testosterone to dihydrotestosterone (DHT). Individuals with 5α-reductase 2 deficiency exhibit decreased concentrations of DHT and impaired development of the male urogenital tract. Affected individuals may appear phenotypically female or have ambiguous external genitalia. as well as undescended testes and prostate hypoplasia, but have male-typical internal genitalia as a result of normal concentrations of testosterone."},{"block":1,"item":4,"image_alt":"","image_url":"","stem":"A 28-year-old woman comes to the physician because of intermittent severe headaches during the past 2 weeks. Her mother and maternal aunt were diagnosed with hypertension at the ages of 23 and 27 years, respectively. The patient's blood pressure is 220/110 mm Hg in both upper extremities. Abdominal examination shows a periumbilical bruit. Angiography is most likely to show which of the following in this patient?","choices":{"A":"Aneurysmal dilation of the abdominal aorta","B":"Beaded stenosis of the left renal artery","C":"Diffuse peripheral vascular disease","D":"Left subclavian artery occlusion with arm raising","E":"Narrowed diameter of the aortic arch"},"correct":"B","explanation":"Fibromuscular dysplasia is a non-inflammatory. non-atherosclerotic angiopathy of medium-sized arteries (eg, renal, carotid), that results in multifocal fibrous and muscular thickening of the vessel wall. The resultant stenosis causes secondary hypertension as a result of abnormal stimulation of the juxtaglomerular apparatus from low afferent blood flow leading to excessive production of renin and angiotensin. It can lead to severe, secondary hypertension in an otherwise healthy. young patient with no comorbidities or laboratory abnormalities. Examination findings often include signs of left ventricular hypertrophy such as an s 4 gallop, and a renal artery bruit auscultated lateral to the umbilicus. Angiography may show a bead-like appearance of the renal artery. ACE inhibitors can be considered for unilateral stenosis but can lead to acute renal failure in the setting of significant bilateral renal artery stenosis. Incorrect Answers: A, C, D. and E. Aneurysmal dilation of the abdominal aorta (Choice A), or an abdominal aortic aneurysm, does not lead to hypertension (though it can result from chronic hypertension) and would be abnormal in a young healthy patient. Rupture of an abdominal aortic aneurysm can lead to hypotension and hemorrhagic shock. Ultrasonography to screen for an abdominal aortic aneurysm is recommended by the USPSTF for men aged 65 to 75 years that have a history of smoking. Diffuse peripheral vascular disease (Choice C) would be unlikely in a young patient with no risk factors, and typically presents with claudication. or leg pain, following exertion that improves with rest. Claudication results from increased physiologic demand of the skeletal musculature for oxygen. which cannot be met because of the fixed obstruction to flow of stenotic peripheral arteries. Left subclavian artery occlusion with arm raising (Choice D) describes subclavian steal syndrome, which presents with exercise-induced vertigo, lightheadedness, and upper extremity fatigue. It is a sign that indicates significant atherosclerotic disease. Narrowed diameter of the aortic arch (coarctation of the aorta, Choice E), commonly presents in childhood with differential blood pressures between upper and lower extremities. It is associated with a bicuspid aortic valve and Turner syndrome. It typically presents with a systolic murmur and with diminished pulses and blood pressure when compared across extremities.","edu_obj":"Flbromuscular dysplasla Is a non-Inflammatory and non-atherosclerottc anglopathy of medium-sized arteries that can lead to renal artery stenosls and secondary hypertension because of excessive production of renin and angiotensin. Examination findings often include signs of left ventricular hypertrophy such as an s4 gallop. and a renal artery bruit auscultated lateral to the umbilicus. Angiography may show a bead-like appearance of the renal artery."},{"block":1,"item":5,"image_alt":"","image_url":"","stem":"A 25-year-old man comes to the physician because of a 6-month history of diarrhea, fatigue, and weight loss. Physical examination shows pallor. Laboratory studies show macrocytic anemia, hypercellular bone marrow, and erythrocyte precursors that are abnormally large. Which of the following is the most likely explanation for the hematologic findings in this patient?","choices":{"A":"Defect in cytoskeleton of the erythrocyte membrane","B":"Defect in a glycolytic enzyme of the erythrocyte","C":"Hemoglobinopathy","D":"Impaired DNA synthesis","E":"Impaired heme synthesis"},"correct":"D","explanation":"Folic acid, or vitamin Bg, is converted in the body to tetrahydrofolic acid. Tetrahydrofolic acid helps form several coenzymes involved in purine and pyrimidine synthesis, nucleoprotein synthesis, and erythropoiesis. Impaired DNA synthesis can lead to ineffective hematopoiesis across cell lines, presenting as megaloblastic anemia. Megaloblastic anemia manifests pathologically as erythrocyte macrocytosis, hypersegmented neutrophils, and hypercellular bone marrow. Laboratory studies show anemia, increased mean corpuscular volume, and normal leukocyte and platelet indices. Folic acid is contained in leafy vegetables and primarily absorbed in the jejunum. Folic acid deficiency is often seen in patients with malnutrition, alcohol use disorder, and patients taking antifolate medications (eg, phenytoin, methotrexate). Patients with folic acid deficiency commonly report fatigue, diarrhea, and anorexia. Physical examination may show pallor. In the case of an otherwise healthy, young patient with chronic diarrhea, fatigue, and weight loss, diagnostic consideration should be paid to primary small intestinal pathology, especially malabsorption syndromes such as celiac disease. Incorrect Answers: A, B, C, and E. A defect in cytoskeleton of the erythrocyte membrane (Choice A) is found in hereditary spherocytosis. Hereditary spherocytosis is a hemolytic anemia that commonly presents with jaundice and splenomegaly. The cytoskeleton is intact in folic acid deficiency. A defect in a glycolytic enzyme of the erythrocyte (Choice B) is found in pyruvate kinase deficiency, a hemolytic anemia that commonly presents with jaundice and splenomegaly. Glycolysis is intact in folic acid deficiency. Hemoglobinopathy (Choice C) describes numerous conditions including thalassemia and sickle cell disease, among others. These conditions cause anemia due to deficient production of normal adult hemoglobin or production of abnormal hemoglobin. Reticulocytosis and increased bilirubin concentrations can be seen if hemolysis is present, but these conditions are chronic and present at birth. Impaired heme synthesis (Choice E) occurs in lead poisoning and porphyria, which manifest as microcytic anemia. Folic acid is not involved in heme synthesis.","edu_obj":"Folic acid deficiency leads to impaired DNA synthesis, resulting in megaloblastic anemia. Megaloblastic anemia manifests pathologically as erythrocyte macrocytosis, hypersegmented neutrophils, and hypercellular bone marrow. Patients with folic acid deficiency commonly report fatigue, diarrhea, and anorexia. Physical examination may show pallor."},{"block":1,"item":6,"image_alt":"","image_url":"","stem":"A 16-year-old boy is brought to the physician for drainage of his third liver abscess in 3 years. Cultures of fluid obtained from the two prior abscesses grew Staphylococcus aureus and Burkholderia cepacia. respectively. Culture of fluid obtained via needle aspiration of the current lesion grows Aspergillus species. Which of the following is the most likelydiagnosis?","choices":{"A":"Chediak-Higashi syndrome","B":"Chronic granulomatous disease","C":"Job syndrome","D":"Leukocyte adhesion deficiency","E":"X-linked agammaglobulinemia"},"correct":"B","explanation":"Chronic granulomatous disease (CGD) is an immunodeficiency syndrome caused by a defect in the nicotinamide adenine dinucleotide phosphate (NADPH) oxidase complex. which is essential for neutrophilic destruction of catalase-positive pathogens. Most defects are inherited in an X-linked pattern. NADPH oxidase uses oxygen as a substrate for the generation of free radicals (superoxide anions). Superoxide dismutase and myeloperoxidase subsequently use these free radical oxygen species for the creation of hydrogen peroxide and hypochlorous acid. This pathway, known as the respiratory burst. results in bacterial death. NADPH oxidase-deficient cells can use hydrogen peroxide from bacteria to generate a respiratory burst. but catalase-positive bacteria can neutralize their own hydrogen peroxide. thus leaving the host cells without the substrate necessaIy to complete the respiratory burst. Recurrent pneumonia is the most common presenting infection in patients with CGD, but pyogenic infections of the skin and soft tissue. lymph nodes, and liver are also encountered. Common infecting bacteria include Staphylococcus spp, B. cepacia. and Nocardia spp. Patients with CGD are at risk for fungal infections, especially Aspergil/us spp. Diagnosis is made by an abnormal dihydrorhodamine test. or a nitroblue tetrazolium reduction test. In the latter test, normal pl1agocytes use the action of NADPH to reduce nitroblue, which leads to a color change from yellow to blue. Results from patients with CGD will not demonstrate color change. Incorrect Answers: A, C, D. and E. Chediak-Higashi syndrome (Choice A) is a rare. autosomal recessive disorder of the immune system caused by mutations in the lysosomal trafficking regulator gene (LYST) that encodes a protein essential for normal formation and transportation of lysosomes within the cell. Disruption of phagolysosome function leads to accumulation of giant granules in neutrophils, other granulocytes, and platelets. Clinical manifestations include recurrent bacterial infections, oculocutaneous albinism, peripheral neuropathy. and progressive neurologic dysfunction. Job syndrome (Choice C). also known as hyper-lgE syndrome, results from a defect in the JAK-STAT signaling pathway that leads to impaired Th17 cell differentiation. which in turn affects neutrophil chemotaxis. Patients present with coarse facies, eczema, and cutaneous cold abscesses, primarily from S. aureus. Leukocyte adhesion deficiency, or LAD (Choice D). is a group of disorders characterized by impaired leukocyte adhesion to the vascular endothelium in response to infection. Leukocytes retain the ability to phagocytose and eliminate foreign pathogens but are unable to migrate to sites of infection or inflammation in the extravascular space. LAD is typically characterized by recurrent bacterial infections. impaired wound healing, a delayed detachment of the umbilical cord after birth, and a lack of leukocytes at sites of infections with an absence of pus. X-linked (Bruton) agammaglobulinemia (Choice E) is caused by a mutation in the BTK gene, which encodes a tyrosine kinase essential for all stages of B lymphocyte development and proliferation. Patients with this gene mutation lack functioning B lymphocytes. resulting in low or absent serum immunoglobulins and recurrent bacterial infections caused by impaired humoral immunity. They do not typically exhibit susceptibility to viral or fungal infections, which are typically combated by T lymphocytes.","edu_obj":"Chronic granulomatous disease (CGD) is caused by a mutation in the nicotinamide adenine dinucleotide phosphate (NADPH) oxidase complex, which is necessary for the formation of reactive oxygen species in phagocytes. Deficiency results in impaired intracellular killing of pathogens by phagocytes. This presents as recurrent pyogenic infections with catalase-positive organisms such as S. aureus. B. cepacia, and Aspergil/us spp."},{"block":1,"item":7,"image_alt":"","image_url":"","stem":"A 24-year-old woman has increased range of motion in most of her joints. She is 183 cm (6 ft) tall and weighs 59 kg (130 lb); BMI is 18 kg/rn2. Examination shows pectus excavatum. Auscultation of the chest discloses a new diastolic murmur. Which of the following is the most likely cause of the murmur?","choices":{"A":"Aortic insufficiency","B":"Atrial septal defect","C":"Mitral insufficiency","D":"Mitral stenosis           <)","E":"Ventricular septa I defect"},"correct":"A","explanation":"Patients with Marfan syndrome characteristically are susceptible to lens dislocation, aneurysmal disease, and joint hypermobility. Degeneration of the aortic wall and aortic insufficiency from Marfan syndrome results from a genetic mutation leading to impaired synthesis of collagen. It can also result in early-onset cystic medial degeneration of the aortic root, which places patients at risk for aortic dissection. Aortic insufficiency results from an incompetent aortic valve that allows retrograde blood flow from the aortic root to the left ventricle (LV) during diastole, resulting in a diastolic murmur. This subsequently leads to an increased LV end-diastolic volume as both blood from the aorta and the left atrium fill the LV. Over time, eccentric hypertrophy of the LV leads to loss of normal compliance and progressive LV systolic dysfunction. Incorrect Answers: B, C, D, and E. Atrial septal defect (Choice B) presents with fixed splitting of the S2 heart sound and occurs due to a failure of closure of the embryologic connection between the right and left atria. Blood generally flows from the left atrium into the right atrium, increasing the amount within the right side of the heart and pulmonary circuit. Myxomatous degeneration of the mitral valve can eventually lead to mitral insufficiency (Choice C), which presents with a holosystolic murmur. Mitral stenosis (Choice D) presents with a diastolic murmur radiating to the axilla. If severe enough, it can result in left atrial enlargement, cardiogenic pulmonary edema, and arrhythmias such as atrial fibrillation and flutter. Rheumatic heart disease commonly causes insufficiency murmurs in the acute phase and stenotic murmurs later in life, predominantly affecting tile mitral valve. Ventricular septal defect (Choice E) is characterized by a llolosystolic murmur best heard in tile left lower sternal border. Often ventricular septal defects occur in benign fashion at birth and spontaneously close; in other cases, they are associated with structural heart defects such as tetralogy of Fallot.","edu_obj":"Aortic insufficiency results in an increased left ventricle (LV) end-diastolic volume as regurgitant blood from the aorta enters the LV during diastole, which can be auscultated as a diastolic murmur."},{"block":1,"item":8,"image_alt":"","image_url":"","stem":"A 42-year-old woman with recurring episodes of hypoglycemia comes to the physician for a follow-up examination. She says that the episodes occur regardless of how much or how little she has eaten. The patient is on medical leave from her job as a licensed practical nurse. She recently underwent an exploratory laparotomy to confirm the diagnosis of insulinoma, but no abnormalities were found. She is 173 cm (5 ft 8 in) tall and weighs 55 kg (120 lb); BMI is 18 kg/m 2. She appears mildly anxious. Her 2-hour postprandial serum glucose concentration is 70 mg/dl. Which of the following is the most likely diagnosis?","choices":{"A":"Conversion disorder","B":"Factitious disorder","C":"Hypoglycemia","D":"Insulinoma","E":"Metabolic syndrome"},"correct":"B","explanation":"In factitious disorder, patients consciously produce symptoms (eg, purposely injure themselves or self-administer insulin) for primary gain. Primary gain is the motivation to be cared for. which constitutes an unconscious motivator for the patient's conscious production of symptoms. Early losses. neglect, or abuse may disrupt patients' identity and relationships. Adopting the sick role may represent patients' attempts to cope with stress and stabilize their identity and relationships. Another risk factor for factitious disorder is a healthcare occupation, which increases patients' access to methods for fabricating symptoms. Diagnosis is supported by a history of multiple medical procedures with inconsistencies in the history, physical examination, or diagnostic studies (eg, repeated episodes of hypoglycemia despite the absence of insulinoma). Treatment includes regular follow-up with one physician who oversees management (as opposed to symptom-triggered appointments) and possible psychotherapy. Incorrect Answers: A. c, D, and E. Conversion disorder (Choice A). also known as functional neurological disorder, involves neurologic symptoms, such as sensory or motor dysfunction, that are not fully explained by objective findings on physical examination or imaging. Though the main motive is primary gain. as in this patient. functional neurological disorder symptoms are subconsciously produced, not fabricated. Further, this patient does not demonstrate neurologic dysfunction. Hypoglycemia (Choice C) episodes can be caused by malnourishment. critical illness, drug ingestions, or tumors such as insulinoma (Choice D). Insulinoma is a rare neoplasm that produces insulin. Patients with hypoglycemia present with lethargy. weakness. fatigue. neurologic symptoms (eg, stroke-like episodes. seizures), tremors, diaphoresis. and hypoglycemia. which are exacerbated by fasting or exercise. No tumors were identified on exploratory laparotomy. and this patient does not demonstrate evidence of malnourishment, drug ingestion, or critical illness. Metabolic syndrome (Choice E) is characterized by hypertension. abdominal obesity, insulin resistance with hyperglycemia, increased serum triglyceride levels. and decreased HDL-cholesterol. This patient demonstrates only hypoglycemia.","edu_obj":"In factitious disorder, patients consciously produce symptoms (eg, self-administer insulin) for primary gain. Primary gain is the motivation to be cared for, which constitutes an unconscious motivator for the patient's conscious production of symptoms. A history of multiple procedures and subjective or objective findings that are inconsistent with a known disease suggests factitious disorder."},{"block":1,"item":9,"image_alt":"","image_url":"","stem":"A 35-year-old man has a sinus tachycardia of 120/min. Which of the following best describes the relationship of ventricular contraction and relaxation in this patient?","choices":{"A":"Diastole and systole are equally prolonged","B":"Diastole and systole are equally shortened","C":"Diastole is prolonged more than systole","D":"Diastole is shortened more than systole","E":"Systole is prolonged more than diastole","F":"Systole is shortened more than diastole"},"correct":"D","explanation":"Tachycardia results in significantly decreased diastolic filling time. In normal sinus rhythm, cardiac conduction starts with an electrical impulse in the sinoatrial (SA) node located in the upper right atrium. The electrical impulse is conducted throughout the atria, causing coordinated contraction of the right and left atria (atrial systole) with active filling of the ventricles. This is the ventricular diastolic phase. The electrical impulse reaches the atrioventricular (AV) node located in the interatrial septum. Conduction is temporarily slowed in the AV node to allow for complete active and passive filling of the ventricles (PR interval), followed by conduction of the electrical impulse down the His-Purkinje system in the interventricular septum, then to the right and left bundles, and finally to the myocardial cells of the ventricles. This results in contraction of the right and left ventricles (ventricular systole, QRS complex) with expulsion of blood into the pulmonary and systemic circulations in the systolic phase. The ventricles subsequently repolarize (T wave) and relax to allow filling for the next cardiac cycle. Filling of the ventricles is essential for maintaining cardiac output via the Frank-Starling mechanism. Incorrect Answers: A. B, C. E. and F. Diastole and systole are equally prolonged (Choice A) is incorrect. Tachycardia leads to a shortened diastolic phase, not a prolonged one. Similarly. diastole is prolonged more than systole (Choice C) is not correct either. Diastole and systole are equally shortened (Choice B) and systole is shortened more than diastole (Choice F) are incorrect. In a heart with normal conduction, the duration of systole depends on conduction time from the AV node to the distal ventricular conduction network, which is not significantly altered by tachycardia. Rather, the time between conduction of the initial impulse in the SA node is shortened, which corresponds with diastole. Systole is prolonged more than diastole (Choice E) does not occur in tachycardia, but is observed in conditions that impair ventricular conduction, such as bundle branch blocks. Increased afterload, such as with hypertension or aortic stenosis, also prolongs systole as ventricular contraction takes longer to complete.","edu_obj":"Tachycardia shortens the duration of diastole and ventricular filling time, reducing preload. Severe or prolonged tachycardia can result in inadequate cardiac output and heart failure."},{"block":1,"item":10,"image_alt":"","image_url":"","stem":"A 58-year-old man with type 2 diabetes mellitus, a history of renal stones, dyslipidemia, and hypokalemia requires diuretic therapy for hypertension. Thiazide and loop diuretics differ most markedly in which of the following parameters of concern in this man?","choices":{"A":"Glucose tolerance","B":"Plasma lipid concentrations","C":"Plasma potassium concentration","D":"Plasma uric acid concentration","E":"Urinary calcium excretion"},"correct":"E","explanation":"The distal convoluted tubule (DCT) is the main site for Na• and er reabsorption in the nephron, making dilute and hypotonic filtrate. Hydrochlorothiazide (HCTZ) and other thiazide diuretics (eg, chlorthalidone) inhibit NaCl reabsorption in the OCT by inhibiting the action of the sodium-chloride cotransporter (NCC). These drugs reduce the diluting capacity of the nephron and result in urinary losses of sodium and potassium. HCTZ has the opposite effect on calcium; calcium ion loss is reduced by thiazide diuretics, and they are occasionally referred to as \"calcium sparing\" diuretics. Thiazide diuretics are a first-line therapy for hypertension. In contrast, loop diuretics (eg, furosemide, torsemide, bumetanide, ethacrynic acid) act at the thick ascending limb of the loop of Henle to reduce solute (and therefore solvent) reabsorption. They inhibit the sodium-potassium-chloride cotransport channel and increase calcium excretion. making them also useful in the treatment of hypercalcemia. By contrast, loop diuretics, through promotion of calcium excretion, may worsen renal stones which are most frequently made of calcium. Thiazide diuretics may be used instead in such cases. Incorrect Answers: A, B, C, and D. Glucose tolerance (Choice A) may be indirectly affected by thiazide diuretics as they are known to cause hyperglycemia as an adverse effect. Loop diuretics generally do not affect glycemic balance. Plasma lipid concentrations (Choice B) can be increased by both loop and thiazide diuretics. Plasma potassium concentration (Choice C) is decreased by both thiazide and loop diuretics, which both promote potassium excretion. Plasma uric acid concentration (Choice D) is increased by thiazide and loop diuretics.","edu_obj":"Both thiazide and loop diuretics reduce solute reabsorption. However, thiazide diuretics decrease calcium excretion, and loop diuretics increase calcium excretion, making thiazides more useful in cases of nephrolithiasis."},{"block":1,"item":11,"image_alt":"","image_url":"","stem":"A 60-year-old woman is found to have osteoporosis. Her last menstrual period was 10 years ago. She has a history of deep venous thrombosis. The physician wishes to initiate treatment with a medication that will improve the patient's bone density without increasing her risk for thrombosis or hot flashes. A drug from which of the following classes is most appropriate for this patient?","choices":{"A":"Bisphosphonates","B":"Gonadotropins","C":"Ovarian sex hormones","D":"Selective estrogen receptor modulators","E":"Vitamin D analogs"},"correct":"A","explanation":"Osteoporosis is caused by the loss of bone mineral density, commonly appearing in postmenopausal females of European descent and exacerbated in those with chronic steroid use and limited physical activity. The condition results from the interplay of three possible mechanisms: failure to achieve peak bone density. increased bone resorption. and decreased new bone formation. It is often asymptomatic until a minimally traumatic injury results in a fracture. most commonly involving the hip. distal radius. or vertebrae. Classically, serum calcium, parathyroid hormone (PTH). vitamin D. and phosphate are within normal limits. Decreased concentrations of vitamin D may contribute lo pathogenesis by causing increased concentrations of PTH even when serum calcium is within normal limits. The diagnosis of osteoporosis is made based on a DEXA scan once the bone density falls below 2.5 standard deviations of the mean for a young adult. Treatment includes correcting any modifiable risk factors, supplementing calcium and vitamin D. weight-bearing exercise therapy, and the use of osteoclast inhibitors, such as bisphosphonates. Bisphosphonates are similar in structure to pyrophosphate, and thus, incorporate into the bone mineral matrix. When this bone mineral matrix is broken down by osteoclasts, bisphosphonates enter the osteoclasts and initiate osteoclast apoptosis. Adverse effects of bisphosphonates include gastrointestinal upset. osteonecrosis of the mandible (particularly when administered intravenously), and a possible risk for atypical fractures. Incorrect Answers: B, C, D. and E. Gonadotropins (Choice B), such as follicle-stimulating hormone and luteinizing hormone, are primarily administered exogenously for ovarian induction during in vitro fertilization. They play no role in the management of osteoporosis. Ovarian sex hormones (Choice C). such as estrogen or progesterone, are not recommended for routine treatment of osteoporosis because of an increased risk for stroke, deep venous thrombosis, coronary vascular disease, and breast cancer. Selective estrogen receptor modulators (Choice D). such as raloxifene, act as agonists for positive bony remodeling by promoting osteoblast activity. However, they are associated with significant adverse effects, including hot flashes, deep venous thrombosis, pulmonary embolism. and stroke. Vitamin D analogs {Choice E) is incorrect. While vitamin D analogs are recommended for reducing fracture risk in patients with osteoporosis, their efficacy is controversial. Bisphosphonates are generally regarded as more effective.","edu_obj":"Osteoporosis is caused by the loss of bone mineral density, commonly appearing in poslmenopausal females of European descent and exacerbated in those with chronic steroid use and limited physical activity. Fragility fractures are a common presentation. First-line treatment involves risk factor modification, supplementation of calcium and vitamin D, weight-bearing exercise therapy, and bisphosphonates. Bisphosphonates act as osteoclast inhibitors by inducing osteoclast apoptosis."},{"block":1,"item":12,"image_alt":"","image_url":"","stem":"A 48-year-old man comes to the physician because of an episode of fever, cough, chills. and shortness of breath 5 days ago that began several hours after he helped a friend bale and store hay on a farm. The symptoms resolved within 2 days. but he is concerned about what could have caused the incident. He takes no medications and does not smoke cigarettes. His temperature is 37°C (98.6°F). and respirations are 12/min. The lungs are clear to auscultation of the chest. Which of the following conditions is the most likely cause of this patient's acute episode of respiratory symptoms?","choices":{"A":"Allergic bronchopulmonary aspergillosis","B":"Byssinosis","C":"Oesquamative interstitial pneumonia","D":"Hypersensitivity pneumonitis","E":"Pulmonary alveolar proteinosis"},"correct":"D","explanation":"This patient's presentation and exposure history are suggestive of hypersensitivity pneumonitis. Moldy hay is associated with hypersensitivity pneumonitis secondary to the inhalation of dust and mold spores. There are hundreds of Known causes. which are often grouped by occupational exposure (common names for the disease include farmer's lung and bird fancier's disease). and hypersensitivity pneumonitis is categorized as a type of occupational lung disease. These exposures include various microorganisms, molds, excretions from pigeons, parakeets, canaries, and other types of birds, animal urine and pelts, chemical manufacturing, and various types of dust. Hypersensitivity pneumonitis can present in acute. subacute. or chronic forms, with the acute form characterized by shortness of breath, cough. and systemic symptoms such as fever, chills, headache, and rash following exposure to an antigen. Chest x-ray may be normal at this stage or may show interstitial infiltrates. The subacute and chronic forms commonly present with dyspnea, cough, fatigue, and weight loss. Imaging studies and biopsy specimen examination show interstitial infiammation and fibrosis of the lung. Incorrect Answers: A. B, C, and E. Allergic bronchopulmonary aspergillosis (Choice A) is a specific hypersensitivity reaction to a pulmonary infection with fungal Aspergillus species characterized by asthma, eosinophilia, and bronchiectasis. Patients typically have low-grade fevers and hemoptysis. Diagnosis can be made using clinical presentation, the presence of transient pulmonary infiltrates on imaging, and a demonstrable immune response to Aspergil/us antigen exposure. Byssinosis (Choice B) is an occupational lung disease associated with textile workers who are exposed to cotton mill dust and upholstery fabric. Byssinosis is sometimes included as a hypersensitivity pneumonitis, but the pathophysiology is due more to direct injury rather than a dysregulated inflammatory reaction. Diffuse alveolar damage and desquamative interstitial pneumonia (Choice C) are characteristically observed. Desquamative interstitial pneumonia is a histologic pattern where the alveolar septa are thickened by infiltration of macrophages, and it is also associated with tobacco smoking. Pulmonary alveolar proteinosis (Choice E) is an idiopathic disease in which the alveolar space becomes filled with proteinaceous material due to a defect in surfactant production and macrophage clearance. Patients typically have a gradual onset of dyspnea on exertion. increased sputum production, cough, fatigue, weight loss. and low- grade fever.","edu_obj":"Hypersensitivity pneumonitis is a dysregulated immunologic response to a sensitized allergen caused by repeated exposure. There are hundreds of known causes, which are often grouped by occupational exposure. Farmers may be exposed to moldy hay, developing hypersensitivity pneumonitis secondary to the inhalation of dust and mold spores."},{"block":1,"item":13,"image_alt":"","image_url":"","stem":"A 9-month-old boy is brought to the emergency department because of an upper respiratory tract infection and decreased appetite for 2 days and rapid breathing for 6 hours. He is at the 3rd percentile for length and weight. He appears acutely ill. Physical examination shows lethargy and dehydration. Laboratory studies show ketosis, metabolic acidosis, hypoglycemia, anemia, and methylmalonic aciduria. He improves following treatment with intravenous fluids and glucose. Direct sequencing of the patient's leukocyte DNA fails to show mutations in the methylmalonyl-CoA mutase gene. In addition to dietary protein limitation, administration of which of the following is most appropriate for this patient?","choices":{"A":"Biotin","B":"Folic acid","C":"Niacin","D":"Vitamin B (pyridoxine)","E":"Vitamin B (cyanocobalamin)"},"correct":"E","explanation":"Methylmalonic acidernia is an inborn error of metabolism, which may be caused by a defect in methylmalonyl-CoA mutase or vitamin B 12 (cobalamin) deficiency. Methylmalonyl-CoA mutase catalyzes the conversion of methylmalonyl-CoA to succinyl-CoA, which is an important step in the metabolism of branched-chain amino acids and fatty acids. Vitamin B 12 also acts as a cofactor for the conversion of methylmalonyl-CoA to succinyl-CoA, and its deficiency is associated with both high methylmalonic acid and homocysteine concentrations. Deficiency in this enzyme or vitamin 812 causes the excretion of methylmalonic acid, a product of amino acid metabolism, in the urine. resulting in methylmalonic aciduria. Methylmalonic acidemia can present acutely or subacutely with vomiting, dehydration, lethargy, failure to thrive. developmental delay. and seizures. Laboratory studies show metabolic acidosis, lactate and/or ketones in the blood, and hyperammonemia. Treatment of methylmalonic acidemia involves a low-protein diet to avoid amino acids isoleucine, valine, threonine, and methionine. Some patients with methylmalonic acidemia are respcnsive to parenteral and/or oral administration of vitamin 8 12. resulting in a decrease in methylmalonic acid in the serum. Incorrect Answers: A, 8. C, and D. Biotin (Choice A) deficiency is characterized by dermatitis. alopecia. and enteritis. It is relatively rare but may be caused by ingestion of large amounts of raw egg whites. as they bind biotin and prevent its absorption. Folic acid (Choice 8) deficiency leads to impaired DNA synthesis and is characterized by erythrocyte macrocytosis and hypersegmented neutrophils. Laboratory studies show anemia. increased mean corpuscular volume. and normal leukocyte and platelet indices. Niacin (Choice C) deficiency can result in glossitis. diarrhea, neuropsychological disturbances such as dementia and hallucinations, and dermatitis. Dietary deficiency of vitamin 8 6 (pyridoxine) (Choice D) causes sideroblastic anemia due to impaired hemoglobin synthesis.","edu_obj":"Methylmalonic acidernia is an inborn error of metabolism, which may be caused by a defect in methylmalonyl-CoA mutase or vitamin B 12 (cobalamin) deficiency. Some patients with methylmalonic acidemia are responsive to, and should be treated with, administration of vitamin 8 12."},{"block":1,"item":14,"image_alt":"","image_url":"","stem":"A 56-year-old man comes to the physician because of a 2-month history of cough productive of blood-tinged sputum. He has smoked 1 pack of cigarettes daily for 30 years. A CT scan of the chest shows a 4-cm mass in the right upper lobe that is obstructing the superior vena cava. Blood from this patient's neck and right upper extremity is most likely returning to his heart through which of the following routes?","choices":{"A":"Anteriogular and transverse scapular veins","B":"Facial and inferior temporal veins","C":"Internal mammaries and intercostal veins","D":"Jugular and subclavian veins","E":"Suprascapular and thyrocervical veins"},"correct":"C","explanation":"When the superior vena cava (SVC) is obstructed, blood from the upper body returns to the heart via several collateral pathways, including the internal mammary and intercostal veins. The internal mammary vein runs inferosuperiorly along the anterior chest wall. collecting drainage from the anterior intercostal veins before draining into the brachiocephalic vein. When the SVC is obstructed, blood in this system can instead drain into the inferior vena cava (IVC) via internal mammary communication with the superior and inferior epigastric veins. The azygos and hemiazygos veins, which drain the posterior intercostal and bronchial veins, provide another collateral pathway to the IVC via their anastomoses with the lumbar venous system. Another collateral pathway to the IVC is formed by the long thoracic venous system. which communicates with the femoral and vertebral veins. Although these collateral pathways exist, SVC obstruction can still cause venous congestion of the head, neck, and upper extremities, leading to SVC syndrome. Patients typically develop cough, distinct swelling of the face and neck, increased jugular venous pressure, upper extremity swelling, distended chest vein collaterals. and conjunctival edema. Incorrect Answers: A, B, D, and E. Anterior jugular and transverse scapular veins (Choice A) are incorrect, as there is no commonly recognized transverse scapular vein. The suprascapular vein drains the upper back around the scapula. It drains into the external jugular vein along with the anterior jugular vein. There is not a directly recognized anastomosis from this system into the lower body. Facial and inferior temporal veins (Choice B) both drain into the internal jugular vein with no anastomoses to the lower body. The inferior temporal vein. more commonly known as the inferior anastomotic vein or the vein of Labbe, drains into the internal jugular vein by way of the system of venous sinuses that drain the brain. Jugular and subclavian veins (Choice D) provide the main venous drainage of the head and upper body. The external jugular veins drain into the subclavian veins, which then merge with the internal jugular veins to form the brachiocephalic veins. The left and right brachiocephalic veins merge to form the SVC. They do not communicate directly with the inferior venous circulation. Suprascapular and thyrocervical veins (Choice E) are incorrect, as there is no formally named thyrocervical vein. Veins that correspond to the branches of the arterial thyrocervical trunk include the inferior thyroid, suprascapular, and transverse cervical veins. The inferior thyroid drains into the brachiocephalic vein, while the suprascapular and transverse cervical veins drain into the external jugular vein. They do not anastomose with tributaries of the IVC.","edu_obj":"The intercostal and internal mammary veins provide an alternate route for blood from the upper extremities and head and neck to return to tile inferior vena cava in the setting of a superior vena cava (SVC) obstruction. Despite the existence of several collateral pathways for venous drainage of the upper body, SVC obstruction can cause symptomatic venous congestion leading to cough, swelling of the face and neck, increased jugular venous pressure, upper extremity swelling, distended chest vein collaterals, and conjunclival edema."},{"block":1,"item":15,"image_alt":"","image_url":"","stem":"A 30-year-old primigravid woman at 18 weeks' gestation comes to the physician for a prenatal visit. Physical examination shows a uterus consistent in size with an 18- week gestation. Ultrasonography shows several intracranial anomalies, including a single ventricle, small cerebrum, fused thalami, and agenesis of the corpus callosum. These findings were most likely caused by the failure of which of the following structures to differentiate?","choices":{"A":"Diencephalon","B":"Mesencephalon","C":"Prosencephalon","D":"Rhombencephalon","E":"Telencephalon"},"correct":"C","explanation":"During week 4 of embryonic development, the neural tube forms three primary brain structures: the prosencephalon (forebrain), mesencephalon (midbrain), and rhombencephalon (hindbrain). By week 5 of development, the prosencephalon differentiates into the telencephalon (ultimately forming the cortical hemispheres and lateral ventricles) and diencephalon (ultimately forming the thalamus and hypothalamus). The rhombencephalon further differentiates into the metencephalon and myelencephalon during week 5. Holoprosencephaly is a congenital malformation in which the prosencephalon does not divide into two hemispheres. Most cases result in death in utero and are often accompanied by craniofacial malformations, including cyclopia and the presence of a proboscis. This patient's fused thalami. agenesis of the corpus callosum (normally connecting the two cortical hemispheres), and single ventricle (rather than a lateral ventricle in each hemisphere) indicate the absence of cortical hemisphere division. Incorrect Answers: A, B, D, and E. Failure of diencephalon (Choice A) differentiation would affect the formation of the hypothalamus, thalamus, and third ventricle. However, cortical structures would be unaffected. Failure of mesencephalon (Choice B) differentiation would result in midbrain malformation. The hemispheres and thalamus would be unaffected. Failure of rhombencephalon (Choice D) differentiation into the metencephalon and myelencephalon would result in abnormalities of the brainstem, cerebellum, and fourth ventricle. Dandy-Walker syndrome is associated with a malformed cerebellum and fourth ventricle. Cortical and thalamic structures would be unaffected. The telencephalon (Choice E) differentiates from the prosencephalon. It is affected in holoprosencephaly, but is named following differentiation, not before. As well, structures originating from the diencephalon, such as the thalamus, would be unaffected.","edu_obj":"The prosencephalon is the embryologic origin of the cortical hemispheres, lateral ventricles. thalamus, and hypothalamus. Holoprosencephaly is a congenital malformation in which the prosencephalon fails to divide and differentiate."},{"block":1,"item":16,"image_alt":"","image_url":"","stem":"A 63-year-old man with a long history of sun exposure develops the skin lesion shown. Which of the following Is the most likely diagnosis?","choices":{"A":"Actinic keratosis","B":"Basal cell carcinoma","C":"Malignant melanoma","E":"Squamous cell carcinoma"},"correct":"C","explanation":"Malignant melanoma commonly presents with asymmetry, irregular borders, color variation, a diameter greater than 6 mm, and rapid evolution. It is a neoplastic proliferation of melanocytes and can develop from a pre-existing nevus or de novo. Malignant melanoma can rapidly invade and metastasize. Prognosis is poor when diagnosed late. Subtypes include superficial spreading, nodular. lentigo maligna. and acral lentiginous melanoma. Any lesion with features suggestive of malignant melanoma should be surgically excised with negative margins and pathologically examined for the depth of dermal invasion. Depth of invasion. or Breslow thickness. is the most important prognostic factor in malignant melanoma. Incorrect Answers: A. B. D. and E. Actinic keratosis (Choice A) and squamous cell carcinoma (Choice E) are found in areas of damage from UV light, including the face, ears, forearms, and dorsal hands. Actinic keratoses classically present as chronic rough, scaly patches and squamous cell carcinoma typically presents with a non-healing ulcerative lesion with scale. Pathologic examination of actinic keratosis shows parakeratosis, loss of the granular layer, and partial thickness atypia extending from the basal layer of the epidermis. Actinic keratosis can be treated with liquid nitrogen therapy or topical 5-fluorouracil. Pathologic examination of squamous cell carcinoma shows parakeratosis. loss of the granular layer, full thickness epidermal atypia, keratin pearls, and may invade into the dermis. Squamous cell carcinoma is treated with excision-based therapies, including Mohs surgery or electrodessication and curettage. Basal cell carcinoma (Choice B) is the most common form of skin cancer and is derived from the basal layer of the epidermis. Basal cell carcinoma is associated with mutations in the hedgehog pathway or the p53 tumor suppressor gene. The primary risk factor for developing basal cell carcinoma is UV light exposure. Basal cell carcinomas typically present as pink, pearly pa pules or nodules with rolled borders and central ulceration in sun-exposed areas of the head and neck. The risk of metastasis is extremely low, though the tumors can invade locally and cause significant tissue damage. Treatment of basal cell carcinoma requires surgical removal. either via excision or Mohs surgery Seborrheic keratosis (Choice D) is a benign proliferation of the epidermis. Lesions have a greasy, adherent appearance. While seborrheic keratoses are often brown. these growths do not have the potential to undergo transformation. The physician should provide reassurance to t11epatient.","edu_obj":"Malignant melanoma presents as a pigmented lesion that may show asymmetry, irregular borders, color variation, diameter over 6 mm, or rapid evolution. This malignant proliferation of melanocytes can rapidly invade and metastasize if not diagnosed early. Tumor depth of invasion is the most important prognostic factor, and lesions amenable to excision should be excised with negative surgical margins."},{"block":1,"item":17,"image_alt":"","image_url":"","stem":"A 32-year-old man comes to the physician for a follow-up examination after he was diagnosed with HIV infection. His CD4+ T-lymphocyte count is 55/mm³ (NS00) and ~lasma HIV viral load is greater than 100,000 copies/ml_ Results of genotyping show that the patient's viral strain is broadly resistant to protease inhibitors, non- nucleoside analogs, and nucleotide inhibitors. Which of the following drugs is most likely to be active against the HIV strain in this patient?","choices":{"A":"Cidofovir","B":"Efavirenz","C":"Enfuvirtide","D":"Ritonavir","E":"Stavudine (d4T)"},"correct":"C","explanation":"HIV infection and replication can be broken into seven primary steps: binding, fusion. reverse transcription, integration, replication, assembly, and budding. Binding and fusion involve interactions between surface glycoproteins (eg, gp120 and gp41) and host membrane proteins (eg, CD4+ T lymphocytes), followed by release of viral contents into the cytoplasm. HIV RNA is reverse transcribed by reverse transcriptase to create HIV DNA, followed by incorporation of this DNA into the CD4+ T lymphocyte genome. Once integrated, HIV hijacks the cellular machinery to produce the HIV genome and all the requisite proteins to form a new HIV viral particle. The new virus then buds from the CD4+ T lymphocyte cell and is released to infect other lymphocytes. However, the viral particles are immature, as they contain long proteins that have not yet been cleaved, a task accomplished by HIV protease. Following protein cleavage, the HIV viral particle core has reached maturity. Enfuvirtide is an agent that inhibits the initial fusion step by blocking the binding of gp41 to prevent the creation of entry pores in the cell membrane. Given this viral strain's broad resistance to agents involved in inhibition of reverse transcriptase and protease, an HIV fusion inhibitor is most likely to be active against this strain. Incorrect Answers: A, B, D. and E. Cidofovir (Choice A) is a nucleotide analogue that inhibits viral DNA polymerase and used to treat infections with HIV and cytomegalovirus (CMV). The patient's viral strain genotyping reveals a resistance to nucleotide inhibitors. and cidofovir will likely be ineffective in this patient. Efavirenz (Choice B) is in the class of non-nucleoside reverse transcriptase inhibitors that interfere with enzymatic transcription of viral DNA from viral mRNA for incorporation into host DNA. The patient's viral strain genotyping reveals a resistance to non-nucleoside analogues. Ritonavir (Choice D) is a protease inhibitor that is often utilized to inhibit the cytochrome P450 system to boost serum concentrations of other protease inhibitors. The patient's viral strain genotyping reveals a resistance to protease inhibitors, and ritonavir is unlikely to provide benefit in this situation. Stavudine (d4T) (Choice E) is a nucleoside reverse transcription inhibitor (NRTI). While the viral strain genotyping does not reveal a known resistance of NRTls, this strain has a high rate of resistance to reverse transcriptase and protease inhibitors, along with nucleotide inhibitors. It would be reasonable to expect a fusion inhibitor as more likely to be active. Nucleoside and nucleotide structures are similar, suggesting resistance to one class may confer resistance to the other.","edu_obj":"Antiviral medications used to treat HIV target various steps in the viral infection and replication cycle. Enfuvirtide belongs to the class of HIV fusion inhibitors, which work by blocking the binding of the viral glycoprotein gp41 to host membrane proteins and are most likely to be active against a viral strain with broad resistance to agents involved in inhibition of reverse transcriptase and protease."},{"block":1,"item":18,"image_alt":"","image_url":"","stem":"A 76-year-old man comes to the emergency department because of a 3-day history of inability to urinate. History includes progressive difficulty urinating, especially initiating the stream, for the past year. Physical examination shows a markedly enlarged prostate and a large, tender suprapubic mass. Catheterization produces 2 L of urine. Ultrasonography shows large kidneys with dilated calyces. Serum studies show a urea nitrogen concentration of 40 mg/dl and a creatinine concentration of 3.6 mg/dl. Arterial Po₂ is 90 mm Hg. Which of the following sets of additional arterial blood gas findings is most likely in this patient?","choices":{"A":"7.25 / 44 / 18","B":"7.32 / 30 / 15","C":"7.36 / 44 / 24","D":"7.40 / 50 / 30","E":"7.48 / 50 / 36","F":"7.50 / 30 / 22"},"correct":"B","explanation":"Obstructive uropathy can occur at a variety of anatomic sites including the ureter (eg, nephrolithiasis, retroperitoneal fibrosis), bladder (eg, malignancy), prostate (eg, benign prostatic hyperplasia, malignancy), or urethra (eg, stricture). This patient's obstructive uropathy is distal, causing bilateral hydronephrosis with dilated calyces, a distended bladder on examination, and acute kidney injury with increased creatinine. Obstructive uropathy and volume expansion can also activate the renin-angiotensin-aldosterone system, leading to hypertension. Patients with obstructive uropathy can have defects in urinary acidification, resulting in a metabolic acidosis, generally a non-anion gap acidosis unless uremia or another secondary anion gap acidosis is concomitantly present. This metabolic acidosis will be compensated by a respiratory alkalosis, resulting in a normal or near-normal pH.

Incorrect Answers: A, C, D, E, and F.

Obstructive uropathy, when causing metabolic acidosis, leads to respiratory compensation and tachypnea, not normal respiration (Choices A and C), as well as metabolic acidosis, not metabolic alkalosis (Choices D and E). A respiratory alkalosis (Choice F) could be present in hyperventilation, and not necessarily associated with obstructive uropathy.","edu_obj":"Obstructive uropathy can cause a distended bladder, bilateral hydronephrosis, and acute kidney injury. Obstructive uropathy leads to defects in urinary acidification. resulting in a metabolic acidosis."},{"block":1,"item":19,"image_alt":"","image_url":"","stem":"A 22-year-old man is brought to the emergency department 30 minutes after having a generalized tonic-clonic seizure that began in his left leg. He has a 3-year history of intermittent arm stiffening in his left arm followed by spasms of his left thigh. He states that he thinks the episodes may be associated with intense workouts at the gym. He has no personal or family history of seizures. Physical examination shows no abnormalities. An MRI of the brain is most likely to show a lesion at which of the following locations?","choices":{"A":"Left frontal cortex","B":"Left parietal lobe","C":"Left ~~poral lobe","D":"Right1rontal cortex","E":"Right parietal lobe","F":"Right temporal lobe"},"correct":"D","explanation":"This patient presenting with left-sided focal seizure activity that becomes secondarily generalized likely has a right frontal lobe lesion. Seizures originating from the frontal lobe are often partial (focal) seizures. Partial seizures are further categorized as either simple or complex. Complex partial seizures are characterized by loss of awareness in contrast to simple partial seizures where awareness is maintained. Clinical manifestations depend on the specific origin of the epileptogenic activity. Seizures originating from the primary motor cortex (located within the frontal lobe) typically present with contra lateral focal motor activity that may spread to adjacent areas and become generalized, as is seen in this patient. Diagnosis includes electroencephalogram and central nervous system imaging. Treatment generally begins with initiation of antiepileptic medications. and may include interventional procedures (eg, surgery) if the seizures are secondary to a lesion, such as a tumor or abscess. Incorrect Answers: A. B, c. E, and F. Left frontal cortex (Choice A) is incorrect, as a left-sided lesion would likely manifest with seizure activity on the contralateral side. Left parietal lobe (Choice B) and right parietal lobe (Choice E) are incorrect as seizures originating from a parietal lobe lesion would most commonly be partial somatosensory seizures. Patients may experience a sensation of numbness, tingling, warmth, and/or pain. other manifestations of parietal lobe epileptic activity may include receptive aphasia, dyslexia, and other language/comprehension disturbances caused by involvement of Wernicke area at the junction of the parietal and temporal lobes. Left temporal lobe (Choice C) and right temporal lobe (Choice F) are incorrect. The temporal lobe is the most common location of focal seizure activity, typically presenting with complex partial seizures that may involve an aura, motor symptoms (especially motor automatisms such as lip-smacking or fidgeting), autonomic dysfunction, and/or confusion.","edu_obj":"Partial seizures originate from one part of the brain and can be simple (with no loss of awareness) or complex (with loss of awareness). Seizures originating from the frontal lobe are typically partial seizures that may exhibit secondary generalization."},{"block":1,"item":20,"image_alt":"","image_url":"","stem":"A 16-year-old boy who plays high school football comes to the physician because of a painful, pruritic rash on his groin and upper thigh. Physical examination shows a rash with red, scaling margins. Direct microscopic examination of a KOH preparation of a skin scraping shows fungal hyphae and arthrospores. Which of the following is the most likely causal agent?","choices":{"A":"Actinomyces israelii","B":"Blastomyces dermatitidis","C":"Candida albicans","D":"Coccidioides immitis","E":"Histoplasma capsulatum","F":"Paracoccidioides brasiliensis","G":"Penicillium marneffei","H":"Pneumocystis jiroveci (formerly P. carinii)","I":"Trichophyton rubrum"},"correct":"I","explanation":"Trichophyton rubrum is a dermatophyte that causes superficial fungal infections. Common sites of involvement include the scalp, trunk, nails, groin, and feet. Superficial dermatophyte infection of the groin is called tinea cruris. Microscopic examination of skin scrapings with potassium hydroxide preparation shows branching septate hyphae. Tinea cruris is commonly treated with topical azole antifungals, such as ketoconazole, which inhibit conversion of lanosterol to ergosterol in the fungal cell wall by 14-a demethylase. Incorrect Answers: A, B, C, D, E, F, G, and H. Actinomyces israelii (Choice A) bacteria classically cause oral and facial abscesses that may progress to osteomyelitis of the jaw. Actinomyces israelii is part of the normal mucosa! flora and often becomes pathogenic in patients with poor dentition and multiple caries. Actinomyces israe/ii is identified by its branching, filamentous pattern on Gram stain. Blastomyces dermatitidis (Choice B), Coccidioides immitis (Choice D), Histoplasma capsu/atum (Choice E), and Paracoccidioides brasiliensis (Choice F) are causes of systemic mycoses. Their organisms are all dimorphic fungi with both mold and yeast forms. These mycoses are associated with pulmonary involvement, and each may cause unique systemic symptoms. These organisms are not associated with tinea cruris. Infections are more common among persons who live in endemic areas and those whoareimmunocompromised Candida atbicans (Choice C) are part of the normal mucocutaneous flora. Although candida infection affects the skin folds, as with diaper rash, it classically does not present with peripheral scaling at the margins. Additionally, candida species form pseudo-hyphae compared to the septate hyphae found in tinea infection. Penicillium marneffei (Choice G) and Pneumocystis jiroveci (formerly P carinii) (Choice H) are both important causes of opportunistic infection in patients with immunodeficiency, such as HIV infection These opportunistic infections do not commonly affect individuals with a normal immune system and rarely involve the skin.","edu_obj":"Trichophyton rubrum is a common cause of tinea cruris. Microscopic evaluation with KOH preparation shows branching septate hyphae. Most superficial tinea infections, including tinea cruris, are effectively treated with topical azole antifungal agents."},{"block":1,"item":21,"image_alt":"","image_url":"","stem":"A 27-year-old woman is admitted to the hospital because of a 1-week history of lower abdominal pain that became more severe 2 days ago. She also has had fever, nausea, and vomiting. Her temperature is 38.4°C (10 1.2°F), pulse is 110/mln, and blood pressure is 135/90 mm Hg. Abdominal examination shows tenderness In the right lower quadrant to light palpatlon and percussion. A CT scan of the abdomen with oral and Intravenous contrast Is obtained. Shortly after having the test, she develops audible wheezing in all lung fields and the rash shown in the photograph. Her pulse now is 120/min, and blood pressure 1s 90/65 mm Hg. Which of the following best describes the mechanism of thlS patient's skin reaction?","choices":{"A":"Cytokine release from segmented neutrophils","B":"Direct acuvau<i.'.)of mast cells","C":"lgE antibody release from eosinophils","D":"Increased production orbradykinin","E":"Systemic entry of bacterial endotoxins"},"correct":"B","explanation":"Directactivationof mastcellscausesdegranulation andreleaseof vasoactivesubstances, includinghistamine.thatproducesymptomsrangingfrom uncomplicated urticaria to severe anaphylaxis. Symptoms of anaphylaxis include urticaria, vasodilation leading to hypotension, compensatory tachycardia, and angioedema. Although rare. intravenous contrast used for CT scans may cause direct mast cell degranulation. leading to an anaphylacticfanaphylactoid reaction. Anaphylactic reactions commonly occur due to the presence of preformed lgE antibodies against an antigen. lgE antibodies promote activation and degranulation of mast cells. Regardless of the inciting mechanism of mast cell activation and degranulation. histamine release leads to the final common pathway characterized by the signs and symptoms of anaphylaxis. Recognition and treatment of anaphylaxis with epinephrine is critical to prevent life-threatening complications, including airway obstruction, respiratory arrest, and cardiovascular collapse from distributive shocK. IncorrectAnswers:A, c, D, andE. Cytokine release from segmented neutrophils (Choice A) is triggered by the innate immune response. Cytokines produced by neutrophils promote inflammation and recruit additional inflammatory cells. however. they are not responsible for anaphylaxis. lgE antibody release from eosinophils (Choice C) is incorrect. lgE antibodies. along with all other types of antibodies. are produced by plasma cells after class switching. The binding of lgE to receptors on mast cells triggers mast cell degranulation and release of vasoactive substances, including histamine. Although this reaction may trigger anaphylaxis in cases of food allergies or bee stings, intravenous contrast has been demonstrated to trigger mast cell degranulation independent of lgE. Increased production of bradyKinin (Choice D) would promote vasodilation and increase permeability in capillary beds, but it would not trigger an anaphylactic reaction. Increased bradykinin levels could lead to an angioedema-type presentation, often seen in patients with ACE inhibitor intolerance. Systemic entry of bacterial endotoxins (Choice E). such as toxic shock syndrome toxin released by Staphylococcus aureus, can cause fever, hypotension, and tachycardia in affected patients. The presence of such toxin also mediates staphylococcal scalded sKin syndrome, which generally presents with erythroderma and sKin sloughing.","edu_obj":"Direct degranulation of mast cells from intravenous contrast causes release of intracellular vasoactive substances, including histamine. Histamine release promotes urticaria, vasodilation, compensatory tachycardia, and angioedema in patients with anaphylaxis. Recognition and treatment of anaphylaxis with epinephrine is critical to prevent life-threatening complications, including respiratory arrest and cardiovascular collapse"},{"block":1,"item":22,"image_alt":"","image_url":"","stem":"A 25-year-old nulligravid woman comes to the physician because of a 3-day history of vaginal discharge and suprapubic discomfort. She has not had fever, chills. nausea, or vomiting. She had two episodes of gonococcal cervicitis during the past year. She is sexually active with multiple partners. Her temperature is 37°C (98.6°F). Bimanual examination shows no cervical motion or adnexal tenderness. There is a yellow discharge from the cervical os. Cultures of the discharge are sent to the laboratory to test for Chlamydia trachomatis and Neisseria gonorrhoeae. Urinalysis shows trace WBCs. A urine pregnancy test result is negative. In addition to appropriate antibiotics, which of the following is the most appropriate action by the physician to preserve this patient's fertility?","choices":{"A":"Discussion with the patient about proper condom use","B":"Hysterosalpingography","C":"Pelvic ultrasonography","D":"Administer vaccination for human papillomavirus","E":"Prescribe an oral contraceptive"},"correct":"A","explanation":"Risk factors for sexually transmitted infections include adolescence, multiple sexual partners. and not using barrier contraception such as condoms. Chlamydia trachomatis and Neisseria gonorrhoeae can both cause vaginitis (as in this patie

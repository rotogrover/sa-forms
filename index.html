nt), cervicitis, and pelvic inflammatory disease (PIO). Vaginitis typically presents with mucopurulent discharge and pruritus. Cervicitis presents with similar discharge, but also with an erythematous, friable cervix and cervical motion tenderness on examination. When infection spreads to the fallopian tubes and ovaries, PIO can result, which presents with cervical motion tenderness, purulent cervical discharge, uterine and adnexal tenderness. and systemic signs and symptoms such as fever. fatigue. nausea. and myalgias. If left untreated, PIO can damage the fallopian tubes and lead to tubal infertility. Utilizing condoms can prevent Chlamydia trachomatis and Neisseria gonorrhoeae infections. Incorrect Answers: B, C, D. and E. Hysterosalpingography (Choice B) is an x-ray technique involving dye injection used to determine the structure of the uterine cavity and fallopian tubes, including tubal patency. Some studies have shown that hysterosalpingography can improve tubal patency, possibly secondary to dye injection. However, this patient does not show evidence of tubal dysfunction. Condom use is an effective upstream intervention for preventing tubal dysfunction secondary to PIO. Pelvic ultrasonography (Choice C) assists in the evaluation of the reproductive anatomy. However. it does not influence fertility. Administering vaccination for human papillomavirus (Choice D) (HPV) will help prevent sequelae of HPV infection such as genital warts and cervical cancer. However. HPV infection does not significantly impact fertility. Prescribing an oral contraceptive (Choice E) would prevent conception. Oral contraceptive pills have not been shown to negatively affect fertility, as the ability to conceive returns once the medication is discontinued. However. oral contraceptive pills also do not improve fertility.","edu_obj":"Chlamydia trachomatis and Neisseria gonorrhoeae can both cause vaginitis, cervicitis, and pelvic inflammatory disease (PIO). If undetected or untreated, PIO can damage the fallopian tubes and decrease fertility. Condom use can prevent infection with Chlamydia trachomatis and Neisseria gonorrhoeae. and thus prevent sexually transmitted infection-related infertility."},{"block":1,"item":23,"image_alt":"","image_url":"","stem":"A 48-year-old man with a 30-year history of type 1 diabetes mellitus comes to the physician because of the sudden onset of double vision. Ophthalmologic examination shows no abnormalities except for weakness of abduction of the left eye. Which of the following is the most likely cause of the development of double vision in this patient?","choices":{"A":"Cavernous sinus thrombosis","B":"Diabetic mononeuropathy","C":"Middle cerebral artery thrombosis","D":"Ophthalmic artery embolism","E":"Ophthalmoplegic migraine"},"correct":"B","explanation":"Microvascular damage resulting from diabetes mellitus can produce neuropathy, such as distal polyneuropathy, radiculopathy or, as in this case, cranial nerve palsy, a form of mononeuropathy. Commonly affected nerves include the abducens nerve, which presents with esotropia, unilateral abduction deficit, and diplopia in horizontal gaze, and the oculomotor nerve, which presents with unilateral ptosis, exotropia, and hypotropia. It is important to exclude other possible causes of cranial nerve palsy, such as stroke, increased intracranial pressure, vasculitis, or optic neuropathy. Most patients with microvascular abducens nerve palsy experience resolution of symptoms during several months following treatment of the underlying cause. Incorrect Answers: A, C, D, and E. Cavernous sinus thrombosis (Choice A) classically follows an infection or injury involving a structure drained by the cavernous sinus (eg. sinusitis) and results in cranial nerve deficits involving those that traverse the cavernous sinus (generally Ill, IV, V1 or V2. or VI). Classic symptoms include ipsilateral orbit pain. proptosis, periorbital edema, and impairment in extraocular movement, pupil reactivity, or symmetry. Middle cerebral artery (MCA) thrombosis (Choice C) will lead to an ischemic stroke affecting the MCA distribution. The MCA supplies the lateral frontal lobe (primary motor and sensory cortices), anterior parietal lobe, and temporal lobe. Occlusion of the MCA leads to contralateral hemiparesis and contralateral sensory deficit of the face and upper extremities. Ophthalmic artery embolism (Choice D) frequently occurs in the setting of carotid or cardiac valvular disease and leads to central retinal artery occlusion (CRAO). Patients present with acute. painless vision loss and examination findings including diminished visual acuity, relative afferent pupillary defect, and a pale fundus with preserved foveal color. Patients who present with CRAO should be admitted to a stroke center for emergent evaluation. Ophthalmoplegic migraine (Choice E) is a rare headache disorder of unknown etiology characterized by recurrent unilateral headaches that are accompanied by palsy of one or several ocular cranial nerves. Cranial nerve palsy may last for several weeks to months and cause significant diplopia before resolving spontaneously. The disease onset typically occurs in childhood or adolescence.","edu_obj":"Diabe;es mellitus causes microvascular damage to a variety of tissues, including nerves. and can cause cranial nerve palsy, a form of mononeuropathy. Microvascular abducens nerve palsy presents with esotropia, unilateral abduction deficit, and diplopia in horizontal gaze. Most patients experience spontaneous recovery during several months following treatment of the underlying cause."},{"block":1,"item":24,"image_alt":"","image_url":"","stem":"A 35-year-old man with chronic hepatitis C comes to the physician because of a 2-week history of weakness and a rash on his legs. Physical examination shows 2+ edema and a purpuric rash over the lower extremities. His serum creatinine concentration is 2.9 mg/dl. Serum C3 and C4 concentrations are markedly decreased. Urinalysis shows numerous dysmorphic RBCs but no RBC casts. Which of the following is the most likely cause of these findings?","choices":{"A":"Acute postinfectious glomerulonephritis","B":"Antiglomerular basement membrane disease","C":"Essential mixed cryoglobulinemia","D":"Lyme disease","E":"Subacute bacterial endocarditis"},"correct":"C","explanation":"Cryoglobulins are immunoglobulins (or immunoglobulin-complement complexes) that precipitate out of serum. Risk factors for excessive cryoglobulin formation include chronic viral infections such as hepatitis Band c viruses, HIV, malaria. and Epstein-Barr virus; chronic inflammatory conditions such as systemic lupus erythematosus and Sjogren syndrome; and lymphoproliferative diseases such as multiple myeloma. The deposition of the immunoglobulin-complement complexes in blood vessels results in leukocytoclastic vasculitis, which can manifest with a reddish-purple rash (purpura) and possible end-organ dysfunction, including nephritic/nephrotic syndrome or renal failure. Mixed cryoglobulinemia is characterized by the triad of weakness, arthralgias, and palpable purpura. Patients may also present with peripheral neuropathy, hematuria, and hepatosplenomegaly. Incorrect Answers: A, B, D, and E. Acute postinfeclious glomerulonephritis (Choice A) is a nephritic syndrome presenting with gross or microscopic hematuria occurring 2 to 6 weeks after infection with group A ~-hemolytic streptococci, typically impetigo or streptococcal pharyngitis or tonsillitis. Patients typically present with dark colored urine. hypertension, and peripheral and perlorbltal edema. Hepatitis C Infection Is more frequently associated with cryoglobullnemla. Antiglomerular basement membrane disease (Choice B), also known as Goodpasture syndrome, is a type II hypersensitivity reaction that involves autoimmune deposition of lgG against the basement membrane in the lung and kidney. Patients present with hemoptysis and hematuria, generally as nephritic syndrome, which may be rapidly progressive and cause renal failure or death if not treated. A cutaneous rash is not typical. Lyme disease (Choice D) is a tick-borne disease caused by Borrelia burgdorteri, which is endemic to the northeastern United States. Its initial stage presents with erythema chronicum migrans, a characteristic expanding rash with a central ring-like clearing, as well as flu-like illness and arthralgia. Later stages of Lyme disease are characterized by carditis, atrioventricular heart block, facial nerve palsy (which is often bilateral), migratory arthralgias, and, if left untreated, encephalopathy and chronic arthritis. Subacute bacterial endocarditis (Choice E) presents with fever. septic emboli, vascular and immunologic phenomena such as splinter hemorrhages, purpuric rash, Osler nodes. and Janeway lesions. and evidence of valvular vegetation on cardiac ultrasonography. Patients typically have a history of intravenous drug use or procedures that disruptmucocutaneous surfaces.suchas dentalprocedures Hepatitisc infectionis nota riskfactor. or cystoscopy.","edu_obj":"Increased cryoglobulin concentrations are characteristic of mixed cryoglobulinemia, which often presents with palpable purpura in association with arthralgias and peripheral neuropathy caused by immune-complex mediated vasculitis. Chronic hepatitis C virus is the most common infection associated with cryoglobulinemia."},{"block":1,"item":25,"image_alt":"","image_url":"","stem":"A 53-year-old woman having an acute inferior myocardial infarction develops sinus bradycardia and hypotension. Administration of which of the following is the most appropriate next step to increase this patient's heart rate?","choices":{"A":"Amiodarone","B":"Atenolol","C":"Atropine","D":"Phenylephrine","E":"Verapamil"},"correct":"C","explanation":"The right coronary artery primarily provides blood flow to the right ventricle. light atrium. sinoatrial (SA) node, atrioventricular (AV) node and is generally the artery that is occluded during an acute. inferior myocardial infarction. Corresponding ST-segment changes are typically seen in the inferior ECG leads II, Ill. and aVF. Impaired perfusion to the SA and AV nodes can result in significant bradycardia and/or heart block as a result of ischemia involving the cardiac conduction system. Atropine is an anticholinergic agent used in the treatment of patients with bradyarrhythmias due to its muscarinic inhibition. If atropine is unsuccessful in raising the heart rate, or if the patient develops worsening hemodynamic instability, transcutaneous or transvenous pacing should be performed as a temporizing measure. and additional inotropic medications such as epinephrine or dopamine could be considered. Definitive management for any acute myocardial infarction involves revascularization to restore blood flow. generally via percutaneous coronary angiography or coronary artery bypass grafting in addition to antiplatelet agent administration. Incorrect Answers: A, B, D, and E. Amiodarone (Choice A) is a class Ill antiarrhythmic agent with wide activity across other classes that inhibits potassium channels and sodium channels. as well as 13 receptors and calcium channels. It is effective in the management of both ventricular and supraventricular tachycardias and may be used for refractory arrhythmias. Because of its 13receptor and calcium channel blockade mechanism, amiodarone would worsen bradycardia and is contraindicated in such cases. Atenolol (Choice B) is a 131-selective antagonist with greater activity at 131 receptors than 13 2 receptors. It can be used in the treatment of hypertension, arrhythmias. and heart failure. Because of its 131 antagonism, atenolol would worsen bradycardia. Phenylephrine (Choice D) is a pure a-agonist that functions to constrict peripheral arterioles and thereby increase blood pressure. Phenylephrine does not have a direct effect on heart rate but may indirectly cause a mild decrease in heart rate through stimulation of the carotid barorenex in response to the increased blood pressure. Verapamil (Choice E) is a calcium channel blocker that slows conduction at the SA and AV nodes, reduces cardiac contractility, and decreases blood pressure. It is commonly used to treat supraventricular arrhythmias. Administering verapamil to a bradycardic patient would worsen the patient's cardiac output and is contraindicated.","edu_obj":"The right coronary artery provides blood flow to the right ventricle, right atrium, sinoatrial node, and atrioventricular node. In the setting of a right- dominant circulation (-85% of patients). it provides a majority of the blood supply to the inferior heart through the posterior descending artery Myocardial infarction in this territory may present with bradycardia or heart block. Atropine. a muscarinic antagonist. can be used in the treatment of bradyarrhythmias."},{"block":1,"item":26,"image_alt":"","image_url":"","stem":"A 24-year-0ld woman comes to the physician because of a 3-day history of vaginal discharge with itching. She is currently being treated with ciprofloxacin for cystitis. Her vital signs are within normal limits. A photograph of the vaginal area is shown. Which of the following is the most likely causal organism?","choices":{"A":"Candida albicans","B":"Chlamydia trachomatis","C":"Herpes simplex virus","D":"Neisseria gonorrhoeae","E":"Trichomonas vagina/is"},"correct":"A","explanation":"This patient's presenting signs and symptoms of vaginal pruritus and a thick, white discharge while on antibiotic therapy are suggestive of vulvovaginitis from Candida a/bicans. While Candida species compose an element of normal vaginal flora, overgrowth can occur and lead to vulvovaginitis. Candida a/bicans as a cause of vulvovaginilis can be distinguished from other potential causes by abnormal, often white, vaginal discharge with normal vaginal pH, negative KOH testing. and the absence of motile trichomonads on wet mount preparation. Risk factors for candida vulvovaginitis include the use of medications such as antibiotics and oral contraceptives, use of intravaginal or intrauterine contraceptive devices, and an immunocompromised state. Candida vulvovaginitis is treated with intravaginal antifungal agents, such as clotrimazole. miconazole. or nystatin, or with oral ftuconazole. Incorrect Answers: B. C, D. and E. Chlamydia trachomatis (Choice B) is a sexually transmitted infection that most commonly presents in women with cervicitis. If untreated. it may progress to pelvic inflammatory disease. It typically manifests with thin, watery discharge and cervical motion tenderness, although patients may also be asymptomatic. This patient's discharge is more consistent with candida vulvovaginitis. Herpes simplex virus (Choice C) genital infection is most commonly caused by HSV-2 and is characterized by painful vesicles in the genital area (eg, vulva, vagina. cervix. perineum). Infection typically begins with the formation of vesicles. which lyse and progress to shallow, painful ulcers with an erythematous border. It does not cause pruritus or white discharge. Neisseria gonorrhoeae (Choice D) is a gram-negative diplococcus that can present with cervicitis. pelvic inflammatory disease, Fitz-Hugh-Curtis syndrome, disseminated gonorrhea, septic arthritis, or urethritis. When causing vaginitis, N. gonorrhoeae typically presents with mucopurulent discharge and pruritus. although patients may be asymptomatic. The absence of mucopurulent cervical discharge suggests that infection with N. gonorrhoeae is less likely. Trichomonas vagina/is (Choice E) is an anaerobic, flagellated protozoan that causes vaginal trichomoniasis, which presents with pruritus. dysuria, dyspareunia, cervical e1ythema, and abnormal discharge that is described as green, frothy, and malodorous. This patient's vaginal discharge is more consistent with candida vulvovaginitis.","edu_obj":"Candida vulvovaginitis involves the overgrowth of normal vaginal Candida flora. Symptoms include pruritus. erythema, and white discharge. Treatment includes intravaginal antifungal agents, such as clotrimazole, miconazole, or nystatin, or oral fluconazole."},{"block":1,"item":27,"image_alt":"","image_url":"","stem":"A 23-year-old woman comes to the physician because of a 1-month history of chronic sinusitis. She began treatment with broad-spectrum antibiotics 3 weeks ago. but her symptoms have persisted. Nasal endoscopy shows obstruction of the drainage of the left maxillary sinus. Cannulation of the sinus through its normal drainage route to the nasal cavity is scheduled. Which of the following is the most appropriate location for cannula placement in this patient?","choices":{"A":"At the anterior portion of the piriform aperture","B":"At the hiatus semilunaris J5 the middle meatus","C":"At the sphenoethmoidal recess","D":"Immediately anterior to the torus tubarius","E":"Immediately inferior to the anterior margin of the superior conchae"},"correct":"A","explanation":"Bacterial sinusitis is a common problem that typically occurs following viral upper respiratory infection. Symptoms typically last for less than 1 month and include fever, malaise. fatigue, nasal congestion. purulent discharge, a feeling of sinus pressure or fullness, and dull pain that is aggravated by leaning forward. Pain may be elicited by percussion of the affected sinus. A minority of patients may experience longer-term persistence of symptoms, leading to subacute or chronic sinusitis. While most cases are uncomplicated, potential complications are serious and include orbital cellulitis, cavernous sinus thrombosis, and meningitis. Tl1e diagnosis is established based on a characteristic history and clinical examination; x-rays and bacterial cultures are not necessary for uncomplicated cases. The Infectious Disease Society of America (IDSA) 2012 Guidelines recommend a course of antibiotics for patients whose symptoms persist for greater than 7 to 10 days, those with fever, and those with worsening symptoms. However. a more recent multidisciplinary Clinical Practice Guideline from the American Academy of Otolaryngology - Head and Neck Surgery has suggested that select patients with good follow up may be clinically observed without antibiotics. Sinusitis not responding to antibiotic therapy can be treated with surgical irrigation and drainage of the obstructed sinus, most often the maxillary sinus. The maxillary sinus drains into the nasal cavity at the hiatus semilunaris in the middle meatus. The anterior portion of the piriform aperture (Choice A) opens into the cartilaginous anterior nasal vestibule. Its borders are the nasal bones superiorly, maxillary bones laterally and inferiorly, and nasal septum medially. It is anatomically associated with the internal nasal valve, the narrowest point in the nasal cavity and highest point of airflow resistance in the nose. Widening of this aperture can be performed during functional septoplasty to enhance airflow through the nose. The sphenoethmoidal recess (Choice C) is the site of drainage of the sphenoid sinus and the posterior ethmoid air cells. It is found in the superior aspect of the nasal cavity both superior and posterior to the superior nasal concha. The sphenoethmoidal recess can be used to visualize drainage from the sphenoid sinus. Additionally. the sphenoid sinus may be used as a surgical approach to the pituitary gland. as in transsphenoidal hypophysectomy. Immediately anterior to the torus tubarius (Choice D) is the location of the opening of the Eustachian tube into the nasopharynx. It connects the posterior nasopharynx to the middle ear and provides a pathway for pathogens to spread to this area, causing acute otitis media. Acute otitis media classically occurs in children and can present with ear pain. fever. and an erythematous tympanic membrane with retrotympanic pus or a middle ear effusion. Immediately inferior to the anterior margin of the superior conchae (Choice E) is the location of the superior nasal meatus. which communicates with the posterior ethmoid cells.","edu_obj":"Bacterial sinusitis is a common problem that typically occurs following viral upper respiratory infection. Symptoms include fever. malaise, fatigue, nasal congestion, purulent discharge, a feeling of sinus pressure or fullness, and dull pain that is aggravated by leaning forward. Subacute or chronic sinusitis that does not respond to antibiotic therapy can be treated with surgical drainage of lhe obstructed sinus. The maxillary sinus can be cannulaled via ils opening into the nasopharynx at the hiatus semilunaris in the middle meatus."},{"block":1,"item":28,"image_alt":"","image_url":"","stem":"A 14-year-old boy is brought to the physician because of a 2-weel< history of progressively severe pain in his right leg just below the l<nee.An x-ray of the involved area shows a large, partly calcified mass that erodes the medullary canal of the tibia, infiltrates the cortex. and extends into the adjacent soft tissue. A biopsy of the lesion identifies primitive cellsJn a lace-like meshwork of bone with numerous mitoses. Which of the following is another common site of origin for this pathologic process?","choices":{"A":"Clavicle","B":"Femur","C":"Metacarpal bones","D":"Ribs","E":"Vertebrae"},"correct":"B","explanation":"Osteosarcoma, the most common type of primary bone cancer. occurs most often in the second and third decades of life. It typically occurs in long bones, frequently above the knee in the distal femur or below the knee in the proximal tibia. The metaphysis is often affected. The initial presentation often includes pain and swelling: sometimes, a fragility fracture is the declaring presentation. Causes include familial malignancy syndromes (especially involving the retinoblastoma or P53 tumor suppressor genes), exposure to radiation, or bony dysplasia, such as fibrous dysplasia or osteitis deformans (Paget disease) in older adults. This malignancy is locally destructive to bone and can erode through the cortex resulting in a sunburst periosteal reaction and elevation of the periosteum (eg, Cadman triangle) on plain x-rays. Once osteosarcoma is suspected. an MRI is indicated to evaluate the extent of local invasion and to allow for local staging. It arises from osteoblast-like mesenchymal cells that produce osteoid. the collagen matrix necessary for mineralization and bone formation. Thus, biopsy will show primitive cells with enlarged nuclei in a bed of disorganized tissue with areas of osteoid production. Osteosarcoma is an aggressive tumor with a poor prognosis. Treatment requires aggressive surgical resection as well as chemotherapy. Incorrect Answers: A, C, D, and E. The clavicle (Choice A) is not a common site of origin for bony neoplasms. Rare cases of giant cell tumors of the clavicle have been reported. These tumors present with a soap bubble appearance on x-rays and multinucleated giant cells on histology. The metacarpal bones (Choice C) are a less common site of origin for bony neoplasms. Usually benign. the most common type is an enchondroma, which can also occur in the phalanges of the fingers. They are often painless and can be managed with observation alone. OIiier disease consists of multiple enchondromas that may present in a single extremity. Maffucci syndrome presents with multiple enchondromas and soft tissue angiomas. The ribs (Choice D) are a less common site of origin for primary bony neoplasms. Metastatic lesions and myeloma are far more frequent. When primary lesions of the ribs arise, Ewing sarcoma and chondrosarcoma are the most commonly reported types. On histology, Ewing sarcoma shows multiple small, round, blue cells. X-rays may show elevated periosteum and layered neocortex formation (\"onion skin\" appearance). ChOndrosarcoma histology will show lobules of hyaline-like cartilage and nests of malignant chondrocyte-like cells. The vertebrae (Choice E) are common sites of metastases of breast and prostate cancer. Patients commonly present with pain that is worse at night and sclerotic lesions on x-rays. Multiple myeloma can also present in the vertebrae, often as multiple lytic lesions along with hypercalcemia, anemia, kidney failure. frequent infections. and diffuse skeletal pain. The most common primary bone tumor of the vertebrae is the osteoblastoma, a benign lesion that presents with bone pain that does not respond to aspirin.","edu_obj":"Osteosarcoma is the most common primary osseous malignancy in children, typically occurring in long bones, such as the distal femur and proximal tibia. Clinical findings include pain and swelling, with destruction of both medullary and cortical bone, a sunburst periosteal reaction. and elevation of the periosteum on radiography. Biopsy shows primitive, osteoblast-like cells in a network of osteoid. Treatment generally involves a combined surgical and medical approach."},{"block":1,"item":29,"image_alt":"","image_url":"","stem":"A 67-year-old man comes to the physician because of numbness in his hands and feet for 3 months. Vitamin B 12 (cobalamin) deficiency is suspected. An increased serum concentration of which of the following is most likely to confirm the diagnosis?","choices":{"A":"Acetoacetate st,","B":"Alanine","C":"Lactate","D":"Leucine","E":"Methionine","F":"Methylmalonate"},"correct":"F","explanation":"Vitamin B 12, or cobalamin, is a water-soluble 8 vitamin that is essential for DNA synthesis as well as the health of neural and hematopoietic tissue. Vitamin 8 12 acts as a cofactor for the conversion of homocysteine to methionine and the conversion of methylmalonyl-CoA to succinyl-CoA. Dietary sources of vitamin B12 primarily include animal sources such as meat, milk, or eggs. Vitamin 8 12 deficiency is rarely caused by dietary deficiency, except in cases of strict veganism, and is more commonly encountered as a result of gastrointestinal malabsorption due to causes such as pernicious anemia, malabsorption following bariatric surgery, celiac or Crohn disease, bacterial small bowel overgrowth, or infection with the fish tapeworm Diphyllobothrium latum. Vitamin B 12 deficiency presents with increased homocysteine, macrocytic anemia, hypersegmented neutrophils, and associated symptoms of generalized fatigue, pallor, and lightheadedness. Vitamin B12 deficiency can be distinguished from vitamin 8 9, or folic acid, deficiency by increased methylmalonate concentrations (normal in vitamin 8 9 deficiency) and the presence of neuropsychiatric symptoms, specifically subacute combined degeneration (SCD). SCD is caused by demyelination of the dorsal columns, lateral corticospinal tracts, and spinocerebellar tracts, and presents with ataxic gait, muscle weakness, paresthesia, abnormal deep tendon reflexes, and loss of proprioception and vibration sense. Treatment is with vitamin 8 12 (cyanocobalamin) supplementation: however, if deficiency is prolonged, neural damage may be irreversible. Incorrect Answers: A, 8, C, D. and E. Acetoacetate (Choice A), along with acetone and 13-hydroxybutyrate,is produced by ketogenesis. Concentrations will be increased, therefore, during periods of fasting. Prolonged starvation is associated with fat and muscle wasting but not neurodegeneration. Alanine (Choice B) and lactate (Choice C) concentrations are increased in pyruvate dehydrogenase complex deficiency (PDCD); pyruvate dehydrogenase converts pyruvate to acetyl-CoA. facilitating transition into the citric acid cycle. PDCD is a rare inborn error of metabolism that presents with lactic acidosis. neurodevelopmental abnormalities and delay, hyperammonemia, tachypnea and hyperventilation, and hypotonia. Lactate (Choice C) is generated by anaerobic cell metabolism and thus increased concentrations are seen in a wide variety of conditions, including strenuous exercise, hypoxemia, shock. and mitochondrial dysfunction. Leucine (Choice D) concentrations are increased in branched-chain a-keto acid dehydrogenase deficiency, also termed maple syrup urine disease, which is characterized by abnormal degradation and consequent buildup of the branched-chain amino acids leucine, isoleucine, and valine. II presents with severe neurologic defects, intellectual disability, vomiting, poor feeding, and a characteristic urine odor similar to maple syrup. Methionine (Choice E) is generated by methionine synthase in a reaction that requires vitamin B 12as a coenzyme. Concentrations will be decreased, not increased, in vitamin B 12 deficiency. Methionine concentrations are increased in cystathionine synthase deficiency, a form of homocystinuria, characterized by increased urine homocysteine, marfanoid habitus, osteoporosis, lens subluxation, atherosclerosis, and intellectual disability.","edu_obj":"Vitamin 812 (cobalamin) deficiency can present with increased methylmalonate and homocysteine, macrncytic anemia, hypersegmented neutrophils, subacute combined degeneration (SCD), fatigue, pallor, and lightheadedness. Causes include strict veganism and gastric malabsorption due to pernicious anemia, bariatric surgery, Crohn disease, or tapeworm infection. SCD results from demyelination of the dorsal columns, lateral corticospinal tracts, and spinocerebellar tracts, and presents with ataxic gait, muscle weakness. paresthesia, abnormal deep tendon reflexes. and loss of proprioception and vibration sense."},{"block":1,"item":30,"image_alt":"Block 1 Q30 — BRCA2 family pedigree","image_url":"https://rotogrover.github.io/sa-forms/images/CBSSA31_B1Q30_pedigree.jpg","stem":"A 20-year-old woman (III-1) comes to the physician for cancer risk assessment. She has a family history of breast cancer in her maternal grandfather and maternal aunt. Previous genetic analysis of the aunt showed a mutation in the BRCA2 gene. The patient's 45-year-old mother does not wish to undergo genetic testing. A pedigree is shown. Which of the following best represents the probability that this patient inherited the gene mutation in this family?","choices":{"A":"0%","B":"25%","C":"50%","D":"75%","E":"100%"},"correct":"B","explanation":"Most breast cancers are sporadic, but a minority are caused by germline mutations in BRCA1 or BRCA2, which are tumor suppressor genes. Indications for genetic testing for BRCA mutations include but are not limited to a personal history of breast cancer diagnosed at younger than age 45 years, a personal or family history of ovarian cancer, or a personal or family history of male breast cancer. Both genes are inherited in an autosomal dominant fashion. Thus, while the status of this patient's mother (II-3) is unknown, the probability that she inherited the gene from the affected maternal grandfather (I-1) is 50%. The probability that the patient inherited the gene from her mother is 50%, resulting in an overall probability of 25%. When functioning normally, the BRCA2 tumor suppressor gene aids in the repair of double-stranded DNA breaks. Mutations render this protein nonfunctional, thereby increasing the risk for error during DNA repair and thus the risk for breast, ovarian, and pancreatic cancers. Bilateral mastectomy and bilateral salpingo-oophorectomy may be performed prophylactically for BRCA mutation carriers to reduce the risk for breast and/or ovarian cancers. Patients who have not yet undergone prophylactic mastectomy should undergo high-risk screening.

Incorrect Answers: A, C, D, and E.

0% (Choice A) and 100% (Choice E) would respectively approximate the patient's probability of inheriting the gene (0%) and probability of not inheriting the gene (100%) if the patient's mother had undergone genetic testing and had been confirmed to be negative for the BRCA2 mutation.

50% (Choice C) represents the patient's risk for inheriting the gene if her mother was a known carrier of this autosomal dominant mutation.

75% (Choice D) is the likelihood that the patient did not inherit this autosomal dominant gene mutation, given the information provided in the pedigree.","edu_obj":"Mutations in the BRCA2 tumor suppressor gene are associated with breast and ovarian cancer. They are inherited in an autosomal dominant fashion. Indications for genetic testing for BRCA mutations include a personal history of breast cancer diagnosed at younger than age 45 years, a personal or family history of ovarian cancer, or a personal or family history of male breast cancer."},{"block":1,"item":31,"image_alt":"","image_url":"","stem":"A 28-year-old woman comes to the physician for advice on a weight loss plan. She is 163 cm (5 ft 4 in) tall and weighs 86 kg (190 lb); BMI is 33 kg/m2. Physical examination shows no other abnormalities. She has read an article on the Internet that outlines a balanced diet of 1500 kcal/day. She says, \"It's not as strict of a diet as some of my friends have tried. I think I can follow it for a long time.\" At her current level of physical activity, she expends approximately 2500 kcal/day. Based on this information. this patient will most likely lose weight at which of the following rates?","choices":{"A":"One-half pound weekly","B":"One pound daily","C":"Two pounds weekly","D":"Three pounds weekly","E":"Five pounds weekly"},"correct":"B","explanation":"Balancing caloric intake versus caloric expenditure underlies many theories of weight loss, which are central to the treatment of obesity. In general, the recommended adult caloric intake is 2500 calories daily for men and 2000 calories daily for women. though these recommendations vary based on lifestyle, comorbidities. and caloric demand. One pound of body fat contains approximately 3500 calories. A daily caloric deficit of 1000 calories will therefore result in loss of 7000 calories during a ?-day period. resulting in a loss of 2 pounds of fat weekly. Weight loss has a variety of beneficial health effects in the setting of obesity, including reduced incidence of diabetes mellitus, depression, hypertension, and osteoarthritis. Incorrect Answers: A, B, D. and E. Choices A, B, D, and E represent erroneous calculations based on an incorrect assessment of tile number of calories stored in 1 pound of body fat. Advance directives are formal specifications of a patient's wishes, created and executed during a time of decision-making capacity. Advance directives should reflect a patient's wishes as expressed during periods of stable values and preferences. They are enacted when tne patient loses capacity to communicate preferences about healthcare wishes. Often, these documents govern end-of-life core and are commonly used in cases of terminal illness; lote-sloge chronic obstructive pulmonary disease is a very common time of use. The physician should ask open-ended questions to assess the patient's wishes and values. Open-€nded questioning honors the patient's autonomy. The medicolegal strength of an advance directive is greater when family members or persons who know the patient corroborate the document's accurate reflection of long-standing and stable wishes. Incorrect Answers: A. c. D. E. and F. Ending medical treatment (Choice A) or terminating care with this patient (Choice C) are paternalistic approaches that constitute abandonment. Giving patients ultimatums or conditions for receiving care opposes the ethical principle of altruism. Physicians must honor patients' autonomy in end-of-life medical decisions. Though the physician may give the patient information about mechanical ventilation outcomes later in the conversation (Choice D), the physician should first ask the patient about her care preferences in an open-ended way. The question is not open-ended or autonomy-promoting in that the physician is expressing their own opinion about the best option for the patient. Stating that the physician needs to make plans for the patient's care (Choice E) constitutes a paternalistic approach that disinvites the patient's collaboration. The physician should ask open-ended questions to honor the patient's autonomy and assess her values. Slating that the polient is shortening her life sp,m (Choice F) is a judgment::il statement that may m::ike the patient feel bad about herself and preclude open discussion about her end-of-life care preferences. Open discussion is important for promoting patient autonomy.","edu_obj":"One pound of body fat contains approximately 3500 calories. A daily caloric deficit of 1000 calories will therefore result in loss of 7000 calories during a 7-day period. resulting in a loss of 2 pounds of fat weekly."},{"block":1,"item":32,"image_alt":"","image_url":"","stem":"A 56-year-old woman comes to the physician because of shortness of breath over the past several months. She smokes 2 packs of cigarettes daily and is not interested in quitting. R,espirations are 24/min. She is barrel-chested. Breath sounds are decreased over all lung fields, and pulmonary function testing shows an obstructive pattern. Oxygen saturation on room air is 91% at rest and 82% with exercise. After telling the patient that her lungs show signs of damage from tobacco, which of the following approaches by the physician is most appropriate in beginning to address advance directives with this patient?","choices":{"A":"\"As long as you continue to smoke, it would be futile for me to be aggressive with your medical care.\"","B":"\"Have you ever considered what medical treatment you would want if your breathing worsens?\"","C":"\"If you continue to smoke, you'll need to find a new physician.\"","D":"\"In my experience, people with your type of lung damage do not do well when put on mechanical ventilation. I'm sure you wouldn't want a tube in your throat, would you·","E":"\"It is very important that I make plans for your future health care.\"","F":"\"You are shortening your life span. We need to discuss what medical treatment you want.\""},"correct":"B","explanation":"Advance directives are formal specifications of a patient's wishes, created and executed during a time of decision-making capacity. Advance directives should reflect a patient's wishes as expressed during periods of stable values and preferences. They are enacted when the patient loses capacity to communicate preferences about healthcare wishes. Often, these documents govern end-of-life care and are commonly used in cases of terminal illness; late-stage chronic obstructive pulmonary disease is a very common time of use. The physician should ask open-ended questions to assess the patient's wishes and values. Open-ended questioning honors the patient's autonomy. The medicolegal strength of an advance directive is greater when family members or persons who know the patient corroborate the document's accurate reflection of long-standing and stable wishes.

Incorrect Answers: A, C, D, E, and F.

Ending medical treatment (Choice A) or terminating care with this patient (Choice C) are paternalistic approaches that constitute abandonment. Giving patients ultimatums or conditions for receiving care opposes the ethical principle of altruism. Physicians must honor patients' autonomy in end-of-life medical decisions.

Though the physician may give the patient information about mechanical ventilation outcomes later in the conversation (Choice D), the physician should first ask the patient about her care preferences in an open-ended way. The question is not open-ended or autonomy-promoting in that the physician is expressing their own opinion about the best option for the patient.

Stating that the physician needs to make plans for the patient's care (Choice E) constitutes a paternalistic approach that disinvites the patient's collaboration. The physician should ask open-ended questions to honor the patient's autonomy and assess her values.

Stating that the patient is shortening her life span (Choice F) is a judgment statement that may make the patient feel bad about herself and preclude open discussion about her end-of-life care preferences. Open discussion is important for promoting patient autonomy.","edu_obj":"All discussions about advance directives or other end-of-life care should begin with the physician asking open-ended, non-leading, non-judgmental questions to explore the patient's end-of-life preferences and values. This approach honors the patient's autonomy."},{"block":1,"item":33,"image_alt":"","image_url":"","stem":"A 48-year-old woman comes to the physician for a routine health maintenance examination. Her husband of 20 years died 2 years ago. Her vital signs are within normal limits. Physical examination shows no abnormalities. During the examination, the patient mentions that she has begun dating again. It is most appropriate for the physician to counsel this patient about which of the following?","choices":{"A":"Cohabitation","B":"Condom use","C":"Couples counseling","D":"Frequency of sexual intercourse","E":"Oral contraceptive use"},"correct":"B","explanation":"Physicians should counsel sexually active patients about safe sex practices to decrease the risk for sexually transmitted infection. Safe sex practices include limiting the number of sexual partners. receiving human papillomavirus vaccinations. being aware of and disclosing sexually transmitted infection status, and utilizing barrier protection such as condoms or diaphragms. For female patients of reproductive age who are dating male partners. discussing a safe sex method that concurrently decreases the risk for unwanted pregnancy is appropriate. Condoms both decrease sexually transmitted infection and pregnancy risk. Safe sex practices should be discussed with patients regardless of gender identity and sexual preference, in non-judgmental terms focused on keeping the patient and partner healthy. Incorrect Answers: A, C, D, and E. Cohabitation (Choice A) refers to partners living together. Though the physician may explore the patient's preferences regarding this personal decision, counseling the patient about cohabitation is generally outside of the physician's scope of practice. Couples counseling (Choice C) is appropriate for committed couples experiencing interpersonal difficulties. This patient has not mentioned interpersonal conflict or a committed relationship. An increased frequency of sexual intercourse (Choice D) does confer an increased risk for sexually transmitted infection and pregnancy. However, without a condom, even infrequent sexual intercourse can lead to sexually transmitted infection or pregnancy. Further, condom use can mitigate these risks while enabling this patient to pursue sexual intercourse as she desires. Oral contraceptive use (Choice E) prevents unwanted pregnancy. However, oral contraceptive pills do not protect against sexually transmitted infections.","edu_obj":"Physicians should counsel sexually active patients about safe sex practices, including utilizing barrier protection such as condoms. Condoms both decrease sexually transmitted infection and pregnancy risk."},{"block":1,"item":34,"image_alt":"","image_url":"","stem":"A 44-year-old man comes to the physician because of a 2-month history of dry mouth. muscle weakness. constipation. inability to achieve an erection, and progressive fatigue. He has smoked 1 pack of cigarettes daily for 30 years. His temperature is 36.7°C (98°F). pulse is 70/min, respirations are 10/min, and blood pressure is 11onomm Hg. Neurologic examination shows weakness of the deltoids. biceps, iliopsoas, and quadriceps, and absence of all muscle stretch reflexes. Sensation to all modalities is normal. A chest x-ray shows a right lung mass. Laboratory studies show antibodies directed against the P/O-type voltage-gated calcium channel. Which of the following mechanisms is the most likely cause of the neurologic findings in this patient?","choices":{"A":"Blockade of motor nerve conduction","B":"Central inhibition of a-motoneuron firing","C":"Decreased excitation-contraction coupling","D":"Hyperpolarizalion of the muscle membrane","E":"Impaired acetylcholine release at the neuromuscular junction"},"correct":"E","explanation":"Impaired acetylcholine (ACh) release at the neuromuscular junction is associated with myasthenic (Lambert-Eaton) syndrome. Myasthenic syndrome is an autoimmune condition in which autoantibodies directed against voltage-gated calcium channels in the presynaptic neuron decrease the release of ACh. Limited ACh release limits muscle cell depolarization and results in proximal muscle weakness. Additional symptoms include hyporeflexia. constipation, and autonomic dysregulation. With extended use, muscle strength improves as a result of the gradual accumulation of ACh in the synapse with repeated presynaptic depolarization. Diagnosis can be confirmed with testing for anti-voltage-gated calcium channel antibodies or electromyography testing. In many cases. myasthenic syndrome is a paraneoplaslic syndrome associated with small cell lung carcinoma. Incorrect Answers: A, B. C, and D. Blockade of motor nerve conduction (Choice A) is associated with the development of ACh receptors antibodies in myasthenia gravis. In myasthenia gravis, these antibodies target postsynaptic ACh receptors, preventing ACh binding. and inhibiting nerve conduction. Patients present with ptosis, diplopia, dysphagia, and muscle weakness, which are worse with repetitive activity and later in the day. Neostigmine is an acetylcholinesterase inhibitor, which decreases the breakdown of ACh in the neuromuscular synaptic junction and increases its duration of action used in the treatment of myaslhenia gravis. Central inhibition of a-motoneuron firing (Choice B) is associated with antagonist muscle groups in spinal reflexes. Spinal reflexes are associated with afferent neurons that synapse with Renshaw cells, specialized inhibitory interneurons, which prevent antagonist muscle firing by a-motoneuron. This is not associated with the development of myasthenic syndrome. Decreased excitation-contraction coupling (Choice CJ at the neuromuscular endplate would prevent release of calcium from voltage-gated ion channels and prevent or limit muscular contraction. Decreased excitation-contraction coupling is the not the primary cause of myasthenic syndrome. Hyperpolarization of the muscle membrane (Choice D) is associated with sodium-potassium channels in cardiac myocyles that use energy to transfer sodium out of the cell and potassium into the cell. creating a negative resting potential. During depolarization. sodium flows into cardiac myocytes, which triggers a contraction in a coordinated fashion.","edu_obj":"Educational Objective Myasthenic (Lambert-Eaton) syndrome is caused by antibodies directed against voltage-gated calcium channels, which decrease the release of acetylcholine at the neuromuscular junction. This leads to decreased reflexes, muscle weakness that improves with repeated use. and autonomic instability. It is frequently a paraneoplastic syndrome associated with small cell lung cancer."},{"block":1,"item":35,"image_alt":"","image_url":"","stem":"A 2-month-old male newborn is brought to the emergency department because of noisy and difficult breathing for 6 hours. Laryngoscopy shows multiple, slender. finger-like excrescences on both vocal cords. The newbom's condition is most likely caused by maternal infection with which of the following during pregnancy?","choices":{"A":"Chlamydia trachomatis","B":"Herpes simplex virus","C":"HIV","D":"Human papillomavirus","E":"Treponema pallidum"},"correct":"D","explanation":"Human papillomavirus (HPV) is a common human pathogen that infects epithelial cells and can cause a variety of lesions. Infection with low-risk strains (subtypes 6 and 11) can cause warty neoplasms (soft, fleshy pa pules). and infection with high-risk strains (subtypes 16, 18, 31, and 33) can cause dysplastic and malignant lesions. HPV is primarily transmitted through direct contact. In children, the most common vector for HPV infection is transmission from an affected mother during labor and transit through the birth canal with consequent infection of the larynx or oropharynx, though the presence of these lesions may also raise concern for sexual assault in the correct clinical context. Laryngeal papillomatosis frequently affects the vocal cords and presents as a vocal cord nodule or growths. Presentations include dysphonia (hoarseness) and may progress to stridor, dyspnea. chronic cough, dysphagia. globus sensation, and airway obstruction if the lesion becomes large enough. Risk factors for clinically significant HPV infection include immunodeficiency and injury to the epithelium from another cause (eg. trauma, coinfection). Treatment focuses on maintaining a patent airway, surgical removal of symptomatic lesions, and preserving voice quality. Anogenital manifestations of HPV infection are common and include condyloma acuminata and dysplasia or carcinoma of the vulva. cervix, penis, or anus. Non-anogenital manifestations include verruca vulgaris and plantar warts. Incorrect Answers: A, B, C, and E. Chlamydia trachomatis (Choice A) is a common causative agent of neonatal bacterial conjunctivitis, along with N. gonorrhoeae. Chlamydia I conjunctivitis presents within 5 to 14 days of birth and 1scharacterized by watery eye discharge. All newborns should receive topical ant1b1ot1c prophylaxis to prevent con1unct1v1t1s; erythromyc1n, which binds the bacterial 50s ribosomal subunit and prevents bacterial protein synthesis, is commonly used. Herpes simplex virus (Choice B) (HSV) infection is characterized by tender vesicles followed by ulceration and crusting. Manifestations of fetal infections include localized cutaneous lesions of the skin. eyes, and mouth, as well as systemic presentations such as meningoencephalitis. Transmission can occur via the placenta or through direct inoculation as the newborn passes through the birth canal in a mother with active lesions. Though the presence of HSV can result in more aggressive laryngeal papillomatosis, the causative agent is HPV. HIV (Choice C) presents nonspecifically with fever. lymphadenopathy, gastrointestinal upset. and occasionally, rash. Neonatal infection results in an immunocompromised state that puts the newborn at risk for failure to thrive, recurrent infections. and chronic diarrhea. HIV does not directly cause laryngeal papillomatosis; rather. an impaired immune system can result in more severe HPV lesions. Treponema pallidum (Choice E) can cause congenital syphilis via transmission through tile placenta in the second and third trimesters. Manifestations include syphilitic rhinitis (eg, mucopurulent nasal discharge), rhagades, dental malformations (notched teeth and irregularly shaped molars). and hepatomegaly with or without splenomegaly and lymphadenopathy. The time of presentation after birth is variable.","edu_obj":"Vocal cord cutaneous neoplasms in the neonatal period are most likely caused by human papillomavirus, which infects epithelial cells and is responsible for a variety of mucocutaneous lesions, ranging from benign to malignant. Presentations include dysphonia {hoarseness) and may progress to strider, dyspnea, chronic cough. dysphagia, globus sensation. and airway obstruction if the lesion becomes large enough. Treatment focuses on maintaining a patent airway, surgical removal of symptomatic lesions, and preserving voice quality."},{"block":1,"item":36,"image_alt":"","image_url":"","stem":"A 44-year-old man is brought to the emergency department 30 minutes after he fell off a ladder from a height of 10 feet. His pulse is 70/min, and blood pressure is 125/80 mm Hg. Physical examination shows multiple ecchymoses over the upper extremities and trunk. In response to the injury, activation of the endothelium of this patient's blood vessels has most likely resulted in which of the following?","choices":{"A":"Decreased ADP concentration","B":"Decreased GTP concentration                        ~","C":"Decreased thromboxane A 2 concentration","D":"Decreased tissue plasminogen activator concentration","E":"Increased cGMP concentration","F":"Increased von Willebrand factor concentration"},"correct":"F","explanation":"Primary hemostasis is the process by which a platelet plug is formed following endothelial damage. Immediately following an injury, the damaged endothelial cells release endothelin, which leads to transient vasoconstriction and stimulates platelet aggregation at the site of injury, along with von Willebrand factor (VWF), which is also released from the alpha granules of platelets. VWF binds to exposed collagen on the damaged endothelium and tethers the platelets to the endothelium via interaction with the Gp1 b receptor on the platelet surface, promoting primary hemostasis. In deficiency, van Willebrand disease arises. Von Willebrand disease is one of the most common hereditary bleeding disorders and caused by quantitative or qualitative abnormality of VWF, leading to impaired primary hemostasis. This can present with epistaxis, gingival bleeding. petechiae, easy bruising, and menorrhagia. Laboratory studies will show a normal platelet count and a prolonged bleeding time. Treatment depends on the site and severity of bleeding and may include desmopressin (which promotes release of additional VWF from endothelial cells) or administration of VWF concentrates, especially in the setting of traumatic injury or active bleeding. Incorrect Answers: A, B, C, D, and E. Decreased ADP concentration (Choice A) is incorrect, as there would instead be an increased ADP concentration following endothelial injury. ADP acts as a stimulator of platelet aggregation and clot formation. Binding of ADP to platelet receptors induces conformational changes in platelets, leading to release of platelet granules. Additionally, ADP induces platelets to form thromboxane A2 via the action of cyclooxygenase and thromboxane A 2 synthase. Decreased thromboxane A2 concentration (Choice C) is therefore incorrect. Thromboxane A 2 is a potent stimulator of further platelet activation and recruitment. Decreased GTP concentration (Choice B) is incorrect. Increase in GTP via conversion from GDP is necessary for activation of signaling pathways that play a crucial role in platelet activity. Decreased tissue plasminogen activator concentration (Choice D) is incorrect. Hemostasis and restoration of perfusion is a balance between thrombosis and thrombolysis. Tissue plasminogen activator would be activated in the setting of thrombolysis because of the presence of a thrombus; however, this principle is not the key related to endothelial injury in primary hemostasis. Increased cGMP concentration (Choice E) would lead to inhibition of platelet function, thus preventing the formation of the platelet plug. This would cause ongoing bleeding and is incorrect.","edu_obj":"Increased von Willebrand factor (VWF) concentration is seen after endothelial damage and plays an important role in primary hemostasis by linking platelets to the damaged endothelium. Deficiency of VWF leads to impaired primary hemostasis and can manifest as easy bruising and increased mucosa! bleeding."},{"block":1,"item":37,"image_alt":"","image_url":"","stem":"During a study of primary human hepatocytes, it is found that these cells dedifferentiate when grown in culture and lose many of the synthetic and metabolic functions unique to in vivo hepatocytes_ Coculturing the primary hepatocytes with biliary epithelial cells preserves many aspects of the differentiated state of the hepatocytes. Compared with hepatocytes grown alone, the cocultured hepatocytes most likely produce an increased amount of which of the following?","choices":{"A":"Alanine","B":"Fructose","C":"Maltose","D":"Pyruvate","E":"Urea"},"correct":"E","explanation":"Hepatocytes are involved many metabolic processes, including metabolism of nitrogenous waste via the urea cycle. The urea cycle allows for the conversion of toxic nitrogenous waste products, such as ammonia, into urea, which can be safely excreted by the kidneys. Failure of the urea cycle leads to an accumulation of ammonia which contributes to hepatic encephalopathy. In the described experiment, preservation of hepatocyte differentiation via co-culturing with biliary cells will maintain normal hepatocyte metabolic processes, including production of urea. In contrast. dedifferentiated hepatocytes will maintain core metabolic pathways that are common to most cells, such as glycolysis and mitochondrial respiration, but will lose the metabolic functions that are specific to hepatocytes, such as the urea cycle, amino acid deamination and transamination, gluconeogenesis, and synthesis of albumin and coagulation factors. Incorrect Answers: A. B, C, and D. Alanine (Choice A) is a non-essential amino acid that is produced by transamination of pyruvate. It plays a key role in the glucose-alanine cycle, which allows muscle fibers to convert amino groups to glutamate and then to alanine, which is metabolized by the liver for gluconeogenesis. Co-cultured hepatocytes would be expected to consume a greater amount of alanine, rather than produce It. Fructose (Choice B) is a monosaccharide. It is absorbed into hepatocytes by the GLUT-2 transporter. In contrast to glucose. which is utilized throughout the body, the metabolism of fructose by fructolysis takes place specifically in the liver. Differentiated hepatocytes would be expected to metabolize a greater amount of fructose, rather than producing it Maltose (Choice C) is a disaccharide formed from two units of glucose. Maltose is cleaved by maltase into two units of glucose in the intestinal brush border and is not directly metabolized by the liver. Neither differentiated nor de-differentiated human cells produce maltose, although both may utilize glucose for energy. Pyruvate (Choice 0), the conjugate base of pyruvic acid, is a central compound in human metabolism that serves as an intermediary between glycolysis, the citric acid cycle, gluconeogenesis, lactate metabolism, and glucose-alanine pathways. Its production through glycolysis would not differ between dedifferentiated and differentiated hepatocytes.","edu_obj":"Hepatocytes are involved in a variety of important metabolic processes, including metabolism of nitrogenous waste via the urea cycle. The urea cycle allows for the conversion of toxic nitrogenous waste products into urea, which can be safely excreted by the kidneys. Loss of hepatocyte differentiation could lead to the loss of metabolic functions that are specific to hepatocytes, such as the urea cycle, amino acid deamination and transamination, gluconeogenesis, and synthesis of albumin and coagulation factors."},{"block":1,"item":38,"image_alt":"","image_url":"","stem":"A male newborn has multiple dysmorphic features suggestive of Down syndrome. Chromosomal analysis is ordered. Which of the following choices is most appropriate regarding what the parents should be told?","choices":{"A":"The newborn has some features of Down syndrome. and chromosomal analysis has been requested","B":"The newborn has some unusual features on examination, and a test has been ordered that may help determine a diagnosis","C":"The physician's concerns shld not be mentioned because the parents would worry unnecessarily if the physician is wrong","D":"Some tests have been orde~. the results of which will be communicated at the routine 2-week examination of the newborn"},"correct":"A","explanation":"Physicians should address objective findings by explaining their differential diagnosis and the next diagnostic steps in simple language that is delivered in small pieces. It is important that physicians honor patients' and family members' autonomy by providing them with relevant clinical information. Typically, the most relevant information includes the most likely diagnoses and the most serious diagnoses. As Down Syndrome is both likely and serious. the physician should discuss this possibility and provide timely updates about diagnostic results. Incorrect Answers: B, C, and D. Providing vague or misleading information about the differential diagnosis and diagnostic process, (Choices Band D) or withholding information (Choice C) are paternalistic approaches that avoid giving the patient's family relevant clinical information. Physicians may be tempted to protect patients and family members from hearing distressing news; however. delivering bad news early and allowing the patient and family to process the information with the physician is the most therapeutic approach. Additionally. stating the !ests will be discussed at a \"routine\" visit is dishonest in implying that the newborn's development is normal.","edu_obj":"Physicians should address objective findings by explaining their differential diagnosis and the next diagnostic steps in simple language that is delivered in small pieces. Physicians should aim to provide patients and family members with relevant clinical information."},{"block":1,"item":39,"image_alt":"","image_url":"","stem":"A healthy 58-year-old man comes to the physician because of progressive hair loss during the past few years. He says that his father and grandfathers had a similar pattern of baldness. Examination of the scalp shows hair loss in an \"M-• shaped pattern over the frontal hairline. Which of the following mechanisms best explains the hair loss in this patient?","choices":{"A":"Decreased 5α-reductase activity","B":"Dihydrotestosterone binding to androgen receptors","C":"Increased activity of cytochrome P450 aromatase","D":"Increased testicular testosterone production"},"correct":"B","explanation":"Dihydrotestosterone binding to androgen receptors is the primary mechanism of male pattern baldness. or androgenic alopecia. Testosterone is converted to dihydrotestosterone. a more potent androgen, by 5α-reductase. When androgen receptors in terminal hair follicles are exposed to dihydrotestosterone. hair follicles undergo miniaturization and may transition to fine vellus hairs causing the clinical presentation of androgenic alopecia. Androgenic alopecia is progressive, and most prominent In the frontal and vertex scalp locations. Flnasterlde, whlct1 is a 5α-reductase Inhibitor, Is used In the treatment of androgenic alopecia. Incorrect Answers: A. C. and D. Decreased 5α-reductase activity (Choice A) prevents conversion of testosterone to dihydrotestosterone and does not cause androgenic alopecia. Androgenic alopecia is driven by the presence of dihydrotestosterone. Increased activity of cytochrome P450 aromatase (Choice CJ promotes peripheral conversion of androgens to estrogens. Increased availability of estrogens does not worsen androgenic alopecia. Increased availability of estrogens may instead result in the development of biologic female secondary sex characteristics, such as gynecomastia. Increased testicular testosterone production (Choice D) increases the amount of testosterone available for conversion to dihydrotestosterone; however. this is not the primary mechanism of androgenic alopecia.","edu_obj":"Androgenetic alopecia is caused by dihydrotestosterone binding to androgen receptors in terminal hair follicles. Over time. dihydrotestosterone promotes terminal hair follicle miniaturization and transition to vellus hairs. Androgenic alopecia progresses over several years and commonly involves the frontal and vertex scalp."},{"block":1,"item":40,"image_alt":"","image_url":"","stem":"A 55-year-old man volunteers as a subject for a cardiac function study. Vital signs and a physical examination are obtained. Echocardiography shows thickening of muscle tissue of the left ventricle. Subsequent testing is most likely to show which of the following underlying conditions in this man?","choices":{"A":"Aortic regurgitation","B":"Coronary artery disease","C":"Hypertension","D":"Mitral stenosis","E":"Mitral valve prolapse"},"correct":"C","explanation":"Hypertension is a common cause of chronic systolic and diastolic dysfunction. and chronic hypertension is associated with left ventricular hypertrophy as a result of constant work against an increased afterload. The thickened myocardium results in impaired left ventricular relaxation and increased diastolic filling pressures that lead to left atrial enlargement and heart failure over time. Physical examination may show an S₄ gallop suggestive of a stiff and noncompliant left ventricle. Jugular venous distension and pulmonary crackles indicate impaired forward flow of blood. An ECG may show evidence of left ventricular hypertrophy and left atrial enlargement. Adequate control of blood pressure decreases afterload and reduces the degree of cardiac myocyte hypertrophy. which decreases the risk for developing heart failure. Incorrect Answers: A. B. D. and E. Aortic regurgitation (Choice A) is commonly associated with endocarditis. acute rheumatic fever, and aortic root dilation. The ECG will show retrograde flow of blood into the left ventricle from the aortic root immediately after systole. Coronary artery disease (Choice B) is a common comorbidity encountered in clinical practice that can lead to myocardial ischemia and infarction. The ECG may show regions of hypokinesis or akinesis that represent previously infarcted myocardium. Mitral stenosis (Choice D), which presents with a murmur classically heard as an opening snap followed by a diastolic rumble, is associated with left atrial hypertrophy, and reduced left ventricular stroke volume due to decreased filling. These findings may be observed on the ECG. Mitral valve prolapse (Choice E) is a cause of mitral regurgitation, typically presenting with a holosystolic murmur best heard in the left fourth or fifth intercostal space along the midclavicular line and radiates to the left axilla. The ECG may show abnormal positioning, movement. and/or thickening of the mitral valve leaflets.","edu_obj":"Hypertension is a common cause of chronic systolic and diastolic dysfunction. and chronic hypertension is associated with left ventricular hypertrophy as a result of constant work against an increased afterload."},{"block":1,"item":41,"image_alt":"","image_url":"","stem":"A 36-year-old man with sarcoidosis comes to the emergency department because of a 3-hour history of severe left flank pain radiating to his groin. He says the pain varies in intensity but never ceases completely. His temperature is 37.5°C (99.5°F). pulse is 100/min. respirations are 16/min, and blood pressure is 144/92 mm Hg. Physical examination shows left flank tenderness. Serum studies show a calcium concentration of 11.2 mg/dl. Urinalysis shows microscopic blood. Which of the following mechanisms is the most likely underlying cause of this patient's condition?","choices":{"A":"Activation of osteoclast-activating factor","B":"Increased a 1-h,r_droxylaseactivity","C":"Increased intenal absorption of oxalate","D":"Inhibition of urinary calcium excretion","E":"Stimulation of parathyroid hormone secretion","F":"Upregulation of vitamin D receptors"},"correct":"B","explanation":"[NOT IN SOURCE FILE]","edu_obj":""},{"block":1,"item":42,"image_alt":"","image_url":"","stem":"An investigator is studying a substance abuse problem among school-age children that involves taking large doses of over-the-counter cough medication containing dextromethorphan. The effects range from mild excitement with hallucinations to a sense of complete dissociation from the body. The investigator notes that this substance is an]V-methyl-o-aspartate receptor antagonist. The psychological effects of this substance most closely resemble those of which of the following?","choices":{"A":"Codeine","B":"Ketamine","C":"Methamphetamine","D":"Propofol","E":"Tetrahydrocannabinol"},"correct":"B","explanation":"Both dextromethorphan and ketamine antagonize N-methyl-o-aspartate (NMDA) glutamate receptors in the central nervous system (CNS). Dextromethorphan is a common ingredient in antitussive medications. When used in excess, it can have mild opioid-like effects and act as a dissociative hallucinogen. Dissociation is defined as a sense of detachment from one's body and/or surroundings. Patients may experience altered consciousness and hallucinations. Similarly, ketamine causes dissociation. Ketamine has been historically used as an anesthetic and analgesic agent and has recently gained popularity as a rapid-acting antidepressant. Other NMDA antagonists include phencyclidine {another recreational drug associated with dissociation) and memantine (a neuroprotective agent that protects patients with dementia against glutamate excitotoxicity). Incorrect Answers: A, C, D, and E. Codeine (Choice A) is an opioid agonist used as an analgesic and antitussive. When used recreationally, codeine can lead to dissociative effects. However, codeine does not antagonize NMDA glutamate receptors, and ketamine more commonly leads to dissociation. Methamphetamine (Choice C) is a CNS stimulant that causes release of dopamine, serotonin, and norepinephrine, leading to increased sympathetic tone (eg, tachycardia, hypertension, pupillary dilation, restlessness). Though methamphetamine-induced psychosis (eg, delusions, hallucinations) is possible, dissociation is less common. Methamphetamine is not considered a hallucinogen and is not a ligand of NMDA glutamate receptors. Propofol (Choice D) is a sedative-hypnotic agent used in general anesthesia. It causes sedation by acting on CNS v-aminobutyric acid receptors. Propofol is not associated with dissociation. Tetrahydrocannabinol (Choice E) is a hallucinogen that acts on the endocannabinoid system in the CNS to cause euphoria, paranoia, 11allucinalions, increased appetite. conjunctival injection, and cognitive slowing. Dissociation is less common, and tetrahydrocannabinol is not a ligand of NMDA receptors.","edu_obj":"Both ketamine and dextromethorphan can act as dissociative hallucinogens because of antagonism of N-methyl-o-aspartate (NMDA) glutamate receptors. Patients may experience altered consciousness, hallucinations, and a sense of detachment from their body and/or surroundings."},{"block":1,"item":43,"image_alt":"","image_url":"","stem":"A 40-year-old man has a history of cerebellar hemangioblastoma and ,etinal angiornas. Urinalysis shows microscopic blood. A CT scan or the abdomen shows a renal mass. and a nephrectomy is performed. The cut surface of the resected kidney ls shown. Which of the following is the most likely diagnosis? ~","choices":{"A":"Hemangioma","B":"Metastatic bronchogenic carcinoma","C":"Myelolipoma","D":"Renal adenocarcinoma","E":"Transitional carcinoma"},"correct":"D","explanation":"Renal cell carcinoma (RCC) is an adenocarcinoma of tubular epithelial cells_ RCC is a common primary malignancy of the kidney and generally occurs in older, male smokers. It can present with gross or microscopic hematuria, flank pain, weight loss, or fever. Laboratory studies may show polycythemia or hypercalcemia as a result of associated paraneoplastic syndrome production of erythropoietin or parathyroid hormone-related peptide. Hypercalcemia can also result from bony metastasis. Diagnosis of RCC typically occurs with CT scan or MRI and is confirmed by biopsy at the time of nephrectomy. Biopsy of RCC is characterized by the presence of polygonal clear cells as a result of the accumulation of lipid and carbohydrate in the cells. on gross pathology, there is typically a golden color caused by intracellular lipid accumulation. Adenocarcinoma is often well-circumscribed, centered on the renal cortex, and if large, may distort the kidney contour. There also may be hemorrhage, necrosis, calcification, or cystic change. It spreads hematogenously, and commonly presents as a metastatic neoplasm. The brain is a frequent site of metastasis. In this example, this patient is less than 50 years of age and has had multiple tumors involving other body systems. This is suggestive of a genetic or hereditary cause of malignancy, in this case, likely von Hippel-Lindau syndrome. Incorrect Answers: A, B. C, and E. Hemangioma (Choice A) refers to a benign proliferation of blood vessels. which can either be present at birth or develop shortly after birth. They are bright red in appearance and do not typically progress to malignancy. Metastatic bronchogenic carcinoma (Choice B) is a malignant neoplasm of the lung. While a metastatic lesion from the lung cannot be excluded, the systemic nature of tumors in multiple systems and known association of renal cell carcinoma with von Hippel-Lindau disease makes a separate renal primary tumor more likely. Myelolipomas (Choice C) are benign tumors that typically occur in the adrenal glands. They consist of adipose tissue and myeloid tissue. This patient's tumor is in the kidney, not the adrenal gland. which lies above the kidney. Transitional cell carcinoma (Choice E) is located within the urinary collecting system and bladder. The transitional epithelium of the collecting system and bladder is specialized stratified epithelium that can expand and contract depending on the collecting system volume. This patient's lesion appears to arise from the renal cortical or medullary parenchyma, as opposed to the collecting system.","edu_obj":"Renal cell carcinoma (RCC) often presents in older, male smokers, and the brain is a common site of metastasis. Biopsy of RCC is uniquely characterized by polygonal clear cells, caused by the accumulation of lipid and carbohydrate content in the cells. It is associated with cancer syndromes such as von Hippel-Lindau disease, which also presents with multiple vascular tumors."},{"block":1,"item":44,"image_alt":"","image_url":"","stem":"A 65-year-old man is brought to the emergency department 30 minutes aer the sudden onset of tearing chest pain that radiates to his back. He has smoked 1 pack of c garettes daily for 40 years. His pulse is 115/min, and blood pressure is 170/110 mm Hg. Physical examination and a chest radiograph show no abnormalities. Contrast axial (left) and sagittal (right) CT sCcJnsof the chest and abdomen shown confirm thoracoabdominal dissection of the aorta; the arrows indicate the vessel perfused by the false lumen. Occlusion of this vessel will most likely result in compromised blood flow to which of the following organs?","choices":{"A":"Colon","B":"Kidney","C":"Pancreas","D":"Small bowel","E":"Spleen"},"correct":"E","explanation":"This patient with tearing chest pain, hypertension, and CT scans showing a dual lumen and flap within the arterial vasculature has an aortic dissection. Aortic dissections begin with a tear through the tunica intima which permits blood to dissect through the layers of the vessel (eg, media, adventitia). Dissection can involve the ascending and descending aorta. as well as the aortic branches. Classic presentation includes sudden onset tearing chest pain that radiates to the back and increased blood pressure. Other presenting features depend on which aortic branches are involved (eg. neurological deficits with carotid artery involvement, acute kidney injury with renal artery involvement). Diagnosis is confirmed with CT angiography, which will reveal the dissection as well as any other complications, such as branch vessel involvement or rupture with hemorrhage. This patient's CT scan shows dissection of the descending aorta extending into the celiac trunk (the vessel indicated by the arrow). The celiac trunk is the first major branch of the descending aorta and gives rise to the common hepatic artery, left gastric artery, and splenic artery at T12. II supplies blood to the liver, stomach, proximal duodenum, pancreas, inferior esophagus, and spleen. Primary initial management for all types of aortic dissection involves rapid reduction in blood pressure and pulse to prevent further propagation of the dissection. Intravenous beta blockers are the preferred first-line agent for medical management. Dissection involving the ascending aorta often requires operative repair. Incorrect Answers: A, B, C, and D. Colon (Choice A) receives its blood supply from both the superior mesenteric artery (SMA) and inferior mesenteric artery (IMA). The cecum. ascending colon, and proximal two-thirds of the transverse colon are supplied by the SMA. The distal third of the transverse colon as well as the upper portion of the rectum are supplied by the IMA. Kidney (Choice B) receives its blood supply from the renal artery which branches directly from the descending aorta. While a descending aortic dissection may compromise renal blood flow, it would be through involvement of the renal arteries, not the celiac trunk. Pancreas (Choice C) and small bowel (Choice D) both receive blood supply from two major sources: the celiac trunk and the SMA. The splenic artery is a major division of the celiac trunk whose branches supply a portion of the pancreas. The common hepatic artery, another major branch of the celiac trunk. gives rise to the gastroduodenal artery which then branches into the anterior and posterior superior pancreaticoduodenal arteries that supply part of the pancreas as well as the proximal duodenum. The SMA gives rise to the anterior and posterior inferior pancreaticoduodenal arteries which supply the distal duodenum and part of the pancreatic head. The superior and inferior pancreaticoduodenal arteries form an anastomosis. Because of this dual blood supply, the pancreas and small bowel would still receive blood flow through the SMA if dissection occurred through the celiac trunk.","edu_obj":"Aortic dissection classically presents with tearing chest pain and increased blood pressure. Dissection can occur through the ascending or descending aorta, as well as through any of the aortic branches. The celiac trunk is the first major branch of the descending aorta and supplies blood to the liver, stomach, proximal duodenum, pancreas, inferior esophagus, and spleen. Dissection involving the ascending aorta often requires operative repair."},{"block":1,"item":45,"image_alt":"","image_url":"","stem":"A 32-year-old woman comes to the physician because of intermittent chest pain that is \"not severe but rather annoying: Her mother died of sudden cardiac arrest at age 51 years. A midsystolic click is heard in the fifth intercostal space in the left midclavicular line. Which of the following cardiac abnormalities is most likely in this patient?","choices":{"A":"Atrial septa I defect","B":"Bicuspid aortic valve with stenosis","C":"Mitral valve prolapse","D":"Patent foramen ova le","E":"Tricuspid regurgitation"},"correct":"C","explanation":"Mitra I valve prolapse is a structural cardiac disease characterized by abnormal positioning and movement of the mitral valve leaflets into the left atrium during ventricular contraction. It is more common in females. The most common causes are myxomatous degeneration, chorda tendinae rupture, and mitral annular disjunction, in which the mitral annulus becomes partially detached. Myxomatous degeneration results in thickened mitral valve leaflets due to accumulation of fibrous and mucoid material. It may be idiopathic or caused by hereditary disease and may be present in muscular dystrophies. It is also associated with connective tissue disorders such as Marfan and Ehlers-0anlos syndrome, as well as adult polycystic kidney disease, systemic lupus erythematosus, and polyarteritis nodosa. Patients are typically asymptomatic, but may develop palpitations, chest pain, and dyspnea especially if there is mitral regurgitation. Patients classically have a midsystolic click on cardiac auscultation. which may or may not be followed by the late systolic murmur of mitral regurgitation. Incorrect Answers: A. B. D. and E. Atrial septal defect (Choice A

to increased concentrations of glucose in the maternal circulation. especially in those with pre-existing diabetes mellitus, and subsequently, the fetal circulation. Fetal hyperglycemia in turn causes the fetus to produce excess insulin, as well as decrease the rate of gluconeogenesis. The insulin then acts as a growth factor, leading to macrosomia, as in this patient, and inhibits the production of surfactant, which can lead to respiratory distress syndrome. After birth. the fetus continues to synthesize insulin and secrete insulin from the pancreatic p cells at a basal level appropriate for in utero glucose concentrations but is no longer exposed to maternal blood glucose, which leads to hypoglycemia. Hypoglycemia presents in the newborn with tremors, diaphoresis, irritability, lethargy, and seizures. Treatment is supportive and includes administration of supplemental glucose while neonatal endocrine regulation self-corrects. Other neonatal complications of maternal diabetes mellitus, which is usually diagnosed by a routine glucose tolerance test at 24 to 28 weeks' gestation, include congenital cardiac and neurologic abnormalities (eg, patent ductus arteriosus, ventricular septal defect. caudal regression), preterm delivery, polycythemia, and hyperbilirubinemia. Incorrect Answers: A, B, C, and E. Glucagon secretion by pancreatic a cells is decreased in the newborn (Choice A) is not the primary mediator of neonatal hypoglycemia. While it may be somewhat decreased in utero due to excessive concentrations of glucose, it should return to normal concentrations after birth. Decreased glucagon is not responsible for this patient's hypoglycemia. Hepatic enzymes for gluconeogenesis are increased in tile newborn (Choice B) is incorrect, as they are decreased after being exposed to excessive glucose and insulin while in utero. These return to normal function in the immediate peripartum period. However. increased gluconeogenesis would result in hyperglycemia rather than hypoglycemia. Hepatic glycogen content is depleted in the newborn (Choice C) is not the cause of neonatal hypoglycemia. Infants that have been exposed to significant in utero glucose and insulin have adequate stores of glycogen. Maternal insulin crossed the placenta (Choice E) is incorrect. Maternal insulin is too large to pass through the placental vessels. Rather, the increased glucose passes through and causes the fetus to create excess insulin. production of which continues after birth. This excessive insulin created by the fetus, rather than transferred from the mother, leads to neonatal hypoglycemia.","edu_obj":"Excessive fetal exposure to glucose and insulin in utero can cause macrosomia, neonatal respiratory distress syndrome or hyaline membrane disease, and hypoglycemia in the newborn. Human placental lactogen produced by the placenta increases maternal insulin resistance. Maternal hyperglycemia leads to fetal hyperglycemia, which in turn causes the fetus to produce excess insulin, as well as decrease the rate of gluconeogenesis. After birth, the newborn continues to synthesize insulin and secrete insulin from the pancreatic p cells but is no longer exposed to maternal blood glucose, which leads to hypoglycemia."},{"block":3,"item":36,"image_alt":"","image_url":"","stem":"A 29-year-old woman with type 1 diabetes mellitus gives birth at home to a male newborn at 30 weeks' gestation. During transport to the hospital, the newborn develops respiratory distress. The lower ribs and sternum retract on inspiration, and an expiratory grunt is audible. An x-ray of the chest shows uniform reticulogranular densities in both lung fields. Arterial PO₂ is 60 mm Hg. Blood and sputum cultures are negative. Which of the following is the most likely cause of the hypoxemia in this newborn?","choices":{"A":"Atelectasis","B":"Bullous emphysema","C":"Diffuse pulmonary fibrosis","D":"Hyperplasia of type I pneumocytes","E":"Intra-alveolar exudate consisting of neutrophils"},"correct":"A","explanation":"Neonatal respiratory distress syndrome (NRDS) commonly occurs in premature infants and is caused by an inadequate production of pulmonary surfactant. Surfactant produced by type II pneumocytes functions to decrease surface tension of the alveolar membrane. Without sufficient quantities of surfactant, high surface tension leads to atelectasis. Surfactant reaches normal levels of production in the third trimester, and infants who are born before 34 weeks' gestation are at increased risk for NRDS. Another risk factor pertinent to this newborn is maternal diabetes mellitus. NRDS presents with tachypnea, hypoxemia, accessory muscle use, and cyanosis, and may lead to death. Chest x-rays commonly show diffuse, bilateral airspace and interstitial opacities. Biopsy is not required for diagnosis, but if performed at autopsy shows atelectasis with deposition of proteinaceous alveolar debris and hyaline material. The treatment of NRDS is supportive. NRDS may be both prevented and treated with glucocorticoids, which stimulate surfactant production. Incorrect Answers: B, C, D, and E. Bullous emphysema (Choice B) is extraordinarily rare in newborns. It is caused by alveolar destruction that leads to enlarged airspaces, referred to as bullae, and presents with obstructive lung disease. It is most commonly caused by smoking but can also be caused by a-1 antitrypsin disorder. Diffuse pulmonary fibrosis (Choice C) is a rare disorder of infants. It is more common in older individuals due to idiopathic inflammation or exposures to certain environmental toxins. However, when present in children, it can present at birth with respiratory failure or in early infancy with cough, hypoxemia, and tachypnea. It would be much less likely than NRDS in this premature newborn. Hyperplasia of type I pneumocytes (Choice D) is rare and would not explain this newborn's symptoms. Type I pneumocytes make up the alveolar wall and thus are involved in gas exchange. Hyperplasia may inhibit gas exchange but would be unlikely to lead to this degree of respiratory failure. Intra-alveolar exudate consisting of neutrophils (Choice E) describes the pathophysiology of pneumonia. Pneumonia immediately after delivery would be uncommon but could present with signs of respiratory failure as seen in this newborn, as well as fever and leukocytosis. However, an x-ray would be expected to show a lobar consolidation, and a sputum culture would be positive.","edu_obj":"Neonatal respiratory distress syndrome (NRDS) commonly occurs in infants who are born before 34 weeks' gestation and is caused by an inadequate production of pulmonary surfactant, which is responsible for maintaining appropriate alveolar surface tension. Without sufficient quantities of surfactant, high surface tension leads to atelectasis. NRDS presents with tachypnea, hypoxemia, accessory muscle use, and cyanosis, and may lead to death. Chest x-rays commonly show diffuse, bilateral airspace and interstitial opacities. The treatment of NRDS is supportive."},{"block":3,"item":37,"image_alt":"","image_url":"","stem":"A 24-year-old woman has the onset-(jlf fever, chills, and lower abdominal pain on the second day of her menstrual period. Examination shows tenderness localized to the fallopian tubes and ovaries. A complete blood count shows leukocytosis. Which of the following is the most likely causal organism?","choices":{"A":"Gardnerella vagina/is","B":"Neisseria gonorrhoeae","C":"Staphylococcus aureus","D":"Streptococcus agalactiae (group B)","E":"Trichomonas vagina/is"},"correct":"B","explanation":"Neisseria gonorrhoeae is a sexually transmitted gram-negative diplococcus that can present with vaginitis, cervicitis, urethritis, disseminated gonorrhea, septic arthritis, or pelvic inflammatory disease. When causing vaginitis, N. gonorrhoeae typically presents with mucopurulent discharge and pruritus, although patients may be asymptomatic. Cervicitis presents with similar discharge, as well as an erythematous, friable cervix with cervical motion tenderness. When infection spreads to the fallopian tubes and ovaries, it can cause pelvic inflammatory disease, which is characterized by cervical motion tenderness, purulent cervical discharge, uterine and adnexal tenderness, and systemic signs such as fever, fatigue, and myalgias. Laboratory studies may also show leukocytosis. Complications include tubo-ovarian or intra-abdominal abscess. Diagnosis is made with a nucleic acid amplification test. and treatment is with ceftriaxone. Incorrect Answers: A, C, D, and E. Gardnerella vagina/is (Choice A) is the organism responsible for bacterial vaginosis, which is a common gynecologic condition characterized by a shift in normal vaginal flora. It presents with gray, thin, malodorous vaginal discharge, a vaginal pH greater than 4.5, a fish-like odor on KOH testing, and clue cells on wet mount preparation. It does not commonly cause leukocytosis or adnexal tenderness. Staphylococcus aureus (Choice C) is the bacteria most commonly identified in toxic shock syndrome. It produces an exotoxin that causes fever, a diffuse erythematous macular rash, hypotensionldistributive shock, and multiorgan system failure. This patient's presentation is more consistent with gonorrhea. Streptococcus aga/actiae (group B) (Choice D) commonly colonizes the vagina. It is frequently asymptomatic. When found in pregnant patients, it can be a cause of neonatal sepsis after birth, prompting treatment with prophylactic antibiotics during the delivery period. Gonorrhea is the more likely cause of this patient's symptoms. Trichomonas vagina/is (Choice E) is an anaerobic, flagellated protozoan that causes vaginal trichomoniasis, which presents with pruritus, dysuria, dyspareunia, cervical erythema, and abnormal discharge that is described as green. frothy, and malodorous. Vaginal pH is often greater than 4.5. and motile trichomonads can be seen on wet mount preparation. It does not often progress to cause adnexal tenderness or leukocytosis.","edu_obj":"Neisseria gonorrhoeae infection is a sexually transmitted bacterium that can cause vaginitis, cervicilis. urethritis, disseminated gonorrhea, septic arthritis, and pelvic inflammatory disease. When pelvic inflammatory disease is present, symptoms include uterine and adnexal tenderness as well as systemic signs and symptoms. Diagnosis is made with a nucleic acid amplification test, and treatment is with ceftriaxone."},{"block":3,"item":38,"image_alt":"","image_url":"","stem":"A 31-year-old man comes to the physician because of a 4-day history of vague lower abdominal discomfort. He has been treated with chemotherapy for the last 4 months for testicular embryonal carcinoma. His serum α-fetoprotein concentration, which was initially markedly increased, is now zero. Imaging studies show a persistent 6-cm, well-circumscribed, retroperltoneal mass. The mass is resected and a representative section Is shown. Which of the following is the most likely diagnosis?","choices":{"A":"Idiopathic retroperitoneal fibrosis","B":"Metastatic choriocarcinoma","C":"Metastatic embryonal carcinoma","D":"Metastatic teratoma","E":"Scar following chemotherapy"},"correct":"D","explanation":"Testicular germ cell tumors account for the majority of testicular carcinoma. Among the germ cell tumors, seminoma occurs most frequently, while nonseminomatous germ cell tumors are classified as either pure or mixed. Histologic patterns include embryonal carcinoma. choriocarcinoma, teratoma, and yolk cell tumor. Mixed nonseminomatous germ cell tumors display these histologic types in combination. Embryonal carcinoma is distinguished histologically by poorly differentiated cells with pleomorphic, high-grade nuclear features and displaying solid. glandular. or papillary arrangements. Embryonal carcinomas secrete α-fetoprotein and human chorionic gonadotropin. In contrast. teratomas display a variety of differentiated cell types from different germ layers and often display organoid morphology with variable degrees of cellular atypia. Teratomas typically do not secrete either α-fetoprotein or human chorionic gonadotropin. This patient's photomicrograph shows a biopsy specimen with features of both glandular tissue and cartilage. which would arise from two separate germ layers (eg, endoderm, mesOderm) consistent with a teratoma. Testicular cancers frequently metastasize to the para-aortic (lumbar) lymph nodes, which are in the retroperitoneal space. This patient's biopsy specimen showing glandular and cartilaginous elements is diagnostic of metastatic teratoma and suggests that his primary testicular tumor was of a mixed type, rather than a pure embryonic carcinoma, Treatment includes complete surgical excision and systemic chemotherapy. Incorrect Answers: A, B, C, and E. Idiopathic retroperitoneal fibrosis (Choice A) is incorrect. Retroperitoneal fibrosis is characterized by a fibrotic lesion that typically surrounds the aorta and common iliac artery. II may occur secondary to infection, malignancies, radiation, or drugs, but may occur idiopathically. Histology shows fibrous tissue and chronic inflammation. Cartilaginous tissue is not present. Metastatic choriocarcinoma (Choice B) is Incorrect. Choriocarcinoma is characterized histologically by the presence of cytotrophoblast and syncytiotrophoblast elements. Choriocarcinoma does not contain elements of cartilage or bone. Metastatic embryonal carcinoma (Choice C) is Incorrect. While this patient was initially diagnosed with embryonal carcinoma, the biopsy specimen showing cartilaginous cells confirms the presence of a teratoma and suggests that the primary testicular carcinoma was of a mixed type. Scar following chemotherapy {Choice E) is incorrect. Scar tissue does not contain cartilaginous elements and would not be expected to form a large, retroperitoneal mass because of chemotherapy.","edu_obj":"Testicular germ cell tumors account for the majority of testicular carcinoma. Germ cell tumors may be seminomatous or nonseminomatous, and nonseminomatous lesions are frequently of a mixed type, displaying combinations of histopathologic cell types. Teratomas classically display differentiated cell types from more than one germ layer, and often display organoid morphology with variable degrees of cellular atypia."},{"block":3,"item":39,"image_alt":"","image_url":"","stem":"A 68-year-old man is diagnosed with metastatic prostate ,cancer.The most appropriate treatment should include a drug with which of the following mechanisms of action?","choices":{"A":"Androstenedione aromatase inhibitor","B":"Estrogen receptor partial agonist-antagonist","C":"Gonadotropin-releasing hormone agonist","D":"Microtubule function inhibitor","E":"Somatostatin receptor agonist"},"correct":"C","explanation":"Prostate cancer is a hormonally sensitive neoplasm, and androgens play a critical role in its growth. Gonadotropin-releasing hormone (GnRH) acts as an agonist of the GnRH receptor and promotes secretion of follicle-stimulating hormone (FSH) and luteinizlng hormone (LH) when secreted in its physiologic. pulsatile fashion from the hypothalamus. However, continuous, exogenous administration of a GnRH agonist serves to desensitize the GnRH receptor. thereby decreasing FSH and LH secretion, the stimulation of Leydig cells, and secretion of testosterone. Leuprolide is a GnRH analog that inhibits testosterone production. which reduces the growth of testosterone- sensitive prostate tumors. This hormonal approach to treating prostate cancer is termed medical castration. Some tumors may become castration-resistant. in which mutations develop that allow the cancer to continue growing without hormonal stimulation. Hormonal therapy can be used in combination with surgical excision, radiation therapy. and chemotherapy. Incorrect Answers: A. B. D. and E. Androstenedione aromatase inhibitors (Choice A). such as exemestane. irreversibly inhibit production of estrone and estradiol, which is useful for treatment of estrogen receptor-positive breast cancer. Other aromatase inhibitors, such as the nonsteroidal aromatase inhibitor anastrazole, inhibit aromatase through competitive inhibition. Estrogen receptor partial agonist-antagonist (Choice B) behavior characterizes the mechanism of action of selective estrogen receptor modulators (SERMs). such as tamoxifen. Tamoxifen is useful for the management of estrogen receptor-positive breast cancer but plays no role in the management of prostate cancer. Microtubule function inhibition (Choice D) is the mechanism of action of a variety of chemotherapeutic agents, such as taxanes (eg, paclitaxel and docetaxel) and vinca alkaloids (eg, vincristine and vinblastine). Taxanes are second-line chemotherapeutic agents for prostate cancer and are typically reserved for castration-resistant tumors. Somatostatin receptor agonists (Choice E). such as octreotide, are useful for the management of carcinoid tumors and VI Poma (tumors that secrete vasoactive intestinal peptide). They are not useful for the management of prostate cancer.","edu_obj":"Leuprolide, a gonadotropin-releasing hormone agonist, is used in prostate cancer as a form of medical castration. Continuous administration of leuprolide decreases luteinizing hormone release by the pituitary gland and subsequently decreases the production of testosterone by the Leydig cells."},{"block":3,"item":40,"image_alt":"","image_url":"","stem":"A 29-year-old man comes to the physician with his 27-year-old wife because they have been unable to conceive for 1 year. Previous examination of the wife showed no abnormalities. Physical examination shows normal genitalia. His serum testosterone and luteinizing hormone concentrations are within the reference ranges and serum follicle-stimulating hormone concentration is increased. Semen analysis shows decreased sperm count. A decreased serum concentration of which of following is the most likely in this patient?","choices":{"A":"Androstenedione","B":"Dihydrotestosterone","C":"Estradiol","D":"lnhibin B","E":"Sex hormone-binding globulin"},"correct":"D","explanation":"Sertoli-cell-only syndrome, also known as germinal cell aplasia, is a rare disorder in which only Sertoli cells line the seminiferous tubules, indicating an absence of germ cells and spermatogonia with resultant failure in spermatogenesis. The cause is not completely understood but is thought to have an underlying genetic cause in at least some cases. Under normal conditions, the seminiferous tubules are lined by spermatogonia, which generate the primary spermatocytes that will ultimately become sperm. Sertoli cells are also present within the seminiferous tubules and are required to support spermatogenesis. Pulsatile gonadotropin-releasing hormone produced by the hypothalamus causes the pituitary gland to secrete follicle-stimulating hormone (FSH) and luteinizing hormone (LH). LH acts on the Leydig cells, located adjacent to the seminiferous tubules, and causes them to secrete testosterone. FSH acts on the Sertoli cells, leading them to produce androgen-binding protein and promote sperm development. Additionally, Sertoli cells provide negative feedback on hypothalamic FSH secretion by producing inhibin B. lnhibin B concentration correlates directly with sperm count and is typically decreased or undetectable in patients with Sertoli-cell-only syndrome. The diagnosis of Sertoli-cell---only syndrome is suggested by normal testosterone and LH concentrations, increased FSH concentration, and azoospermia (lack of sperm) on semen analysis, although testicular biopsy is required to confirm the absence of germ cells. Incorrect Answers: A, B, C, and E. Androstenedione (Choice A) is a precursor of testosterone. It is converted to testosterone by 17β-hydroxysteroid dehydrogenase within Leydig cells. Most patients with Sertoli-cell-only syndrome have normal concentrations of testosterone and androstenedione. Dihydrotestosterone (Choice B) is an androgenic hormone that is produced from testosterone by li4-5a--dehydrogenase. While it plays an important role in sexual differentiation and development of secondary sexual characteristics, it does not play an important role in spermatogenesis and is typically normal in patients with Sertoli- cell---onlysyndrome. Estradiol (Choice C) is produced by Leydig cells. While estradiol does play a role in spermatogenesis by regulating spermatogonia proliferation and differentiation, defective estradiol production does not underlie Sertoli-cell-only syndrome. Sex hormone-binding globulin (Choice E) is a hepatically produced serum protein that carries circulating testosterone and estradiol. Its concentration is not affected by defects in spermatogenesis.","edu_obj":"Sertoli-cell---only syndrome is a rare disorder in which only Sertoli cells line the seminiferous tubules, indicating an absence of germ cells and spermatogonia with resultant failure in spermatogenesis. Patients exhibit abnormally reduced inhibin B production by Sertoli cells due to the absence of spermatogonia. The diagnosis of Sertoli-cell-only syndrome is suggested by normal testosterone and luteinizing hormone concentrations, increased follicle-stimulating hormone concentration, and azoospermia (lack of sperm) on semen analysis, although testicular biopsy is required to confirm the absence of germ cells."},{"block":3,"item":41,"image_alt":"Block 3 Q41 — Thyroidal iodine-123 uptake scan with arrow","image_url":"https://drive.google.com/uc?id=REPLACE_B3Q41_FILE_ID","stem":"A 30-year-old woman comes to the physician because of a 3-week history of palpitations; she also has had a 4.5-kg (10-lb) weight loss during this period. Her pulse is 110/min. Physical examination shows a goiter and a fine resting tremor. Serum studies show a thyroid-stimulating hormone concentration of <0.1 µU/mL and thyroxine (T₄) concentration of 50 µg/dl. A thyroidal iodine (¹²³I) uptake scan is shown. Which of the following structures is identified by the arrow in this image?","choices":{"A":"Ectopic thyroid tissue","B":"Parathyroid gland","C":"Pyramidal lobe","D":"Salivary gland tumor","E":"Thyroid adenoma"},"correct":"C","explanation":"This patient presents with hyperthyroidism. as evidenced by findings of weight loss, tremor, palpitations, reduced serum thyroid-stimulating hormone (TSH) concentration. and increased serum thyroxine (T₄) concentration. Graves disease is the most common cause of hyperthyroidism and is caused by an autoantibody that stimulates the TSH receptor on thyroid follicular cells. Excessive stimulation of the TSH receptor leads to follicular thyroid hyperplasia and a diffusely enlarged thyroid gland. Serum laboratory studies may show increased concentrations of triiodothyronine (T3) and T₄. decreased TSH, and the presence of TSH receptor stimulating antibodies. Nuclear medicine studies may be performed with iodine-123 or technetium 99m pertechnetate and will generally show diffuse, homogenously increased thyroid activity, as in this patient. While most patients with or without hyperthyroidism have a bilobed thyroid gland. a minority possess a third lobe known as a pyramidal lobe. The pyramidal lobe is a remnant of the thyroglossal duct and is usually located at the isthmus of the thyroid gland, extending superiorly toward the hyoid bone. The presence of a pyramidal lobe is considered a normal anatomic variant of the thyroid gland. Incorrect Answers: A, B, D, and E. Ectopic thyroid tissue (Choice A) is incorrect. While ectopic thyroid tissue may exist at any point along the course of the thyroglossal duct, the tissue observed in this patient is connected to the thyroid gland near the isthmus and likely represents a pyramidal lobe. Parathyroid gland (Choice B) is incorrect. The parathyroid glands are located on the posterior aspects of the two lobes of the thyroid gland. Parathyroid tissue does not take up iodine-123 and is not typically visible on nuclear medicine studies. except with scans using technetium 99m sestamibi. Salivary gland tumor (Choice D) is incorrect. While salivary gland tumors may rarely present in the thyroid gland, where they may mimic thyroid carcinoma. they do not absorb iodine-123 on nuclear medicine studies. Thyroid adenoma (Choice E) is incorrect. Thyroid adenomas may display variable patterns of iodine-123 uptake. This patient's scan shows diffusely and homogenously increased uptake within both thyroid lobes as well as the indicated structure, which is less consistent with an adenoma.","edu_obj":"A minority of patients possess a third thyroid lobe known as a pyramidal lobe. The pyramidal lobe is a remnant of the thyroglossal duct and is usually located at the isthmus of the thyroid gland, extending superiorly toward the hyoid bone. The presence of a pyramidal lobe is considered a normal anatomic variant of the thyroid gland. Pyramidal lobes are often discovered incidentally during thyroid ultrasonography or nuclear medicine studies."},{"block":3,"item":42,"image_alt":"","image_url":"","stem":"An 18-year-old woman with a 3-year history of type 1 diabetes mellitus is brought to the emergency department because of a 2-day history of light-headedness and urinary frequency with a large volume of urine. She has had nausea and has not eaten or taken her insulin for the past 2 days. She appears tired. Her pulse is 110/min, respirations are 22/min. and blood pressure is 98/68 mm HiJ:.Physical examination shows dry mucous membranes and decreased skin turgor. Her breath has a fruity aroma. Which of the following mechanisms is most likely occurring in this patient?","choices":{"A":"Decreased formation of 3-hydroxybutyric acid","B":"Decreased gluconeogenesis from lactic acid","C":"Decreased glycogenolysis","D":"Increased activity of hormone-sensitive lipase","E":"Increased cholesterol synthesis","F":"Increased glycogen synthesis In the liver"},"correct":"D","explanation":"Diabetic ketoacidosis (OKA) occurs as a result of accumulation of serum ketones such as [3-hydroxybutyric acid, acetoacetic acid, and acetone in the setting of insulin deficiency, and is more ccmmon in patients with type 1 diabetes mellitus. Patients present with signs and symptoms of tachycardia, tachypnea, fatigue, polyuria, shortness of breath, and diffuse abdominal discomfort. Laboratory studies typically show increased serum glucose and ketones, metabolic acidosis, and a high anion gap caused by the accumulation of unmeasured anions in serum. Absent insulin signaling leads to OKA by causing a perceived energy deficient state, causing dysregulated secretion of glucagon and upregulation of hepatic gluconeogenesis and ketogenesis. Ketone bodies provide an alternate source of energy in the absence of insulin-mediated delivery of glucose. The production of ketone bodies in OKA is regulated in part by hormone-sensitive lipase (HSL). HSL is expressed in adipose tissue, where it hydrolyzes fatty acids from triacylglycerols or diacylglycerols. HSL is stimulated by catecholamines and inhibited by insulin. The absence of insulin in OKA leads to increased HSL-mediated lipolysis. Free fatty acids are then made available for hepatic beta oxidation, producing acetyl coenzyme A, which is in turn used to synthesize ketone bodies during hepatic ketogenesis. OKA is treated with replacement of insulin, volume repletion, correction of electrolyte abnormalities, and treatment of any precipitating conditions. Incorrect Answers: A, B, C, E, and F. Decreased formation of 3-hydroxybutyric acid (Choice A) would not be observed. 3-hydroxybutyric acid is formed in increased amounts in patients with OKA. Decreased gluconeogenesis from lactic acid (Choice B) is incorrect. While lactic acidosis is not the underlying cause of OKA. increased concentrations of lactic acid are observed in the setting of OKA. When present, lactic acid may be used for hepatic gluccneogenesis. Decreased glycogenolysis (Choice C) is not observed; rather, increased relative activity of glucagon and deficiency of insulin stimulates glycogenolysis. Increased cholesterol synthesis (Choice E) is not generally a component of the pathophysiology of OKA. While cholesterol synthesis may be altered by perturbations in lipid metabolism from the balance of glucagon to insulin signaling, cholesterol does not feature prominently in the pathophysiology of OKA. Increased glycogen synthesis in the liver (Choice F) is not observed. In OKA. relative excess activity of glucagon stimulates glycogenolysis, rather than glycogen synthesis.","edu_obj":"During diabetic ketoacidosis (OKA). the production of ketone bodies is regulated in part by hormone-sensitive lipase (HSL). HSL is expressed in adipose tissue, where it hydrolyzes fatty acids from triacylglycerols or diacylglycerols. HSL is stimulated by catecholamines and inhibited by insulin. The absence of insulin in OKA leads to increased HSL-mediated lipolysis. Free fatty acids are then made available for hepatic beta oxidation, producing acetyl coenzyme A, which is used to synthesize ketone bodies during hepatic ketogenesis."},{"block":3,"item":43,"image_alt":"","image_url":"","stem":"A 40-year-old woman comes to the physician because of episodes of fainting during the past 2 weeks. She also has a 3-month history of easy fatigability, irritability, headaches on awakening, and extreme hunger. Physical examination shows no abnormalities. Her serum glucose concentration is 35 mg/dl. A CT scan of the abdomen shows a mass in the pancreas. Immunohistochemical labeling of neoplastic cells obtained on biopsy of the mass is most likely to involve the use of antibodies directed to which of the following pancrfatic secretory products?","choices":{"A":"Gastrin","B":"Glucagon","C":"Insulin","D":"Somatostatin","E":"Vasoactive intestinal polypeptide"},"correct":"C","explanation":"Insulinoma is a rare neoplasm of pancreatic islet cells that functionally produces insulin. These neoplastic cells classically do not respond to typical feedback mechanisms, and as a result, insulin is continuously produced even in periods of hypoglycemia. Patients present with symptoms of hypoglycemia, which are generally neuroglycopenic (agitation, headache, blurry vision, diplopia, tremor), autonomic (diaphoresis, tremoring, nausea, vomiting, cramping, tachycardia, anxiety), and nonspecific (fatigue, weakness, lethargy), often exacerbated by periods of fasting or exercise. In extreme cases, hypoglycemia can present with seizures, coma, arrhythmias, and death. Whipple triad characterizes the presentation of hypoglycemia in the setting of likely insulinoma or excess insulin, and includes 1) signs and symptoms of hypoglycemia, 2) concomitant serum glucose less than 45 mg/dl, and 3) reversibility of symptoms with administration of glucose. lnsulinomas seldom metastasize and are considered predominantly benign neuroendocrine tumors apart from their dysregulated functional production of hormone. They are occasionally associated with multiple endocrine neoplasia. Diagnosis of an insulinoma is via laboratory studies showing increased serum proinsulin, insulin, and C peptide, and decreased glucose, along with CT scan or MRI of the pancreas. Definitive treatment requires surgical resection. Incorrect Answers: A, B, D, and E. Gastrin (Choice A) is produced by gastrinomas, which are associated with Zollinger-Ellison syndrome. Gastrinomas result in excessive production of acid by the gastric parietal cells. This can lead to recurrent, chronic duodenal or jejunal ulcers, which can present with abdominal pain, diarrhea secondary to malabsorption, and possible hematemesis, melena, or hematochezia. Glucagon (Choice B) is produced by glucagonomas, a rare pancreatic tumor. Excessive glucagon production raises blood glucose. Symptoms are nonspecific and include mild diabetes mellitus, paraneoplastic rash (eg, necrolytic migratory erythema), and weight loss. Somatostatin (Choice D) is produced by somatostatinomas. Somatostatinomas are an uncommon neuroendocrine malignancy that presents with weight loss, mild diabetes mellitus, steatorrhea as a result of limited cholecystokinin release, and achlorhydria from inhibition of gastrin. Vasoactive intestinal polypeptide (VIP) (Choice E) is produced by a vipoma. Vipoma is a rare tumor often associated with multiple endocrine neoplasia. Patients present with chronic and profound watery diarrhea, electrolyte disturbances (eg, hypokalemia, hypercalcemia), achlorhydria, alkalosis, flushing, vasodilation, and hypercalcemia. This syndrome is often termed WDHA syndrome (watery diarrhea, hypokalemia, achlorhydria).","edu_obj":"lnsulinoma is a rare neoplasm of pancreatic islet cells that functionally produces insulin. Patients present with symptoms of hypoglycemia, which are generally neuroglycopenic (agitation, headache, blurry vision, diplopia, tremor), autonomic (diaphoresis, tremoring, nausea, vomiting, cramping, tachycardia, anxiety), and nonspecific (fatigue, weakness, lethargy), often exacerbated by periods of fasting or exercise. Diagnosis of an insulinoma is via laboratory studies showing increased serum proinsulin, insulin, and C peptide, and decreased glucose, along with CT scan or MRI of the pancreas. Definitive treatment requires surgical resection."},{"block":3,"item":44,"image_alt":"","image_url":"","stem":"A 68-year-old woman has been hospitalized for 2 weeks because of severe pneumonia complicated by septicemia and respiratory failure. She has a long-standing history of type 2 diabetes mellitus and a family history of chronic autoimmune (Hashimoto) thyroiditis. Her serum triiodothyronine (T₃ ) and thyroxine (T₄ ) concentrations are below the reference ranges, and serum thyroid-stimulating hormone and free T₄ concentrations are within the reference ranges. Which of the following best explains these findings?","choices":{"A":"Antithyroid antibodies","B":"Euthyroid sick syndrome","C":"Hypothyroidism","D":"Increased serum T₄ -binding globulin concentration","E":"Iodine deficiency"},"correct":"B","explanation":"Euthyroid sick syndrome describes abnormalities in thyroid function testing that occur in the setting of acute systemic illness. Euthyroid sick syndrome has been observed in the setting of brain injury, myocardial infarction, pneumonia, cirrhosis, end-stage kidney disease, diabetic ketoacidosis, starvation, malignancy, and following trauma or major surgery. The cause of this syndrome is not completely understood, but it is hypothesized that critical illness and acute phase, proinflammatory cytokines alter normal thyroid signaling in a variety of mechanisms, such as downregulation of the hypothalamic-pituitary-thyroid axis at the level of the hypothalamus. by altering the action of deiodinases and thyroid binding globulin, and by altering expression and function of thyroid receptors. The most frequently observed findings are decreased serum concentration of free triiodothyronine (T3), normal or low thyroxine (T₄) and free T4 , and a normal thyroid-stimulating hormone (TSH) concentration. Patients are clinically euthyroid and do not display overt clinical symptoms of hypothyroidism. Treatment targets the underlying illness, and abnormalities in laboratory studies generally resolve with resolution of the primary disease. Incorrect Answers: A, C, D, and E. Antithyroid antibodies (Choice A) are characteristic of chronic lymphocytic thyroiditis, also known as Hashimoto disease. Patients present with signs and symptoms of hypothyroidism caused by destruction of thyroid parenchyma. Hypothyroidism (Choice C) can occur as a result of hypothalamic-pituitary-thyroid axis dysfunction. primary thyroid dysfunction, or autoimmune disease. and presents with signs and symptoms such as weight gain, lethargy, fatigue, constipation, hair loss, and cold intolerance. The presence of abnormal thyroid function testing and lack of overt symptoms of hypothyroidism in the context of acute illness suggests euthyroid sick syndrome. Increased serum T4-binding globulin concentration (Choice D) may occur in patients with hypothyroidism and is often secondary to hormonal disturbances associated with pregnancy, oral contraceptive use, and liver dysfunction. Iodine deficiency (Choice E) is incorrect. Thyroid follicular iodine stores are sufficient to support thyroid function for several months. Iodine deficiency is rare in the developed world due to fortification of common food staples with iodine.","edu_obj":"Euthyroid sick syndrome describes abnormalities in thyroid function testing that occur in the setting of acute systemic illness, and likely occurs as part of the acute phase response to critical illness. The most frequently observed findings are decreased serum concentration of free triiodothyronine (T3), normal or low thyroxine (T4 ) and free T4 . and a normal thyroid-stimulating hormone (TSH) concentration. Patients are clinically euthyroid and do not display overt clinical symptoms of hypothyroidism."},{"block":3,"item":45,"image_alt":"Block 3 Q45 — Gottron's papules on dorsum of hands (dermatomyositis)","image_url":"https://rotogrover.github.io/sa-forms/images/CBSSA31_B3Q45_skin.jpg","stem":"A 65-year-old woman comes to the office because of a 6-week history of a rash on her face and hands; the rash is exacerbated by sun exposure. She also has had difficulty climbing stairs and holding her arms above her head, such as when combing her hair. Examination of the hands shows the findings in the photograph. This patient most likely has which of the following underlying conditions?","choices":{"A":"Amyloidosis","B":"Bronchiectasis","C":"Cancer","D":"Optic artery occlusion","E":"Renal failure"},"correct":"C","explanation":"Cancer, especially adenocarcinomas such as ovarian cancer, are associated with dermatomyositis as a paraneoplastic syndrome. Dermatomyosilis presents with cutaneous and musculoskeletal manifestations. Cutaneous manifestations include pink to light purple patches over the upper eyelids (heliotrope rash), pink papules over the dorsal fingers (Gottron papules), and light pink to lilac-colored patches with telangiectasias over the upper back and sun-exposed chest (poikilodermatous rash). Musculoskeletal findings include proximal muscle weakness of the extremities. Diagnosis is made with a combination of clinical findings and serologic testing, including antinuclear antibody, anti-Jo-1, anti-SRP. and anti-Mi-2 antibodies. Patients diagnosed with dermatomyositis should undergo further workup including age-appropriate cancer screening to rule out underlying occult malignancy. Incorrect Answers: A. B, D. and E. Amyloidosis (Choice A) results from deposition of amyloid that may be genetic or acquired secondary to chronic inflammatory conditions or lymphoproliferative malignancy. Diagnosis is based 011 histopathologic examination of tissue from affected organs stained with Congo red showing green birefringent crystals under polarized light. Bronchiectasis (Choice B) is abnormal dilatation of the bronchi that may result from recurrent necrotizing infections and chronic inflammation. Risk factors for bronchiectasis include cystic fibrosis, Kartagener syndrome, and allergic bronchopulmonary aspergillosis. Optic artery occlusion (Choice D) commonly results from an embolic source as in carotid artery stenosis or from valvular vegetations of endocarditis. Skin findings associated with endocarditis include splinter hemorrhages, Osler nodes, and Janeway lesions. It presents with sudden, painless vision loss. Renal failure (Choice E) is associated with systemic lupus erythematosus (SLE). Acute SLE is associated with cutaneous findings including malar rash sparing the nasolabial folds and erythema of the skin over the dorsal digits between the metacarpophalangeal and interphalangeal joints. Systemic complications of acute SLE include arthralgias, anemia, thrombocytopenia, hypercoagulability, and lupus nephritis, which is a common cause of renal failure in young patients. Diagnosis of SLE is based on serologic and clinical findings.","edu_obj":"Dermatomyositis presents with cutaneous manifestations and proximal muscle weakness of the extremities. Cutaneous findings include a heliotrope rash involving the periocular area, Gottron papules overlying the joints of the dorsal hands, and a poikilodermatous rash in a shawl distribution. Patients are diagnosed with dermatomyositis based on clinical and serologic findings, including the presence of autoantibodies. Patients diagnosed with dermatomyositis should undergo age- appropriate screening to rule out underlying occult malignancy."},{"block":3,"item":46,"image_alt":"","image_url":"","stem":"A 35-year-old man is brought to the emergency department 30 minutes after fainting while at work. He is conscious and is able to state his name and what he was doing before the episode. He says that he has had fatigue during the past 3 weeks. He has no history of major medical illness and takes no medications. His mother died of ovarian cancer at the age of 40 years. His maternal grandfather died of colon cancer at the age of 49 years. The patient does not smoke or drink alcoholic beverages. He appears pale. His temperature is 37.5°C (99.5°F), pulse is 110/min. respirations are 20/min, and blood pressure is 95/55 mm Hg. Physical examination shows no other abnormalities. Laboratory studies show a hemoglobin concentration of 6.2 g/dl and hematocrit of 19%. Test of the stool for occult blood is positive. Colonoscopy shows an isolated right-sided mass. Examination of a biopsy specimen of the mass shows a poorly-differentiated adenocarcinoma with mucinous features. Immunohistochemistry of the biopsy specimen is most likely to show loss of expression of which of the following proteins?","choices":{"A":"APC","B":"BRCA1","C":"β-Catenin","D":"MSH2","E":"p53"},"correct":"D","explanation":"Lynch syndrome is an autosomal dominant disorder characterized by a high risk for colorectal cancer (CRC), along with endometrial. ovarian, gastric, hepatobiliary, pancreas, brain, and skin cancer. It is caused by defects in DNA mismatch repair genes, including MSH2, MSH6, and MLH1, which have a key role in correcting DNA replication errors. These proteins remove mismatched nucleotides from newly synthesized single DNA strands. The resulting gaps are filled in using the parent strand as a template. Dysfunction of mismatch repair proteins increases the frequency of spontaneous mutations and causes high microsatellite instability, increasing the risk for cancer. Lynch syndrome comprises 2% to 5% of all cases of CRC, but 80% of patients with Lynch syndrome develop CRC, typically at a younger age than in sporadic cases. Patients with a family history suspicious for a cancer syndrome should undergo genetic counseling; microsatellite instability profiling and immunohistochemistry testing for mismatch repair gene expression are the gold standard to confirm diagnosis. Patients with Lynch syndrome should undergo CRC screening with colonoscopy every 1 to 2 years beginning at age 25, or 5 years before the first age of diagnosis in the family, and then annually beginning at age 35. Alternatively, patients can undergo prophylactic colectomy, along with prophylactic hysterectomy and bilateral salpingo-oophorectomy in biologically female patients. Incorrect Answers: A, B, C, and E. APC (Choice A) is a tumor suppressor gene that regulates cellular proliferation and cell adhesion. Inactivating mutations are implicated in most sporadic cases of CRC as the first step in the adenoma-carcinoma sequence, a pathway of sporadic mutations that promotes progression to cancer. Germline mutations in APC are the cause of familial adenomatous polyposis, characterized by the development of thousands of colonic polyps and a 100% lifetime risk for development of CRC. BRCA 1 (Choice B) is a tumor suppressor gene involved in DNA double-strand break repair. Inherited germ line mutations of BRCA 1 are associated with an increased risk for breast cancer, including male breast cancer, along with ovarian, gastric, pancreatic, prostate, and colon cancer. Cancer risk can be decreased with prophylactic mastectomy and bilateral salpingo-oophorectomy. β-Catenin (Choice C) is a proto-oncogene that regulates cell to cell adhesion and gene transcription. Sporadic mutations are implicated in a wide range of cancers including colorectal. ovarian, breast, lung, brain, and liver cancer. However, a familial cancer syndrome caused by a germline mutation in β-catenin has not been described, and this gene is not one of the adenoma-carcinoma sequence genes commonly found in sporadic cases of CRC. p53 (Choice E) is a tumor suppressor that limits oncogene transcription and promotes transcription of genes that inhibit cell division. Dysfunctional or inactivating mutations of p53 are a common finding in many solid tumors, including as a late step in the adenoma-carcinoma sequence of sporadic CRC. Germline mutations in p53 are the cause of Li-Fraumeni syndrome, an autosomal dominant disorder characterized by high risk for sarcomas, breast cancer, leukemia, and adrenal gland cancer.","edu_obj":"Inherited defects in DNA mismatch repair genes are the cause of Lynch syndrome, an autosomal dominant disorder characterized by a high risk for colorectal cancer, along with endometrial, ovarian, gastric, hepatobiliary, pancreas, brain, and skin cancer. Patients with Lynch syndrome should undergo screening colonoscopy every 1 to 2 years beginning at age 25, or 5 years before the first age of diagnosis in the family, and then annually beginning at age 35. Additional treatment options include prophylactic colectomy, hysterectomy, and bilateral salpingo-oophorectomy."},{"block":3,"item":47,"image_alt":"","image_url":"","stem":"A 45-year-old man is brought to the emergency department because of a 45-minute history of abdominal pain, diaphoresis, and weakness. Two hours ago, he spilled a chemical on his left arm while mixing the solution for crop dusting. His respirations are 8/m1n.and blood pressure is 100/55 mm Hg. Physical examination shows salivation, wheezing. diaphoresis, and muscle weakness. After confirming the identity of the solution, the physician begins treatment with atropine and pralidoxime. The chemical solution most likely contained which of the following?","choices":{"A":"Carbary!","B":"2,4-Dichlorophenoxyacetic acid","C":"Paraquat","D":"Parathion","E":"Pyrethrin"},"correct":"D","explanation":"Anticholinesterase poisoning is caused by the irreversible inhibition of acetylcholinesterase (AChE), which is an enzyme that acts to degrade acetylcholine (ACh). ACh acts on both nicotinic and muscarinic ACh receptors. Nicotinic ACh receptors are found in autonomic ganglia, adrenal medulla, and skeletal muscle, whereas muscarinic ACh receptors are found in the heart, brain, smooth muscle, exocrine glands, and sweat glands. Inhibitors of AChE inhibit ACh degradation and lead to excess levels of ACh in the neuromuscular junction. This can result in vomiting, diarrhea, urination, diaphoresis, salivation, lacrimation, bronchorrhea, bronchospasm, bradycardia, seizures, and muscle weakness. A common cause of anticholinesterase poisoning includes organophosphates, which are commonly found in insecticides. Exposure can occur transcutaneously, or via inhalation or ingestion. Triggering agents found in organophosphates include parathion, fenthion, and malathion, among others. Treatment involves decontamination along with atropine to antagonize the muscarinic receptors and pralidoxime to regenerate functional AChE. Incorrect Answers: A, B, C, and E. Carbary! (Choice A) is a chemical used in insecticides. It is also a cholinesterase inhibitor that can lead to toxicity in humans through ingestion, inhalation, or dermal absorption. It typically causes less severe symptoms for shorter periods of time, as it only transiently inhibits AChE before spontaneously dissociating. 2,4-Dichlorophenoxyacetic acid (Choice B) is a commonly used herbicide. It is generally not toxic to humans and would not be expected to cause the cholinergic symptoms seen in this patient. Paraquat (Choice C) is a commonly used herbicide. While it is toxic to humans, ingestion or inhalation are more significant routes of exposure. It would more commonly present with lung injury followed by multiorgan failure. It would not be expected to cause the symptoms seen in this patient. Pyrethrin (Choice E) is an organic insecticide derived from chrysanthemum flowers. It can cause toxicity in humans when inhaled or when there is prolonged dermal exposure, but, in general, it is not considered particularly harmful.","edu_obj":"Organophosphates can cause anticholinesterase poisoning due to irreversible inhibition of acetylcholinesterase. Symptoms include vomiting, diarrhea, urination, diaphoresis, salivation, lacrimation, bronchorrhea, bronchospasm, bradycardia, seizures, and muscle weakness. Chemicals in organophosphates responsible for this toxicity include parathion, fenthion, and malathion."},{"block":3,"item":48,"image_alt":"","image_url":"","stem":"Public health officials in a large metropolitan city in the US would like to decrease the prevalence of obesity in the city's population. A tax on carbonated and other sugar-based beverages is subsequently implemented. Which of the following best describes this type of intervention? ~","choices":{"A":"Clinical","B":"Community","C":"Secondary","D":"Tertiary"},"correct":"B","explanation":"A tax on carbonated and sugar-based beverages is an example of a community intervention strategy. Community intervention strategies define the setting for and target of intervention as the community, as opposed to interventions aimed toward an individual. Such interventions can take place in a variety of settings, such as at the municipal level, through schools, churches, or other organizations. community interventions aim to improve the health of the population by influencing decision-making throughout the community. For such strategies to succeed, they require knowledge of the community, its health and socioeconomic challenges, and identification of appropriate points of intervention. Incorrect Answers: A, C, and D. Clinical intervention (Choice A) describes intervention strategies that take place in a clinical setting. Clinical interventions may employ primary, secondary, or tertiary strategies by preventing, identifying, and treating disease. Secondary intervention (Choice C) strategies employ screening to identify individuals with disease early in their course, generally while remaining subclinical. A secondary intervention strategy would be to screen an obese population for hypertension or diabetes, detecting disease before symptoms or consequences have arisen. Tertiary intervention (Choice D) strategies aim to slow or ameliorate the progression and complications of a disease through therapeutic intervention. An example would be to treat an obese patient with known diabetes to prevent further macrovascular complications.","edu_obj":"Community intervention strategies define the setting for and target of intervention as the community, as opposed to interventions aimed toward an individual. Such interventions can take place in a variety of settings, such as at the municipal level, or through schools, churches, or other organizations."},{"block":3,"item":49,"image_alt":"","image_url":"","stem":"A study of 10 patients with severe emphysema who were treated with oral lheophylline for 12 weeks found no improvement in the exercise ability of these patients after treatment. Which of the following best describes this study design?","choices":{"A":"Case series","B":"Case-control study","C":"Cohort study","D":"Randomized controlled trial","E":"Systematic review"},"correct":"A","explanation":"A case series study is a descriptive study that describes the history, possible exposures, clinical findings, and treatment results of a group of patients with a similar diagnosis. Case series are non-analytic studies and do not imply a cause-and-effect relationship. They do not test a hypothesis nor are they randomized. They are useful in characterizing the natural history of a disease or response to treatment and are also useful for evaluating the outcomes of a particular procedure or patient population at a single institution. They are useful in describing rare diseases, as the small population size may not permit conduction of a larger cohort. or randomized trials with sufficient power. Incorrect Answers: B, C, D, and E. Case-control studies (Choice B) investigate an association between an exposure and an outcome. In this study design, a group of patients with the disease (cases) are identified. A group of patients without the disease (controls) are matched on baseline characteristics to the cases. Exposure data for the two groups is collected. and these data are compared to determine association with the outcome (disease) in question. An odds ratio may be calculated to compare exposures between groups. Cohort studies (Choice C) identify a group of patients with or without an exposure and follow them over time to identify whether an exposure is associated with an outcome of interest. Cohort studies may be retrospective or prospective in design. In a prospective design, the hypothesis and analysis protocols are established prior to the start of the study period. In a retrospective design, the hypothesis or question is designed after the study time period has passed. A randomized controlled trial (Choice D) is an experimental study design. Patients are randomly allocated to two or more interventional or control arms, and these patients are followed over time to evaluate an outcome of interest. Randomized design minimizes opportunity for bias: thus, a randomized interventional study can be used to imply causation. Common examples of randomized trials include therapeutic comparisons between a new drug and the previous standard of care. A systematic review (Choice E) is a study design in which ideally all known studies pertaining to a particular topic are collected according to a predetermined set of criteria. Systematic reviews typically include meta-analysis, in which statistical analysis is performed to combine the results of multiple studies addressing the same question. Systematic review and meta-analysis are useful for overcoming certain (importantly, not all) limitations of the constituent studies. By pooling the results of multiple studies, this method reduces the risk for Type II error caused by the smaller sample sizes within each constituent study. on the converse. methodologic error from individual studies still influences the result of U1esystematic review and meta-analysis.","edu_obj":"A case series is a descriptive study that describes the history, possible exposures, clinical findings, and treatment results of a group of patients with a similar diagnosis. Case series studies are useful for studying the outcomes or natural history of a particular group, procedure, or treatment."},{"block":3,"item":50,"image_alt":"","image_url":"","stem":"A study is done to determine the relationship between use of oral contraceptives and cervical cancer. Study subjects include 50,000 women who are using oral contraceptives nd 50,000 women who have had a tubal ligation. After 2 yejrs of follow-up, the rate of in situ cervical cancer is 18 per 10,000 women among users of oral contraceptives and 3 per 10,000 among sterilized women (p<0.05). Which of the following is the design of this study?","choices":{"A":"Case control","B":"Case series","C":"Cohort","D":"Cross-sectional","E":"Randomized clinical trial"},"correct":"C","explanation":"A cohort study identifies a group of patients and follows them over time to identify whether an exposure is associated with an outcome of interest. Cohort studies may be retrospective or prospective in design. In a prospective design, the hypothesis and analysis protocols are established prior to the start of the study period. In a retrospective design, the hypothesis or question is designed after the study period has passed. In this study, patients are observed over time and divided into groups based on use of oral contraceptives or tubal ligation (exposure) and are followed over lime. Rates of cervical cancer (outcome) are compared between the two groups. The relative risk for cervical cancer (a comparison of incidence) is then calculated to be six times as high in the oral contraceptive group. This represents a prospective cohort study design. Incorrect Answers: A, B. D, and E. Case control (Choice A) studies investigate an association between an exposure and an outcome. In this study design, a group of patients with the disease (cases) are identified. A group of patients without the disease (controls) are matched on baseline characteristics to the cases. Exposure data for the two groups is collected. and these data are compared to determine association with the outcome (disease) in question. An odds ratio may be calculated to compare exposures between groups. A case series (Choice B) is a descriptive study design in which several consecutive or nonconsecutive cases of a disease and/or treatment are described in detail, with information about exposure, demographics, and comorbidities. Case series do not imply a cause-and-effect relationship. They do not test a hypothesis nor are they randomized. They are useful in characterizing the natural history of a disease or response to treatment. They are also useful in describing rare diseases, as the small population size may not permit conducting of larger cohort studies or randomized trials with sufficient power. A cross-sectional study (Choice D) seeks to identify the prevalence of a condition at a particular point in time. In addition. the risk factor and the outcomes are measured simultaneously. A cross-sectional study does not follow patients over time. All information is collected at a single time point. A randomized clinical trial (Choice E) is an experimental study design. Patients are randomly allocated to two or more interventional arms or control arms, and these patients are followed over time to evaluate an outcome of interest. Randomized design minimizes opportunity for bias; thus, a randomized interventional study can be used to imply causation. Common examples of randomized trials include therapeutic comparisons between a new drug and the previous standard of care.","edu_obj":"A cohort study follows patients over time. either retrospectively or prospectively. and seeks to investigate the impact of exposures or risk factors on an outcome of interest."},{"block":4,"item":1,"image_alt":"","image_url":"","stem":"A study is conducted to assess the normal frequency distribution of plasma sodium concentrations in a given population. Results show that the mean is 141 mEq/L and the standard deviation is 3.2 mEq/L. Which of the follow!ng best represents the percentage of values that will fall in the interval between 134.6 mEq/L and 147.4 mEq/L?","choices":{"A":"25%","B":"33%","C":"50%","D":"67%","E":"90%","F":"95%","G":"97.5%","H":"99%"},"correct":"F","explanation":"In a Gaussian (normal) distribution, data points center around the mean value. Standard deviation is a measure of the degree of dispersion of data points about the mean and is defined as the square root of the variance. In a Gaussian distribution, one standard deviation above and below the mean will include approximately 68% of data points, while two standard deviations above and below the mean will include approximately 95% of data points. Three standard deviations above and below the mean will include approximately 99.7% of data points. In a population with a mean sodium of 141 mEq/L and a standard deviation of 3.2 mEq/L, individuals with sodium between 134.6 mEqll and 147.4 mEq/L will fall within two standard deviations below and above the mean. respectively. Therefore. this range of values will include approximately 95% of the values in this distribution. Incorrect Answers: A, B, C, D. E, G. and H 25% (Choice A). 50% (Choice C), and 90% (Choice E) do not correspond with a percentage of values within or outside of one, two, or three standard deviations of the mean. 33% (Choice B) roughly corresponds to the total percentage of values found outside of the range of one standard deviation above or below the mean. while 67% (Choice D) roughly corresponds to the percentage of values that lie within one standard deviation from the mean. 97.5% (Choice G) is not correct. Five percent of data points in total lie outside of the range of two standard deviations above and below the mean, with half of these data points (2.5%) above this range and the other half (2.5%) below. Therefore, 97 .5% represents the percentage of all values above 134.6 mEq/L (95% within two standard deviations from the mean plus 2.5% above this range) or the percentage of all values below 147.4 mEqll (95% within two standard deviations from the mean plus 2.5% below this range). 99% (Choice H) roughly corresponds to the percentage of data points found within three standard deviations above and below the mean (99.7%).","edu_obj":"In a normal distribution, standard deviation describes the degree of dispersion of data points about the mean. Sixty-eight percent of data points lie within one standard deviation above and below the mean, 95% of data points lie within two standard deviations above and below the mean, and 99. 7% of data points lie within three standard deviations above and below the mean."},{"block":4,"item":2,"image_alt":"","image_url":"","stem":"Numerous cross-sectional studies in different populations have shown a significant relationship between the use of tanning beds and the development of melanoma. The odds ratios of these studies range from 3.2 to 7.1. In these studies, the number of hours of tanning bed use was highly correlated with an increase in the size and number of dysplastic nevi. Which of the following is the greatest limitation in establishing causality from these studies?","choices":{"A":"Biologic plausibility","C":"Dose response","D":"Strength of association","E":"Temporal sequence of events"},"correct":"F","explanation":"A cross-sectional study seeks to identify the prevalence of a condition at a particular point in time. In this scenario, these studies examine the use of tanning beds and the development of melanoma at a single cross-section of time. Thus, the risk factor (tanning beds) and the outcomes (melanoma) are measured simultaneously. Cross- sectional studies do not follow patients over time. All information is collected at a single point, so causation cannot be determined because the temporal sequence of events cannot be examined. In these studies, the development of melanoma may have preceded the use of tanning beds. Cross-sectional studies can, however, determine correlation. Correlation relates the trends of two variables together and is quantified by the Pearson correlation coefficient (r). It represents the increase, decrease, or absence, or absence of change in one variable with changes in the other. In cases where variables trend together (both increase), the r value is positive. The closer the value of the correlation coefficient to 1.0, the stronger the trend between the two variables. Negative r values suggest that data trend in opposing fashion; as one variable increases, the other decreases. Uncorrelated data will have a correlation coefficient near zero, which indicates that changes in one variable are not associated with any trend in the other variable. Correlation should not be confused with causation. Incorrect Answers: A, B, C, and D. light can lead to skin cancer, such as melanoma. Consistency of the findings (Choice B) is inaccurate. These studies have consistent findings with highly positive odds ratios in all studies. Despite including numerous studies with consistent findings, causality remains difficult to interpret given the unknown timing of events. Dose response (Choice C) is present in these studies, as increased hours of tanning was associated with an increased risk for melanoma. This seems to be consistent across studies. An increased dose response favors causality but does not prove it. Strength of association (Choice D) also favors causality. In these studies, there seems to be a high strength of association with odds ratios ranging from 3.2 to 7.1, indicating a significantly increased risk for melanoma with tanning bed exposure. This would not inhibit the ability to infer causality.","edu_obj":"A cross-sectional study seeks to identify the prevalence of a condition at a particular point in time. Because the risk factor and the outcomes are measured at the same time, the temporal sequence of events cannot be determined. This inhibits the ability to infer causality. Biologic plausibility, consistent findings, a strong dose response, and a strong association increase the likelihood of causality but do not prove it."},{"block":4,"item":3,"image_alt":"","image_url":"","stem":"An 18-year-old female college freshman comes to the health center because of a 3-month history of fatigue and intermittent headaches. She also has had an unintentional weight loss of 4 kg (9 lb) during the past 6 weeks and difficulty concentrating on her schoolwork. She moved from her home to a campus dormitory 5 months ago. She was an avid tennis player but says she has not played since school began because she has no energy and has lost interest in sports. She notes that she recently broke off her long-distance relationship with her boyfriend back home. She tearfully says she feels lonely and is frustrated with her performance on final examinations. She occasionally drinks alcoholic beverages \"to help with sleep.\" She does not use illicit drugs. She appears thin and has a sad affect. Physical examination shows no abnormalities. Which of the following is the most appropriate initial response by the physician?","choices":{"A":"\"Although this is a difficult time for many, I'm concerned that you're not coping well. Have you had any feelings of hurting yourself?\"","B":"\"Have you made any friends on campus yet? Sometimes a student support group is the best remedy for transitional stress.\"","C":"\"It seems that this difficult transition has made you depressed. What are your thoughts about receiving additional care in the hospital, where you can be in a safe environment?\"","D":"\"It's normal to feel homesick and lonely during your first year away from home. Planning a visit home to be with your family might help you feel better.\"","E":"\"Transitioning to college life is difficult for many students. It will get better once you become accustomed to your surroundings.\""},"correct":"A","explanation":"This young patient is exhibiting neurovegetative symptoms suggestive of major depressive disorder (MDD). The physician should express concern about the patient's well- being and conduct a thorough suicide risk assessment including questions about suicidal ideation or attempts. Symptoms of MDD typically include 2 or more weeks of depressed mood, anhedonia. guilt or worthlessness, difficulty concentrating. psychomotor slowing. suicidal thoughts. and/or neurovegetative symptoms (decreased energy, sleep disturbance, appetite disturbance). These symptoms disrupt everyday functioning. Some patients present with vague somatic symptoms such as headaches. Suicide is the most serious and acute risk for patients with MDD, so physicians should ask detailed questions about patients' suicidal ideation and recent or remote suicide attempts. Incorrect Answers: B. C, D. and E. Suggesting a support group by stating \"Have you made any friends on campus yet? Sometimes a student support group is the best remedy for transitional stress.• (Choice B) or encouraging a family visit by stating \"It's normal to feel homesick and lonely during your first year away from home. Planning a visit home to be with your family might help you feel better.\" (Choice D) may be appropriate later in the interview, particularly given that the patient reports loneliness. However, the physician's first priority should be evaluating the patient's safety. Suggesting psychiatric hospitalization (Choice C) may be warranted if the patient reports active suicidal ideation. However, the physician should first assess the patient's safety. Reassuring the patient that her transition experience is nom,al (Choice E) would be inaccurate, as the patient appears to have MDD. Further, the physician's priority should be evaluating the patient's safety.","edu_obj":"Major depressive disorder can manifest with vague somatic symptoms in conjunction with decreased energy, increased or decreased sleep, and increased or decreased appetite. Suicide is the most acute and serious risk for major depressive disorder and should be assessed regularly in patients with suspected major depressive disorder."},{"block":4,"item":4,"image_alt":"","image_url":"","stem":"A healthy 40-year-old woman comes to the physician because she is concerned that she has breast cancer. She takes no medications. She has two children, aged 8 and 10 years. Menarche occurred at the age of 13 years, and she began menopause 1 year ago. During the family history portion of the interview, the patient begins to cry and says, \"My mother died of breast cancer when she was 52 years old, and I know that I have breast cancer. That's why I came to see you today.\" Which of the following is the most appropriate initial response by the physician?","choices":{"A":"\"Are there any other major illnesses you are afraid you might have?\"","B":"\"I'm sorry to hear about your mother, but I wouldn't worry about getting breast cancer at your age.\"","C":"\"Let's discuss your overreaction and what this really means.\"","D":"\"Let's just take it ore,estep at a time: there is no need to cry before we know for sure.\"","E":"\"Tell me why you htlnk you may have breast cancer.\""},"correct":"E","explanation":"When patients or patients' family members express medical concerns, physicians should initially ask open-ended questions to explore the understanding and fears of the patient or family member. The physician can then tailor further discussion and reassurances to address these knowledge gaps and fears. Asking open-ended questions also invites the patient to elaborate on their concerns. as there may be medically or psychiatrically relevant details that the patient reveals on further discussion. Further. listening to the specific concerns of the patient will improve therapeutic alliance. Incorrect Answers: A, B, C, and D. Asking the patient if she fears having other major illnesses (Choice A) misses an opportunity to encourage the patient to elaborate on her concerns about breast cancer. Additionally, focusing on the patient's experience of fear itself rather than the breast cancer concern may be perceived as invalidating by the patient. Immediately providing reassurance (Choice B) misses an opportunity to understand the patient's fears in more depth. Open-ended questions allow patients to elaborate on their concerns and improves therapeutic alliance. Labeling the patient's fear as an overreaction (Choice C) is a judgmental statement that is likely to hinder open discussion. This statement indicates that the physician has not tried to empathize with the patient. Highlighting that the patient is crying and encouraging the patient to take the situation one step at a time (Choice D) is unlikely to assuage the patient's anxiety and disallows an open exploration of the patient's specific fears. She may feel shamed by her crying if the physician mentions it. Additionally, the statement \"before we know for sure\" implies that the physician suspects breast cancer.","edu_obj":"When patients or families express medical concerns, physicians should ask open-ended questions to explore the specific nature of the concern and the patient's or family member's understanding. The physician can then tailor further discussion to address knowledge gaps and specific fears, and may learn additional. relevant details about the concern."},{"block":4,"item":5,"image_alt":"","image_url":"","stem":"A 55-year-old man comes to the physician because of a 4-month history of cough and chest pain. He has smoked 1 pack of cigarettes daily for 30 years. Physical examination shows no abnormalities. A chest x-ray shows a 3-cm mass in the right lower lobe of lhe lung. II is most appropriate for the physician to begin lo communicate the x-ray findings in which of the following manners?","choices":{"A":"\"I'd like lo refer you lo a specialist who will be belier able to tell you aboul your chest x-ray results than I am.\"","B":"\"I'm afraid I have bad news; the chest x-ray showed an abnormality in your lung Iha! concerns me.\"","C":"\"I'm sorry, bul you are almost certainly going to need an operation and chemotherapy.\"","D":"\"Let's make an appointment for you and your wife next week so I can tell you both the results at that time.\"","E":"''We need to do more tests before I can give you lhe final results of your x-ray.\""},"correct":"B","explanation":"This patient has a medical history and x-ray findings suggestive of a lung malignancy. The physician should share this bad news, including the top differential diagnosis and next steps in management. Bad news should be delivered honestly, directly, and using small pieces of information at a time. Bad news should also be delivered in a timely fashion to allow patients to follow the next management steps efficiently, plan advance directives and other arrangements, and process the information. Incorrect Answers: A, C, D, and E. Delaying the discussion about the suspected diagnosis by referring the patient to a specialist (Choice A), making an appointment to discuss the news with the patient and his wife the following week (Choice DJ, or stating that more tests are needed before the x-ray results could be discussed (Choice E) all introduce unnecessary delays in discussing the concerning x-ray findings. The patient should be encouraged to obtain support from his social support system. However, the bad news should first be shared with the patient. Informing the patient that he will need an operation and chemotherapy (Choice C} is likely to overwhelm the patient with information. It is also premature to discuss the treatment course before the diagnosis is conclusively established. The physician should first discuss the suspected diagnosis. then discuss next steps in management in small pieces.","edu_obj":"Bad news should be delivered honestly, directly, in a timely manner, and using small pieces of information at a time."},{"block":4,"item":6,"image_alt":"","image_url":"","stem":"A 65-year-old Iranian woman is brought to the physician by her daughter because of a 2-month history of abdominal pain. She does not speak English, but her daughter does speak English. They brought a report from an endoscopy clinic that shows gastritis. It is most appropriate for the physician to communicate the findings and treatment plan to the patient in which of the following manners?","choices":{"A":"Explain the information to the daughter so she can relay it to her mother","B":"Refer the patient to a physician who speaks her language","C":"Reschedule the appointment when the receptionist who speaks Farsi will be in the office","D":"Use a professional translator in explaining the information to the patient","E":"Write the information on a piece of paper in English so the patient can use a translator of her choice later"},"correct":"D","explanation":"Professional interpreters can provide high-quality translations that maintain patient safety. Credentialed interpreters are trained in medical knowledge and vocabulary, ethics, and cultural sensitivity. Relying on a family member for interpreting increases the risk for miscommunication about medical or culturally relevant details and can jeopardize informed consent for treatment and patient safety Incorrect Answers: A, B, C. and E. Family members (Choice A) or uncertified translators (Choice E) should not act as interpreters for patients. The nuances of a medical situation may be misunderstood by an untrained interpreter and therefore miscommunicated to the patient. The only situation in which interpretation by a family member is acceptable is an emergency when no other option exists. Further, writing the information on a piece of paper for the patient to bring home prevents real-time, reciprocal discussion. Referring the patient to a physician who speaks her language (Choice B) or rescheduling the appointment the receptionist who speaks Farsi will be in the office (Choice C) would lead to unnecessary delays in treatment. Further. it is unlikely that the receptionist is a certified translator.","edu_obj":"Physicians should utilize professional interpreters instead of family members to translate for patients. Professional interpreters are trained to accurately communicate in medical settings and are therefore crucial for patient safety and informed consent to treatment."},{"block":4,"item":7,"image_alt":"","image_url":"","stem":"A recent clinical trial compares the use of Drug A to the standard treatment of symptomatic genital herpes. The study involves 10,000 people with genital herpes who are randomly assigned to receive Drug A or standard treatment. Results of the trial show that the duration of symptoms in patients who received Drug A is 4 days, versus 4.5 days in patients who received standard symptomatic measures (p<0.05). The manufacturer of Drug A recommends the use of Drug A in the clinical treatment of genital herpes. Based on the study's results, which of the following is the most appropriate reason to question the manufacturer's recommendation?","choices":{"A":"The investigators used an inappropriate study design","B":"II is likely that there was a Type I error","C":"II is likely that there was a Type II error","D":"The observed difference is not clinically significant","E":"The observed difference is not statistically significant","F":"There was insufficient power"},"correct":"D","explanation":"When conducting any experiment, two hypotheses are created. The null hypothesis, or Ho, states that there is no difference between the two groups being compared. The alternative hypothesis. or H1, suggests that there is a difference between the two groups being compared. The study investigators found that Drug A shortens the duration of genital herpes by 0.5 days. This is a statistically significant result, enabling the study investigators lo reject the null hypothesis (as there is a less than 5% chance they are erroneously rejecting the null hypothesis). However, a half-day of symptom resolution is unlikely to meaningfully improve patients' quality of life and carries little clinical significance. If not clinically significant, physicians and drug manufacturers should abstain from changing treatment recommendations based on study results. Incorrect Answers: A, B, C, E, and F It is unlikely that the investigators used an inappropriate study design (Choice A). As they are trying to determine whether Drug A has an efficacy benefit over standard treatment, a randomized controlled design with standard treatment as the control group is an appropriate study design. A Type I error (Choice B) is unlikely. The acceptable rate of a Type I error is a percentage called the alpha level and is set by the investigators. When the alpha level is converted to a decimal, it becomes the p-value of the experiment. An alpha level of 5% or 0.05 is standard for studies, and indicates that if the null hypothesis is true, there is a 5% chance that the investigators will erroneously reject it based on the study results. A Type II error (Choice C)

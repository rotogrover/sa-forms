rt out of the nucleus. During transcription. a cleavage and polyadenylation signal is recognized by the cleavage enzyme CPSF (cleavage and potyadenylation specificity factor). which is bound to RNA polymerase II and signals for the polymerase to cease transcription. The pre-mRNA molecule is then cleaved at the 3' end and bound by a second enzyme. polyadenylate (polyA) polymerase. which catalyzes the addition of a long string of adenine nucleotides onto the end of the pre- mRNA molecule. This polyA tail allows for transport out of the nucleus and into the cytoplasm where the mRNA molecule can be translated into proteins. A non-functional polyadenytation signal would result in failure to cleave pre-mRNA or failure to polyadenylate the transcript leading to early degradation within the nucleus. as the presence of the poly A tail prevents early degradation, and therefore promotes stabilization of mRNA. Incorrect Answers: A. B, C, and E. Addition of lysine residues (Choice A) is incorrect. While lysine is encoded by the AAA codon. the polyadenylated region of mRNA occurs in the 3' untranslated region. following the stop codon. Of the 64 trinucleotide codons. the stop codons (those signaling the termination of translation) are UAG, UGA, and UAA. Destabilization of mRNA (Choice B) is incorrect as the addition of adenine residues is a key factor in stabilizing translated mRNA. Absence of a polyA tail would confer reduced stability to the mRNA, whereas the presence of a polyA tail provides stability. Initiation of translation (Choice C) involves the start codon, AUG, which in eukaryotes, codes for methionine. Initiation of translation also involves upstream 5' sequences that contain the sites where translational enzymes bind. Upstream of the start codon. initiator RNAs. protein initiation factors. and ribosomes bind. Termination of translation (Choice E) is governed by the stop codons. UAG, UGA, and UAA, which are recognized by and associated with release (termination) factors. Binding of the release factors to the ribosomal A site triggers termination via a GTP dependent process.","edu_obj":"mRNA undergoes several regulatory modifications before translation. These include the addition of a 5'-GTP cap, splicing of intrans and exons. and the addition of a poly-adenine tail. Polyadenylation is the addition of a string of adenine nucleotides to the 3' end of the mRNA molecule that prevents degradation and permits transport out of the nucleus. t'"},{"block":4,"item":31,"image_alt":"","image_url":"","stem":"A male newborn is delivered at 26 weeks' gestation to a healthy mother. Pulmonary function testing shows:","choices":{"A":"Excessive pulmonary capillary hydrostatic pressure","B":"Excessive surfactant production","C":"Incompletely formed bronchioles","D":"Increased alveolar surface tension","E":"Interalveolar fibrosis"},"correct":"D","explanation":"Respiratory distress syndrome of the newborn, also called hyaline membrane disease and neonatal respiratory distress syndrome (NRDS), commonly occurs in premature infants, and is caused by an inadequate production of pulmonary surfactant. Surfactant produced by Type 11pneumocytes functions to decrease surface tension of the alveolar membrane. Without sufficient quantities of surfactant, high surface tension leads to alveolar collapse. A fetus' risk for NRDS may be estimated by amniocentesis and calculation of the ratio of lecithin to sphingomyelin in the amniotic fluid. Surfactant is rich in phospholipids, such as lecithin and sphingomyelin, and an increase in the lecithin to sphingomyelin ratio correlates with increasing fetal lung development. Surfactant reaches normal levels of production in the third trimester, and infants who are born prior to 34 weeks are at an increased risk for NRDS. NRDS presents with tachypnea, hypoxia, accessory muscle use, and cyanosis, and may lead to death. Chest x- ray commonly shows diffuse, bilateral airspace and interstitial opacities. Biopsy is not required for diagnosis, but if performed at autopsy, shows atelectasis with deposition of proteinaceous alveolar debris and hyaline material. The treatment of NRDS is supportive. NRDS may also be both prevented and treated with glucocorticoids, which stimulate surfactant production. Incorrect Answers: A, B, C, and E. Excessive pulmonary capillary hydrostatic pressure (Choice A) may occur in cases of cardiogenic pulmonary edema. This presentation may arise in neonates or infants with congenital heart disease or cardiovascular malformations. Increased pulmonary capillary hydrostatic pressure results in transudation of fluid out of capillaries into the interstitial and alveolar spaces. Pulmonary function testing would not necessarily show reduced capacities. Excessive surfactant production (Choice B) is incorrect as surfactant decreases surface tension within the pulmonary capillaries and promotes appropriate lung function. If production were in extreme excess, it is possible that buildup of surfactant could impair lung function. Such a case is one potential cause of pulmonary alveolar proteinosis. Incompletely formed bronchioles (Choice C) may describe bronchopulmonary dysplasia or aplasia. In utero, the lungs form and develop beginning in the first trimester; however, lung maturity is not complete until late in the third trimester. Incomplete pulmonary development may be caused by inadequate amniotic fluid, among other causes. A lack of amniotic fluid may trigger the Potter sequence, marked by abnormal facial, limb, and lung development. Interalveolar fibrosis (Choice E) is uncommon in children; however, it can occur as a result of infectious, inflammatory, genetic/congenital, autoimmune, and inhalational processes. A restrictive pattern of lung disease would be seen on pulmonary function testing, yet prematurity without other associated congenital or genetic abnormalities would more likely be associated with NRDS as a result of inadequate surfactant production in the immature lung.","edu_obj":"Neonatal respiratory distress syndrome commonly occurs in premature infants and is caused by an inadequate production of pulmonary surfactant. Lack of pulmonary surfactant leads to increased alveolar surface tension and alveolar collapse (atelectasis). Deposition of proteinaceous debris and creation of hyaline membranes within alveoli is seen on biopsy."},{"block":4,"item":32,"image_alt":"","image_url":"","stem":"An experiment is conducted to assess the adaptation of certain bacteria to hospital environments. The investigator identifies antibiotic resistance markers located on transposons that permit bacteria to adapt to these environments and perpetuate resistance. These transposons are observed to be mobile genetic elements that can incorporate into a chromosome without having DNA homology. Which of the following factors permits this genetic promiscuity?","choices":{"A":"Alu repeat sequences","B":"Homology sequences","C":"Insertion sequences","D":"Proteases","E":"Topoisomerases"},"correct":"C","explanation":"The prokaryotic genome is understood to contain core elements interspersed with mobile elements. Mobile elements of the genome (mobile genetic elements) can move within a host cell's genome, or from one cell to another cell. Plasmids are examples of circular elements of genetic material that can transfer from one cell to another, whereas transposons and insertion sequences are believed to remain as mobile genetic elements within a cell. Transposons incorporate into a chromosome without significant DNA homology using insertion sequences. An insertion sequence. or insertion element, is a short segment of DNA that codes for proteins supporting DNA transposition. These proteins are generally enzymes that promote transposition of DNA and promoter or repressor proteins that regulate such transposition. Insertion sequences can occur by themselves or also as part of a transposon. In this manner, they are believed to take part in heritable antibiotic resistance. Incorrect Answers: A, B. D, and E. Alu repeat sequences (Choice A) are a type of small, interspersed, transposable nuclear elements that are frequently found in primate and human DNA. They have frequent cytosine and guanine elements. and are often the sites of epigenetic regulation (eg, methylation). They are associated with several human diseases, including many malignancies. They are not known to contribute to prokaryotic mobile genetic elements or the acquisition of antibiotic resistance. Homology sequences (Choice B) are sequences of DNA having similar composition of base pair sequences. While similar sequences can promote a transposition event, this is not believed to be the mechanism of transposon insertion. The term homology sequence also describes t11esimilarity of DNA when compared between sets of genetic material across or within species or organisms. Proteases (Choice D) are enzymes that lyse bonds within amino acid sequences. Examples include aminopeptidase and carboxypeptidase. Proteases have roles in genetic regulation and repair, including DNA-dependent proteases. Enzymes are involved in the integration of transposons into the core genetic elements of a cell: however, these enzymes are often of the transposase class. which are nucleases. Topoisomerases (Choice E) are enzymes that modify the coiling of nucleic acids. They act by cutting and splicing DNA to adjust coil structure. While they are nucleases, they have no known involvement in the splicing and integration of transposons into the core genome.","edu_obj":"Transposons incorporate into a chromosome without significant DNA homology using insertion sequences. An insertion sequence, or insertion element, is a short segment of DNA that codes for proteins supporting DNA transposition."},{"block":4,"item":33,"image_alt":"","image_url":"","stem":"A 27-year-old man comes to the physician because of a 3-week history of pain in his back and flanks. His blood pressure is 153/87 mm Hg. Palpation of the abdomen and flanks shows enlarged kidneys bilaterally. Renal ultrasound shows multiple cysts in the cortex and medulla of each kidney. Cysts are also likely to be found in which of the following organs?","choices":{"A":"Adrenal glands","B":"Colon             ~","C":"Liver","D":"Lungs","E":"Testicles"},"correct":"C","explanation":"Polycystic kidney disease refers to either autosomal recessive or dominant disease. Autosomal recessive polycystic kidney disease (ARPKD) results from a mutation in PKD1 and generally presents in childhood with cystic renal disease. Numerous small renal cysts replace the normal renal parenchyma leading to end-stage renal disease and typically requiring dialysis and/or transplantation at a young age. It is associated with hepatic fibrosis and Caroli disease. It typically has a variable age of presentation during fetal life or childhood but can be a potential cause of oligohydramnios and pulmonary hypoplasia (Potter sequence) if it develops in utero. Autosomal dominant polycystic kidney disease (ADPKD) typically presents in adulthood, and is associated with aneurysmal vascular disease (eg, berry aneurysm) and hepatic cysts. Both forms generally present with signs of renal failure as a final common pathway, including hypertension and oliguria. Incorrect Answers: A, B, D, and E. Adrenal (Choice A), colonic (Choice B), lung (Choice D). and testicular (Choice E) cysts are not generally associated with polycystic kidney disease.","edu_obj":"Educational Objeclive: Polycystic kidney disease is caused by genetic mutations that result in the development of multiple cysts in the kidney as a result of structural abnormalities of the renal tubules. Aneurysmal vascular disease and hepatic cysts are often present in the autosomal dominant form of polycystic kidney disease."},{"block":4,"item":34,"image_alt":"","image_url":"","stem":"A 23-year-old woman has a grade 3/6 systolic murmur. Cardiac catheterization shows:","choices":{"A":"Aortic stenosis","B":"Atrial septal defect","C":"Mitral regurgitation","D":"Pulmonic stenosis","E":"Tricuspid regurgitation","F":"Ventricular septal defect"},"correct":"F","explanation":"Ventricular septal defects (VSDs) are among the most common congenital heart abnormalities, and they may occur in isolation or in association with complex structural abnormalities. The genetic cause of VSDs is heterogeneous and includes known associations with well-defined syndromes such as Down. DiGeorge, and Holt-Oram. It may also occur in isolation and via nonspecific, random mutations and individual point mutations that are de nova. VSDs are characterized by a holosystolic murmur best heard in the left lower sternal border and may have an associated palpable thrill. VSDs result in a left to right shunt, which increases pulmonary blood flow. This results in increased right ventricle (normal <25/5 mm Hg) and pulmonary artery (normal <25/10 mm Hg) pressures, as observed in this patient's cardiac catheterization. The oxygen saturation of the right ventricle increases due to the mixing of oxygenated blood from the left ventricle with deoxygenated blood returning from the venous circulation. Incorrect Answers: A, B, C, D, and E. Aortic stenosis (Choice A) affects the left side of the heart as the left ventricle (LV) attempts to overcome the resistance of a stenotic valve. The LV pressures would be expected to be increased in systole and diastole, and the left atrial (LA) pressure increased due to impaired forward flow and congestion. The aortic pressures characteristically display a strikingly increased systolic pressure with a much lower diastolic pressure. Oxygenation would be normal, with equal saturation percentages in the right atrium (RA), right ventricle (RV), and pulmonary artery (PA), as there is no direct communication between the left and right chambers to allow mixing of oxygenated blood. Atrial septal defect (Choice B) results in increased RA and RV pressures as flow from the LA crosses the septum. The oxygen saturation percentage increases in the RA, RV, and PA due to the mixing of oxygenated blood from the LA. The normal RA pressure in this case makes a VSD more likely. Mitral regurgitation (Choice C) results in retrograde flow of blood from the LV to the LA. LA pressure is significantly increased. Oxygenation would be normal. Pulmonic stenosis (Choice D) mirrors aortic stenosis, with greatly increased RV and RA pressures. and a large pressure differential in the PA between systole and diastole. Oxygenation would be normal. Tricuspid regurgitation (Choice E) mirrors mitral regurgitation. with increased RA pressure because of retrograde flow of blood from the RV. Oxygenation would be normal.","edu_obj":"Ventricular septal defects are among the most common congenital heart abnormalities. The shunting of oxygenated blood from the high-pressure left ventricle to the right ventricle results in increased right-side pressures, which can be observed through hemodynamic monitoring."},{"block":4,"item":35,"image_alt":"","image_url":"","stem":"While being treated for urosepsis in the intensive care unit, a 69-year-old man develops bleeding from sites of intravenous catheterization. He is receiving cefepime, dopamine, and 0.9% saline. He is obtunded. His temperature is 38.2°C (100.8°F), pulse is 90/min, respirations are 30/min, and blood pressure is 90/60 mm Hg. Physical examination shows oral bleeding and oozing at intravenous catheter sites and previous puncture sites. Laboratory studies show:

Hemoglobin: 12 g/dL
Hematocrit: 36%
Leukocyte count: 25,800/mm³
Platelet count: 35,000/mm³
Prothrombin time: 15 sec (INR=1.2)
Partial thromboplastin time: 56 sec
Serum:
- Urea nitrogen (BUN): 27 mg/dL
- Creatinine: 1.3 mg/dL
- AST: 57 U/L
- ALT: 67 U/L
- D-dimer: positive

Which of the following is the most likely diagnosis?","choices":{"A":"Congestive splenomegaly","B":"Disseminated intravascular coagulation","C":"Hepatic failure","D":"Immune thrombocytopenic purpura","E":"Thrombotic lhrombocytopenic purpura"},"correct":"B","explanation":"Disseminated intravascular coagulation (DIC) is a systemic disorder characterized by the widespread activation of the clotting cascade resulting in microthrombi formation, thrombocytopenia, and bleeding complications (due to consumption of platelets and clotting factors). DIC has many potential causes, including trauma, sepsis, malignancy, pancreatitis, and exposure to toxins. Regardless of underlying cause, the clinical effects include stigmata of bleeding (petechiae, purpura, oozing at surgical and venipuncture sites, clinical evidence of bleeding), and laboratory abnormalities reflecting disseminated activation of the clotting cascade (increased aPTT, PT, and INR) and consumption of platelets (thrombocytopenia). Additional laboratory abnormalities include increased D-dimer (due to the presence of fibrin split products) and low fibrinogen concentration, along with increased markers of hemolysis (detectable free hemoglobin, low haptoglobin, increased lactate dehydrogenase). Treatment includes correcting the underlying cause and correcting resulting coagulopathy and thrombocytopenia. Incorrect Answers: A, C, D, and E. Congestive splenomegaly (Choice A) describes splenic engorgement and increased red pulp caused by impaired flow of blood through the spleen or its draining veins. Common causes include cirrhosis of the liver, congestive heart failure, and splenic vein thrombosis. Patients with congestive splenomegaly may show thrombocytopenia as a result of splenic sequestration but would not typically show coagulopathy as well. Hepatic failure (Choice CJ may present with impairments in hepatic synthetic function, such as coagulopathy, hypoalbuminemia, and thrombocytopenia, in hepatic metabolic function, such as hyperbilirubinemia, and hyperammonemia, or in secretory/digestive function with malabsorption. Derangements beyond those of coagulopathy would be expected, and patients generally present with jaundice and ascites in acute liver failure. Immune thrombocytopenic purpura (Choice D) generally presents with thrombocytopenia and increased bleeding time (if measured) and may be acute or chronic. It occurs as a result of autoantibodies against platelets leading to their opsonization and consumption. Coagulation factors are not affected (PTT and PT are normal). Thrombotic thrombocytopenic purpura (Choice E) (TTP) is a thrombotic microangiopathy caused by inhibition or deficiency of ADAMTS 13, which is a metalloprotease that degrades von Willebrand Factor (vWF). Impaired ADAMTS13 activity leads to the accumulation of large vWF multimers and increased platelet adhesion/activation, forming platelet microthrombi. The intrinsic coagulation pathway is not activated, and coagulation studies are often normal in TTP.","edu_obj":"Disseminated intravascular coagulation is a systemic disorder characterized by the widespread activation of the clotting cascade resulting in microthrombi formation, thrombocytopenia. and bleeding complications due to consumption of platelets and clotting factors. It can be caused by trauma, sepsis, malignancy, pancreatitis, exposure to toxins, and multiple other causes. Laboratory studies reveal thrombocytopenia, prolonged prothrombin time and activated partial thromboplastin time. decreased fibrinogen concentration, decreased platelet count, and increased D-dimer concentration."},{"block":4,"item":36,"image_alt":"","image_url":"","stem":"A 46-year-old man comes to the emergency department because of an 18-hour history of fever, nausea, vomiting, and severe pain of his middle and left upper abdomen that radiates to his back. He recently returned from a 3-day fishing trip with some friends; he drank six to eight beers daily during this period. He says that he has had similar symptoms after binge drinking in the past. He has hyperlipidemia treated with simvastatin. He appears diaphoretic. His temperature is 39.3°C (102.8°F). Abdominal examination shows mild distention and tenderness over the epigastric region and left upper quadrant. Laboratory studies show: LeukocY1ecount 17,000/mm³ serum Ca2• 7.5 mg/dl Amylase 185 U/L Lipase 300 U/L This patient most likely has which of the following underlying processes?","choices":{"A":"Abscess","B":"Caseous necrosis","C":"Fibrinoid necrosis","D":"Liquefaction necrosis","E":"Saponification of fat"},"correct":"E","explanation":"Acute pancreatitis typically presents with epigastric abdominal pain that radiates to the back. along with nausea and emesis. and often in a patient with a history of gallstones, alcohol use disorder, trauma, hypertriglyceridemia, or hypercalcemia. Less common clinical manifestations are Grey-Turner sign, bruising of the flanks, and Cullen sign, bruising around the umbilicus. Acute pancreatitis can be complicated by necrosis, hemorrhage, abscess, or the formation of pseudocysts. Laboratory studies often show increased amylase and lipase. The diagnosis of pancrealilis requires two of the following: classic signs and symptoms. lipase three times higher than the upper limit of normal, or characteristic imaging features. Recurrent episodes of acute pancreatitis may lead to chronic pancreatitis and insufficiency of both the exocrine and endocrine pancreas. Regardless of the cause, the symptoms of pancreatitis present from premature activation of pancreatic enzymes, such as lipase and peptidases, with resultant autodigestion of the organ, its stroma, and surrounding tissues. Biochemically, as the patient's fat is autodigested, saponification occurs. Saponification refers to the hydrolysis of an ester to form an alcohol and a carboxylate salt. In this case, triglycerides or pl1ospholipids containing ester linkages are hydrolyzed in the saponification reaction, catalyzed by the patient's own pancreatic lipase. Calcium ions often complex with these products, resulting in serum hypocalcemia. Incorrect Answers: A, B, C, and D. Abscess (Choice A) represents a complication of pancreatitis and describes a walled off collection of inflammatory cells plus bacteria. An abscess may occur in this patient, though generally requires more than 18 hours to occur. Its presence could be assessed through imaging of the pancreas with a CT scan. Gaseous necrosis (Choice B) describes a type of cell death in which the resultant tissue appears soft, white in color, and is a proteinaceous mass. It is often encountered in tubercular and fungal infections and results from cytolytic chemicals released by inflammatory cells. The affected, necrotic cells are incompletely digested, which gives caseous necrosis its gross appearance. This is not a pathology associated with pancreatitis. Fibrinoid necrosis (Choice C) generally results from inflammation caused by antigen-antibody complexes and is seen in conditions such as vasculitides and autoimmune disease. Proteins, including the immune complexes, complement, and plasma protein such as fibrin may deposit in areas of fibrinoid necrosis. The staining pattern of necrosis on histology resembles that of fibrin. Liquefaction necrosis (Choice D) describes the process of necrosis in which the death of cells transforms the tissue into a liquid mass. Causes include infections and chemical burns. In liquefactive necrosis, the cell is completely digested. It is often seen in necrotic lesions of the central nervous system.","edu_obj":"Saponification refers to the hydrolysis of an ester to form an alcohol and a carboxylate salt. In pancreatitis, autodigested triglycerides or phospholipids are hydrolyzed in the saponification reaction. catalyzed by pancreatic lipase. Calcium ions often complex with these products, resulting in serum hypocalcemia."},{"block":4,"item":37,"image_alt":"","image_url":"","stem":"A study is conducted to assess the distribution of preoperative serum creatinine concentrations among a small group of patients who are scheduled to undergo operative procedures at a local hospital. Seven consecutive patients are enrolled. The results are shown:","choices":{"A":"Accuracy","B":"Mean","C":"Median","D":"Mode","E":"Precision","F":"Range"},"correct":"B","explanation":"In statistical analysis, measures of central tendency are useful in describing a dataset. Mean, median, and mode are all measures of central tendency. The mean is defined as the average of all the values included in the data set. In this set, it is equal to a serum creatinine concentration of 2.7 mg/dl. Inadvertent entry of a value of 0.9 mg/dl as 9 mg/dl would increase the mean to 3.8 mg/dL Outlier values generally affect the mean to the greatest degree. Incorrect Answers: A, C, D, E, and F. Accuracy (Choice A) describes the absence of error or bias in a test: it reflects how correct a test's measurements are as compared to reality. In other words, if a patient's creatinine concentration is 1 mg/dl and the test measures 1 mg/dL, the test is considered accurate. Human error in recording a dataset does not affect the accuracy of the test itself. The median (Choice C) is defined as the middle value of the dataset when ordered, meaning that there are the same number of values to the left and right (lesser than and greater than) of the median. If the median falls between two numbers, these numbers are summed and divided by two. The median is less influenced by outliers and skew. In this dataset. the median is 0.9 mg/dl. Inadvertent entry of 0.9 mg/dl as 9 mg/dl would alter the data set to O 5, 0.6, 0.8, 1, 5, 9, and 10; thus, the median would become 1 mg/dl. The mode (Choice D) is defined as the value that occurs most frequently within the data. In this data set. no numbers occur more than once: therefore, there is no mode. If 0.9 mg/dl were inadvertently entered as 9 mg/dl, there would still be no repeating numbers in this set, and therefore still no mode. Precision (Choice E) describes the reproducibility of results. More precise measurements suffer from less variation in measurement. Decreasing random error in a test increases precision. If a patient's creatinine concentration is 1 mg/dl and the test consistently measures 1 mg/dl each time, the test is considered precise. Human error in recording a dataset does not affect the precision of the test itself. The range (Choice F) is defined simply as the difference between the lowest and highest values in the dataset. The lowest and highest values in this dataset are 0.5 mg/dl and 10 mg/dl, respectively. resulting in a range of 9.5 mg/dl. Inadvertent entry of 0.9 mg/dl as 9 mg/dl would not alter the range. as both 0.9 and 9 values lie within the minimum and maximum values of this dataset.","edu_obj":"Median. mode, and mean are measures of the central tendency of data. The mean is the average of all values in the dataset, the median is the central value of the data, and the mode is the most common value. Inadvertent substitution of a higher datapoint could potentially shift all values away from the correct values; however, the mean is more sensitive to outliers and skew than the median."},{"block":4,"item":38,"image_alt":"","image_url":"","stem":"A study is conducted to assess the efficacy of bisphosphonate treatment in preventing vertebral fractures in women with low bone density. A total of 257 women with low bone density and no history of fractures are randomly assigned to receive a bisphosphonate or placebo for 3 years. Results show:","choices":{"A":"(32/98)/(42/88)","B":"(42/88)/(32/98)","C":"1/(32/64-98/186)","D":"130/(42-32)","E":"260/(186-64)"},"correct":"D","explanation":"Number needed to treat (NNT) is an epidemiological measure that clarifies the effectiveness of an intervention. Formally, the NNT is the number of patients who must receive an intervention in order to prevent the occurrence of one negative outcome. For example, a cardiovascular drug that must be given to 100 people in order to prevent one cardiovascular event would have an NNT of 100. In this study, the rate of fractures In the bisphosphonate group (experimental group) is 32/130 = 25%, while the rate of fractures in the placebo group (control group) is 42/130 = 33%. The difference between these two risks is the absolute risk reduction (ARR) of bisphosphonates, 42/130- 32/130 = (42-32)/130. NNT is inversely related lo ARR via the following equation: NNT=1/ARR. Thus, NNT = 130/(42-32), which equals 13. In other words, if 13 women with low bone density are treated with bisphosphonates. one patient would stand to benefit from the treatment through avoidance of a fracture. The NNT is a useful measure for the evaluation of an intervention, as it can be intuitively understood by clinicians and the general population, whereas relative risk reduction and absolute risk reduction calculations are more abstract and difficult to translate to the number of people helped by an intervention. Incorrect Answers: A, B, C, and E. (32/98)/(42/88) (Choice A) represents the odds ratio (OR). which is commonly calculated in case-control studies. It evaluates the likelihood of exposure to a certain risk factor given a disease or non-disease state. An OR greater than one suggests that the exposure is associated with the disease state. (42188)1(32198)(Choice B) represents the inverse of the OR 1/(32/64-98/186) (Choice C) represents incorrect computation in calculating the NNT. 260/(186-64) (Choice E) divides the total number of study participants by the difference between the absolute number of patients who did not experience fractures and those who did. It is not a meaningful computation in the context of the presented data and reflects a misinterpretation or a mathematical error.","edu_obj":"The number needed to treat (NNT) Is the number of individuals who must receive an Intervention in order to prevent the occurrence of one negative outcome. The number needed to treat is calculated as the inverse of the absolute risk reduction (ARR): NNT = 1/ARR"},{"block":4,"item":39,"image_alt":"","image_url":"","stem":"An 18-year-old woman comes to the physician because of a 3-week history of intermittent double vision and transient vision loss. She also has had a 9-kg (20-lb) weight loss during the past 5 months due to decreased appetite. She is 152 cm (5 ft) tall and now weighs 51 kg (112 lb): BMI is 22 kg/m 2. Her temperature is 38°C (100.5°F), and blood pressure is 146/88 mm Hg. Funduscopic examination shows a recent retinal hemorrhage of the left eye. Cardiac examination shows bilateral carotid bruits. Radial pulses are diminished on the right side and absent on the left side. Laboratory studies show:

Hemoglobin: 10.5 g/dL
Hematocrit: 32%
Mean corpuscular volume: 95 µm³
Leukocyte count: 13,250/mm³ with normal differential
Erythrocyte sedimentation rate: 84 mm/h
Serum:
- IgA: 650 mg/dL
- IgG: 3100 mg/dL
- IgM: 852 mg/dL
- Antinuclear antibodies: weakly positive
- Rheumatoid factor: weakly positive

Histologic examination of a carotid artery in this patient will most likely show which of the following types of vasculltis?","choices":{"A":"Acute neutrophilic","B":"Fibrinoid necrotizing","C":"Granulomatous","D":"Leukocytoclastic","E":"Lymphocytic"},"correct":"C","explanation":"Takayasu arteritis is a rare, large vessel vasculitis usually affecting female patients younger than age 40 years and is characterized by weak pulses caused by narrowing of the aortic arch and proximal great vessels. Following the acute inflammatory stage, weakening of the pulses develops due to vascular luminal narrowing. Late stages are characterized by vascular fibrosis. It is also associated with systemic symptoms, such as fever, night sweats, myalgias, and arthralgias. Cerebral hypoperfusion may lead to lightheadedness or syncope. Renal arterial narrowing may lead to secondary hypertension. Patients may present with visual changes caused by ischemic or hypertensive retinopathy. Laboratory studies typically show anemia, leukocytosis, thrombocytosis. and increased concentrations of erythrocyte sedimentation rate and C-reactive protein. While vascular biopsy is not typically performed due to the location of the involved arteries, biopsy shows granulomatous inflammation and intimal fibrosis. The diagnosis is established with contrast angiography showing irregular vascular narrowing and aneurysmal changes with characteristic intervening, unaffected areas, or skip lesions. Treatment is with oral glucocorticoids and immunomodulatory therapy. Incorrect Answers: A. B. D. and E. Acute neutrophilic (Choice A) inflammation is characteristic of Sweet syndrome, a rare disorder that presents in children with fever, leukocytosis, and painful, cutaneous papular lesions that show neutrophilic perivasculitis. Sweet syndrome may occur in association with infection or autoimmune disease, or as a paraneoplastic phenomenon in the setting of leukemia. Fibrinoid necrotizing (Choice B) inflammation occurs in polyarteritis nodosa. Polyarteritis nodosa is a necrotizing vasculitis involving medium-sized arteries that generally affects the kidneys and visceral organs, sparing the lungs. It typically presents with systemic symptoms, hypertension. renal damage, renal microaneurysms. abdominal pain, and melena. Leukocytoclastic (Choice D) vasculitis refers to small vessel vasculitis that primarily involves the skin. It affects females more than males, and typically presents with a painful, burning rasl1 as well as systemic symptoms of fever, weight loss, fatigue, and myalgias. Palpable purpura is commonly noted on physical examination. Lymphocytic (Choice E) vasculitis is a rare, cutaneous vasculitis characterized by vascular inflammation with a lymphocytic predominance. Patients may present with petechiae, purpura, or cutaneous ulcers.","edu_obj":"Takayasu arteritis is a rare. large vessel vasculitis usually affecting female patients younger than age 40 years and is characterized by weak pulses caused by n;irrnwing of the aortic arch and rroximal great vessel\" While v.:i\"r.ular biopsy i,:; not typically pertormed due to thP.location of the involvP.darteries. biopsy shows granulomatous inflammation and intimal fibrosis. The diagnosis is established with contrast angiography showing irregular vascular narrowing and aneurysmal changes with characteristic intervening, unaffected areas, or skip lesions."},{"block":4,"item":40,"image_alt":"","image_url":"","stem":"A 56-year-old woman comes to the physician because of progressive shortness of breath and cough during the past 2 weeks. Her respirations are 20/min. Crackles are heard on auscultation. A chest x-ray shows bilateral pleural effusions. A thoracentesis is done. Pleural fluid analysis shows:","choices":{"A":"Bacterial pneumonia","B":"Congestive heart failure","C":"Metastatic carcinoma to the lung","D":"Pulmonary tuberculosis","E":"Systemic lupus erythematosus","F":"Thoracic duct obstruction"},"correct":"B","explanation":"Pleural effusions occur as a result of multiple underlying conditions and can be categorized into transudative and exudative effusions. If the cause of the effusion is uncertain, thoracentesis should be performed to analyze the pleural fluid. Evaluation of the protein, lactate dehydrogenase (LDH), and glucose can aid in determination of the underlying cause. Exudative effusions are associated with conditions such as infections, malignancy, and inflammatory disease, such as systemic lupus erythematosus and rheumatoid arthritis. Transudative effusions are a result of conditions that cause either an increase in hydrostatic pressure, such as congestive heart failure, or a decrease in oncotic pressure, such as cirrhosis and nephrotic syndrome. Light's criteria are used to analyze pleural fluid and differentiate between a transudative effusion and an exudative effusion, thereby narrowing the differential diagnosis. Pleural fluid in transudative effusions will generally have a total protein concentration less than 2.5 g/dl and a ratio of pleural fluid to serum fluid protein of <0.5. Fluid from a transudative effusion will have total protein concentrations greater than 2.9 g/dl and pleural:serum protein ratio of >0.5. Transudative effusions generally have an LDH activity <200 U/L and a ratio of pleural:serum LDH of <0.6. This patient, with a subacute onset of dyspnea and bilateral pleural effusions, has pleural fluid that is most consistent with a transudative effusion as may be seen in congestive heart failure. Incorrect Answers: A, C, D, E, and F. Bacterial pneumonia (Choice A) can be complicated by a parapneumonic effusion. Patients may present with fever, cough, and shortness of breath. The effusion will be ipsilateral to the site of infection and will show exudative features with predominant neutrophils and increased protein and LDH activity. Metastatic carcinoma to the lung (Choice C) may present with an exudative pleural effusion that is often ipsilateral to the site of malignancy. Additionally, the pleural fluid may contain malignant cells. Patients with malignant pleural effusions will usually present with other features indicating underlying malignancy, such as an indolent onset of cough, weight loss, night sweats, and shortness of breath. Pulmonary tuberculosis (Choice D) frequently causes pleural effusions. When suspected, pleural fluid adenosine deaminase activity should be assessed, which is often increased. These effusions are exudative, not transudative, and often have a lymphocyte predominance which is not seen in this patient. Additionally, this patient does not have any known risk factors for tuberculosis. Systemic lupus erythematosus (Choice E) may present with pleural effusions that are often bilateral and occur in the setting of pleuritis. These effusions are exudative, and a high lymphocyte count is seen. In addition to the pleuritis, patients will typically have other findings consistent with a diagnosis of lupus. Thoracic duct obstruction (Choice F) may lead to a chylothorax. The thoracic duct empties into the central vasculature at the junction of the left subclavian and internal jugular veins, thus obstruction or damage to the duct causes a left-sided pleural effusion. Chyle consists of triglycerides that are being carried from the intestine to the bloodstream, which gives it a milky appearance.","edu_obj":"Pleural effusions can be categorized as either transudative or exudative. Thoracentesis can be done to obtain pleural fluid for analysis to aid in determination of the underlying cause. Transudative effusions can be caused by congestive heart failure, nephrotic syndrome, and cirrhosis. Exudative effusions can be caused by infections, malignancy, and inflammatory conditions."},{"block":4,"item":41,"image_alt":"","image_url":"","stem":"Two randomized, double-blind studies (Study X and Study Y) are conducted to assess the efficacy of a new chemotherapeutic agent. For each study, patients are randomized to receive either placebo or the new experimental chemotherapy; all subjects are then followed for a mean of 5 years. Follow-up rates are 92% in Study X and 91% in Study Y. Results show:","choices":{"A":"Bias","B":"Difference in follow-up rates","C":"Difference in number of patients","D":"Different population","E":"Randomization error"},"correct":"C","explanation":"These two randomized clinical trials are similar in their design. However, they provide discrepant results in the confidence intervals (Cl) of their respective relative risks (RR). RR describes the risk for developing an outcome in a group with a particular exposure divided by the risk for developing the outcome in a group without the exposure. A Cl proposes a range of values within which a true value is likely to fall. Formally, a 95% Cl is the range of values within which the calculated statistic would fall in 95% of cases if the sample and calculation were repeated, reflecting a reasonable margin of error (5%). Cl is a function of standard deviation; a narrower (wider) Cl indicates a smaller (larger) SD and increased (decreased) precision of the data. In addition, when evaluating odds ratios or RR, a value of 1.0 indicates that the two groups are similar with regards to the outcome of interest. Thus, a Cl that does not include 1.0 would indicate a statistically significant difference between the two groups. A broad Cl, or a Cl that includes a value of one. is commonly caused by inadequate statistical power. Statistical power, the ability of the study to detect a difference between groups if one exists, is often limited by an inadequate number of study participants. Increasing the power of a study can generally be completed through a larger sample size and improving precision in measurements. When the power of a study is increased, the incidence of a Type II error decreases. A Type II error occurs when a study shows no difference between the null and alternative hypotheses, when in fact, a difference exists. The Type II error rate is calculated by subtracting the power from 100%. Given the similarities between these two studies, it is likely that study X. which has a broad Cl that includes a value of 1.0, is affected by Type II error caused by inadequate statistical power and potentially inadequate sample siz.e. In contrast, study Y has detected a significant reduction in risk with a narrow Cl, likely caused by adequate sample size. Incorrect Answers: A, B, D. and E. Bias (Choice A) is a common cause of statistical error within a study and can be minimized by randomization and blinding procedures. The studies in question are both double-blinded and well-randomized. Difference in follow-up rates (Choice B) can lead to attrition bias, a form of selection bias that occurs because of unequal dropout rates from the study groups. The two studies have similar 5-year follow-up rates, suggesting that this is not a likely explanation for the discrepant results. Different population (Choice D) can lead to discrepant results between two studies in the setting of sampling bias, wherein the population selected for inclusion in one study differs from that selected for inclusion in the other study. The demographic characteristics of the study populations are similar between study X and study Y, suggesting that the likelihood of sampling bias is low. Randomization error (Choice E) can take place because of improper randomization design such that randomization does not occur, known as selection bias, or as a result of human error during the study. Both studies show similar proportions of patients between treated and placebo groups across the demographic parameters included within the studies. suggesting that the groups were appropriately randomized.","edu_obj":"A confidence interval (Cl) proposes a range of values within which a true value is likely to fall. A Cl that includes a value of 1.0 indicates the absence of significant difference between two groups. A broad Cl, or a Cl that includes a value of 1.0, is commonly caused by inadequate statistical power. Statistical power is often limited by an inadequate number of study participants. The power of a study can be increased through a larger sample size and improved precision in measurements."},{"block":4,"item":42,"image_alt":"","image_url":"","stem":"A previously healthy 4-year-old boy is brought to the physician because of a 1-week history of easy fatigability and swelling of his face and feet. His temperature is 37. 1°C (98.8°F), pulse is 100/min, respirations are 20/min, and blood pressure is 85/67 mm Hg. Physical examination shows facial edema, abdominal distention, and a 3-cm umbilical hernia. There is 3+ pitting edema of the ankles and feet. Laboratory studies show:

Serum:
- Na⁺: 131 mEq/L (N=138–145)
- Albumin: 2.5 g/dL (N=3.5–5.5)
- Cholesterol: 210 mg/dL (N=109–189)
- Triglycerides: 111 mg/dL (N=30–86)

Urine protein: 4+

One week later, the patient develops a temperature of 39°C (102.2°F), severe abdominal pain, and chills. Abdominal paracentesis yields turbid peritoneal fluid that grows Streptococcus pneumoniae. Further studies will most likely show a decrease in which of the following in this patient?","choices":{"A":"B-lymphocyte differentiation","B":"Natural killer cells","C":"Neutrophil oxidative burst","D":"Serum lgG concentration","E":"T-lymphocyte population"},"correct":"D","explanation":"This patient, presenting with fatigue, edema, abdominal distention, hyponatremia, and hypoalbuminemia, likely has nephrotic syndrome. Nephrotic syndrome refers to a group of clinical features that result from several underlying diseases that affect the glomerular filtration barrier. Nephrotic syndrome causes proteins such as albumin and globulins to be lost in urine, resulting in hypoalbuminemia and low levels of globulins. Minimal change disease is the most common cause of nephrotic syndrome in the pediatric population. It may be triggered by recent viral infection or immune stimulus. or it may be idiopathic in nature. Regardless of cause, signs and symptoms of nephrotic syndrome include dependent edema, foamy or dark-colored urine, hypoalbuminemia, proteinuria, hypogammaglobulinemia, and compensatory hyperlipidemia. Patients with nephrotic syndrome, hypogammaglobulinemia, or low serum immunoglobulin concentration, are at increased risk of infections, especially with encapsulated bacteria such as Streptococcus pneumoniae. Treatment varies based on the cause and often includes steroids or immunomodulators. Any suspected infection in patients with nephrotic syndrome should be treated with antibiotics targeting likely pathogens and narrowed based on culture and sensitivity results. Incorrect Answers: A, B, C, and E. B-lymphocyte differentiation (Choice A), natural killer cells (Choice B), and T-lymphocyte population (Choice E) would not decrease in the setting of active infection resulting in nephrotic syndrome. During an active infection, coordination between the innate and adaptive immune system promotes and stimulates B-lymphocyte differentiation and the T-lymphocyte population, including natural killer cells. Many primary immunodeficiencies have causes that involve B lymphocyte, natural killer cell, or T lymphocyte deficiencies (eg, severe combined immunodeficiency), though are not necessarily associated with nephrotic syndrome. Neutrophil oxidative burst (Choice C), or respiratory burst, generates reactive oxidative species (eg, peroxides and superoxides) that are toxic to bacterial cells. During acute infection, the neutrophil oxidative burst would increase. The oxidative burst is impaired in chronic granulomatous disease.","edu_obj":"Nephrotic syndrome is characterized by edema and proteinuria, including hypogammaglobulinemia, and hyperlipidemia. In the setting of nephrotic syndrome, patients are relatively immunodeficient due to hypogammaglobulinemia, or low serum immunoglobulin concentration. Hypogammaglobulinemia places patients at increased risk for systemic infection .."},{"block":4,"item":43,"image_alt":"","image_url":"","stem":"A 24-year-old primigravid woman at 36 weeks' gestation comes to the physician because of a 3-day history of ankle swelling. She has gained 2.7 kg (6 lb) during the past week. She has no history of major medical illness, and her pregnancy has been uncomplicated. Her temperature is 37°C (98.6°F), pulse is 85/min. and blood pressure is 160/100 mm Hg. Physical examination shows a uterus consistent in size with a 36-week gestation. There is mild facial edema and pilling edema of the lower extremities and ankles bilaterally. Laboratory studies show: Hemoglobin 12 g/dL Hematocrit 36% Platelet count 95,000/mm³ Serum creatinine 1.3 mg/dL Urine protein 3+ Labor is induced, and the patient delivers a healthy male newborn. The placenta is removed and sent for analysis. Histologic examination of the placenta is most likely to show which of the following characteristics of this patient's gestational disorder?","choices":{"A":"Acute chorioamnionitis","B":"Atherosis of decidual vessels","C":"Chronic villitis","D":"Placenta accreta","E":"Villous edema"},"correct":"B","explanation":"This patient's findings of hypertension, peripheral edema, proteinuria, thrombocy1openia, and renal insufficiency, occurring after the 20th week of gestation, are consistent with a diagnosis of preeclampsia. Preeclampsia is caused by an abnormality of the placental spiral arteries and poor trophoblastic invasion, leading to placental hypoperfusion and the subsequent production of vasoactive l1ormones that cause generalized endothelial dysfunction, hypercoagulability, and vasospasm. Histologic examination of the placenta will show fibrinoid necrosis of the spiral arteries with inflammatory cells, known as acute atherosis of the decidual vessels. Preeclampsia usually presents in the second or third trimester, after the 20th week of gestation. Preeclampsia may lead to uteroplacental insufficiency, which places the fetus at risk for fetal growth restriction. If untreated, preeclampsia can progress to eclampsia, characterized by maternal seizures, which can have profoundly adverse outcomes, including maternal stroke, cardiac arrest, end-stage kidney disease, or maternal or fetal death. Preeclampsia is treated with antihyperiensive agents, eclampsia prophylaxis with magnesium sulfate, and delivery of the fetus and placenta. Incorrect Answers: A, C, D, and E. Acute chorioamnionitis (Choice A) is a bacterial infection of the fetal membranes that commonly occurs in the setting of premature or prolonged rupture of the membranes. Maternal fever and leukocy1osis are characteristic. and the uterus may be tender to palpation. Chorioamnionitis would not explain this patient's hypertension. proteinuria, or peripheral edema. Chronic villitis (Choice C) refers to inflammation of the chorionic villi caused by inflammatory cells from the mother reaching the placenta. It may be idiopathic or infectious in origin. It is most commonly asymptomatic but can be associated with miscarriage, premature labor, and intrauterine fetal demise. It is less likely than preeclampsia and atherosis of the decidual vessels in this patient. Placenta accreta (Choice D) refers to the abnormal attachment of the placenta to the myometrium. rather than just the endometrium. Risk factors include prior cesarean delivery or uterine surgery, increased maternal age, and multiparity. Complications include postpartum hemorrhage caused by the increased risk for retained products of conception. Placenta accreta would not explain this patient's symptoms. Villous edema (Choice E) is nonspecific with a variety of causes, including infection. chromosomal abnormalities of the fetus. and erythroblastosis fetal is. It may cause the placenta to appear larger than expected on gross examination. This patient has signs and symptoms of preeclampsia, and histologic evaluation of the placenta is more likely to show atherosis of the decidual vessels.","edu_obj":"Preeclampsia presents after the 20th week of gestation with hypertension, peripheral edema. proteinuria, thrombocy1openia, and renal insufficiency. It is caused by an abnormality of the placental spiral arteries and poor trophoblastic invasion, leading to placental hypoperfusion and the subsequent production of vasoactive honnones that cause generalized endothelial dysfunction, hypercoagulability, and vasospasm. Histologic examination of the placenta will show fibrinoid necrosis of the spiral arteries with inflammatory cells. known as acute atherosis of the decidual vessels. Preeclampsia is treated with antihypertensive agents. eclampsia prophylaxis with magnesium sulfate, and delivery of the fetus and placenta."},{"block":4,"item":44,"image_alt":"","image_url":"","stem":"A 48-year-old woman comes to the emergency department 2 hours after the sudden onset of severe flank pain. She also has a 2-month history of mild exacerbation of her baseline constipation. She has had no fever. chills. pain with urination. or increased urinary frequency. She has a history of infrequent urinary tract infections. with the most recent occurring more than 5 years ago. She has no personal or family history of renal calculi. Her pulse is 92/min, and blood pressure is 138/88 mm Hg. Physical examination shows no other abnormalities. Laboratory studies show: Serum Na• 144 mEq/L K• 3.8 mEq/L c1- 100 mEq/L HCO3- 27 mEq/L Ca 2 • 10.6 mg/dl Urea nitrogen 19 mg/dl Creatinine 0.8 mg/dl Phosphorus 2.9 mg/dl ts- Urine blood 2+ Which of the following is the most likely cause of these findings?","choices":{"A":"Hyperoxaluria","B":"Hyperparathyroidism","C":"Hyperuricemia","D":"Hypervitaminosis D","E":"Milk-alkalisyndrome"},"correct":"B","explanation":"Primary hyperparathyroidism results in hypercalcemia and hypophosphatemia secondary to the aberrant increased production of parathyroid hormone (PTH). The most common cause of primary hyperparathyroidism is a chief cell adenoma of the parathyroid gland, followed by parathyroid hyperplasia, and parathyroid carcinoma. PTH is produced by parathyroid chief cells and stimulates 1a-hydroxylase in the kidney. which leads to the conversion of 25-hydroxycholecalciferol to 1,25-dihydroxycholecalciferol (active vitamin D). Vitamin D acts to increase the intestinal absorption of calcium and phosphate. PTH also plays a role in the regulation of calcium and phosphate by stimulating osteoclastic bone reabsorption and distal convoluted tubular calcium reabsorption and phosphate excretion in the kidney. Common symptoms of primary hyperparathyroidism are secondary to hypercalcemia, and include recurrent nephrolithiasis, bone pain from osseous resorption (osteitis fibrosa cystica). polyuria, dehydration. constipation. and psychiatric disturbances. Diagnosis typically requires evaluation with a technetium 99m sestamibi nuclear medicine scan. Treatment involves resection of the parathyroid adenoma. Incorrect Answers: A, C, D. and E. Hyperoxaluria (Choice A) is a rare disorder of oxalate metabolism that may lead to excessive urinary excretion of oxalate with associated calcium oxalate nephrolithiasis. It is less common than primary hyperparathyroidism. Hyperuricemia (Choice C) may occur in the setting of gout or less frequently due to tumor lysis syndrome, or Lesch-Nyhan syndrome. Hyperuricemia may contribute to the formation of uric acid nephrolithiasis Given the absence of these risk factors. a calcium nephrolith is more likely. Hypervitaminosis D (Choice D) may cause hypercalcemia. Patients typically report a history of use of vitamin supplements. Vitamin D may be associated with normal or increased concentrations of phosphorus, in contrast to hyperparathyroidisrn where phosphorus concentration is generally low. Milk-alkali syndrome (Choice E) is caused by ingestion of calcium and absorbable alkali. Antacids contain calcium and alkali and are the most common cause of milk-alkali syndrome. Patients present with a constellation of symptoms related to hypercalcemia and alkalosis, including weakness. confusion. headache, dizziness. nausea. vomiting, polydipsia. and polyuria.","edu_obj":"Primary hyperparathyroidism presents with symptoms of hypercalcemia. including recurrent nephrolithiasis, bone pain from osseous resorption, polyuria, dehydration, constipation, and psychiatric disturbances. Parathyroid chief cell adenoma is the most common cause."},{"block":4,"item":45,"image_alt":"","image_url":"","stem":"A 5-year-old girl with a history of recurrent infections since the age of 4 months is brought to the physician for a follow-up examination. She has had multiple episodes of pneumonia. sinusitis, otitis media, and diarrhea. She is at the 20th percentile for height and weight. Her temperature is 37.4°C (99.3°F). Mild crackles are heard bilatelly over the lower lung lobes. Laboratory studies show: Leukocyte count 10,500/mm 3 (N=SS00-15,500) Segmented neutrophils 57% Eosinophils 2% Lymphocytes 34% CD3+ T lymphocytes 67% CD19+ B lymphocytes 28% CD56+ natural killer cells 5% Monocytes 7% Serum lgA undetectable (N=14-159 mg/dL) lgG 25 mg/dL (N=345-1236) lgM 410 mg/dL (N=43-207) This paUent most likely has an abnormality of which of the following immune system components?","choices":{"A":"Activation-induced deaminase","B":"CD40 ligand","C":"Class II MHC protein","D":"Common y chain of the interleukin-2 (IL-2) receptor","F":"Terrmnal complement"},"correct":"B","explanation":"Patients with type I hyper-lgM syndrome lack CD40 ligand, a T-lymphocyle ligand on activated CD4+ T lymphocyles that binds to B lympl1ocytes. Activated CD40 ligand on T lymphocyles promotes immunoglobulin class switching by activated B lymphocytes. Patients without CD40 ligand may have normal to increased levels of lgM and diminished to undetectable levels of other immunoglobulins, including lgA. lgE, and lgG. Diminished levels of lgA. lgE, and lgG place affected patients at risk of recurrent infections, including from opportunistic pathogens such as Pneumocystisjiroveci. Patients usually develop symptoms several months following delivery and often do not survive to adulthood. Incorrect Answers: A, C, D, E, and F Activation-induced deaminase (Choice A) mutation is found in patients with type II hyper-lgM syndrome. in which a patient's B lymphocytes cannot respond to C040 ligand. These patients have similar diminished levels of lgA and lgG as well as normal to increased levels of lgM. Unlike patients with type I hyper-lgM syndrome. these patients do not always present with opportunistic infections. Class II MHC protein (Choice C) deficiency (Bare Lymphocyte Syndrome Type II) results in increased risk of infections with a similar presentation of severe combined immunodeficiency (SCIO). Laboratory findings include normal T lymphocytes and B lymphocytes in peripheral blood, hypogammaglobulinemia, and decreased MHC II expression on peripheral T lymphocytes. Common y chain of the interleukin-2 (IL-2) receptor (ChOice D) and recombination-activating gene 1 (Choice E) are two mutations associated with the development of SCIO. Patients with SCIO have decreased immunoglobulin production and decreased T lymphocytes, leading to the development of opportunistic infections. atopic dermatitis, failure to thrive, and absent thymus. Treatment for SCIO is bone marrow transplant. Terminal complement (Choice F) deficiencies involve complement CS-9 proteins present in the membrane attack complex. Patients with deficiencies in terminal complement proteins have increased susceptibility to recurrent Neisseria infections.","edu_obj":"In hyper-lgM syndrome. patients have a normal to increased amount of lgM and a paucity or absence of immunoglobulins from different classes. They lack functional CD40 ligand, a T-lymphocyte ligand on activated CD4+ T lymphocytes that interacts with B lymphocytes to promote class switching of immunoglobulins. As a result, these patients are at increased risk of recurrent and opportunistic infections."},{"block":4,"item":46,"image_alt":"","image_url":"","stem":"A 68-year-old woman comes to the physician for a follow-up examination after a routine endoscopy for dyspepsia showed large esophageal varices. She has a 25-year history of type 2 diabetes mellitus. She also has hypertension and hyperlipidemia. She does ]jot have any history of liver disease, blood transfusions, or intravenous drug use, and she does not drink alcohol. Her current medications are 81-mg aspirin, insulin, lisinopril. and simvastatin. She appears alert. She is 168 cm (5 ft 6 in) tall and weighs 110 kg (242 lb); BMI is 39 kg/m2. Physical examination shows scattered spider angiomata over the chest and upper extremities. Abdominal examination shows no ascites. The spleen tip is palpated 4 cm below the left costal margin. Laboratory studies show: Hemoglobin 12.2 g/dl Hematocrit 36% Mean corpuscular volume 102 µm 3 Platelet count 92,000/mm 3 Serum Total bilirubln 1.8 mg/dl AST 65 U/L ALT 85 U/L Ferritin 62 ng/ml Hepatitis B surface antigen negative Hepatitis B surface antibody posrtive Hepatitis C virus negative Ultrasonography shows coarsened liver echotexture with increased echogerncity, Which of the following is the most likely cause of the liver findings in this patient?","choices":{"A":"Adverse drug effect","B":"Chronic hepatitis B","D":"Hepalolenticular degeneration (Wilson disease)","E":"Prior excessive alcohol use"},"correct":"C","explanation":"Non-alcoholic fatty liver disease (NAFLD) is a common disorder characterized by fatty liver in the absence of other causes of fatty liver, such as alcohol use, Wilson disease. drug-induced liver injury, or viral hepatitis infection. While its underlying cause is not completely understood. NAFLD is strongly associated with type 2 diabetes mellitus and metabolic syndrome. Metabolic syndrome is defined as the presence of three of the following five conditions: abdominal obesity, hypertension, hyperglycemia, hypertriglyceridemia, and decreased serum high-density lipoprotein. In some cases, NAFLD may progress to its more severe manifestation. non-alcoholic steatohepatitis (NASH). which is considered a sub-category of NAFLD. Whereas NAFLD is characterized histologically by macrovesicular hepatic steatosis in greater than 5% of hepatocytes and relatively little inflammation, NASH displays greater lobular inflammation with formation of Mallory bodies, ballooning degeneration of hepatocytes, and hepatic fibrosis. Patients with NAFLD are often asymptomatic. However, patients with NASH may present wiih or progress to symptoms of cirrhosis, including fatigue, malaise, hepatic encephalopathy, abdominal discomfort, esophageal varices, hepatosplenomegaly, and spider angiomata. NAFLD typically presents with normal serum transaminase concentrations, although these may be increased in the setting of cirrhosis. Cirrhosis may also lead to thrombocytopenia and hypoalbuminemia. Laboratory studies should be performed to exclude alternate diagnoses. Abdominal ultrasound or CT scan are useful for identifying hepatic fibrosis. The diagnosis is confirmed with liver biopsy. NAFLD is associated with increased mortality as a result of cardiovascular disease and stroke and is associated with an increased risk for cirrhosis and hepatocellular carcinoma. Initial treatment is with lifestyle modification and management of associated hyperglycemia. hypertension, and hyperiipidemia, while cirrhosis requires liver transplantation. Incorrect Answers: A, B, D, and E. Adverse drug effects (Choice A) can cause hepatotoxicity and can be caused by several medications, including acetaminophen, isoniazid, HMG-CoA reductase inhibitors (statins), and hormonal medications. Liver function testing generally shows increased transaminases. Chronic hepatitis B (Choice B) is associated with right upper quadrant discomfort, fever, nausea, vomiting, diarrhea, increased transaminases, and abnormal serologic studies (eg, HBsAg, Anti-HBs, Anti-HBc) showing titers indicative of the infection. This patient's titers are consistent with prior hepatitis B vaccination. Hepatolenticular degeneration (Wilson disease) (Choice D) results from impaired metabolism of copper. Patients often present with liver dysfunction and neuropsychologic impairment (eg, parkinsonism, ataxia, tremors, dystonia, dementia, hallucinations, and/or personality changes). Prior excessive alcohol use (Choice E) is a common cause of hepatic steatosis and steatohepatitis. A careful history of alcohol use is necessary to distinguish alcoholic from non-alcoholic fatty liver disease. In this patient with no history of alcohol use, NAFLD is more likely.","edu_obj":"Non-alcoholic fatty liver disease (NAFLD) is a common disorder characterized by fatty liver in the absence of other causes. NAFLD is strongly associated with type 2 diabetes mellitus and with metabolic syndrome. NAFLD is characterized histologically by macrovesicular hepatic steatosis in greater than 5% of hepatocytes and minimal inflammation. However, it may progress to a more severe form. non-alcoholic steatohepatitis, which displays greater lobular inflammation with formation of Mallory bodies. ballooning degeneration of l1epatocytes, and hepatic fibrosis, which may lead to cirrhosis."},{"block":4,"item":47,"image_alt":"","image_url":"","stem":"A 3-year-old girl is brought to the physician because of a 4-day history of irritability, vomiting, decreased urinary frequency and volume. and diarrhea. She visited a local petting zoo with her family 1 week ago. Her temperature is 38°C (100.4°F), pulse is 100/min. respirations are 30/min, and blood pressure is 130/100 mm Hg. Physical examination shows pallor. petechiae over the chest. and mild abdominal tenderness. Laboratory studies show: Hemoglobin 5.9 g/dL (N=11-15) Hematocrit 31% (N=28%-45%) Erythrocyte count 3.1 million/mm³ (N=3.9-5.31) Leukocyte count 18,000/mm³ (N=G000-17,500) Reticulocyte count 4.5% (N=0.5%-1.5%) Platelet count 52,000/mm³ (N=150,000-400,000) Serum Urea nitrogen 210 mg/dL (N=5-18) Creatinlne 1.1 mg/dL (N=0.~. 7) Bilirubin. total 2.5 mg/dL (N=0.1-1) Direct 0.2 mg/dL (N=0.0-0.4) Indirect 2.3 mg/dL (N=0.1-0.6) Lactate dehydrogenase 550 U/L (N=120-500) Direct antiglobulln (Coombs) test result is negative. A photomicrograph of a peripheral blood smear is shown. Acetaminophen, amlodipine, and fluid and nutritional support are administered. In addition to thrombi-containing platelet aggregates. which of the following would cause occlusion of small renal vessels in this patient?","choices":{"A":"Elastin","B":"Fibrin","C":"Hemosiderin","D":"lgA                           •","E":"lgE","F":"lgG"},"correct":"B","explanation":"This patient with fever. hemolytic anemia, thrombocytopenia, and acute kidney injury following a diarrheal illness likely has hemolytic uremic syndrome (HUS). HUS is typically seen in children and is often caused by infection with Shiga toxin-producing E. coli (0157:H7). which is usually accompanied by bloody diarrhea. Widespread microvascular thrombosis consumes platelets and predisposes circulating erythrocytes to shearing forces because of a disrupted vascular lumen. When erythrocytes encounter microvascular clots. they become damaged and fragment into schistocytes, which are visible on the peripheral blood smear as fragmented cells. Platelet-fibrin clots also form in the renal vasculature resulting in renal injury. Laboratory evaluation will reveal a hemolytic anemia {decreased hemoglobin, increased LDH, increased reticulocyte count. increased indirect bilirubin), thrombocytopenia, and increased creatinine. In contrast to disseminated intravascular coagulation. prothrombin and partial thromboplastin time will be normal in HUS. Treatment of HUS is supportive, although eculizumab, a human monoclonal lgG antibody against complement protein C5 that prevents formation of the membrane attack complex. has been used in refractory cases. Antibiotics are avoided as they can result in an increased release of Shiga toxin and clinical deterioration. Incorrect Answers: A, C, D, E, and F. Elastin (Choice A) is a protein found in connective tissues. notably the skin, lungs. and elastic ligaments. It can conformationally deform and return to base structure. an important function for tissues requiring flexibility and change of shape or position. Hemosiderin (Choice C) is a pigment from iron that deposits in tissues after hemorrhage or erythrocyte extravasation. Deposition of this pigment from extravasated red blood cells is what gives the skin a bronze appearance in patients with venous insufficiency. lgA (Choice D) is an immunoglobulin that prevents attachment of bacteria and viruses to mucosa! surfaces. lgE (Choice E) is an immunoglobulin associated with hypersensitivity reactions. It binds mast cells and basophils and mediates the release of histamine and inflammatory mediators during type 1 hypersensitivity reactions. lgG (Choice F) is the most abundant immunoglobulin and plays a role in the secondary antibody response to a foreign antigen. lgG functions to opsonize bacteria, fix complement, and neutralize bacterial toxins and viruses.","edu_obj":"Hemolytic uremic syndrome (HUS) is often triggered by infection with Shiga toxin-producing E.coli (0157:H7). It typically presents with the triad of hemolytic anemia, thrombocytopenia. and acute renal failure. Platelet-fibrin rich thrombi form throughout the vasculature and lead to widespread endothelial damage."},{"block":4,"item":48,"image_alt":"","image_url":"","stem":"A 72-year-old woman with mild dementia is brought to the office because of a nosebleed for 2 hours. She has no history of previous bleeding problems. There is no family history of bleeding disorder. She lives in a dilapidated farmhouse infested by rodents and has extensive exposure to rat poisons. Her temperature is 37 .1°C (98.7°F). pulse is 85/min. respirations are 14/min. and blood pressure is 142/92 mm Hg. Physical examination shows bleeding from the left nostril with no petechiae. Laboratory studies show: Hemoglobin 14 g/dL Hematocrit 42% Leukocyte count 5500/mm³ Platelet count 210,000/mm³ Prothrombin time 25 sec (INR=4) Partial thromboplastin time 48 sec Plasma fibrinogen 250 mg/dL (N=2000) Treatment with an infusion of fresh frozen plasma controls the hemorrhage. Which of the following structural modifications in plasma coagulation proteins is most likely absent in this pa![ent?","choices":{"A":"Aggregation into high-molecular-weight polymers","B":"Association with soluble cofactor molecules","C":"Gamma carboxylation of glutamate residues","D":"Rearrangement of disulfide bonds","E":"Removal of N-terminal amino acids","F":"Surface expression of select platelet proteins"},"correct":"C","explanation":"Vitamin K plays a critical role in the synthesis of hepatic coagulation proteins; it is oxidized in the liver during the post-translational gamma carboxylation of glutamate residues on coagulation factors II. VII, IX. X. and proteins C and S It is a co-factor for vitamin K epoxide reductase, which reduces vitamin K following its involvement in glutamate carboxylation. Warfarin is an anticoagulant that interferes with the carboxylation of coagulation factors through inhibition of vitamin K epoxide reductase. A deficiency in vitamin K leads to coagulopathy with increased prothrombin time (PT) and activated partial thromboplastin time (aPTT) and is characterized by easy bruising. Warfarin originated as a rodenlicide, and it and its derivatives are commonly found in rat poisons used today. Incorrect Answers: A. B, D, E. and F. Aggregation into high-molecular-weight polymers (Choice A), namely fibrin formation and platelet aggregation into the fibrin clot. are not affected directly by warfarin. Warfarin interferes with the extrinsic pathway of the clotting cascade but does not interfere with platelet-fibrin interactions. Association with soluble cofactor molecules (Choice B) is not directly affected by warfarin. Heparin is an anticoagulant that functions by promoting the binding of antithrombin Ill to clotting factors Ila, Xa, IXa, Xia. and Xlla. This causes inactivation of those factors. Rearrangement of disulfide bonds (Choice D), which play a critical role in protein stability and structure, is not the mechanism of action of warfarin or other coumarins. Removal of N-terminal amino acids (Choice E) is not a structural modification that is absent in warfarin exposure. The vitamin-K dependent clotting factors have a glutamic acid residue at the N-terminal that is modified post-translation by addition of a carboxyl group. This process is disrupted by warfarin due to impaired vitamin K reduction. Surface expression of select platelet proteins (Choice F) is impaired in exposure to thienopyridines, such as clopidogrel or ticlopidine. which inhibit the P2y12 receptor. The P2y12 receptor is an ADP-mediated. G protein coupled receptor on the platelet surface that increases Gp Ilb/Illa expression when activated.","edu_obj":"Vitamin K plays a critical role in the synthesis of hepatic coagulation factors II. VII. IX, X. and proteins C and S. serving as an oxidizing agent for the post-translational gamma carboxylation of glutamate residues. Warfarin interferes with vitamin K epoxide reductase, which is needed lo reduce the oxidized vitamin K for further synthesis."},{"block":4,"item":49,"image_alt":"","image_url":"","stem":"A 65-year-old woman comes to the office for a follow-up examination. She has chronic kidney disease. hypertension. and type 2 diabetes mellitus. Current medications are llsinopril. atorvastatin, and sltagliplin. She does not smoke or drink alcoholic beverages. Vital signs are within normal limits. Physical examination shows decreased sensation to monofilament over the distal lower extremities. Results of laboratory studies are shown: Hemoglobin 8.7 g/dL Hematocrit 26% Mean corpuscular volume 84 µm³ Reticulocyte count 3.2% Serum Creatinine 2.5 mg/dL Ferritin 198 ng/mL ~ Which of the following is the most likely cause of the laboratory findings in this patient?","choices":{"A":"Decreased erythropoietin production","B":"Decreased liver iron stores","C":"Decreased serum 2,3-bisphosphoglycerate concentration","D":"Increased concentration of autoantibodies","E":"Increased erythrophagocytosis","F":"Increased PCO₂"},"correct":"A","explanation":"This patient with chronic kidney disease (CKD) and anemia likely has decreased erythropoietin (EPO) production. EPO is a hormone produced by the interstitial cells in the renal peritubular capillary bed. It is upregulated in response to hypoxia and stimulates proliferation of erythrocytic progenitors in the bone marrow. In the setting of chronic kidney disease, there is insufficient production of EPO by the kidneys, resulting in diminished bone marrow stimulation and subsequent normocytic. nonhemolytic anemia. Results of laboratory studies will likely show a decreased hemoglobin concentration, normal mean corpuscular volume (MCV). diminished reticulocyte count, normal ferritin, and normal transferrin saturation. Supplemental administration of EPO to patients with chronic renal insufficiency, especially those with end-stage kidney disease, can prevent and treat normocytic anemia. Incorrect Answers: B. C, D. E. and F. Decreased liver iron stores (Choice B) is a characteristic of iron deficiency anemia, and blood loss is the most common cause. Laboratory studies for iron deficiency anemia typically shows a low MCV, low ferritin, and increased total iron binding capacity. Decreased serum 2,3-bisphosphoglycerate concentration (Choice C) is incorrect. One of the body's compensatory mechanisms in chronic anemia is to increase production of 2,3-bisphosphoglycerate. leading to a rightward shift of the oxygen-hemoglobin curve. This results in increased unloading of oxygen to the tissues. Increased concentration of autoantibodies (Choice D) will be seen in autoimmune hemolytic anemia (AIHA), but not in anemia of chronic disease. AIHA occurs as a result of the production of antibodies targeting circulating red blood cell surface antigens, marking them for removal in the reticuloendothelial system or fixing complement leading to intravascular hemolysis. Laboratory studies show a normocytic anemia, increased reticulocyte count, and increased unconjugated hyperbilirubinemia. Increased erythrophagocytosis (Choice E) occurs in extravascular hemolytic anemias such as hereditary spherocytosis, and some autoimmune hemolytic anemias. Laboratory studies will show a normocytic anemia with increased reticulocyte count. Increased PCO₂ (Choice F) may be seen in a variety of conditions, including obstructive lung diseases, hypoventilation. obstructive sleep apnea. and metabolic disorders. Increased PCO₂ does not cause normocytic anemia.","edu_obj":"In the setting of chronic kidney disease. there is insufficient production of erythropoietin by the kidneys, resulting in diminished bone marrow stimulation and subsequent normocytic, nonhemolytic anemia. Results of laboratory studies will likely show a decreased hemoglobin concentration, normal mean corpuscular volume. diminished reticulocyte count. normal ferritin, and normal transferrin saturation."},{"block":4,"item":50,"image_alt":"","image_url":"","stem":"A study is conducted to aissess the effectiveness of an intervention at decreasing the incidence of hypertension. Patients at risk for this disease are enrolled in the study and are assigned to either a group receiving the intervention or a group that does not receive intervention. The hypothesis states that the intervention decreases the annual incidence of hypertension. The table is a conceptual representation of the randomized clinical trial. True Effect In the Population Intervention decreases Intervention does not decrease incidence of hypertension incidence of hypertension Null hypothesis rejected (Intervention effective) A. B. Null hypothesis accepted (intervention ineffective) C. D. Which of the following labeled cells in the table represents a Type II error?","choices":{"A":"A.","B":"B.","C":"C.","D":"D."},"correct":"C","explanation":"A Type II error occurs when a study shows no difference between the null and alternative hypotheses, when in fact, a difference exists. It is known as a \"false negative· error and can be reduced by increasing the power of the study through a larger sample size and increasing precision in measurements. The Type II error rate is calculated by subtracting the power from 100%. A Type II error threshold is set at the beta level. Power, or the likelihood that the investigators will find the difference if it is there. is equal to one minus the beta level. In contrast, a Type I error occurs when the investigator shows a difference that does not actually exist. It is a false-positive error. with the error threshold set at the alpha level. Incorrect Answers: A, B, and D. Choice A shows an appropriate rejection of the null hypothesis. In this example, the null hypothesis is rejected in the setting of a true effect of the intervention. This is indicative of a study that was able to accurately identify a true difference. Choice B is a Type I error. The investigators in this scenario inaccurately rejected the null hypothesis of no difference between the groups, accepting the alternative hypothesis that suggested the intervention was associated with a decreased incidence in hypertension. This difference identified does not actually exist. Choice D shows an appropriate acceptance of the null hypothesis. In this example. there are no significant differences in the intervention arm, which was appropriately identified by the investigators.","edu_obj":"A Type II error occurs when a study shows no difference between the null and alternative hypotheses, when in fact, a difference exists. In contrast, a Type I error occurs when the investigator shows a difference that does not actually exist."}];

let filtered = [];
let answered = {};  // key -> chosen letter
let revealed = {};  // key -> true

function qKey(q) { return `${q.block}-${q.item}`; }

function filterQuestions() {
  const block  = +document.getElementById('blockSelect').value;
  const search = document.getElementById('searchBox').value.toLowerCase().trim();

  filtered = ALL_QUESTIONS.filter(q => {
    if (block && q.block !== block) return false;
    if (search) {
      const hay = (q.stem + ' ' + Object.values(q.choices).join(' ') + ' ' + q.explanation).toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });

  renderList();
  updateProgress();
}

function updateProgress() {
  const total   = filtered.length;
  const done    = filtered.filter(q => revealed[qKey(q)]).length;
  const pct     = total ? Math.round(done/total*100) : 0;
  document.getElementById('progressText').textContent =
    `${done} of ${total} questions reviewed (${pct}%)`;
  document.getElementById('progressFill').style.width = pct + '%';
}

function renderList() {

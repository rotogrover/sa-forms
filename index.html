<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CBSSA Forms 30 &amp; 31</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .index-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 28px;
      margin-top: 28px;
    }
    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }
    .form-card-header {
      background: #1c1a17;
      color: #fff;
      padding: 12px 18px;
      font-family: var(--font-mono);
      font-size: .8rem;
      font-weight: 600;
      letter-spacing: .08em;
    }
    .block-links { padding: 10px 0; }
    .block-links a {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 18px;
      font-family: var(--font-sans);
      font-size: .9rem;
      color: var(--text);
      text-decoration: none;
      border-bottom: 1px solid var(--border-light);
      transition: background .1s;
    }
    .block-links a:last-child { border-bottom: none; }
    .block-links a:hover { background: var(--accent-light); }
    .block-links a span {
      font-family: var(--font-mono);
      font-size: .72rem;
      color: var(--text-muted);
    }
    @media (max-width: 600px) { .index-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<header class="site-header" role="banner">
  <a class="header-brand" href="index.html">CBSSA</a>
  <nav class="block-tabs" aria-label="Forms">
    <a href="form30_block1.html">Form 30</a>
    <a href="form31_block1.html">Form 31</a>
  </nav>
</header>

<main id="top" style="max-width:860px;margin:0 auto;padding:32px 24px 80px;">
  <p class="block-title">CBSSA Self-Assessment Forms</p>

  <div class="index-grid">
    <div class="form-card">
      <div class="form-card-header">FORM 30</div>
      <div class="block-links">
        <a href="form30_block1.html">Block 1 <span>Q1–50</span></a>
        <a href="form30_block2.html">Block 2 <span>Q51–100</span></a>
        <a href="form30_block3.html">Block 3 <span>Q101–150</span></a>
        <a href="form30_block4.html">Block 4 <span>Q151–200</span></a>
      </div>
    </div>
    <div class="form-card">
      <div class="form-card-header">FORM 31</div>
      <div class="block-links">
        <a href="form31_block1.html">Block 1 <span>Q1–50</span></a>
        <a href="form31_block2.html">Block 2 <span>Q51–100</span></a>
        <a href="form31_block3.html">Block 3 <span>Q101–150</span></a>
        <a href="form31_block4.html">Block 4 <span>Q151–200</span></a>
      </div>
    </div>
  </div>
</main>

<footer>CBSSA Forms 30 &amp; 31 &nbsp;·&nbsp; Medical Education Reference</footer>
</body>
</html>

s as a latent infection. EB virus integrates into the B-lymphocyte genome and promotes dysregulated proliferation when active. In acute infection, patients develop infectious mononucleosis, presenting with fever, lymphadenopathy (typically involving the posterior cervical lymph nodes). and hepatosplenomegaly, along with pharyngitis. Latent infection is suppressed by T-lymphocyte regulated immunity, and patients with immunocompromising conditions are at high risk for reactivation. Reactivated EB virus is associated with lymphoproliferative disease, nasopharyngeal and gastric carcinomas, oral hairy cell leukoplakia, and various lymphomas. This patient likely has a lymphoma presenting as a supraclavicular mass caused by malignant transformation of B lymphocytes infected with reactivated EB virus. Incorrect Answers: A, B, C, D, and F. Chronic immune activation of B lympl1ocytes (Choice A) and T lymphocytes (Choice B) occurs in patients wit11HIV infection and promotes viral proliferation. as infected CD4+ lymphocytes spread the virus to other CD4+ cells. This mechanism is associated with premature B lymphocyte senescence, which contributes to the disruption of humeral immunity in patients with chronic infection. Immunologic surveillance for tumor cells is a major component of the host defense against cancer formation. Genetic and environmental conditions that cause inhibition of B-lymphocyte tumor surveillance (Choice C) and T-lymphocyte tumor surveillance (Choice D) can promote the development of various cancers: however. in the setting of HIV infection, lymphoma development due to malignant transformation of B lymphocytes infected with EB virus is the most likely explanation for this patient's presentation. Malignant transformation of T lymphocytes (Choice F) leads to various types of neoplastic T-cell disease, which include T-lymphoblastic lymphoma/leukemia and peripheral T-cell lymphomas such as cutaneous T-cell lymphoma. EB virus promotes malignant transformation in B lymphocytes, not T lymphocytes.","edu_obj":"Patients with immunocompromising conditions have increased risk for malignancies caused by oncogenic viruses such as Epstein-Barr (EB) virus. EB virus is associated with development of leukemia, lymphoproliferative disease, nasopharyngeal and gastric carcinomas. and oral hairy cell leukoplakia in patients with HIV infection."},{"block":2,"item":18,"image_alt":"","image_url":"","stem":"A 10-month-old girl develops a cough and grunting following a 3-day hospital stay for surgical repair of a cleft palate. Her temperature is 39.2°C (102.6°F), and respirations are 40/min. Crackles are heard over most lung fields, and breath sounds are decreased. There is a mild pleural rub in the right upper thorax. Her leukocyte count is 68,000/mm 3 (85% segmented neutrophils. 10% bands, arr,:!less than 5% myeloblasts, promyelocytes. and myelocytes ). Which of the following mechanisms most likely caused the increased leukocyte count in this patient?","choices":{"A":"Accelerated release of cells from the bone marrow postmitotic reserve pool","B":"Decreased margination and rolling of circulating cells","C":"Increased production of myeloblasts in the spleen","D":"Shift in bone marrow from eosinophil production to segmented neutrophil production","E":"Transformation of myeloid stem cells"},"correct":"A","explanation":"Neutrophils are an essential component of the innate immune system, and several factors are involved in regulating the amount in circulation at any time. Neutrophil homeostasis is regulated by the rate of precursor production, intravascular margination (adherence of cells to endothelium), release of mature (postmitotic) neutrophils from reserve pools found in the bone marrow, spleen, and liver, and clearance of neutrophils from circulation. The number of circulating neutrophils can increase rapidly in response to an acute stressor such as infection or inflammation. Most newly circulating neutrophils are released from the bone marrow postmitotic reserve pool. Proinflammatory mediators, including interleukin-1 and tumor necrosis factor, also stimulate accelerated release of immature neutrophils. referred to as bands, which are characterized by a curved, nonlobular nucleus. The increase in band neutrophils in circulation is sometimes called a left shift. Increased immature cell types in the setting of leukocytosis outside of hematologic malignancy is known as a leukemoid reaction. Incorrect Answers: B, C, D, and E. Decreased margination and rolling of circulating cells (Choice B) describes the process by which neutrophils are recruited to a site of inflammation and migrate into the peripheral tissue. The majority of newly circulating mature neutrophils enter circulation from the bone marrow reserve pool. Increased production of myeloblasts in the spleen (Choice C) does not contribute to the leukemoid reaction. The accelerated release of metamyelocytes, myelocytes, and promyelocytes from the bone marrow in response to proinflammatory signaling accounts for the left shift observed in the leukemoid reaction. Shift in bone marrow from eosinophil production to segmented neutrophil production (Choice D) does not account for the rapid increase in circulating neutrophils. The formation of a mature neutrophil from a precursor cell occurs during the course of 1 to 2 weeks. Malignant transformation of myeloid stem cells (Choice E) occurs in acute and chronic myeloid leukemia, which often present with profound leukocytosis.","edu_obj":"The number of circulating neutrophils increases rapidly in the setting of proinftammatory signaling. The majority of newly circulating neutrophils are released from the bone marrow postmitotic reserve pool."},{"block":2,"item":19,"image_alt":"","image_url":"","stem":"A 6-year-old boy Is admitted to the hospital because of fever and celluliUs of his right hand. Examination of the hand shows a 2-cm. erythematous. macular lesion on the dorsum of the right hand. Intravenous treatment with nafcillin is begun. During the next 24 hours, he develops a temperature of 39°C (102.2°F). Blood cultures eventually grow methicillin-reslstant Staphylococcus aureus. Production of which of the following most likely caused this organism's resistance to methicillin?","choices":{"A":"Altered porins in the cell envelope","B":"Antibiotic efflux pump","C":"Increased production of folate","D":"New penicillin-binding protein","E":"Penicillinase"},"correct":"D","explanation":"Cellulitis, infection of the epidermis, dermis, and/or hypodermis, is frequently caused by gram-positive bacteria, including staphylococcal and streptococcal species. Over time. methicillin-resistant Staphylococcus aureus (MRSA) species have acquired resistance to the penicillin family of antibiotics after developing a new penicillin-binding protein. When infection is suspected or confirmed. a culture should be collected. Once bacterial culture data is available, the prescribed antibiotic regimen can be adjusted to target MRSA if it is present. Common antibiotics used to treat MRSA infection include doxycycline, trimethoprim-sulfamethoxazole. or vancomycin. Incorrect Answers: A, B, C. and E. Altered porins in the cell envelope (Choice A) would allow the passive transport of hydrophilic molecules through the outer membranes of gram-negative organisms (or cell membranes in general, as a class of proteins). Serratia marcescens, Klebsiel/a pneumoniae, and Pseudomonas species have demonstrated 13-lactamresistance via mutations in genes coding for porins. It is not the most frequent mode of resistance 1nMRSA. An altered antibiotic efflux pump (Choice B) would lower intracellular concentrations of antibiotics. Tetracycline resistance in Escherichia coli species is a classic example of resistance through this mechanism. Increased production of folate (Choice C) by dihydrofolate reductase would allow for increased synthesis of purines needed for cell growth and division. Trimethoprim targets dihydrofolate reductase leading to decreased folate synthesis. overproduction of dihydrofolate reductase leads to resistance to trimethoprim. Penicillinase (Choice E) and 13-lactamasesare the main modality of resistance to 13-lactamantibiotics (eg, penicillin, ampicillin) in gram-negative bacteria. Commonly, the genes encoding tJ-lactamase enzymes are transferred on plasmids between bacteria. These enzymes inactivate β-lactam antibiotics and are a common mode of resistance to the 13-lactamclass.","edu_obj":"Bacteria demonstrate different modes of acquiring antibiotic resistance leading to differing clinical patterns of virulence. Methicillin-resistant staphylococci have developed resistance to the penicillin family of antibiotics due to the development of penicillin-binding proteins, rendering these antibiotics less effective. Empiric treatment for methicillin-resistant Staphylococcus aureus (MRSA) or adjusting antibiotic regimens based on bacterial culture data can allow for adequate treatment of MRSA infection."},{"block":2,"item":20,"image_alt":"","image_url":"","stem":"A 33-year-old man comes to the physician with his wife for a routine health maintenance examination. His medical records show that he has a 10-year history of alcoholism. The patient minimizes the amount and impact of his drinking and says. ·1 do not have a drinking problem.\" However. further questioning suggests a continuing dependence on alcohol. Physical examination shows mild tremulousness, palmar erythema, and a palpable liver edge. Which of the following actions by the physician Is most appropriate?","choices":{"A":"Ask the patient to attend a few 12-step program meetings before his next appointment","B":"Ask thatient's wife to encourage him to stop drinking","C":"Express concern about the drinking and ask the patient to return after thinking about it","D":"Say nothing further about the drinking but schedule a follow-up appointment","E":"Tell the patient he will need to find another physician if he continues to drink"},"correct":"C","explanation":"This patient with longstanding alcohol use disorder is displaying physical examination signs of liver disease (palpable liver edge and palmar erythema) and mild alcohol withdrawal (tremulousness). However, the patient appears precontemplative about changing his drinking habits, which is closely related to his lack of insight about his alcohol use being a problem. Given this lack of insight, it is appropriate for the physician to provide education about how alcohol affects this patient's health. However, it is important that physicians are not overly directive in making treatment recommendations to patients who are unaware of a problem. Tl1e stages of behavioral change are used to define a patient's readiness to change a health-related behavior. In sequential order, the stages of behavioral change are precontemplation, contemplation, preparation, action, maintenance, and termination. Physicians aim to move patients through these stages over time with an interview technique called motivational interviewing. Motivational interviewing involves using open-ended, nonjudgmental questions to help the patient explore their reasons for wanting to change or maintain the habit. This physician is encouraging the patient to reflect on his drinking and make his own choices, wt1icll is consistent with motivational Interviewing strategies. Incorrect Answers: A, B. D, and E. Ask the patient to attend a few 12-step program meetings before his next appointment (Choice A) or ask the patient's wife to encourage him to stop drinking (Choice B) represent paternalistic approaches given that the patient is precontemplative about changing his drinking habits. He will likely react defensively and may not attend future appointments. Additionally. paternalistic approaches are less effective in promoting behavior change. Say nothing further about the drinking but schedule a follow-up appointment (Choice D) is unlikely to increase this patient's insight about the harmful health effects of drinking. The physician should mention the patient's alcohol use during motivational interviewing. Tell the patient he will need to find another physician if he continues to drink (Choice E) is a paternalistic approach that constitutes abandonment. It would violate the principle of doing no harm, as the patient may take time to find a new physician while atso having liver disease that needs monitoring, workup, and treatment. Finally. this approach would likely decrease the patient's candor about drinking with other physicians.","edu_obj":"When a patient is unaware of a health problem, the physician should provide education to improve the patient's insight and motivational interviewing to increase the patient's readiness for behavioral change."},{"block":2,"item":21,"image_alt":"","image_url":"","stem":"An 85-year-old man develops fever. chills, and a cough productive of thick brownish sputum while in the hospital for treatment of a hip fracture. His temperature is 37.7°C (100°F). A chest x-rayshows bilateral infiltrates in the lower lobe. Serum studies show a creatinine concentration of 0.8 mg/dL. A sputum culture grows Pseudomonas aeruginosa. Combination drug treatment is initiated. Five days later, his serum creatinine concentration is 2 mg/dL. Which of the following drugs is the most likely cause of these laboratory findings?","choices":{"A":"Ampicillin","B":"Aztreonam","C":"Ciprofloxacin","D":"Erythromycin","E":"Gentamicin"},"correct":"E","explanation":"Gentamicin, an aminoglycoside antibiotic, is commonly used to treat neonatal sepsis, meningitis, and pneumonia, as well as pelvic inflammatory disease, endocardi!is, and osteomyelitis. though it has many broad uses. The bactericidal function of aminoglycosides comes from the inhibition of the 30S subunit of the bacterial ribosome, which precludes protein synthesis by causing misreading of mRNA. Aminoglycoside usage may cause nephrotoxicity, ototoxicity, or neuromuscular damage. It should not be used during pregnancy as it is also a teratogen. This patient's acute kidney injury alter antibiotic usage is most likely caused by an aminoglycoside antibiotic such as gentamicin. Incorrect Answers: A, B, C, and D. Ampicillin (Choice A) can cause gastrointestinal distress such as diarrhea. It would be less likely to cause acute kidney injury. Aztreonam (Choice B) can cause gastrointestinal distress such as nausea, vomiting, diarrhea. and stomach discomfort. Adverse effects of fluoroquinolones such as ciprofloxacin (Choice C) include gastrointestinal distress, tendonitis with risk for tendon rupture, and QT prolongaiion. Erythromycin (Choice D) functions by binding to the bacterial SOSribosomal subunit and preventing bacterial protein synthesis. The most frequeni side effects of erythromycin are gastrointestinal-related, such as nausea, vomiting, abdominal pain, and diarrhea. They also increase gastrointestinal motility and are known to cause rash.","edu_obj":"Gentamicin is an aminoglycoside antibiotic, which can cause nephrotoxicity, ototoxicity, teratogenicity, or neuromuscular damage."},{"block":2,"item":22,"image_alt":"","image_url":"","stem":"A 6-month-old boy is brought to the emergency department after being found unresponsive in his crib. He is successfully resuscitated. His serum glucose concentration is 20 mg/dL. Urine contains dicarboxylic acids; there are no ketones. The most likely cause of these symptoms is a defect in which of the following?","choices":{"A":"Amino acid catabolism","B":"Fatty acid f3-oxidation","C":"Gluconeogenesis","D":"Glycogen storage","E":"Glycolysis"},"correct":"B","explanation":"Long-chain acyl-CoA dehydrogenase is an enzyme involved in the beta oxidation of fatty acids. Deficiency of this enzyme is generally inherited in an autosomal recessive fashion; it results in the accumulation of long-chain fatty acids in the mitochondrial matrix. It is characterized by two forms: an early-onset form that results in severe, life- threatening cardiomyopatlly, and a later-onset form that is characterized by episodes of symptomatic hypoglycemia. Signs and symptoms may include irritability, lethargy, hepatomegaly (caused by excess lipid accumulation), and hypoglycemia. Symplomatic episodes can be triggered by illness. fasting, stress, or exercise. Hypoglycemia occurs without the production of ketones due to impaired fatty acid degradation and ketone body production since there is deficient production of acyl CoA from long-chain fatty acids. Immediate treatment involves correction of the patient's hypoglycemia, while long-term management involves preventing acute episodes of hypoglycemia and dietary supplementation with medium-chain fatty acids, which will use medium-chain acyl-CoA dehydrogenase for beta oxidation, circumventing the patient's enzymatic deficiency for long-chain fatty acid beta oxidation. Incorrect Answers: A, C, D, and E. Amino acid catabolism (Choice A) impairments, such as in maple syrup urine disease, are characterized by a buildup of the branched-chain amino acids leucine, isoleucine, and valine. Increased concentrations of isoleuclne give the urine its characteristic maple smell, and Increased concentrations of leucine account for many of tile neurologic complications such as lethargy and hypotonia. Gluconeogenesis (Choice C) dysregulation or metabolic deficiency, such as in phosphoenolpyruvate carboxykinase deficiency, can lead to hypoglycemia. In this condition, the irreversible conversion of oxaloacetate to phosphoenolpyruvate is impaired. Deficiency can lead to hypoglycemia, failure to thrive, hepatomegaly, and lactic acidosis. Treatment includes a diet with simple carbohydrates, especially during periods of fasting, illness, or exercise. Glycogen storage (Choice D) disease, such as von Gierke disease, is secondary to glucose 6-phosphatase deficiency and is characterized by excess glycogen in the liver, fasting hypoglycemia, increased concentrations of triglycerides and uric acid, and hepatomegaly. Pyruvate kinase catalyzes the final regulatory step in glycolysis (Choice E) and converts phosphoenolpyruvate to pyruvate. Red blood cells depend on anaerobic respiration and the production of adenosine triphosphate from glycolysis; thus, pyruvate kinase deficiency presents with hemolysis.","edu_obj":"Long-chain acyl-CoA dehydrogenase deficiency is an autosomal recessive disorder of fatty acid metabolism. Signs and symptoms include irritability, lethargy, hepatomegaly (caused by excess lipid accumulation), and hypoglycemia. Episodes can be triggered by illness. fasting, stress, or exercise. Immediate treatment involves correction of hypoglycemia, while long-term management involves preventing acute episodes of hypoglycemia and dietary supplementation with medium-chain fatty acids."},{"block":2,"item":23,"image_alt":"","image_url":"","stem":"A 48-year-old woman comes to the physician for a routine health maintenance examination. She says that she is beginning menopause because she has had irregular menstrual periods over the past year. She asksUhe physician if \"the change of life\" will make her irritable, depressed, and lose interest in sexual intercourse. Which of the following responses by the physician is most appropriate?","choices":{"A":"\"As you age, it is normal to have less interest in sex.\"","B":"\"Hot flashes and personality changes are part of the menopause experience, but some of the newer antidepressants will make you feel better.\"","C":"\"Most women go through menopause without experiencing disabling changes in their emotions or sexual interest.\"","D":"\"Starting hormone replacement therapy soon will decrease both menopausal symptoms and decrease the risk for heart disease.\"","E":"\"These days, we can use hormone replacement therapy to prevent all the symptoms of menopause.\""},"correct":"C","explanation":"Menopause refers to the absence of menstruation caused by a diminution in ovarian reserve. On average, it begins around age 50 years. While menopause is defined by the absence of menstruation for 12 months, symptoms can begin before menstrual cessation. Symptoms include hot flashes, night sweats, loss of libido, and vaginal atrophy or dryness. Mood and sleeping patterns may also be affected. In most women, vasomotor symptoms are more common than mood changes. Thus. it is appropriate for the physician to reassure this patient that most women go through menopause without experiencing disabling changes in their emotions or sexual interest. While menopause is commonly a clinical diagnosis, laboratory studies will show a decreased estradiol concentration due to ovarian exhaustion, with a consequent increase in follicle-stimulating hormone. As symptoms of menopause are secondary to estrogen deficiency, which can also increase the risk for a variety of other health problems such as osteoporosis, hormone therapy with supplemental estrogen is often considered. While estrogen therapy does relieve some symptoms, primarily the vasomotor symptoms, it is not without risk. Prolonged exposure to unopposed estrogen can increase the risk for endometrial cancer, cardiovascular disease, thromboembolism, and breast cancer. The recommended duration of use is limited to 3 to 5 years for these reasons. Incorrect Answers: A, B, D, and E. The other statements offered are incorrect. Many women do not experience changes in their sexual drive as they age (Choice A). though they may experience vaginal atrophy and dryness secondary to decreased estrogen concentrations. These symptoms can be treated with lubrication or with intravaginal estrogen. While some antidepressants are effective for helping manage the vasomotor symptoms associated with menopause (Choice B), such as serotonin/norepinephrine reuptake inhibitors (SSRls/SNRls), they are not always effective in treating other symptoms. Additionally, not all women experience hot flashes or personality changes. and SSRls/SNRls may reduce sexual interest. Hormone replacement therapy may treat vasomotor symptoms as well, but it comes with an increased, rather than decreased, risk for heart disease (Choice D). Finally. hormone replacement therapy does not treat all the symptoms of menopause (Choice E). It is most effective for the vasomotor symptoms, such as hot flashes and night sweats.","edu_obj":"Menopause commonly occurs at approximately age 50 years with symptoms including hot flashes. night sweats, loss of libido, vaginal atrophy or dryness, mood changes, and sleep disturbances, although these symptoms may begin before menstrual cessation. Not all women experience these symptoms, and the severity of symptoms differs vastly among patients, with most women progressing through menopause without disabling changes in their emotions or sexual interest. Hormone replacement therapy can treat the vasomotor symptoms of menopause but increases the risk for endometrial cancer, cardiovascular disease, thromboembolism, and breast cancer."},{"block":2,"item":24,"image_alt":"","image_url":"","stem":"An obese 45-year-old man comes to the physician because of a 3-week history or nausea. vomiting. abdominal cramps. and diarrhea. He has a 3-week history or flushing and shortness of breath,fis temperature is 37.4°C (99.3°F), pulse is 74/min, respirations are 15/min, and blood pressure is 156/90 mm Hg. Bilateral wheezing is heard on auscultatio,,. A grade 3/6 systolic cardiac murmur is heard. Physical examination shows hepatomegaly and a palpable midabdominal nontender mass. A CT scan of the abdomen shows a 3-cm mId1leaImass and hepatomegaly with a single 5-cm mass. The mass in the 1IeumIs resected. Gross and microscopic appearances of the resected mass are shown. Which of the following is most likely secreted in measurable quantities from this patient's lesion?","choices":{"A":"CA 19.9","C":"Carcinoembryonic antigen","D":"5-Hydroxyindoleacetic acid","E":"Vanillylmandelic acid"},"correct":"D","explanation":"5-Hydroxyindoleacetic acid (5-HIM) is the primary metabolite of serotonin. Increased urine concentration of 5-HIM is suggestive of carcinoid syndrome, a rare disorder resulting from high levels of serotonin production by a carcinoid tumor. carcinoid tumors are neuroendocrine cell neoplasms often found in the gastrointestinal tract, though they can occur in the lungs as well. Normally, the liver eliminates serotonin secreted by a primary gastrointestinal carcinoid tumor. However, if the cancer has metastasized or if the primary lesion has developed outside of the gastrointestinal tract, then active serotonin enters the systemic circulation and manifests as carcinoid syndrome. Symptoms include weight loss, flushing, diarrhea, bronchospasm, right-sided cardiac valvular disease. and abdominal pain. Physical examination may show erythema, wheezing, and a cardiac murmur dependent on which valve is involved (tricuspid valve is commonly affected). Diagnosis can be confirmed by measuring urine concentration of 5-HIM. Additional diagnostic information can be obtained from CT scan or octreotide scintigraphy to localize the tumor and evaluate for metastatic disease. Treatment consists of surgical resection and medical therapy with octreotide (a somatostatin analog). Incorrect Answers: A, B. C, and E. CA 19.9 (Choice A) is a marker for pancreatic cancer. Pancreatic cancer may present with fatigue, weight loss, superficial thrombophlebitis (Trousseau sign), jaundice, and painless palpable gallbladder (Courvoisier sign). Pancreatic cancer often presents late in disease course, and overall prognosis is poor. CA 125 (Choice B) is a tumor marker generally used in diagnosis and management of ovarian carcinoma. Ovarian carcinoma presents indolently, typically in an older, postmenopausal female, with increasing abdominal distension and weight loss. Carcinoembryonic antigen (Choice C) is a nonspecific tumor marker for colon and pancreatic cancer. This marker can be used to support cancer diagnosis and monitor clinical response to therapy in colon cancer. Vanillylmandelic acid (Choice E) is a metabolite of catecholamines including dopamine, epinephrine, and norepinephrine. This metabolite is useful in the diagnosis of catecholamine producing tumors, such as pheochromocytoma.","edu_obj":"Carcinoid syndrome results from increased levels of circulating serotonin, commonly caused by a carcinoid tumor that has metastasized from the gastrointestinal tract, or less commonly because of a primary carcinoid tumor of non-gastrointestinal origin. Diagnosis is supported by measuring the concentration of the serotonin metabolite 5-Hydroxyindoleacetic acid (5-HIM). Treatment for carcinoid syndrome includes surgical resection and medical therapy with octreotide."},{"block":2,"item":25,"image_alt":"","image_url":"","stem":"A 25-year-old man is brought to the emergency department by his wife because of confusion for 8 hours. His wife says that he consumed an excessive amount of alcohol at a party the night before, but he does not use illicit drugs. She adds that he had not eaten anything for the preceding 24 hours. Physical examination shows no abnormalities, and neurologic examination shows no focal findings. He is not oriented to person, place, or time. His symptoms are relieved by intravenous administration of 50% glucose. This patient most likely had a limited glucose production because of which of the following changes In hepatic metabolism?","choices":{"A":"Decreased inorganic phosphate","B":"Decreased lactate","C":"Decreased NADH","D":"Increased inorganic phosphate","E":"Increased lactate","F":"Increased NADH"},"correct":"F","explanation":"This patient presents with symptoms of hypoglycemia following consumption of alcohol that are reversed with administration of glucose. Hypoglycemia is a common occurrence following consumption of alcohol, particularly under fasting conditions. and is mediated largely by the effects of ethanol metabolism within hepatocytes. Ethanol is metabolized by alcohol dehydrogenase to acetaldehyde during a reaction that requires the reduction of NAO+ to NADH. Acetaldehyde is further metabolized by aldehyde dehydrogenase to acetic acid, a reaction which similarly involves the reduction of another NAO+ to produce a second NADH molecule. This relative increase in the formation of NADH reduces the intracellular availability of NAO+. inhibiting several metabolic steps that are necessary for hepatic gluconeogenesis. Hepatic gluconeogenesis involves mitochondrial conversion of pyruvate to oxaloaoetate and malate. which is then converted within the cytosol to oxaloacetate again by malate dehydrogenase ma reaction that requires the reduction ot NAO' to NAOH. In the absence ot available pyruvate, such as in the tasting state, lactic acid can also be converted to pyruvate by lactate dehydrogenase, but this reaction also requires the reduction of NAO+ to NADH. In both instances, the absence of NAO+ and relative increase of NADH leads to an inability to produce phosphoenolpyruvate and inhibition of gluconeogenesis. There are multiple additional mechanisms of hypoglycemia in the setting of acute and/or chronic alcohol use disorder, including preferential selection of alcohol over food (and therefore, malnutrition and limited glycogen stores). hepatic metabolic dysfunction. malabsorption, and pancreatic dysfunction limiting release of insulin, which promotes glycogen storage, and glucagon, which promotes gluconeogenesis. lncorrectAnswers:A. B. C, D. and E. Decreased inorganic phosphate (Choice A) is incorrect. While acute alcohol intoxication following a period of fasting may present with hypophosphatemia, particularly in patients with chronic alcohol use disorder, this does not underlie the mechanism of hypoglycemia in these patients. Decreased lactate (Choice 8) is incorrect. The failure of hepatic gluconeogenesis in the setting of alcohol intoxication is rather due to decreased NAD+. Patients with acute alcohol intoxication typically have normal or increased serum lactic acid concentrations. Decreased NADH (Choice C) is incorrect. Ethanol metabolism produces NADH, rather than consuming it. Increased inorganic phosphate (Choice D) is incorrect. Patients with excessive alcohol use and poor oral nutritional intake are more likely to present with hypophosphatemia. Increased lactate (Choice E) is incorrect. While increased NADH concentrations may theoretically promote the conversion of pyruvate to lactic acid by lactate dehydrogenase, this does not typically occur to clinically significant degrees in patients with alcohol intoxication. Absence of NAD+ and relative increase in NADH, rather than pyruvate, underlies the inhibition of hepatic gluconeogenesis under these conditions.","edu_obj":"The metabolism of ethanol by alcohol dehydrogenase and aldehyde dehydrogenase produces an increased concentration of NADH within hepatocytes. The maintenance of blood sugar in the fasting state is dependent on hepatic gluconeogenesis, which requires NAD+ in reactions catalyzed by malate dehydrogenase and lactate dehydrogenase. As a result of the increased hepatocyte NADH/NAD+ ratio, alcohol consumption can lead to profound hypoglycemia in the fasting state due to inhibition of hepatic gluconeogenesis."},{"block":2,"item":26,"image_alt":"","image_url":"","stem":"A 55-year-old man comes to the physician because of a rash on his face and body 2 weeks after undergoing allogeneic hematopoietic cell transplantation for multiple myeloma. Physical examination shows a maculopapular rash over the cheeks, upper trunk, and palms. Histologic examination of a section of this patient's affected skin is most likely to show basal keratinocytes undergoing which of the following processes?","choices":{"A":"Apoptosis","B":"Hyperplasia","C":"Hypertrophy","D":"Metaplasia","E":"Necrosis"},"correct":"A","explanation":"Acute graft-versus-host disease (GVHD) is common in patients following hematopoietic stem cell transplantation. Common findings in acute GVHD include fever, maculopapular rash with follicular accentuation, diarrhea, and transaminitis. Acute GVHD should be suspected in patients with any of these symptoms following a recent bone marrow transplantation. Acute GVHD is the result of donor T lymphocytes mounting an immune response against host cells. Basal keratinocytes are triggered to undergo apoptosis by donor T lymphocytes through initiation of the Fas-ligand pathway. Apoptosis of basal keratinocytes can be seen on skin biopsy. Cells undergoing apoptosis shrink, causing the cytoplasm to appear eosinophilic, the nucleus condenses and fragments, and cellular debris is removed by macrophages without triggering significant inflammation. The risk for GVHD can be attenuated prior to transplantation by matching donors and recipients for human leukocyte antigen (HLA) loci. Medications used in the treatment of GVHD act either by directly inhibiting production of T lymphocytes or by suppressing the normal function of these cells. Examples include mycophenolate mofetil. which inhibits the synthesis of nucleotides needed for lymphocyte proliferation; etanercept, a tumor necrosis factor (TNF)-alpha receptor inhibitor; pentostatin, a purine analog that inhibits T lympt1ocyte proliferation; sirolimus, which inhibits mammalian target of rapamycin (mTOR) to suppress T lympl1ocyte proliferation; and anti-thymocyte globulin, which directly targets T lymphocytes. Incorrect Answers: B, C, D, and E. Hyperplasia (Choice B), increased cell division, and hypertrophy (Choice C). increased cell size, result as a response to external or internal stress. In GVHD, cells are targeted by donor T lymphocytes and undergo apoptosis. rather than hyperplasia or hypertrophy. Melaplasia (Choice D), change in cell type, allows cells lo adapt lo an external pressure over lime. Under persistent stress, metaplasia can evolve into dysplasia or irregular cell growth leading to precancerous and cancerous conditions. An example is intestinal metaplasia seen in the distal esophagus in chronic acid reflux (eg, Barrett esophagus). If the stressor is removed, cells may revert to their initial cell type. Necrosis (Choice E) is unregulated cell death that may be triggered by anoxia, toxin exposure, or conditions that lead to irreversible cellular organelle and membrane injury. In the setting of necrosis, biopsy shows significant inflammation.","edu_obj":"Acute graft-versus-host disease is common following stem cell transplantation, and manifestations may include fever. rash, diarrhea, and transaminitis. This condition is often the result of human leukocyte antigen (HLA) mismatch, leading to donor T lymphocytes triggering a response against host cells. Prompt diagnosis and treatment of this condition is important due to significant associated morbidity and mortality."},{"block":2,"item":27,"image_alt":"","image_url":"","stem":"A 30-year-old woman, gravida 2. para 2, with epithelial ovarian cancer comes to the office to begin her first cycle of a planned six cycles of paclitaxel therapy. This treatment is designed to produce drug-induced arrest at which of the following cell cycle checkpoints?","choices":{"A":"DNA damage","B":"DNA replication","C":"G 1 to S transition","D":"Restriction point","E":"Spindle formation"},"correct":"E","explanation":"The normal cell cycle in somatic cells involves several phases: G 1, S, G2, and M. Go phase denotes cell cycle arrest. During the G 1 phase, the cellular contents, except for the chromosomes, are replicated. In S phase, chromosomal duplication by way of DNA replication occurs; in G 2 phase, the fidelity of replication is checked. M phase, or mitosis, involves the attachment of chromosomes to spindles followed by their separation and division into two identical cells, with the stages of M phase denoted as prophase, prometaphase, metaphase. anaphase, and telophase. The phases of the cell cycle are regulated by checkpoints and regulatory proteins to prevent indefinite cell proliferation. When the regulatory proteins involved in these phases and checkpoints are mutated, rapid cell proliferation can occur, and malignancy can develop. Thus, these cell phases are often targeted by cytotoxic chemotherapeutic agents. Paclitaxel specifically targets microtubules, enhancing their assembly and preventing their rearrangement and breakdown. This impairs spindle formation. which subsequently prevents the cell from replicating. Adverse effects of paclitaxel include bone marrow suppression and neuropathy as a result of its effects on rapidly dividing cells. Incorrect Answers: A, B, C, and D. DNA damage (Choice A) is assessed during the cell cycle prior to the cell undergoing mitosis. This prevents damaged genetic material from being transferred to a new cell. Paclitaxel does not affect the mechanisms used lo evaluate replicated DNA. DNA replication (Choice B) occurs during S phase. Many chemotherapeutic agents function by impairing DNA synthesis. For example, 5-fluorouracil is an antimetabolite that impairs DNA synthesis by decreasing thymidine synthesis. Paclitaxel does not impair DNA synthesis. G 1 to S transition (Choice C), or the restriction point (Choice D), is the point at which a cell has become devoted to undergoing division. This transition point is regulated by proteins such as cyclins, p53, and transcription factor E2F. It is not affected by paclitaxel.","edu_obj":"The cell cycle consists of several phases, including G 1. S, G2, and M, which are carefully regulated by checkpoints and regulatory proteins. When mutations occur in these regulatory proteins. uncontrolled cell growth can occur and malignancy can develop, thus making these phases and proteins prime targets for chemotherapeutic agents. For example, paclitaxel impairs spindle formation. which prevents DNA from being separated into daughter cells and thereby limiting cellular division."},{"block":2,"item":28,"image_alt":"","image_url":"","stem":"A 70-year-old man comes to the physician because of a 1-month history of heavy, pressing substernal chest pain that occurs when he walks up a flight of stairs. The symptoms are relieved by rest. The physician prescribes a drug to alleviate the symptoms. Within the cell, the drug acts by breaking down into a compound that binds to a protein to increase intracellular concebtrations of cGMP, resulting in vasodilation. This binding most likely occurs in which of the following cell locations?","choices":{"A":"Cytosol","B":"Golgi complex","C":"Mitochondria","D":"Nucleus","E":"Peroxisome","F":"Plasmamembrane"},"correct":"A","explanation":"The physician has likely prescribed nitroglycerin, which acts within the cytosol of vascular smooth muscle cells by releasing nitric oxide (NO). This activates guanylate cyclase and increases cGMP, leading to smooth muscle relaxation and vasodilation. Muscle contraction occurs when myosin light chains in muscle cells are phosphorylated, leading to cross-bridge formation between myosin heads and actin filaments. This reaction is performed by myosin light chain kinase (MLCK). This process is opposed by myosin light chain phosphatase (MLCP), which dephosphorylates the myosin light chains resulting in decreased smooth muscle tone (eg, smooth muscle relaxation). MLCP is upregulated by cGMP, leading to increased myosin light chain dephosphorylation. decreased vascular smooth muscle tone, and vasodilation. Nitroglycerin, along with other organic nitrates, is a potent venodilator. which reduces cardiac preload and myocardial oxygen demand, making it a first-line therapy in the treatment of angina pectoris. Incorrect Answers: B, C, D, E, and F. Golgi complex (Choice B) is an organelle that transports, modifies, and packages proteins. Soluble guanylate cyclase, the enzyme activated by NO, is found in the cytosol. Mitochondria (Choice C) are responsible for producing energy for the cell in the form of adenosine triphosphate. Various toxins and medications affect mitochondrial function, predominantly impairing cellular respiration and energy production. Nucleus (Choice D) is the site of DNA storage, replication. and gene expression. The nitrite ion released by nitroglycerin acts on guanylate cyclase in the cytosol. Peroxisome (Choice E) is a membrane-bound organelle located in the cytosol. It serves as a site for oxidative metabolic functions and some parts of lipid metabolism. Plasma membrane (Choice F) proteins are common targets for medications as they can modulate cell signaling and behavior. Nitrates release nitric oxide. which passively diffuses across the cell membrane.","edu_obj":"Nitroglycerin is a potent vasodilator used in the acute management of angina pectoris. It acts by stimulating guanylate cyclase in the cytosol of vascular smooth muscle cells, leading to increased cGMP formation and smooth muscle relaxation."},{"block":2,"item":29,"image_alt":"","image_url":"","stem":"A 30-year-old man comes to the physician for a routine health maintenance examination. Physical examination shows no abnormalities. Laboratory studies show an increased serum creatinine concentration. Renal ultrasonography shows multiple cysts involving both kidneys. Renal ultrasonography of the patient's father shows cystic kidneys; his serum creatinine concentration is within the reference range. Similar examination of the patient's mother showed no abnormalities. Which of the following genetic mechanisms best explains the findings in this family?","choices":{"A":"Anticipation","B":"Decreased penetrance","C":"Heteroplasrny","D":"Pleiotropy","E":"Variable expression"},"correct":"E","explanation":"Autosomal dominant polycystic kidney disease is caused by genetic mutations in polycystin (PKD1 or PKD2) that result in the development of multiple large cysts in the kidney due to structural abnormalities of the renal tubules. These cysts generally form in adulthood in the autosomal dominant variant and eventually compress adjacent normal renal parenchyma. Autosomal dominant polycystic kidney disease is inherited with complete penetrance and variable expression signifying that all family members who inherit the mutation manifest the disease but may demonstrate different phenotypic presentations. Patients can present with flank pain, hematuria, hypertension, and progressive chronic kidney disease. The disease is associated with aneurysmal vascular disease such as berry aneurysms, mitral valve prolapse, and hepatic cysts. Patients may experience complications of chronic hypertension and chronic kidney disease. Incorrect Answers: A, B, C, and D. Anticipation (Choice A) is a genetic phenomenon whereby each affected generation manifests the symptoms of the disease at an earlier age. It is most common in diseases caused by abnormal trinucleotide repeats such as Huntington disease and occurs because of expansion of these repeats through successive generations. Symptoms may not only present earlier but may also be more severe. With decreased penetrance (Choice B), not all individuals witl1 the genotype will manifest the disease. By contrast, in a disease with 100% penetrance, an individual with the genotype will demonstrate the phenotype of the disease in all cases, which is generally true of autosomal dominant polycystic kidney disease (eg, complete penetrance). Heteroplasmy (Choice C) refers to the presence of more than one type of mitochondrial DNA (mtDNA) in a cell. Each cell contains many mitochondria. but the differential presence of mitochondria with mutated versus normal mtONA can determine the severity and clinical manifestations of mitochondrial diseases. Pleiotropy (Choice D) refers to genes that influence one or more different and seemingly unrelated traits. One example is phenylKetonuria, which is caused by mutations that affect phenylalanine hydroxylase, resulting in failure to convert phenylalanine to tyrosine Neurologic manifestations are a result of accumulated phenylalanine, but tyrosine is also a precursor to melanin. so patients commonly have fair skin and hair.","edu_obj":"Variable expressivity refers to genetically inherited conditions that have different phenotypes despite identical underlying mutations. An example is autosomal dominant polycystic kidney disease, which can manifest with a spectrum of disease."},{"block":2,"item":30,"image_alt":"","image_url":"","stem":"A 70-year-old man is brought to the emergency department because of a 3-day history of fever and progressive shortness of breath. He also has a history of cough productive of yellow sputum that has recently become thick and green. He has smoked 1 to 2 packs of cigarettes daily for 40 years. His temperature is 40°C (104°F), and respirations are 22/min. Physical examination shows decreased breath sounds. A chest x-ray shows right lower lobe infiltrates surrounding a 3-cm, rounded lesion containing an air-fluid level. Which of the following immune cell activities most likely predominates in the center of this lesion?","choices":{"A":"B-lymphocyte antibody production","B":"Macrophage free-radical generation","C":"Natural killer cell-mediated killing","D":"Segmented neutrophil acid hydrolase activation","E":"T-lymphocyte perforin synthesis"},"correct":"D","explanation":"This patient with fever, shortness of breath, and a cavilary lesion with an air-fluid level on chest x-ray has a presentation concerning for a lung abscess. Lung abscesses are classically caused by aspiration of oral secretions leading to pneumonia and ultimately result in necrosis and cavitation of the lung parenchyma. Patients with a lung abscess may present with a cough productive of foul-smelling sputum, fever, malaise. and shortness of breath. X-ray may show a cavitary lesion with an air-fluid level. Lung abscesses may be mono- or polymicrobial, with the most isolated pathogens being streptococci and anaerobes. If the infection is polymicrobial, commonly isolated organisms include Staphylococcusaureus, K/ebsiellapneumoniae,and gram-negative bacilli. Lysozyme is an acid hydrolase that is part of the innate immune system. It is found in bodily secretions such as tears, saliva, and breastmilk, and is also found in cytoplasmic granules of neutrophils. Lysozyme catalyzes the hydrolysis of the peptidoglycan component or the bacterial cell wall, leading to bacterial cell death. It would likely predominate in the lesion due to neutrophilic attack on proliferating bacteria. Incorrect Answers: A B, C, and E. B-lymphocyte antibody production (Choice A) is an example of adaptive immunity. In response to bacterial infections, B-lymphocytes produce antibodies that play a role in bacterial opsonization and subsequent phagocytosis. Antibodies against bacterial toxins may also be made. While antibody production would take place in this patient, it is not the predominant activity that would occur in the center of the lesion; rattier, it would occur in plasma cells and lymphatic centers. Macrophage free-radical generation (Choice B) is incorrect, as infections caused by pyogenic bacteria are characterized by a predominance of neutrophil activity, not macrophage activity. Generation of free radicals by neutrophils is an important defense mechanism in patients with a lung abscess. Natural killer cell-mediated killing (Choice C) predominantly occurs in tumor cells and virally infected cells in response to an absence of surface class I MHC molecules. When activated, natural killer cells synthesize perforin and granzyme, which are both proapoptotic, leading to the induction of apoptosis in their target cells. T-lymphocyte pertorin synthesis (Choice E) plays a role in the immune system's defense against viruses. When a cell has been infected by a virus, it presents intracellular viral antigen on its surface through class I MHC molecules. COB+ T lymphocytes possess unique T-cell receptors that bind to the MHC-viral antigen complex, leading to T lymphocyte activation. The activated T lymphocytes release perforin and granzyme, which cause membrane pore formation and subsequent apoptosis of infected cells.","edu_obj":"Educational Objective Lung abscesses typically occur secondary to aspiration and may present with cough, fever, and foul-smelling sputum. Lysozyme. a hydrolytic enzyme found in neutrophils, catalyzes the hydrolysis of the bacterial cell wall, leading to bacterial death."},{"block":2,"item":31,"image_alt":"","image_url":"","stem":"A pharmaceutical company develops a new oral medication (Drug X) for the treatment of type 2 diabetes mellitus. Study results have shown that the mechanism of action is mediated by blocking the ATP-dependent potassium channel on pancreatic 13cells. Based on these findings. Drug X is most similar to which of the following?","choices":{"A":"Exenalide","B":"Glyburide","C":"Metformin","D":"Pioglitazone","E":"Sitagliptin"},"correct":"B","explanation":"Drug Xis most similar in mechanism of action to glyburide, a commonly prescribed antihyperglycemic agent in the sulfonylurea class. The mechanism of action of sulfonylureas involves closing ATP-dependent potassium channels in pancreatic islet p cell membranes, resulting in depolarization of the cells. Depolarization leads to opening of voltage-gated calcium channels. calcium influx, and endogenous insulin release from the pancreas. Sulfonylureas are used as treatment in type 2 diabetes mellitus, in which the pancreatic islet cells retain function and are able to release insulin, in contrast to type 1 diabetes mellitus where the islet cells are destroyed and no functional insulin is produced. Insulin induces glucose uptake by peripheral tissues, such as skeletal muscle and adipose tissue, and promotes glycogen, triglyceride, and protein synthesis. Through these mechanisms. insulin decreases the concentration of serum glucose. The major adverse effect of sulfonylureas is hypoglycemia caused by the promotion of endogenous insulin release. Incorrect Answers: A. c. D. and E. Exenatide (Choice A) is an example of a glucagon-like peptide (GLP)-1 analogue. GLP-1 is an incretin hormone that stimulates pancreatic secretion of insulin in response to an oral qlucose load. In type 2 diabetes mellitus, this response is impaired. GLP-1 also promotes increased glucose uptake by muscle tissue and decreased gluconeogenesis in the liver. Dipeptidyl peptidase (DPP)-4 is an enzyme that deactivates GLP-1. Sitagliptin (Choice E) is an example of a DPP-4 inhibitor. which are also commonly used in the treatment of diabetes mellitus. Metformin (Choice C) is a first-line therapy for the treatment of type 2 diabetes mellitus, prescribed in addition to diet and activity modification. Metformin inhibits hepatic gluconeogenesis and increases glucose uptake by peripheral tissues. Pioglitazone (Choice D) is an example of the thiazolidinedione class of antihyperglycemic agents that achieves its effect by binding to peroxisome proliferator-activated receptors (PPARs). which are expressed in most cell types, including adipose cells, pancreatic cells, myocytes, and hepatocytes. PPARs are nuclear receptors that act as transcription factors to regulate metabolism. Activation results in increased cell sensitivity to insulin.","edu_obj":"Sulfonylureas stimulate endogenous insulin release from the pancreas. Insulin quickly induces glucose uptake by peripheral tissues such as skeletal muscle and adipose tissue, which can increase the risk for hypoglycemia"},{"block":2,"item":32,"image_alt":"","image_url":"","stem":"An investigator is conducting a study of the effects of alcohol consumption in young adults. A total of 250 participants between the ages of 21 and 25 years are recruited for the study. Bliod alcohol concentrations are measured using a breathalyzer after repeated oral doses of pure (95%) ethanol. Results show that female participants become more intoxicated and have higher blood alcohol concentrations compared with male participants receiving an equivalent dose of ethanol. Which of the following characteristics of the female participants best explains these findings?","choices":{"A":"Decreased alcohol dehydrogenase activity","B":"Induction of enzymes in the microsomal ethanol-oxidizing system","C":"Presence of genetic polymorphisms of alcohol dehydrogenase","D":"Presence of genetic polymorphisms of aldehyde dehydrogenase","E":"Relatively higher proportion of total body water"},"correct":"A","explanation":"Ethanol is metabolized to acetaldehyde in the liver by alcohol dehydrogenase, which is further metabolized to acetate by acetaldehyde dehydrogenase. Both of these reactions require NAD+ as a cofactor and generate NADH. This increase in NADH relative to NAO+ leads to hepatic steatosis, hypoglycemia, and lactic acidosis. Increases in acetaldehyde concentration also cause the classic signs associated with alcohol intoxication and withdrawal, such as disinhibition, slurred speech, and discoordinated movements. Women are more prone to ethanol intoxication with similar levels of ethanol ingestion given their relatively lower proportion of total body water, and thus lower total volume of distribution, as well as decreased activity of alcohol dehydrogenase compared with men. The latter is the most likely characteristic of the female participants that explains the increased intoxication and high blood alcohol concentrations compared with the male participants. Alcohol dehydrogenase is inhibited by fomepizole, which is used to treat methanol and ethylene glycol intoxication. Incorrect Answers: B. C, D, and E. Induction of enzymes in the microsomal ethanol-oxidizing system (Choice B) would enhance the breakdown and metabolism of ethanol into acetaldehyde. This would result in lower levels of intoxication and decreased blood alcohol concentrations in the female participants compared with the male participants. Presence of genetic polymorphisms of alcohol dehydrogenase (Choice C) could result in increased, decreased, or unchanged metabolism of ethanol depending on how the polymorphism affected the function of the enzyme. While a polymorphism that decreased the function of alcohol dehydrogenase would lead to increased intoxication and blood alcohol concentration, this polymorphism would be unlikely to be ubiquitously expressed in all the female participants in this study. Presence of genetic polymorphisms of aldehyde dehydrogenase (Choice D) could result in increased, decreased, or unchanged metabolism of acetaldehyde. Changing the function of this enzyme would be unlikely to cause changes in blood alcohol concentration, as it is a downstream enzyme in the metabolism of ethanol. Some patients have dysfunctional aldehyde dehydrogenase, which leads to increased concentrations of acetaldehyde and consequent vasodilation and flushing in response to even small amounts of alcohol. Relatively higher proportion of total body water (Choice E) is noted in men, rather than in women. This causes an increase in the volume of distribution in which the ethanol can be distributed. Consequently, men have lower blood alcohol concentrations than women in response to the same amount of ethanol.","edu_obj":"Ethanol is metabolized to acetaldehyde in the liver by alcohol dehydrogenase, which is further metabolized to acetate by acetaldehyde dehydrogenase. Women are more prone to ethanol intoxication than men with similar levels of ethanol ingestion given their relatively lower proportion of total body water, and thus lower total volume of distribution. as well as decreased activity of alcohol dehydrogenase compared with men."},{"block":2,"item":33,"image_alt":"","image_url":"","stem":"A 35-year-old woman haJ had nervousness and insomnia for 2 weeks. She has asthma that has been successfully treated with a slow-release theophylllne preparation for 4 months. Recent use of which of the following is the most likely cause of these symptoms?","choices":{"A":"Barbiturates","B":"Cigarettes","C":"Cimetidine","D":"Diazepam","E":"Phenytoin"},"correct":"C","explanation":"The cytochrome P450 (CYP450) superfamlly of oxidative enzymes is responsible for the majority of phase I metabolism of drugs. Clmelldine is a potent inhibitor of CYP1A2. which metabolizes theophylline. Theophylline is known for its narrow therapeutic window. and inhibition of the CYP450 system would lead to increased bioavailabil ity of the drug. Increased bioavailability of theophylline can potentiate minor adverse effects, such as nervousness and insomnia. and places patients at higher risk for life-threatening adverse effects, such as seizures and arrhythmias. Incorrect Answers: A. B, D, and E. Barbiturates (Choice A), such as phenobarbital, and some antiepileptic drugs, such as phenytoin (Choice E), are inducers of the CYP3A4 enzyme, which increases the rate of metabolism of drugs in this pathway. Theophylline. metabolized by CYP1A2, would not be impacted by barbiturate or phenytoin use. Other inducers of the CYP3A4 enzyme include carbamazepine and rifampin. Cigarette smoking (Choice B) is an inducer of CYP1A2, which would result in increased metabolism of theophylline and decreased bioavailability of the drug. Diazepam (Choice D) is metabolized by multiple CYP450 enzymes including CYP3A4; however. it does not induce or inhibit the metabolism of theophylline by CYP1A2.","edu_obj":"Theophylline, used for the treatment of asthma. has a narrow therapeutic window and undergoes metabolism by CYP1A2. Inhibitors of CYP1A2. such as cimelidine, increase the bioavailability of the drug, placing patients at risk for adverse effects including nervousness, insomnia, seizures, and arrhythmias."},{"block":2,"item":34,"image_alt":"","image_url":"","stem":"A 15-year-old girl with a 7-year history of asthma Is brought to the physician for a follow-up examination. She has been taking oral prednisolone for 2 months for exacerbations of her condition. Her respirations are 28/min. Physical examination shows expiratory wheezing. Pulmonary function studies show decreased FEY 1 and decreased FEV 1 /FVC ratio. A leukotriene receptor antagonist is prescribed and the patient's clinical condition improves. This drug blocks receptors that belong to which of the following types?","choices":{"A":"G protein-coupled","B":"Ligand-gated","C":"Nuclear","D":"Protein kinase","E":"Voltage-gated"},"correct":"A","explanation":"Leukotriene receptor antagonists, such as montelukast, are used in the treatment of persistent asthma. Leukotrienes are synthesized from arachidonic acid by the enzyme 5-lipoxygenase. There are two groups of leukotrienes, distinguished by the presence of an amino acid moiety. Leukotrienes C4, D4, and E4 have the amino acid moiety and bind to specific leukotriene receptors on the cell membrane resulting in bronchoconstriction, increased vascular permeability, and proinflammatory signaling. Leukotriene receptors are G protein-coupled receptors (GPCRs). GPCRs are transmembrane proteins that undergo conformational change in response to ligand activation, releasing second messengers that activate or inhibit various pathways. In bronchial smooth muscle. inhibition of this signaling pathway decreases muscle contraction and reduces airway edema and inflammation that occurs in chronic asthma. Incorrect Answers: B. C, D, and E. Ligand-gated (Choice B) ion channels are integral membrane proteins that respond to a chemical stimulus by allowing a flux of ions across a membrane. For example, ligand-gated calcium channels are commonly involved in postsynaptic neuromuscular signaling. Nuclear (Choice C) receptors interact with ligands that cross the plasma membrane, which are mostly lipid-soluble molecules such as steroid hormones. The majority are involved in transcription factor signaling to modulate gene expression. Protein kinase (Choice D) are membrane proteins involved in signal transduction through phosphorylation of associated proteins. The tyrosine kinase family is a large group of signaling protein kinases found in humans. and they are involved in the pathogenesis of several types of cancer. Voltage-gated (Choice E) ion channels respond to changes in membrane potential. Sodium and calcium voltage-gated channels are involved in action potential generation and propagation in neurons and presynaptic neurotransmitter release.","edu_obj":"Leukotriene receptor antagonists work by inhibiting binding of leukotrienes to the leukotriene receptor, a G protein-coupled receptor. In bronchial smooth muscle, inhibition of this pathway leads to muscle relaxation, making it a useful treatment for persistent asthma."},{"block":2,"item":35,"image_alt":"","image_url":"","stem":"A 52-year-old man who lives In Indiana comes to the physician because of a 1-month history of fever and nonproductive cough. He Is a construction worker. His temperature is 38.4•C (101.1°F). pulse Is 84/min. respirations are 14/min. and blood pressure is 110f70 mm Hg. Scattered crackles are heard over all lung fields. A chest x-ray shOws 1>I1ateraI interstitial infiltrates. A photomicrograph of a specimen obtained via trans1>roncnia1 biopsy 1sshown. The most liKely causal organism in this patient has a cell wall composed of which of the following?","choices":{"A":"N-Acetylglucosamine-N-acetylmuramic acid","B":"Cellulose","C":"Glucans","D":"Polyglutamic acid","E":"Teichoic acid"},"correct":"C","explanation":"This patient likely has histoplasmosis, an endemic mycosis caused by Histop/asma capsu/atum. The photomicrograph shews characteristic oval yeast forms within macrophages. Pulmonary histoplasmosis can present in acute. subacute, or chronic phases, generally characterized by fever, malaise, myalgia, cough, and hemoptysis with the development of calcified nodules and mediastinal or hilar lymphadenopat11y.Transmission occurs through inhalation of fungal spores. It is endemic to the Mississippi and Ohio River valleys in the United States, as well as parts of Central and South America, sub-Saharan Africa, and Southeast Asia. The virulence of H. capsulatum is dependent on its growth inside nonactivated macrophages, which protect the fungal cells from detection and elimination. Risk factors for histoplasmosis include exposure to bird or bat droppings. Diagnosis is typically made via the detection of histoplasma antigen in the serum and/or urine. Histop/asma on culture grows with septate mycelia and characteristic tuberculate macroconidia. Glucans. chitin, and glycoproteins are the main components of the fungal cell wall. Incorrect Answers: A, B, D, and E. N-Acetylglucosamine-N-acetylmuramic acid (NAG-NAM) (Choice A) is a key component of the peptidoglycan polymer found in bacterial cell walls. Several antibiotics target NAG-NAM cross-linking to disrupt bacterial cell wall integrity. The biopsy specimen in this case shows fungal organisms inside macrophages that is most consistent with histoplasmosis. Cellulose (Choice B) is the main component of plant cell walls. Fungal cell walls are primarily composed of glucans, chitins, and glycoproteins. Polyglutamic acid (Choice D) is an organic polymer synthesized by Bacillus species and certain other bacteria. In Bacillus organisms. polyglutamic acid expressed in the cell capsule is a virulence factor that helps with immune system evasion. Teichoic acid (Choice E) is found in the cell walls of gram-positive bacteria and provides increased flexibility to the cell wall along with several other functions. Fungal cell walls do not contain teichoic acid.","edu_obj":"Endemic mycoses are a common cause of pulmonary and systemic disease. The fungal cell wall is primarily composed of glucans. chitins. and glycoproteins."},{"block":2,"item":36,"image_alt":"","image_url":"","stem":"An investigator is studying a T-lymphocyte clone that recognizes a peptide from the hemagglutlnin glycoprotein of Influenza virus. In the context of human leukocyte antigen (HLA)-DR2. this clone most likely recognizes a peptide that was combined with HLA-DR2 In which of the following cellular compartments?","choices":{"A":"Cytosol","C":"Endosomes","D":"Mitochondria","E":"Nucleus"},"correct":"C","explanation":"Endosomes are cytoplasmic organelles composed mainly of microtubules and vesicles that traffic and sort endocytosed material, including vaccines and live viruses. Endosomes exist in several forms (eg. early, late, recycling) and can traffic endocytosed material to the Golgi complex, to lysosomes, or to the extracellular membrane. Human leukocyte antigen (HLA) class II (the human major histocompatibility complex (MHC)-11)proteins, such as HLA-DR2, are synthesized in the rough endoplasmic reticulum and are trafficked to the Golgi complex and then to late endosomes. where they form high-affinity combinations with degraded, endocytosed proteins. Bound protein is then recycled to the cell surface membrane where the peptide fragments are presented on HLA/MHC-II to T lymphocytes. The T lymphocyte receptor identifies the peptide bound to the HLA and initiates or sustains an immune response. Incorrect Answers: A, B, D, and E. The cytosol (Choice A) is the site of degradation of cytoplasmic peptides via the proteasome, which are then combined with MHC-I proteins in the endoplasmic reticulum and shuttled to the plasma membrane for presentation. An absence of MHC-I proteins on the cell surface is an initiating trigger for natural killer cell-induced cell destruction. Endoplasmic reticulum (Choice B) is the site of combination of peptides with MHC-I proteins. Mitochondria (Choice D) do not play a known significant role in the processing of endocytosed material. The nucleus (Choice E) is the site of mRNA synthesis but is not a major site of trafficking of endocytosed material.","edu_obj":"Endosomes are cytoplasmic organelles composed mainly of microtubules and vesicles and serve to traffic and sort endocytosed material. Endocytosed viral protein activates the immune system through combination with human leukocyte antigen proteins and subsequent presentation to T lymphocytes."},{"block":2,"item":37,"image_alt":"","image_url":"","stem":"An investigator is studying the effects of complement proteins on acute inflammation in an experimental mouse model. During the study, sections of skin are harvested before and after simultaneous dermal injection of Staphylococcus aureus and a single complement protein. The concentration of several biochemical mediators is measured before and after injection. Compared with baseline measurements, increased concentrations of histamine. leukotriene B4 • and serotonin are found after injection. Which of the following complement proteins was most likely injected during the experiment?","choices":{"A":"C1q","B":"C2a","C":"C2b","D":"C5a","E":"C5b"},"correct":"A","explanation":"C5a serves multiple roles in the immune response. As an anaphylatoxin, it mediates the degranulation of mast cells and basophils. These granules contain numerous inflammatory mediators, including histamine, leukotrienes, and serotonin. Together with C5a and C3a, another anaphylatoxin. these factors mediate many of the features of anaphylaxis, including granulocyte recruitment, smooth muscle constriction, vasodilation. increased vascular permeability, and mucous secretion. C5a is also a potent chemoattractant, mediating the chemotaxis of neutrophils, eosinophils, basophils, macrophages, and mast cells to sites of inflammation. It activates neutrophils and macrophages by stimulating production and release of substances such as reactive oxygen species, lysozyme, cytokines. and chemokines. A dysfunctional response to C5a and other chemoattractants (eg, IL-8, leukotriene B4) is a hallmark of leukocyte adhesion deficiency. Incorrect Answers: A. B, C, and E. C1q (Choice A) binds antibody-antigen complexes and combines with C1r and C1s to form the C1 complex, initiating the classical complement pathway C1q is not directly involved in mediating mast cell and basophil degranulation. C2, a component of the classical complement pathway, is cleaved into C2a (Choice B). a smaller fragment that is released into the microenvironment, and a larger fragment, C2b (Choice C), which associates with C4b to form C4b2b, a C3 convertase. Neither fragment is directly involved in mediating mast cell and basophil degranulation. {Historically, sources referred to the larger, active cleavage fragment as 2a and the smaller, released fragment as 2b.) C5b (Choice E) complexes with C6, C7, ca, and C9 (terminal complement factors) to form the membrane attack complex, which allows for creation of a transmembrane pore. This pore formation disrupts the cellular membrane. ultimately leading to cell lysis. Hemagglutinin is a membrane fusion protein which binds the sialic acid receptor on host cells and allows for viral entry. Antibodies against hemagglutinin, promoted by the influenza vaccination. prevent membrane fusion and viral cell entry into host cells. The influenza vaccination contains multiple strains of killed virus due to random mutations in the hemagglutinin protein. also known as antigenic drift. that occur annually. Incorrect Answers: B, C, D. and E. M1 matrix protein (Choice B) is an influenza virus matrix protein that coats the inner viral envelope. This protein is not targeted by the influenza vaccine. M2 ion channel (Choice C) is a protein on the viral envelope of influenza A. This protein is not targeted by the influenza vaccine. Neuraminidase (Choice D) is an enzyme found on the viral surface that enables the release of influenza virus from the host cell by cleaving sialic acid from glycoproteins. This is the target of the anti-influenza medication oseltamivir, but not a target of the influenza vaccine. Nucleoprotein (Choice E) is a structural protein which binds to viral RNA. This protein is not targeted by the influenza vaccine.","edu_obj":"C5a mediates many components of inflammation, including mast cell and basophil degranulation. Degranulation of these cells results in increased conctlnl1atio11suf innar11rnato1y rntldiaturs suctI as t1istamintl, leul<.ot,iene84, and se1otonin. C5a StllVtlS as a µowerful chemuattractant am.l aclivato1 of neut1uphils and macrophages."},{"block":2,"item":38,"image_alt":"","image_url":"","stem":"A 62-year-old woman with a 25-year history of type 2 diabetes mellitus comes to the office for a follow-up examination. She is 165 cm (5 ft 5 in) tall and weighs 79 kg (175 lb); BMI is 29 kg/m 2. Physical examination shows no other abnormalities. The physician recommends that she receive an influenza virus vaccine at this visit. Administration of this vaccine is most likely to produce protective antibodies against which of the following viral structural proteins?","choices":{"A":"Hemagglutinin","B":"M1 matrix protein","C":"M2 ion channel","D":"Neuraminidase","E":"Nucleoprotein"},"correct":"A","explanation":"Hemagglutinin is a membrane fusion protein which binds the sialic acid receptor on host cells and allows for viral entry. Antibodies against hemagglutinin, promoted by the influenza vaccination, prevent membrane fusion and viral cell entry into host cells. The influenza vaccination contains multiple strains of killed virus due to random mutations in the hemagglutinin protein, also known as antigenic drift, that occur annually.

Incorrect Answers: B, C, D, and E.

M1 matrix protein (Choice B) is an influenza virus matrix protein that coats the inner viral envelope. This protein is not targeted by the influenza vaccine.

M2 ion channel (Choice C) is a protein on the viral envelope of influenza A. This protein is not targeted by the influenza vaccine.

Neuraminidase (Choice D) is an enzyme found on the viral surface that enables the release of influenza virus from the host cell by cleaving sialic acid from glycoproteins. This is the target of the anti-influenza medication oseltamivir, but not a target of the influenza vaccine.

Nucleoprotein (Choice E) is a structural protein which binds to viral RNA. This protein is not targeted by the influenza vaccine.","edu_obj":"Hemagglutinin is an influenza viral surface protein that facilitates cell entry. The influenza vaccine stimulates lymphocytes to develop antibodies against hemagglutinin which prevents viral entry and subsequent infection of host cells."},{"block":2,"item":39,"image_alt":"","image_url":"","stem":"A 42-year-old man with end-stage renal disease undergoes transplantation with a kidney from a cadaveric donor. During the operation, following anastomosis of the renal vessels, the transplanted kidney becomes cyanotic and mottled. The kidney fails to excrete urine and is removed. Which of the following is the primary cause of nonfunction of Ille transplanted kidney?","choices":{"A":"Fibrin thrombi in capillaries","B":"Interstitial eosinophilic infiltration","C":"Neutrophilic infiltration of venules","D":"Organizing thrombus in the renal artery","E":"T-lymphocyte infiltration of tubules"},"correct":"A","explanation":"This patient is demonstrating signs of hyperacute rejection of his transplanted kidney. Hyperacute rejection occurs within minutes following allografl transplantation. The transplanted kidney will appear mottled and cyanotic. It occurs secondary to preformed recipient antibodies reacting to donor antigens (type II hypersensitivity), which activate complement and cause thrombosis of the allograft vasculature. Thrombosis can be clinically identified by widespread evidence of hypoperfusion, such as cyanosis, mottling, or diminished/absent flow in parenchymal blood vessels or draining veins. Management involves immediate removal of the transplanted kidney. Incorrect Answers: B. c, D. and E. Interstitial eosinophilic infiltration (Choice B) is seen in acute interstitial nephritis (AIN). AIN is usually caused by a hypersensitivity reaction to exposure to drugs, such as nonsteroidal anti-inflammatory medications. diuretics. and sulfonamides, and is characterized by a rash, eosinophilia, and eosinophiluria. II would not be detectable within seconds or minutes on a macroscopic basis following transplantation. Neutrophilic infiltration of venules (Choice C) is not generally associated with allograft rejection This finding may be seen in the setting of bacterial infection. Organizing thrombus in the renal artery (Choice D) is a rare complication of allografl transplantation that usually occurs in the first month after transplantation and often leads to graft loss. Thrombosis may be the result of mechanical abnormalities such as vessel compression or torsion, or from causes such as hypotension. hypercoagulable states. and vessel stenosis. T-lymphocyte infiltration of tubules (Choice E) is seen in acute T-cell-mediated rejection (TCMR). This most commonly occurs within the first six months after transplantation. TCMR is caused by host T-lymphocytes reacting to donor major histocompatibility complexes present on cells within the glomeruli, tubules, interstitium. and blood vessels of the allograft. Treatment is based upon the degree of rejection and allograft dysfunction, but includes steroids and lymphocyte-depleting agents.","edu_obj":"Hyperacute rejection occurs secondary to preformed recipient antibodies reacting to donor antigens, which activate complement and cause thrombosis of the allograft vasculature. This will manifest as mottling and cyanosis of the transplanted kidney which occurs within minutes of transplantation."},{"block":2,"item":40,"image_alt":"","image_url":"","stem":"A 30-year-old man comes to the physician because of a 2-month history of episodes of headache, fever, and shaking chills since he returned from a 6-month trip to the Mayan ruins in southern Mexitf). His temperature is 39°C (102.2°F). Physical examination shows no other abnormalities. A photomicrograph of a Wright- stained peripheral blood smear Is shown. Which of the following vectors Is the most likely source of infection in this patient?","choices":{"A":"Body louse","B":"Kissing bug","C":"Mosquito","D":"Sandfly","E":"Tsetse fly"},"correct":"C","explanation":"Chronic fatigue, cyclic or relapsing fever, chills, and headache presenting in a patient with recent travel to Africa or Central/South America suggest a diagnosis of malaria, which is caused by infection with parasites of the genus Plasmodium following a bite by a mosquito vector (typically Cu/ex or Anopheles species). There are several different pathogenic species of malaria including Plasmodium falciparum, P ovale, P vivax, P knowtesi, and P malariae, although over 90% of malaria infections in returning U.S. travelers are secondary to P. falciparum or P vivax. Plasmodium infects human red blood cells, where the organism reproduces and progresses through several stages. Various stages of the organism are visible on peripheral blood smear, including ring forms, trophozoites, and schizonts (as seen in this patient's peripheral smear). P ova/e and P vivax also have hypnozoite liver forms. Even after the initial parasitemia has resolved, patients infected with P ovale or P vivax are at risk of reactivation weeks or months later. Treatment is with antimalarials, generally chloroquine, which eradicates circulating parasites, and primaquine, which effectively targets the hypnozoite exoerythrocytic forms of P vivax and P ova/e. Attention should be paid to resistance patterns when choosing antimalarial medications, as sensitivities vary by region. Incorrect Answers: A, B, D, and E. Body lice (Choice A) transmit epidemic typhus. caused by the gram-negative bacterium Rickettsia prowazekii. Epidemic typhus typically occurs in conditions of poor hygiene and crowding. Although now rare, it was responsible for widespread outbreaks througl1out history, especially following wars, where it was transmitted by soldiers. It presents with fever, chills, myalgia, cough, nausea, vomiting, and a characteristic macular rash that begins on the trunk and spreads to the extremities, sparing the palms and soles. It has a high mortality rate without appropriate treatment. Kissing bugs (Choice B), also known as Reduviid insects, are hematophagous insects endemic to South America, Central America, and areas of the southern United States, and may vector Chagas disease (trypanosomiasis). Chagas disease results from infection with the parasitic. flagellate Trypanosoma cruzi. Chagas disease presents with an acute stage characterized by fever, malaise, lymphadenopathy, and splenomegaly, as well as chronic manifestations including dilated cardiomyopathy. arrhythmia, congestive heart failure, and megaesophagus. Sandflies (Choice D) may transmit protozoans of the Leishmania genus. which cause both Old World and New World leishmaniasis. Leishmaniasis has both cutaneous and visceral forms. Cutaneous leishmaniasis begins with a pink papule at the site of the sand fly bite. Additional lesions may develop and spread along the draining lymphatics. In Old World leishmaniasis. a characteristic hyperkeratotic eschar may form. Visceral leishmaniasis presents with fever, malaise. weight loss. and organomegaly over several weeks to months. Tsetse flies (Choice E) may transmit the parasite Trypanosoma brucei, which causes African trypanosomiasis, or African sleeping sickness. Patients exhibit lymphadenopathy, recurrent fever, and somnolence.","edu_obj":"Malaria is caused by infection with parasites of the genus P/asmodium following a bite by a mosquito (typically Cu/ex or Anopheles species). Malaria presents with fatigue, cyclic/relapsing fever, chills. headache, and anemia. Infection with P. ovale or P. vivax can produce recurrent or relapsing symptoms months after the initial infection due to dormant liver forms."},{"block":2,"item":41,"image_alt":"","image_url":"","stem":"A 37-year-old woman has had fatigue and headaches for 1 month. Laboratory studies show a hemoglobin concentration or 9 g/dl, mean corpuscular volume or 82 µm³,

 does not apply to these study results. A Type II error occurs when a study shows no difference between the null and alternative hypotheses, when in fact, a difference exists. Type II error is known as a \"false negative\" error and can be reduced by increasing the power of the study (Choice F) through a larger sample size and increasing precision in measurements. This study showed a difference between the two study arms, so the concepts of Type II error and insufficient power do not apply. The observed difference is statistically significant (Choice E) as shown by the p-value being less than 0.05. A p-value of less than 0.05 indicates a less than 5% chance that the study investigators erroneously rejected the null hypothesis.","edu_obj":"When physicians or drug manufacturers encounter a statistically significant result, they should consider whether it is clinically significant enough to change treatment recommendations."},{"block":4,"item":8,"image_alt":"","image_url":"","stem":"A 58-year-old man dies from heart failure that was refractory to therapy. At autopsy his heart weighs 490 g. Sections of his heart are shown. Which of the ro11owingis the most likely diagnosis?","choices":{"A":"Congestive heart failure resulting from repeated infarcts","B":"Mltral valve prolapse","C":"Pulmonary stenosis","D":"Rupture of the papillary muscle","E":"Septal rupture"},"correct":"[NOT IN SOURCE FILE]","explanation":"[NOT PRESENT IN SOURCE FILE]","edu_obj":""},{"block":4,"item":9,"image_alt":"Block 4 Q9 — Bacterial growth curve (relative growth vs. time in hours)","image_url":"https://rotogrover.github.io/sa-forms/images/CBSSA31_B4Q9_graph.jpg","stem":"The graph shows the growth of Escherichia coli in culture media containing glucose and lactose. Which of the following is the most likely explanation for the observed growth pattern?","choices":{"A":"Altered (nonfunctional) catabolite activator protein","B":"Glucose depletion followed by induction of the lac operon","C":"Increased β-galactosidase synthesis in the first 4 hours of growth","D":"Lactose depletion followed by glucose utilization"},"correct":"B","explanation":"The graph shows a linear increase in bacterial growth that plateaus between hours 4 and 6 and continues in a linear fashion thereafter. These findings are explained by the initial utilization of glucose followed by lactose once glucose has been depleted in the culture medium. When both glucose and lactose are available, glucose is the preferred metabolic substrate for Escherichia coli. The lac operon is commonly found in Enterobacteriaceae and enables the utilization of lactose in a glucose-poor environment. In states of high glucose or low lactose, transcription of the lac operon genes is suppressed. When conditions are appropriate for expression (glucose-poor, lactose-rich environment), catabolite activator protein (CAP) binds the CAP site, which permits binding of RNA polymerase to the promoter, and transcription of the lac operon genes begins. Such genes code for enzymes that catabolize lactose for use in generation of adenosine triphosphate.

Incorrect Answers: A, C, and D.

Altered (nonfunctional) catabolite activator protein (Choice A) is incorrect, as this would prevent transcription of the lac operon genes. In states of glucose depletion, an upregulation of cAMP leads to activation of the CAP. Once active, the CAP binds to the CAP site on the lac operon, allowing RNA polymerase to bind to the promoter and transcription to begin. If the CAP was nonfunctional, lactose would not be used.

Increased β-galactosidase synthesis in the first 4 hours of growth (Choice C) is incorrect, as the first 4 hours of growth occur due to glucose (not lactose) utilization. The lacZ gene encodes for β-galactosidase, an enzyme that breaks down lactose into glucose and galactose. Translation of this protein would be increased after glucose stores were depleted around hour 4.

Lactose depletion followed by glucose utilization (Choice D) is incorrect as glucose (not lactose) will be preferentially metabolized when present. Lactose utilization will not occur until glucose is unavailable.","edu_obj":"Glucose is the preferential metabolic substrate for Escherichia coli. The Jae operon permits the digestion of lactose in a glucose-poor environment and cedes for genes that are activated by glucose scarcity."},{"block":4,"item":10,"image_alt":"","image_url":"","stem":"An unimmunized 10-year-old boy is brought to the emergency department by his mother because of a 2-day history of progressively severe abdominal pain and vomiting. One week ago. he had fever, headache, earache, and swollen painful glands anterior to his ears. His temperature is 38.8°C (101 .9°F). Physical examination shows bilateral swollen. tender parotid glands and moderate epigastric tenderness. Serum studies show mildly increased amylase and highly increased lipase activities. This patient's primary infection most likely caused which of the following complications?","choices":{"A":"Basophils","B":"Bowel obstruction","C":"Common bile duct obstruction","D":"Pancreatitis","E":"Viscus perforation"},"correct":"D","explanation":"This patient with upper abdominal pain. vomiting, and increased amylase and lipase most likely has acute pancreatitis. The most common causes of acute pancreatitis are alcohol use and gallstones. The presentation of fever with bilateral swollen and tender parotid glands in this unimmunized child is consistent with a diagnosis of mumps, which is a known, but less common cause of pancreatitis. Patients with pancreatitis often present with epigastric or left upper quadrant pain that may radiate to the back. as well as nausea and vomiting. An increase in serum lipase and amylase may be found. Diagnosis is made by the presence of two of the three of the following criteria: serum lipase at least three times the upper limit of normal, history and physical examination consistent with pancreatitis. and characteristic findings on imaging, such as peripancreatic soft tissue stranding, pancreatic inflammation or edema, or complications such as pseudocyst. abscess, or necrosis. Treatment involves supportive care with fluid resuscitation, pain management, and bowel rest. Incorrect Answers: A. B, C, and E. Appendicitis (Choice A) typically presents with periumbilical pain that migrates to the right lower quadrant, fever, vomiting, and leukocytosis. Examination findings include tenderness in the right lower quadrant or tenderness elicited with movement of the psoas or obturator muscles. Bowel obstruction (Choice 8) presents with abdominal pain and distension, nausea, and vomiting. Partial obstruction will allow a degree of continued flatus with diminished stooling, and complete obstruction will result in obstipation. X-ray will show dilated loops of bowel with air-fluid levels. Common bile duct obstruction (Choice C) presents as right upper quadrant pain, nausea, and vomiting. If severe, jaundice may occur. Laboratory studies will show increased direct bilirubin and alkaline phosphatase. If secondary infection occurs. the patient may present with fever and leukocytosis. Viscus perforation (Choice E) leads to peritonitis and presents as severe abdominal pain with physical examination findings of rebound tenderness. guarding, and abdominal wall rigidity.","edu_obj":"Pancreatitis can occur as a complication of mumps. Patients with pancreatitis present with upper abdominal pain, nausea. and vomiting. Serum lipase and amylase may be increased. Treatment involves supportive care with fluid resuscitation, pain management, and bowel rest."},{"block":4,"item":11,"image_alt":"","image_url":"","stem":"A 12-year-old boy is brought to the emergency department 30 minutes after falling from his skateboard. He reports pain in his right elbow. Physical examination shows that his right forearm and hand are cold and pale and have no pulse. There is swelling of the elbow region. This patient most likely has a fracture of which of the following structures?","choices":{"A":"Head of the radius","B":"Lateral epicondyle of the huus","C":"Olecranon process of the ulna","D":"Radial tuberosity","E":"Supracondylar region of the humerus"},"correct":"E","explanation":"The elbow is a complex joint composed of articulations between the ulna, humerus, and radius. The anterior distal humerus abuts important neurovascular structures. The brachial artery runs through the elbow. passing anterior to the distal humerus and extending into the forearm. where it gives rise to the radial and ulnar arteries. Similarly, the median nerve crosses anterior to the elbow along with the brachial artery. The ulnar nerve courses posterior to the medial epicondyle, and the radial nerve lies between the brachialis and brachioradialis muscles. In supracondylar fractures, the distal humerus is disrupted, and if severe, can injure neurovascular structures that lie along the distal humerus, such as the brachial artery and median nerve. In this patient. the brachial artery is likely injured, leading to a pulseless right upper extremity. Emergent reduction and operative fixation of the fracture is needed to restore distal circulation, and in some cases. vascular repair may be necessary. Incorrect Answers: A, B, C. and D. Fractures of the head of the radius (Choice A) can be associated with elbow dislocations, but they would be unlikely to result in a brachial artery injury. A fracture at the lateral epicondyle of the humerus (Choice B) will present with tenderness to palpation at the lateral aspect of the elbow. and a fracture at the olecranon process (Choice C) will present with tenderness to palpation at the posterior aspect of the elbow. Both can be caused by direct blows to t11earea and will not typically cause neurovascular compromise. The radial tuberosity (Choice D) refers to an eminence along the proximal radius that serves as the insertion point for the tendon of the biceps brachii. A fracture would be uncommon and would not typically cause neurovascular compromise.","edu_obj":"Supracondylar fractures of the humerus can lead to neurovascular compromise with injuries to the brachia! artery. Injury to the brachia I artery can cause a pulseless right upper extremity requiring emergent reduction and operative fixation of the fracture to restore distal circulation."},{"block":4,"item":12,"image_alt":"","image_url":"","stem":"A 60-year-old man comes to the physician because of the gradual onset of muscle weakness during the past 5 years. He takes no medications. Physical examination shows no skin lesions or rashes. There is marked weakness of the distal muscles. Corticosteroids are administered. At a follow-up examination 6 weeks later. his condition has not improved. His serum creatine kinase concentration is increased. The results of assays for antinuclear antibody and U1 ribonucleoprotein are negative. Microscopic examination of a skeletal muscle biopsy specimen shows inflammatory cells and basophilic-rimmed vacuoles. Which of the following is the most likely diagnosis?","choices":{"A":"Chronic inflammatory polyradiculoneuropathy","B":"lnclusiony myositis","C":"Mixed connective tissue disease","D":"Myasthenia gravis","E":"Systemic lupus erythematosus"},"correct":"B","explanation":"Inclusion body myositis is categorized as an idiopathic inflammatory myopathy, along with dermatomyositis and polymyositis. This condition is most common in males over 50 years of age and generally presents with the insidious onset of proximal or distal lower extremity weakness and dysphagia. The average duration between symptom onset to diagnosis is 5 years, and patients may complain of inability to get out of a chair, frequent falls, or difficulty opening jars. Patients with inclusion body myositis may have a normal to mildly increased creatinine kinase concentration. Muscle biopsy histopathology is characterized by infiltration of inflammatory cells (generally lymphocytes and macrophages), fibrosis, and myocyte inclusion bodies demonstrating apple-green birefringence on Congo red staining, and vacuoles, seen with Gomori trichrome staining. Unlike other inflammatory myopathies, inclusion body myositis is generally resistant to immunosuppressive therapies, including corticosteroids. Non- pharmacologic treatments, such as physical and occupational therapy, are recommended to help prevent decline in patient function. Incorrect Answers: A, C, D, and E. Chronic inflammatory polyradiculoneuropathy (Choice A) is an acquired immune-mediated demyelinating neuropathy that affects peripheral nerves and nerve roots. It is characterized by symmetric, motor, and sensory neuropathy. Diagnosis depends on electromyography or nerve biopsy supporting peripheral nerve demyelination. Patients generally respond to immunosuppressive regimens, including glucocorticoids and intravenous immunoglobulin (IVIG). Mixed connective tissue disease (Choice C) is an autoimmune connective tissue disorder, with overlapping features of systemic lupus erythematosus, systemic sclerosis, and/or polymyositis. Symptoms of mixed connective tissue disease include fatigue, myalgias, arthralgias, polymyositis, arthritis, Raynaud phenomenon, hand edema, and sclerodactyly. Diagnosis is made by the presence of anti-U1 ribonucleoprotein (RNP) antibodies. It is responsive to immunosuppressive therapy, including glucocorticoids. Myasthenia gravis (Choice D) is an autoimmune disorder caused by autoantibodies against nicotinic acetylcholine receptors at the postsynaptic membrane of the neuromuscular junction, rendering them unresponsive to acetylcholine. Presenting symptoms include ptosis, diplopia, dysphagia, and muscle weakness, which worsen with repetitive activity and in the afternoon and evening. Systemic lupus erythematosus (SLE) (Choice E) is associated with malar rash sparing the nasolabial folds, arthralgias, anemia, thrombocytopenia, hypercoagulability, and nephritis, a common cause of renal failure in young patients. Diagnosis of SLE is based on both serologic and clinical findings. Often patients will respond to immunosuppressive regimens, including glucocorticoids, during acute flares. Antimalarials, such as hydroxychloroquine, are used as a first-line therapy to prevent SLE flares.","edu_obj":"Inclusion body myositis is an idiopathic inflammatory myopathy that commonly affects older males. Symptoms include insidious onset of proximal or distal lower extremity weakness and dysphagia. Characteristic muscle biopsy findings include inflammatory infiltrates, fibrosis, and inclusion bodies or vacuoles seen with staining. Unlike other inflammatory myopathies, inclusion body myositis is resistant to immunosuppressive therapies. Treatment includes physical and occupational therapy."},{"block":4,"item":13,"image_alt":"","image_url":"","stem":"A 64-year-old woman with chronic obstructive pulmonary disease comes to the emergency department because of a fainting spell 1 hour ago. She says she felt light- headed and weak for approximately 20 seconds after an episode of severe coughing. She thinks she may have lost consciousness. She has had nasal congestion and throat irritation for the past 3 days. She is not takfug any medications. Which of the following mechanisms is most likely responsible for the syncope?","choices":{"A":"Cerebral embolus originating from intracardiac thrombus","B":"Decreased cardiac output caused by increased intrathoracic pressure","C":"Decreased cerebral perfusion caused by atrial arrhythmia","D":"Generalized tonic-clonic seizure triggered by increased cerebral irritability","E":"Vasodilation caused by respiratory alkalosis"},"correct":"B","explanation":"A patient with lightheadedness and weakness with a brief, self-resolved episode of loss of consciousness likely had a syncopal episode. The cause of syncope is variable and may occur because of reflex or neural-mediated causes, ventricular arrhythmias, or orthostasis. Episodes of severe coughing can lead to emesis or syncope. This patient likely experienced a syncopal episode secondary to transient cerebral hypoperfusion. Forced expiration against a closed glottis (the Valsalva maneuver). such as with coughing, rapidly increases intrathoracic pressure with a corresponding decrease in venous return, preload, and cardiac output, resulting in an abrupt drop in mean arterial pressure. The combination of these factors can result in significantly reduced cerebral blood flow and consequent syncope. In the absence of an underlying pathologic process, resumption of the normal respiratory drive and a supine position will quickly correct the perfusion deficit, resulting in the restoration of consciousness. Incorrect Answers: A, C, D, and E. Cerebral embolus originating from an intracardiac thrombus (Choice Al is a typical cause of embolic stroke secondary to atrial fibrillation. Patients with embolic ischemic stroke typically present with weakness on one side of the body, a facial droop, and may present with speech difficulty or aphasia. Syncope is less common. Decreased cerebral perfusion in the setting of an atrial arrhythmia (Choice C), such as with atrial fibrillation, less commonly results in an acute decrease in cerebral perfusion causing syncope or near syncope. In cases where such a cause was responsible for syncope, it would generally not be preceded by coughing but rather with palpitations, chest discomfort, or shortness of breath. Atrial fibrillation has been associated with a chronic decreased cerebral blood flow that may lead to cognitive impairment. Generalized tonic-clonic seizures (Choice D) are characterized by a sudden loss of consciousness followed by a stiffening of the muscles of the arms, legs, chest, and back (tonic phase), progressing to jerking or twitching (clonic phase). After the seizure. postictal confusion is common. This patient had a syncopal or near-syncopal episode, without any rhythmic movements or a postictal phase. Acute hypocapnia and respiratory alkalosis (Choice E) results in cerebral vasoconstriction, not vasodilation. and decreased cerebral blood flow.","edu_obj":"Forced expiration against a closed glottis (the Valsalva maneuver), such as with coughing, rapidly increases intrathoracic pressure with a corresponding decrease in venous return, preload, and cardiac output, resulting in an abrupt drop in mean arterial pressure. The combinaiion of these factors can result in significantly reduced cerebral blood flow and consequent syncope."},{"block":4,"item":14,"image_alt":"","image_url":"","stem":"A 58-year-old woman comes to the office because of a 1-month history of fatigue, fever, shortness of breath. and joint pain; she also has had a 3.2-kg (7-lb) weight loss during this period. Her temperature is 37.6°C (99.7°F), and respirations are 34/min. Physical examination shows tenderness to palpation over the maxillary sinus, nasal ulcerations. and a bulging, red left tympanic membrane. Laboratory studies show: Erythrocyte sedimentation rate 65 mm/h Serum C-reactive protein 8.2 mg/L (N=0.08-3.1) Urine Blood 2+ Protein 2+ Histologic examination of a biopsy specimen of affected lung tissue shows granulomata and vasoulitis. An autoantibody is most likely directly binding which of the following cell types in this patient?","choices":{"A":"Basophils                                                                                                                                    I","B":"Endothelial cells","C":"Fibroblasts","D":"Neutrophils","E":"Plasma cells"},"correct":"D","explanation":"Granulomatosis with polyangiitis (GPA, formerly Wegener granulomatosis) is a systemic necrotizing granulomatous vasculitis that affects small and medium vessels. It is associated with the development of cytoplasmic antineutrophil cytoplasmic antibodies (c-ANCA) targeting neutrophils. GPA primarily affects the sinopulmonary tract, kidneys, and skin. Patients typically present with constitutional symptoms, such as fever, weight loss, and fatigue. with additional symptoms based on specific organ involvement. Sinopulmonary manifestations include recurrent sinusitis. otitis media, mastoiditis, nasal ulcerations with epistaxis, hemoptysis. cough, and dyspnea. The kidneys are typically involved. and patients often present with hematuria with an increased risk for developing rapidly progressive glomerulonephritis and renal failure. When the skin is involved, patients may exhibit purpura. Incorrect Answers: A, B, C, and E. Basophils (Choice A) are important for the initiation of the allergic response; however, they are not targeted by c-ANCA present in GPA. Endothelial cells (Choice B) line the walls of blood vessels and regulate the exchange of substances between the bloodstream and the surrounding tissues. Endothelial cells are not targeted by c-ANCA. Fibroblasts (Choice C) contribute to the synthesis of collagen in the extracellular matrix. They are present in almost every organ system, including the skin, and are critical in the process of wound healing. Plasma cells (Choice E) are terminally differentiated B lymphocytes that produce immunoglobulins in large quantities after antigenic stimulation. While plasma cells produce antibodies, they are not the target of c-ANCA.","edu_obj":"Granulomatosis with polyangiitis (GPA) is a systemic necrotizing granulomatous vasculitis that affects small and medium vessels. It is associated with the development of cytoplasmic antineutrophil cytoplasmic antibodies (c-ANCA). GPA primarily affects the sinopulmonary tract, kidneys, and skin. GPA may present with sinusitis, otitis media, mastoiditis, nasal ulcerations with epistaxis, hemoptysis, cough, hematuria with an increased risk for developing rapidly progressive glomerulonephritis, and renal failure."},{"block":4,"item":15,"image_alt":"","image_url":"","stem":"A 33-year-old man with HIV infection comes to the physician because of a 3-day history of headaches, intolerance to light, and severe neck stiffness. His temperature is 39.5°C (103.1 °F). Physical examination shows photophobia and nuchal rigidity. Analysis of cerebrospinal fluid obtained on lumbar puncture shows cryptococci. Initial therapy with combination antifungal medication, including fluconazole, successfully resolves the symptoms. Fluconazole most likely impaired or inhibited which of the following fungal targets in this patient?","choices":{"A":"Cell-wall 1,3-β-glucan synthase","B":"De novo pyrimidine synthesis","C":"Ergosterol synthesis","D":"Microtu!lule depolymerization","E":"RNA polymerase"},"correct":"C","explanation":"Cryptococcus neoformans is an encapsulated, nondimorphic yeast and common opportunistic pathogen in patients who are immunocompromised. HIV/AIDS, malignancy, especially lymphoma or leukemia, solid organ transplantation, sarcoidosis, liver cirrhosis, and long-term corticosteroid therapy are risk factors for infection. C. neoformans can cause cryptococcal meningitis, encephalitis, and pulmonary cryptococcosis. Transmission is through inhalation, with risk for dissemination to the brain and meninges as well as other distal sites. Cryptococcal meningitis presents with headache, nuchal rigidity, photophobia, nausea and vomiting, and progressive encephalopathy. Diagnosis is made by analysis of cerebrospinal fluid (CSF), sputum. urine, and blood. Lumbar puncture classically detects an increased opening pressure, increased CSF protein, and a mononuclear cell pleocytosis. Histologic examination may show yeast cells with narrow-based budding and a bright red inner capsule on staining with mucicarmine or periodic acid-Schiff. Treatment is with antifungal agents, typically a combination of amphotericin B with high-dose oral fluconazole. Fluconazole inhibits the production of ergosterol, which is part of the fungal cell membrane, by inhibiting the cytochrome P450 (CYP450)-dependent demethylation reaction that synthesizes ergosterol from lanosterol. Incorrect Answers: A, B, D, and E. Cell-wall 1,3-β-glucan synthase (Choice A) polymerizes β-glucans in the fungal cell wall and is the target of echinocandin antifungal agents (eg, micafungin). De novo pyrimidine synthesis (Choice B) is the target of several immunosuppressive medications, including 5-fluorouracil and methotrexate. lmmunosuppressive medications do not play a role in the treatment of opportunistic fungal infections. Microtubule depolymerization (Choice D) is the mechanism of action of mitotic inhibitors, such as vinca alkaloids or the antifungal agent griseofulvin, a systemic antifungal used to treat tinea capitis in children. Griseofulvin-induced inhibition of microtubular polymerization leads to impaired fungal cell division. RNA polymerase (Choice E) is inhibited by the antibiotic rifampin. Rifampin is commonly employed as an anti-mycobacterial agent in the treatment of tuberculosis.","edu_obj":"Cryptococcus neoformans is an encapsulated, nondimorphic yeast and common opportunistic pathogen in immunocompromised patients. Cryptococcal meningitis presents with headache, nuchal rigidity, photophobia, nausea and vomiting, and progressive encephalopathy. Treatment is with antifungal agents, typically a combination of amphotericin B with high-dose oral fluconazole. Fluconazole inhibits the production of ergosterol by inhibiting the cytochrome P450 (CYP450)- dependent reaction that synthesizes ergosterol from lanosterol."},{"block":4,"item":16,"image_alt":"","image_url":"","stem":"A 50-year-old man with a follicular B-lymphocyte lymphoma has a translocation involving chromosomes 14 and 18 with fusion of the immunoglobulin heavy chain locus (lgH) to the BCL2 gene. Which of the following is the most likely oncogenic effect of this translocation? ~","choices":{"A":"Deletion of BCL2","B":"Deletion of lgH","C":"Overexpression of BCL2","D":"Overexpression of lgH","E":"Underexpression of BCL2","F":"Underexpression of lgH"},"correct":"C","explanation":"BCL2 is a normal cellular protein that plays a role in the regulation of apoptosis. It is found in the outer mitochondrial membrane, nuclear envelope, and endoplasmic reticulum. BCL2 functions by preventing the oligomerization of BAX/BAK in the outer mitochondrial membrane. which would normally cause release of cytochrome c and activation of caspases in the cytoplasm. Such activity triggers apoptosis. Overexpression of BCL2 leads to prolonged cellular survival and inhibition of apoptosis. BCL2 overexpression is found in several types of non-Hodgkin lymphoma, including follicular B-lymphocyte lymphoma and diffuse large B-lymphocyte lymphoma. Overexpression of proto-oncogenes (eg, growth factors) and loss of function of tumor suppressors (eg, p53 inhibitors) is central to oncogenesis. Incorrect Answers: A, B. D, E, and F. Deletion of BCL2 (Choice A) and underexpression of BCL2 (Choice E) would lead to the increased oligomerization of BAX/BAK in the outer mitochondrial membrane and release of cytochrome c. This cascade would cause activation of caspases in the cytoplasm triggering cellular apoptosis. Deletion of lgH (Choice B) and underexpression of lgH (Choice F) would lead to decreased quantity of immunoglobulin heavy chain protein by cells: however. this would not impact the expression of BCL2 in lymphoma cells. Overexpression of lgH (Choice D) would lead to increased quantity of immunoglobulin heavy chain protein by cells: however, this would not impact the expression of BCL2 in lymphoma cells. Such a circumstance, however, could hypothetically lead to malignancy or macroglobulinemia, such as myeloma or monoclonal gamrnopathy of uncertain significance.","edu_obj":"Non-Hodgkin lymphomas, including follicular B-lymphocyte lymphoma, may be driven by the overexpression of BCL2 protein, preventing apoptosis. BCL2 is an antiapoptotic protein that blocks the oligomerization of BAX/BAK in the outer mitochondrial membrane and prevents release of cytochrome c, which normally activates caspases and promotes apoptosis."},{"block":4,"item":17,"image_alt":"","image_url":"","stem":"A drug rapidly distributes in total body water and has an elimination half-life of 8 hours. In a patient who weighs 80 kg (176 lb; total body water of 50 L), an intravenous drip is started which will maintain a drug concentration in plasma of 20 mg/Lal steady state. The time ii will take {in hours) from the start of the intravenous drip for plasma drug concentration to reach 18 mg/L (90% of the steady state value) is closest to which of the following?","choices":{"A":"8","B":"18","C":"28","D":"38","E":"48"},"correct":"C","explanation":"A steady state concentration of a drug occurs when the rate of elimination of a drug is equal to the rate of drug administration. Because of this, the time to steady state concentration is dependent on the rate of elimination. Rate of elimination can be quantified by the half-life of the drug. or the time required for the plasma concentration of the drug to decrease by one-half. This medication has a steady state concentration of 20 mgll with a half-life of 8 hours. In general, it takes approximately five half-lives for a medication to reach steady state concentration or slightly more than three half-lives to reach 90% steady state levels. This can most simply be demonstrated by assuming that a dose of 1000 mg is given every half-life with 100% bioavailability and that it is evenly distributed in the total body water (50 Lin this case). leading to a concentration of 20 mg/L. After 8 hours, half of the first dose would be gone but a new dose would be given, leading to a concentration of 30 mg/L. After two half-lives, this would be decreased to 15 mg/Lor 75% the steady state concentration. After the third dose, the initial plasma concentration would be 35 mg/L, but this would decrease to 17.5 mg/L or approximately 88% of the steady state concentration. Therefore, the plasma drug concentration would reach 18 mg/L (90% of the steady state value) shortly after three half-lives had passed, making 28 hours the correct answer. Incorrect Answers: A, B, D. and E. The plasma drug concentration would not have reached 18 mg/Lor 90% of the steady staie by 8 hours (Choice A) or 18 hours (Choice B). Only 50 to 80% of the steady state drug concentration would be reached after 1 to 2.25 half-lives, making these choices incorrect. The plasma drug conceniration would exceed 18 mg/L or 90% of the steady state by 38 hours (Choice D) or 48 hours (Choice E). After 4. 75 to 6 half-lives, steady state concentration would be reached.","edu_obj":"A steady state concentration of a drug occurs when the rate of elimination of a drug is equal to the rate of drug administration. The rate of elimination can be quantified by the half-life of the drug, or the time required for the plasma concentration of the drug to decrease by one-half. In general, it takes approximately five half-lives for a medication to reach steady state concentration or slightly more than three half-lives to reach 90% steady state levels."},{"block":4,"item":18,"image_alt":"","image_url":"","stem":"A 27-year-old woman is brought to the emergency department 1 hour after cutting her left wrist with a razor blade during a fight with her boyfriend. She cut herself after she assaulted him with a knife, accusing him of cheating on her. This is the third time she has physically assaulted her boyfriend. She was prescribed clonazepam by her primary care physician. She states that she does not use alcohol or illicit drugs. She smells of beer. She tells the physician that she does not trust anyone because her stepfather repeatedly raped her from the ages of 8 to 13 years. Physical examination shows a 3-cm laceration on the left wrist. Serum alcohol concentration is undetectable. She demands hydrocodone for the pain. This patient most likely has which of the following types of personality disorders?","choices":{"A":"Antisocial~","B":"Avoidant","C":"Borderline","D":"Narcissistic","E":"Obsessive-compulsive"},"correct":"C","explanation":"Borderline personality disorder (BPD) is a cluster B personality disorder (the emotional or dramatic cluster) that features an unstable sense of self and tumultuous relationships. Likely caused by a combination of genetic polymorphisms in serotonin and dopamine receptors, and emotional invalidation or abuse during childhood, patients with BPD unconsciously make impulsive and dramatic gestures, including self-harm, to obtain attention and emotional fulfillment from others. Because of inadequate emotional attunement from caregivers, patients with BPD do not learn to label, understand. or regulate their emotions. Due to affective dysfunction and hypodopaminergic tone, patients may use substances or self-harm (producing endorphins) to artificially create a positive effect. Chronic invalidation leads to poor self- esteem (eg, the feeling of worthlessness) and the consequent reliance on others for self-esteem needs, resulting in an intense fear of abandonment and severe distress when perceived abandonment happens. Because of stressful childhood experiences with caregivers (and ongoing unstable relationships), people with BPD may lack trust in others. The treatment for BPD is dialectical behavioral therapy. Incorrect Answers: A. B. D. and E. Antisocial personality disorder (Choice A) is a cluster B personality disorder that arises from a deficit in empathy, resulting in pervasive violations of others' rights, aggression, and a hostile and manipulative attitude toward others. These patients may also be chronically bored. and hence, sensation seeking, leading to a high rate of substance use disorders and gambling. Patients with antisocial personality disorder rarely self-harm. Whereas the patient in this scenario had unstable emotions and an insecure attachment with her boyfriend, patients with antisocial personality disorder commonly lack emotion and attachments to others. Avoidant personality disorder (Choice B) is a cluster C personality disorder (the anxious or fearful cluster} that features the avoidance of interpersonal contact because of feelings of social inadequacy and hypersensitivity to rejection. Though this patient is hypersensitive to rejection and abandonment, she does not avoid interpersonal contact or endorse fears of socializing. Narcissistic personality disorder (Choice D}, a cluster B personality disorder. is characterized by fragile self-esteem and compensatory arrogant, self-aggrandizing behavior to gain approval, sometimes at others' expense. Similar to patients with BPD, patients with narcissistic personality disorder are overly sensitive in social settings. However, the patient in this scenario does not demonstrate self-aggrandizing behavior. Obsessive-compulsive personality disorder (Choice E} is a cluster C personality disorder that features a pattern of inflexible orderliness and perfectionism as well as an intense fear of making mistakes. These patients typically present as emotionally constricted rather than emotionally dysregulated. like the patient in this scenario.","edu_obj":"Borderline personality disorder is a cluster B personality disorder that features an unstable sense of self, emotional dysregulation, and tumultuous relationships. To unconsciously fulfill emotional needs, patients with borderline personality disorder may make suicidal gestures to avoid abandonment."},{"block":4,"item":19,"image_alt":"","image_url":"","stem":"A 38-year-old woman has had a slowly enlarging pink papule on her left cheek for 1 year. A photomicrograph or a biopsy specimen of the papule is shown. Which of the following Is the most likely diagnosis?","choices":{"A":"Actinic keratosis","B":"Basal cell carcinoma","C":"Fibrous histiocytoma","D":"Malignant melanoma","E":"Seborrheic keratosis","F":"Squamous cell carcinoma"},"correct":"B","explanation":"Basal cell carcinoma typically presents as pink, pearly papules or nodules with rolled borders and central ulceration found in sun-exposed areas of the head and neck. Biopsy specimen of basal cell carcinoma shows basaloid blue islands of cells invading into the dermis. These cells form a peripheral palisaded pattern with retraction from the surrounding dermis, due to surrounding myxoid stroma. Metastasis is rare, though local invasion with tissue destruction can occur. Following diagnosis, basal cell carcinoma is treated with excision-based therapies, including Mohs surgery or electrodessication and curettage. Incorrect Answers: A, C, D, E and F. Actinic keratosis (Choice A) classically presents as chronic rough. scaly patches in areas of UV light damage, including the face, ears. forearms. and dorsal hands. Pathologic examination shows parakeratosis, loss of the granular layer, and partial thickness atypia extending from the basal layer of the epidermis. These lesions do not invade into the dermis. Fibrous histiocytoma (Choice C) or dermatofibroma is a benign proliferation of fibrohistiocytic cells, which typically presents as a hyperpigmented. semi-firm papule on the lower extremities. Pathologic examination shows spindle cell proliferation with collagen trapping, and stains positive for Factor Xllla. Malignant melanoma (Choice D) is a tumor of melanocytes. which are dendritic cells that reside in the basal layer of the epidermis and produce melanin that is distributed among the surrounding keratinocytes. These tumors invade into the dermis and stain positive for factors such as S100. The most important risk factor for melanoma metastasis is the depth of invasion, termed \"Breslow thickness.\" Lesions suggestive of melanoma should undergo diagnostic biopsy for pathologic evaluation. Seborrheic keratosis (Choice E) is a benign proliferation of the epidermis that exhibit a greasy, adherent appearance on clinical examination. These lesions present with acanthosis, or epidermal thickening, horn cysts filled with keratin, and do not invade into the dermis. Squamous cell carcinoma (Choice F) typically presents with a non-healing ulcerative lesion with scale in areas of prolonged sun exposure. Pathologic examination of squamous cell carcinoma shows parakeratosis, loss of the granular layer, full thickness epidermal atypia, keratin pearls, and may invade into the dermis. Squamous cell carcinomas are treated with excision-based therapies, including Mohs surgery or electrodessication and curettage.","edu_obj":"Basal cell carcinoma is a malignant proliferation of basal keratinocytes extending from the basal layer of the epidermis into the dermis. Pathologic features of basal cell carcinoma include blue basaloid islands of cells in a peripheral palisaded pattern with retraction from surrounding dermis. Basal cell carcinoma is treated with surgical modalities including Mohs surgery, surgical excision, or electrodessication and curettage."},{"block":4,"item":20,"image_alt":"","image_url":"","stem":"In a study of the use of ultrasonography for the early detection of prostate cancer. 35 of 50 men with prostate cancer have abnormal test results, and 20 of 100 men without prostate cancer have abnormal test results. Which of the following is the specificity of this test?","choices":{"A":"20%","B":"30%","C":"50%","D":"70%","E":"80%"},"correct":"E","explanation":"Specificity describes the proportion of people who do not have the disease that test negative and is calculated as true negatives/ (true negatives+ false positives). As specificity increases, the false positive rate decreases. A highly specific test allows the clinician and the patient to be confident that a positive test confirms the presence of disease. A test with poor specificity, if positive, does not proVide strong evidence or confidence that the patient does. in fact. have the disease. In contrast, sensitivity is the ability of a test to detect a disease if it is present. A test is described as sensitive if it has a high likelihood of disease detection, and therefore a low likelihood of a false negative (Type II error). High sensitivity is useful in ruling out a disease. In the study described, 80 men without prostate cancer have normal test results (true negatives), whereas 20 men without prostate cancer have abnormal test results (false positives). Therefore, the sens,tivity of this test is 80/(80+20) or 80%. Incorrect Answers: A, B, C, and D. 70% (Choice D) describes the sensitivity of this test, rather than the specificity. The other choices (Choices A, B, and C) are incorrect calculations of the specificity.","edu_obj":"Specificity describes the proportion of people who do not have the disease that test negative and is calculated as true negatives / (true negatives + false positives). As specificity increases, the false positive rate decreases. A highly specific test allows the clinician and the patient to be confident that a positive test confirms the presence of disease."},{"block":4,"item":21,"image_alt":"","image_url":"","stem":"A 47-year-old woman comes to the physician because of a 1-week history of yellow-tinged eyes and itchy skin. Physical examination shows scleral icterus and multiple excoriations over the trunk. Serum studies show:

Total bilirubin: 8 mg/dl
Alkaline phosphatase: 450 U/L
ALT: 45 U/L
Antimitochondrial antibodies: present

This patient most likely has a deficiency of which of the following?","choices":{"A":"Folic acid","B":"Vitamin B6 (pyridoxine)","C":"Vitamin B 12 (cobalamin)","D":"Vitamin C","E":"Vitamin D"},"correct":"E","explanation":"This patient has signs of primary biliary cholangitis (PBC) with signs of cholestasis (increased bilirubin and alkaline phosphatase), supported further by the presence of antimitochondrial antibodies. P8C is an autoimmune destruction of intralobular bile ducts. It generally presents in middle-aged women with pruritus, fatigue, and cholestasis. Physical examination may show jaundice, scleral icterus, skin hyperpigmentation, and hepatosplenomegaly. Laboratory studies will show increased concentrations of alkaline phosphatase, bilirubin (especially late in the course), and, to a lesser degree, aminotransferases. Antimitochondrial antibodies, as seen in this patient, are also indicative of disease. Complications include cirrhOsis and liver failure. Because bile aids in the absorption of lipids and fat-soluble vitamins, patients with PBC can develop malnutrition and fat-soluble vitamin deficiencies. Fat-soluble vitamins include vitamins A, D, E, and K. Thus, this patient with PBC most likely has vitamin D deficiency, which can cause low bone mineral density and/or hypocalcemia. Incorrect Answers: A, B, C, and D. Folic acid (Choice A) is contained in leafy vegetables and absorbed in the jejunum. Folic acid deficiency is often seen in patients with malnutrition, alcohol use disorder, and patients taking antifolate medications (eg, phenytoin, methotrexate). Megaloblastic anemia occurs in the setting of impaired DNA synthesis. Folic acid is not a fat-soluble vitamin. so its absorption would not be affected by PBC. Vitamin 8 6 (pyridoxine) (Choice 8) deficiency limits synthesis of histamine, hemoglobin, and neurotransmitters, including epinephrine, norepinephrine, dopamine, serotonin, and y-aminobutyric acid. Deficiency commonly presents with peripheral neuropathy, dermatitis, sideroblastic anemia, glossitis, and seizures. As vitamin B6 is not fat. soluble, its abSorption would not be affected by PBC. Vitamin 8 12 (cobalamin) (Choice C) deficiency is most common in pernicious anemia, gastrectomy, and decreased intake. Symptoms include megaloblastic anemia, as well as neurologic deficits such as subacute combined degeneration of the spinal cord. While absorption of vitamin B12 is complex and involves multiple aspects of digestion, its absorption is not generally affected by PBC. Vitamin c (Choice D), or ascorbic acid, is a water-soluble antioxidant found in fruits and vegetables. Deficiency causes the constellation of symptoms known as scurvy, which is characterized by petechiae, perifollicular hemorrhage, bruising, poor wound healing, and small, curly, fragile hairs. As vitamin C is water-soluble, it would not be deficient in this patient.","edu_obj":"Primary biliary cholangitis is an autoimmune disorder of the intralobular bile ducts that most commonly presents in middle-aged women with pruritus. fatigue, cholestasis, jaundice, hepatosplenomegaly, and increased concentrations of bilirubin, aminotransferases, and alkaline phosphatase. Antimitochondrial antibodies are indicative of disease. It can be complicated by malnutrition with deficiencies of fat-soluble vitamins, such as vitamins A, D, E, and K."},{"block":4,"item":22,"image_alt":"","image_url":"","stem":"A 47-year-old woman comes to the physician because of a 1-week history of yellow eyes and itching skin. Physical examination shows scleral icterus and excoriations over the trunk. Serum studies show:

Total bilirubin: 8 mg/dl
Alkaline phosphatase: 450 U/L
ALT: 45 U/L
Antimitochondrial antibody titer: 1:80 (N=absent)

This patient most likely has a deficiency of which of the following vitamins?","choices":{"A":"Folic acid","B":"Vitamin A","C":"Vitamin B 1 (thiamine)","D":"Vitamin B6 (pyridoxine)","E":"Vitamin B (cobalamin)","F":"Vitamin C"},"correct":"B","explanation":"This patient has signs of primary biliary cholangitis (PBC) with signs of cholestasis (increased bilirubin and alkaline phosphatase), supported further by the presence of antimitochondrial antibodies. PBC is an autoimmune destruction of intralobular bile ducts. It generally presents in middle-aged women with pruritus. fatigue. and cholestasis. Physical examination may show jaundice. scleral icterus. skin hyperpigmentation. and hepatosplenomegaly. Laboratory studies will show increased concentrations of alkaline phosphatase. bilirubin (especially late in the course). and, to a lesser degree. aminotransferases. Antimitochondrial antibodies, as seen in this patient. are also indicative of disease. Complications include cirrhosis and liver failure. Because bile aids in the absorption of lipids and fat-soluble vitamins. patients with PBC can develop malnutrition and fat-soluble vitamin deficiencies. Fat-soluble vitamins include vitamins A. D, E. and K. Thus, this patient with PBC most likely has vitamin A deficiency, which can cause night blindness. corneal degeneration, Bitot spots on the conjunctiva, dry skin. and immunosuppression. Incorrect Answers: A, C, D, E, and F. Folic acid (Choice A) is contained in leafy vegetables and absorbed in the jejunum. Folic acid deficiency is often seen in patients with malnutrition, alcol1ol use disorder, and patients taking antifolate medications (eg, phenytoin. methotrexate). Megaloblast1c anemia occurs in the setting of impaired DNA synthesis. Folic acid is not a fat-soluble vitamin, so its absorption would not be affected by PBC. Vitamin B1 (thiamine) (Choice C) causes variable manifestations when deficient. Dry beriberi presents as peripheral neuropathy with mental status change. Wet beriberi exhibits a dilated cardiomyopathy leading to heart failure. Wernicke encephalopathy classically presents as confusion, ataxia, and ophthalmoplegia. As vitamin B 1 is not fat- soluble, its absorption is not affected by P8C. Vitamin B6 (pyridoxine) (Choice D) deficiency limits synthesis of histamine, hemoglobin, and neurotransmitters, including epinephrine, norepinephrine, dopamine, serotonin. and y-aminobutyric acid. Deficiency commonly presents with peripheral neuropathy, dermatitis, sideroblastic anemia, glossitis, and seizures. As vitamin B6 is not fat- soluble. its absorption would not be affected by P8C. Vitamin 8 12 (cobalamin} (Choice E) deficiency is most common in pernicious anemia, gastrectomy, and decreased intake. Symptoms include megaloblastic anemia, as well as neurologic deficits such as subacute combined degeneration of the spinal cord. Vitamin 8 12 absorption is not affected by PBC. Vitamin C (Choice F}. or ascorbic acid, is a water-soluble antioxidant found in fruits and vegetables. Deficiency causes the constellation of symptoms known as scurvy. which is characterized by petechiae, perifollicular hemorrhage, bruising, poor wound healing, and small, curly, fragile hairs. As vitamin C is water-soluble, it would not be deficient in this patient.","edu_obj":"Primary biliary cholangitis is an autoimmune disorder of the intralobular bile ducts that most commonly presents in middle-aged women with pruritus, fatigue, cholestasis, jaundice, hepatosplenomegaly, and increased concentrations of bilirubin, aminotransferases, and alkaline phosphatase Antimitochondrial antibodies are indicative of disease. It can be complicated by malnutrition with deficiencies of fat-soluble vitamins. such as vitamins A. D, E. and K."},{"block":4,"item":23,"image_alt":"","image_url":"","stem":"A 25-year-old woman comes to the physician because of progressive fatigue during the past 5 months. She says that she falls asleep several times daily. She takes no medications. She is 152 cm (5 ft) tall and weighs 154 kg (340 lb); BMI is 66 kg/m2. Her blood pressure is 150/90 mm Hg. Physical examination shows no other abnormalities. Laboratory studies show:

Hemoglobin: 18.1 g/dl
Hematocrit: 54%
Serum glucose: 140 mg/dl

Arterial blood gas analysis on room air:
- pH: 7.25
- PCO₂: 61 mm Hg
- PO₂: 60 mm Hg

The results of a urine drug screen are negative. Which of the following is the most likely cause of the somnolence in this patient?","choices":{"A":"Hyperglycemia","B":"Hypertension","C":"Hypoventilation","D":"Polycythemia","E":"Psychogenic disorder"},"correct":"C","explanation":"This patient with obesity, progressive fatigue, respiratory acidosis, hypoxemia, and polycythemia has a presentation consistent with obesity hypoventilation syndrome (OHS). OHS is defined as alveolar hypoventilation that occurs in an obese patient (BMI >30) while awake. Obesity induces increased demand on the respiratory system, and, in healthy individuals, compensatory mechanisms occur to maintain normal carbon dioxide levels. The pathogenesis of OHS is complex. but it is thought to develop because of failure of these ccmpensatory mechanisms. leading to hypercapnia. Most patients with OHS also have obstructive sleep apnea, and thus, may present with daytime sleepiness, loud snoring, and frequent nighttime awakenings. In addition to these things, patients with OHS often have daytime hypoxemia that significantly worsens overnight and may present with signs and symptoms of pulmonary hypertension. Laboratory studies will show respiratory acidosis, compensatory metabolic alkalosis, hypoxemia, and often. polycythemia due to chronic hypoxemia. Polysomnography is the gold standard for diagnosis of OHS. Definitive treatment is weight loss. lnccrrect Answers: A, 8, D. and E. Hyperglycemia (Choice A) that is severe may lead to somnolence in the setting of hyperosmotic hyperosmolar state (HHS). Patients with HHS often have glucose concentration >600, serum osmolality >320, normal pH, and present with altered mental status, polyuria, and excessive thirst. This patient has a normal glucose concentration, ruling out HHS. Hypertension (Choice B) can be associated with changes in mental status. Two examples are posterior reversible encephalopathy syndrome, and hypertensive intracerebral hemorrhages. Both conditions are associated with significantly increased blood pressures, usually >180/11O mmHg. This patient only exhibits mildly increased blood pressure. Polycythemia (Choice D) seen in patients with OHS is termed secondary polycythemia. Decreased oxygenation causes increased secretion of erythropoietin (EPO) from the kidneys. Increased ccncentration of EPO stimulates the production of hemoglobin and erythrocytes. Polycythemia can lead to itching and erythromelalgia but does not typically cause somnolence. Psychogenic disorder (Choice E) is unlikely in this patient who has objective abnormalities on evaluation. The presence of respiratory acidosis, hypoxemia. and polycythemia are more consistent with an organic cause of underlying somnolence.","edu_obj":"Obesity hypoventilation syndrome (OHS) is characterized by daytime alveolar hypoventilation in an obese patient. Laboratory studies will reveal respiratory acidosis, compensatory metabolic alkalosis, hypoxemia, and polycythemia. Definitive treatment is weight loss."},{"block":4,"item":24,"image_alt":"","image_url":"","stem":"A 26-year-old woman with mild intellectual developmental disorder is brought to the physician by her father because he is concerned about her recent disruptive behavior. The father often conducts business with clients at home. and the patient frequently interrupts his business meetings wearing revealing clothing. She has three sisters who are married, and she often states that she wants her own husband. The father asks the physician to prescribe enough medication for his daughter so that she no longer embarrasses him. Which of the following is the most appropriate initial action by the physician?","choices":{"A":"Speak to the patient privately about what motivates her behavior","B":"Advise the patient's father to conduct his business outside of the home","C":"Recommend that the father restrict the patient to her room during his meetings","D":"Discuss with the patient's father the possibility of placing his daughter in a group home","E":"Prescribe a medication that will suppress the patient's libido"},"correct":"A","explanation":"When patients' family members express concerns about medical issues, physicians should first ask the patient open-ended questions about the family member's concern to build a therapeutic alliance with the patient and explore the patient's understanding of the issue. This questioning should be done privately given that there is interpersonal conflict around the behaviors that may inhibit this patient from candid discussion if her father were present. This information gathering will help define the problem and inform the physician of whether the patient is distressed about the behaviors or experiencing daily dysfunction because of the behaviors. Typically, behavioral or pharmacologic treatment is warranted for behaviors related to mental health diagnoses that lead to patient distress or daily dysfunction. If behaviors are causing distress in one family member only, physicians should consider problem solving with this family member about how to cope with or manage the behaviors. However, before the physician can recommend management strategies, the physician should gather more information. Incorrect Answers: B, C, D, and E. Before recommending management strategies such as advising the patient's father to conduct his business outside of the home (Choice B), recommending that the father restrict the patient to her room during his meetings (Choice C), or discussing with the patient's father the possibility of placing his daughter in a group home (Choice D), the physician should develop a comprehensive understanding of the issue by speaking with the patient privately. Restricting the patient to her room during the father's meetings or placing her in a group home would likely unnecessarily limit the patient's freedom. Further, placing the patient in a group home would likely be unnecessarily restrictive given the limited scope of the behaviors, which do not appear to reflect generalized daily dysfunction. Prescribing a medication that will suppress the patient's libido (Choice E) is not an accepted medical practice in most situations. Prior to recommending any pharmacologic treatment, the physician needs to gather more information by speaking with the patient privately.","edu_obj":"When patients' family members express concerns about medical issues, physicians should privately ask the patient open-ended questions about the family member's concern to build a therapeutic alliance with the patient and explore the patient's understanding of the issue."},{"block":4,"item":25,"image_alt":"","image_url":"","stem":"A 68-year-old man comes to the physician because of a 6-month history of progressive shortness of breath. He also has a 1-month history of nonproductive cough. He has a long history of joint pain treated with prednisone. He does not smoke cigarettes. but he was raised in a coal mining community. Vital signs are within normal limits. Physical examination shows no jugular venous distention or edema. There are small painless nodules along the extensor surface of both forearms. ulnar deviation, and swan neck deformities of the fingers. Bilateral diffuse crackles are heard on auscultation of the chest. A chest x-ray shows a diffuse fibronodular infiltrate with a right pleural effusion. A thoracentesis is done, and pleural nuid analysis shows straw-colored nuid containing 200 leukocytes/mm³ and a glucose concentration of 12 mg/dl (N=70). Which of the following is the most likely underlying cause of his current condition?","choices":{"A":"Goodpasture syndrome","B":"Polymyalgia rheumatica","C":"Rheumatic fever","D":"Rheumatic heart disease","E":"Rheumatoid arthritis","F":"Granulomats with polyangiitis"},"correct":"E","explanation":"Rheumatoid arthritis (RA) is an autoimmune disease that causes extensive inflammation in the synovial tissues. The clinical course is characterized by joint destruction, periarticular bone loss. and synovial hypertrophy, along with extra-articular manifestations, such as rheumatoid nodules and pleural effusions Patients often present with symmetric patterns of arthritis, particularly in the wrists and hands. Results of serologic studies generally show a positive rheumatoid factor and anti-cyclic citrullinated peptide antibodies. RA is associated with the HLA-DR4 genotype. Tumor necrosis factor (TNF) is key in the pathophysiology of RA. It is a potent activator of macrophages and neutrophils, enhancing their cytotoxic effects and expression of endothelial adhesion molecules to promote migration into peripheral tissues. Because of this central role in RA, TNF is a key target of disease modifying agents such as adalimumab, etanercept, and infliximab. other commonly used disease-modifying agents include methotrexate, hydroxychloroquine, and sulfasalazine. Incorrect Answers: A, B, C, D, and F. Goodpasture syndrome (Choice A) is an autoimmune disease in which antibodies attack the pulmonary capillaries and glomerular basement membranes. Patients with Goodpasture syndrome present with hemoptysis, hematuria, hypertension, and proteinuria. Complications include rapidly progressive, pauci-immune necrotizing and crescentic glomerulonephritis, and pulmonary hemorrhage with hemoptysis and shortness of breath. This patient's clinical presentation is not consistent with Goodpasture syndrome. Polymyalgia rheumatica (PMR) (Choice B) is a chronic inflammatory disease characterized by muscle pain and stiffness in older adults. PMR presents with stiffness in the proximal muscles of the extremities, weight loss, increased erythrocyte sedimentation rate, and C-reactive protein levels. A subset of patients with PMR develop giant cell arteritis of the temporal artery. Patients with PMR are treated with immunosuppressive medications, including corticosteroids. Rheumatic fever (Choice C) is a complication of untreated Streptococcus pyogenes (Group A) infection in pediatric patients and is characterized by carditis, subcutaneous nodules, erythema marginatum, Sydenham chorea, and migratory polyarthritis. Rheumatic heart disease (Choice D) is a late complication of acute rheumatic fever secondary to damage to the heart valves, most commonly the mitral valve, and is associated with valvular fibrosis and calcification. If severe enough, patients may develop left atrial enlargement, cardiogenic pulmonary edema, and arrhythmias such as atrial fibrillation and flutter. Wegener granulomatosis (Choice F), now known as granulomatosis with polyangiitis, is a systemic necrotizing granulomatous vasculitis affecting small and medium vessels and is associated with C-ANCA antibodies. Patients typically present with constitutional symptoms such as fever, weight loss, fatigue, nasal ulcerations with epistaxis, hemoptysis, hematuria, and purpura. Life-threatening complications include rapidly progressive glomerulonephritis and subsequent renal failure.","edu_obj":"Rheumatoid arthritis (RA) is an autoimmune disease characterized by joint destruction, periarticular bone loss, synovial hypertrophy, rheumatoid nodules, and can be complicated with development of pleural effusions. Patients present with symmetric arthritis of the wrists and hands and are positive for rheumatoid factor, as well as anti-cyclic citrullinated peptide antibodies. Tumor necrosis factor is key in the pathophysiology of RA and is targeted by disease-modifying agents."},{"block":4,"item":26,"image_alt":"","image_url":"","stem":"An 82-year-old woman is brought to the physician by her son because of a 1-year history of increasing word-finding difficulty and a 3-year history of increasing forgetfulness. She has hypertension and hypercholesterolemia. Her medications are lisinopril and atorvastatin. Her blood pressure is 120/80 mm Hg. Physical examination shows no abnormalities. On mental status examination, she is alert and attentive. She recalls one of five parts of a name and address after 5 minutes, and does not recognize the remaining parts when given clues for each. She recalls zero of three figures 5 minutes after copying them. She cannot name the point of a pen or the band of a watch. Degeneration of which of the following is the most likely cause of this patient's memory changes?","choices":{"A":"Basal forebrain","B":"Caudate and putamen","C":"Frontal cortex","D":"Hippocampal formation","E":"Mammillary bodies","F":"Medial thalamus","G":"Substantia nigra"},"correct":"D","explanation":"This elderly patient in her ninth decade of life, presenting with word finding difficulty, forgetfulness, and challenges with short-term recall and naming, which likely has degeneration or dysfunction related to her hippocampal formation The hippocampus is a key center for learning and memory processing and is located within the mesial temporal lobe. The hippocampus forms anterograde, declarative memories (eg, memories about facts) and consolidates these memories into long-term memories. The hippocampus also assists with spatial navigation. Additionally, the hippocampus is part of the limbic system and forms strong connections with the brain regions that generate emotions, such as the amygdala. As such, the hippocampus mediates the recall of emotional memories. Bilateral lesions of the hippocampus classically lead to an amnesic syndrome in which new facts cannot be learned or recalled. Hippocampal atrophy is a key finding in the setting of dementia, Alzheimer type. Incorrect Answers: A, B, C, E, F, and G. Basal forebrain (Choice A) is implicated in dementia as well. Dementia, Alzheimer type is associated with decreased cholinergic signaling in the cerebral cortex and basal forebrain. Cholinergic neurons, which primarily originate from the locus coeruleus and basal forebrain, project widely to areas of the cortex, mediating functions such as attention, learning, and memory. This patient displays an isolated disturbance in memory, which limits the ability to diagnose dementia, Alzheimer type or a higher co11ical process. Caudate and putamen (Choice B) lesions tend to be associated with movement disorders in addition to any neurocognitive disorder. For example. Huntington disease and Parkinson disease may involve these areas of the basal ganglia. Huntington disease is a heritable progressive neurodegenerative disorder typically arising in the third to sixth decade of life associated with atrophy of the caudate nuclei. The disease usually presents with an insidious onset of psychiatric (irritability, depression. psychosis) and cognitive symptoms. Motor symptoms (chorea, hypotonia, dystonia, loss of voluntary control of movements) typically appear later in the disease course. The putamen contains inhibitory neurons that coordinate with the subthalamic nucleus to control purposeful movement. Lesions typically lead to parkinsonism (eg, dystonia and tremor). The frontal cortex (Choice C) has many higher order functions, including but not limited to attention, memory, speech, executive decision making, and planning for and executing movement. Mammillary bodies (Choice E) are atrophied in Wernicke-Korsakoff syndrome. a neuropsychiatric disorder related to chronic alcohol use and malnutrition. Patients typically have a thiamine (vitamin 8 1) deficiency because of poor nutritional intake and malabsorption. Over time. thiamine deficiency can result in damage and atrophy of the mammillary bodies. The typical presentation of Wernicke encephalopathy is a triad of altered mental status (including disorientation, confusion, delirium). ophthalmoplegia (which can present with nystagmus). and ataxia. Medial thalamus (Choice F) plays roles in memory, attention, organization, and planning. It has connections with the prefrontal cortex, which also shares these roles. Substantia nigra (Choice G), located in the anterior midbrain. is the primary area that synthesizes dopamine. The dopaminergic neurons of the substantia nigra project to the basal ganglia as part of the nigrostriatal pathway and modulate motor function. Lesions within this area lead to parkinsonism.","edu_obj":"The hippocampus is a key center for learning and memory processing and is located within the mesial temporal lobe. The hippocampus forms anterograde, declarative memories (eg, memories about facts) and consolidates these memories into long-term memories."},{"block":4,"item":27,"image_alt":"Block 4 Q27 — CT of head, axial and coronal views showing pituitary region","image_url":"https://rotogrover.github.io/sa-forms/images/CBSSA31_B4Q27_ct.jpg","stem":"A 53-year-old woman comes to the physician because of a 1-month history of persistent headaches. Physical examination shows no abnormalities. CT scans of the head are shown. Further studies confirm a tumor of the hypophysis. This patient is at greatest risk for compression of which of the following nerves?","choices":{"A":"Olfactory","B":"Optic","C":"Oculomotor","D":"Trochlear","E":"Trigeminal"},"correct":"B","explanation":"Mass lesions within the central nervous system can have several structural and functional effects. Rapidly enlarging lesions can compress adjacent anatomic structures, impairing function or causing herniation through cranial foramina. In this case, the patient presents with persistent headaches and has a CT scan showing a lesion within the sella turcica. The pituitary gland (hypophysis) is located within the sella turcica, which lies in close relationship to several cranial nerves, notably the optic nerve. The sensory fibers of the optic nerve begin within the retina and travel through the optic nerve at the posterior aspect of each eye. The optic nerve enters the skull through the orbital fissures and travels posteriorly to its decussation at the optic chiasm, just superior to the sella turcica and pituitary gland. With the optic chiasm being located immediately superior to the pituitary gland, mass lesions of the pituitary can compress the chiasm and produce a visual field deficit. Patients experiencing a deficit associated with an optic chiasmal lesion will present with bitemporal hemianopsia in such cases, with loss of the lateral field of view bilaterally. Incorrect Answers: A, C, D, and E. The olfactory (Choice A) nerve has a complex course from sensory reception within the nasopharyngeal mucosa through the ethmoid bone and cribriform plate. It may be injured in skull base fractures but is not usually involved with pituitary lesions as its anatomic course is distant from the sella turcica. The oculomotor (Choice C) nerve travels from the brainstem (midbrain) through the cavernous sinus and orbital fissure to innervate several extra- and intraocular muscles, including the superior, inferior, and medial rectus muscles, the inferior oblique muscle, and the pupillary constrictor muscles. It is commonly compressed in brain herniation syndromes and from aneurysms within the circle of Willis, leading to loss of function, which presents with diplopia, an inferiorly and laterally deviated visual axis, and a dilated, sluggish, or nonresponsive pupil. The trochlear (Choice D) nerve travels from the brainstem (midbrain) through the cavernous sinus and orbital fissure to innervate the superior oblique muscle. A lesion affecting this nerve would present with vertical or torsional diplopia and a medially deviated pupil. The trigeminal (Choice E) nerve has three branches, which course from the brainstem (junction of midbrain and pons) to several anatomically distinct areas within the face. Branches V1 and V2 are primarily sensory and carry afferent signals from the forehead, eye, nose, and cheek to the sensory cortices. Branch V3 supplies motor and sensory fibers to the jaw and several muscles. Its fibers do not course in proximity to the sella turcica but do run in proximity to the cavernous sinus. Lesions there, such as cavernous sinus thrombosis, can cause mass effect on the trigeminal nerve.","edu_obj":"Pituitary mass lesions, such as a pituitary adenoma, may lead to compression of the optic chiasm and produce visual field defects. Bitemporal hemianopsia is the most frequently observed visual field defect as a result of chiasmal compression."},{"block":4,"item":28,"image_alt":"","image_url":"","stem":"A new rare genetic disease is caused by a mutation in the gene coding for cysteine-tRNA. This results in the substitution of tyrosine for cysteine. Which of the following is the most likely major effect of this amino acid substitution?","choices":{"A":"Disulfide bonds are not formed","B":"Formation of α-helices is inhibited","C":"Formation of β-sheets ceases","D":"Glycosy1ation is incomplete","E":"Translation stops prematurely"},"correct":"A","explanation":"Amino acids contain an amino group, carboxy group, and side chain that may be nonpolar, polar, acidic, or basic. Nonpolar amino acids include glycine, alanine, valine, leucine. isoleucine, methionine, phenylalanine, praline. and tryptophan. Polar amino acids include serine, threonine, asparagine, cysteine. tyrosine, and glutamine. These amino acids have a polar side chain without a net charge. Amino acids with basic side chains include lysine, arginine. and histidine. Amino acids with an acidic side chain include aspartate and glutamate. Some amino acids have moieties not commonly found on other amino acids. For example, tyrosine contains an aromatic ring, while cysteine contains a sulfhydryl group. Properties of amino acids determine their functional and structural use. For example, transmembrane proteins include largely nonpolar amino acids in their transmembrane domains as a result of their affinity with the hydrophobic phospholipid membrane. Cysteine's sulfhydryl moiety plays an important structural role in tertiary and higher structures of proteins. The sulfhydryl linkage can be catalyzed to form a disulfide bridge (a covalent sulfur-sulfur bond), connecting two separate areas of the polypeptide chain. Loss of cysteine within a protein would alter its tertiary structure. and therefore, its interactions with other peptides and enzymes. which would in turn alter its function. Incorrect Answers: B. c. D. and E. Formation of α-helices is inhibited (Choice B) is incorrect. o-Hellc;es are common motifs within proteins that include a helical structure that repeats every 3.6 amino acid residues. In contrast to covalent sulfur bridges, such helices are stabilized by hydrogen bonding. Similarly, formation of β-sheetsceases (Choice C) is incorrect, as they are also stabilized by hydrogen bonding. Glycosylation is incomplete (Choice D) is incorrect. Glycosylation is one of many post-translational modifications that a peptide can undergo. Many different portions of the amino acid can participate in glycosylation, and addition of sugar moieties greatly increases the functional diversity of proteins. Sugar moieties can target proteins for destinations within or outside of the cell, can be bound by receptors. can act as ligands, and can mediate cell attachment. Glycosylation can occur at many sites on a protein or amino acid, including the amino, carboxy, or side-chain groups. It is not necessarily specific to the sulfur moiety of cysteine. Translation stops prematurely (Choice E) could occur if a stop codon were introduced earlier in the mRNA sequence than would have otherwise been appropriate. Termination of translation is governed by the stop codons, UAG, UGA, and UAA which are recognized by/associated with release (termination) factors Binding of the release factors to the ribosomal A site triggers termination via a GTP dependent process. An early-stop codon can arise from a frameshift mutation; however, this is not a process directly associated with tyrosine to cysteine mutations.","edu_obj":"Properties of amino acids determine their functional and structural use. Cysteine's sulfhydryl moiety plays an important structural role in tertiary and higher structure of proteins. The sulfhydryl linkage can be catalyzed to form a disulfide bridge (a covalent sulfur-sulfur bond). connecting two separate areas of the polypeptide chain. Loss of cysteine within a protein would alter its tertiary structure, and therefore, its function."},{"block":4,"item":29,"image_alt":"","image_url":"","stem":"A 36-year-old man comes to the physician because of fever and frequent slimy stools for 2 weeks. He recently emigrated from Ecuador. His temperature is 38.2°C ( 100.8°F). Abdominal examination shows mild tenderness of the right upper quadrant. Examination of the stool shows mucus. Colonoscopy shows multiple flask- shaped ulcers that have undermined and destroyed large areas of the intestinal epithelium. Which of the following is the most likely causal organism?","choices":{"A":"Ascaris lumbricoides","B":"Cryptosporidium parvum","C":"Ent amoeba histolytica","D":"Sch/srosoma mansoni","E":"Taenia solium"},"correct":"C","explanation":"Infection with Entamoeba histolytica leads to amoebiasis (amoebic dysentery). E. histolytica is an amoebic parasite that forms cysts, which can be transmitted through the fecal-oral route, typically through ingestion of contaminated water. Amoebic cysts mature to trophozoites in the large bowel, which may invade the colonic mucosa and interstitium, leading to symptoms of abdominal pain and bloody diarrhea, or enter the bloodstream and cause hepatic amoebic abscesses, which present with fever and right upper quadrant pain. The diagnosis can be made with identification of cysts on stool microscopy or peripheral smear, which may reveal trophozoites with endosomes containing red blood cells, as well as by antibody assay or polymerase chain reaction. Colonoscopy reveals mucosa! ulcers that are often flask shaped. Treatment of hepatic amoebic abscesses involves combination therapy with metronidazole or tinidazole as well as an anti-luminal agent such as paromomycin or iodoquinol. Incorrect Answers: A, B. D, and E. Ascaris lumbricoides (Choice A) infection causes ascariasis. Endemic to India and other parts of Asia, Africa, and South America, transmission occurs via food or water contaminated with eggs. Ingested eggs hatch within days in the small intestine releasing larvae that travel into the colon, followed by larval infiltration of the intestinal wall with subsequent hematogenous spread within the portal venous system to the liver. From here. larvae can move to the heart and finally to the lungs where they mature over a period of 2 weeks, ascend the bronchi, and travel back down the esophagus after patients cough them up and swallow them. At this point, the larvae mature into adult worms that can measure up to 35 cm in length. Adult worms produce eggs that are released in the stool and begin the infectious cycle again. Clinical manifestations are related to the number of worms and the stage of the life cycle. Pulmonary manifestations include cough and eosinophilic pneumonitis. Some patients are entirely asymptomatic because of low worm burden. Cryplosporidium parvum (Choice B) causes a diarrheal illness that is mild and self-limited in immunocompetent hosts but is severe and often life-threatening in immunocompromised hosts. Signs and symptoms include fever, weight loss, symptoms of dehydration and orthostasis, severe, watery diarrhea, cramping abdominal pain, nausea, and vomiting. lmmunocompromised patients may develop disseminated infection with involvement of the liver and lungs. Diagnosis is made with stool antigen testing or with detection of luminal oocysts by acid fast staining. Schistosoma mansoni (Choice D) along with other Schistosoma spp causes schistosomiasis. one of the most common parasitic infections in the world. The lifecycle of Schistosoma is complex and is shared between snails and humans. The parasite can infect and colonize the intestine, liver. and bladder. Eggs of the parasite are key in the pathophysiology, becoming lodged within organs and triggering an inflammatory reaction followed by fibrosis with collagen deposition. Granulomata can form. Untreated infection can result in organ failure, importantly, liver failure. Treatment is generally with praziquantel. Taenia solium (Choice E) is a pork tapeworm that may cause neurocysticercosis. It most often occurs in endemic rural regions in Latin America, Asia, and Africa. Symptoms include headache. seizures, signs of increased intracranial pressure, and. rarely, altered vision. Certain patients are asymptomatic. and other patients present with muscle or subcutaneous nodules. Treatment may include symptomatic management of increased intracranial pressure and seizures. antiparasitic therapy, and/or steroids.","edu_obj":"Entamoeba histolytica is an amoebic parasite that forms cysts. which can be transmitted through the fecal oral route. typically through ingestion of contaminated water. Amoebic cysts mature to trophozoites in the large bowel, which may invade the colonic mucosa and interstitium, leading to symptoms of abdominal pain and bloody diarrhea, or may enter the bloodstream and cause hepatic amoebic abscesses, which present with fever and right upper quadrant pain."},{"block":4,"item":30,"image_alt":"","image_url":"","stem":"During a study, an investigator sequences a mature mRNA isolated from a human cell line. Adenine is found to repeat 200 times at the 3' end of mRNA. This polyadenylation will most likely have which of the following effects on the translation of mRNA?","choices":{"A":"Addition of lysine residues","B":"Destabilization of mRNA","C":"Initiation of translation","D":"Stabilization of mRNA","E":"Termination of translation"},"correct":"D","explanation":"mRNA, in its nascent. newly transcribed form, undergoes several regulatory modifications. These include the addition of a 5'-GTP cap, splicing of introns and exons. and the addition of a poly-adenine tail. Polyadenylation is the addition of a string of adenine nucleotides to the 3' end of the mRNA molecule that prevents degradation and permits transpo

 allow electrical impulses to spread from the right to left atrium. The superoposterior region posterior to the fossa oval is (Choice E) is the location of the beginning of the anterior internodal conduction pathway; transection of this region may result in damage to this pathway, but the majority of internodal conduction would likely still be intact via the middle and posterior internodal pathways.","edu_obj":"Electrical impulses originate from the sinoatrial node, located in the right atrium, and reach the atrioventricular (AV) node, located in the interatrial septum, before being carried to the ventricles via the His-Purkinje system. When transecting the interatrial septum for access to the left atrium, care must be taken to avoid injuring the cardiac conduction system, most importantly, the AV node, which is located in the posteroinferior region of the septum above the opening of the coronary sinus."},{"block":3,"item":13,"image_alt":"","image_url":"","stem":"A 76-year-old man who has had no medical care for more than 10-~ears comes to the physician because of a 3-week history of intermittent episodes of dizziness and feeling faint. He says the symptoms are worse when he rises after lying down. He is unable to be even moderately physically active because of the dizziness. He has had no chest pain or shortness of breath during this period. His pulse is 30/min, respirations are 15/min, and supine blood pressure is 100/40 mm Hg. Physical examination shows no other abnormalities. An ECG is shown. This patient most likely has which of the following dysrhythmias?","choices":{"A":"Atrial fibrillation","B":"Atrial flutter","C":"Second-degree atrioventricular block","D":"Sinus arrest","E":"Sinus bradycardia","F":"Third-degree atrioventricular block"},"correct":"F","explanation":"Third-degree atrioventricular {AV) block {complete heart block) occurs when no sinus impulses are transmitted through the AV conduction pathway resulting in complete dissociation between the atria and ventricles, marked by no relationship between P waves and the QRS complexes on ECG. ECG will show a constant. regular interval between P waves and a different constant. regular interval between QRS complexes. which will show no relationship to one another. Patients with a third-degree AV block may present with fatigue, dyspnea. chest pain. lightheadedness. or syncope. Causes include ischemic or structural heart disease, electrolyte abnormalities, systemic diseases {eg. systemic lupus erythematosus. connective tissue disorders. sarcoidosis, amyloidosis). Lyme carditis. and medication toxicity. Any symptomatic patient requires intervention with chronotropic agents (eg, atropine, dopamine, epinephrine) though such agents may not resolve the symptoms. If the patient's bradycardia is refractory to medical management, or if the patient becomes or remains hemodynamically unstable, transcutaneous or transvenous pacing should be performed. Definitive management includesreversalof anysecondarycauses,andplacementof a permanentpacemakerin caseswhereno reversiblecauseis present. Incorrect Answers: A, B, C, D, and E. Atrial fibrillation (Choice A) and atrial flutter (Choice B) are both tachyarrhythmias that often present with palpitations. fatigue, lightheadedness. and dyspnea when symptomatic On electrocardiography, atrial fibrillation shows irregularly irregular RR intervals without discernible P waves. Atrial flutter appears as regular flutter waves with regular or irregular QRS complexes, depending on the AV conduction ratio. Second-degree atrioventricular block (Choice C) has two presentations: type I and type II. Second degree AV block type I is identified by a prolonged PR interval that progressively increases followed by a non-conducted P wave (no QRS), with resumption of normal conduction. It is usually benign. Second degree AV block type 11is identified by a prolonged PR interval that does not progressively increase with intermittent non-conducted P waves. Treatment for type II often involves placement of a pacemaker. Sinus arrest {Choice D) occurs When there is an absence of SA nodal activity for 3 seconds or longer. ECG will show absence of electrical activity followed by one or more escape beats. Sinus bradycardia (Choice E), when symptomatic. may have a similar clinical presentation to that of a third-degree AV block with fatigue, dyspnea, and lightheadedness. In sinus bradycardia, conduction occurs in the typical fashion from the SA node to the AV node. ECG shows regular QRS complexes that are each preceded by a P wave, with a pulse less than 60/min.","edu_obj":"Third-degree atrioventricular (AV) block occurs when no sinus impulses are transmitted through the AV conduction pathway resulting in complete dissociation between the P waves and the QRS complexes. Definitive management is placement of a permanent pacemaker or treatment of the underlying cause. Any unstable patient may require temporary electrical pacing or pharmacologic chronotropic support regardless of etiology."},{"block":3,"item":14,"image_alt":"","image_url":"","stem":"A 22-year-old man comes to the office because of a 3-month history of episodes of severe abdominal pain with nausea and vomiting. Abdominal examination shows epigastric tenderness to palpation without rebound tenderness or guarding. Serum studies show a triglyceride concentration of 2000 mg/dl. amylase activity of 2000 U/L, and lipase activity of 1800 U/L. Abdominal ultrasonography shows no evidence of biliary tract obstruction. A drug from which of the following classes is most appropriate to treat this patient's lipid abnormality?","choices":{"A":"Bile acid sequestrant","B":"Cholesterol absorption inhibitor","C":"Fibric acid derivative","D":"HMG-CoAinhibitor","E":"Omega-3 fatty acids ~"},"correct":"C","explanation":"This patient presents with recurrent epigastric abdominal pain, nausea, and vomiting, in the setting of hypertriglyceridemia, a known risk factor for acute interstitial pancreatitis. Acute pancreatitis typically presents with epigastric abdominal pain that radiates to the back, nausea, and emesis. The patient often has a history of gallstones, alcohol use disorder, trauma, hypertriglyceridemia, or hypercalcemia. Less common clinical manifestations are bruising of the flanks (Turner sign) and bruising around the umbilicus (Cullen sign). Acute pancreatitis can be complicated by necrosis, hemorrhage, abscess, or the formation of pseudocysts. Laboratory studies often show increased amylase and lipase activity. Recurrent episodes of acute pancreatitis may lead to chronic pancreatitis and insufficiency of both the exocrine and endocrine pancreas. Any modifiable inciting causes of pancreatitis (eg, gallstones, alcohol use disorder, hypertriglyceridemia, hypercalcemia) should be mitigated to delay disease progression and preserve remaining native pancreatic function. The first-line class of medications to target hypertriglyceridemia in the absence of concomitant hypercholesterolemia (eg, increased serum LDL cholesterol concentration) is fibric acid derivatives. For example, gemfibrozil is a fibrate-based lipid-lowering agent that activates peroxisome proliferator-activated receptors (PPAR) and upregulates lipoprotein lipase, resulting in decreased serum LDL, increased HDL, and decreased triglyceride concentrations. Incorrect Answers: A, B, D, and E. Bile acid sequestrant (Choice A) medications form a nonabsorbable complex with bile acids in the gastrointestinal tract and facilitate their excretion in the stool. They are a second-line class used in hyperlipidemia after initiation of a statin. They are not used primarily in the management of hypertriglyceridemia. Cholesterol absorption inhibitor (Choice B) medications are used to prevent micellar uptake of dietary and biliary cholesterol in the small intestine. By limiting the amount of cholesterol that returns to the liver in chylomicrons, the liver upregulates LDL receptors which results in increased serum clearance of cholesterol. Ezetimibe is an example and is used in conjunction with statin medications in the treatment of hyperlipidemia. HMG-CoA inhibitor (Choice D) medications are those that make up the \"statin\" group. By limiting hepatic synthesis of cholesterol, hepatic uptake of cholesterols from the bloodstream is increased. Stalins are the first-line medications used in the treatment of hypercholesterolemia, especially for patients with increased LDL and decreased HDL cholesterol. They lower triglyceride concentrations as well, though to a lesser extent than their LDL-lowering capability. As a result, they are a second-line treatment to fibric acid derivatives for hypertriglyceridemia. Omega-3 fatty acids (Choice E) have been studied for several decades as a means of reducing cardiovascular risk, though as of 2022, several reviews and meta-analyses have been published that show limited efficacy in certain populations. There is consensus that they may act to lower blood pressure and serum triglyceride concentrations without significantly changing serum LDL and HDL concentrations; however according to the consensus statement from the American Heart Association, their use is more appropriate at mild-to-moderate hypertriglyceridemia (triglyceride concentration in the 100-499 mg/dL range). Triglyceride levels above 500 mg/dL are best treated with fibric acid derivatives as a first-line agent.","edu_obj":"Acute pancreatitis typically presents with epigastric abdominal pain that radiates to the back, along with nausea and emesis, and often in a patient with a history of gallstones, alcoholism, trauma, hypertriglyceridemia, or hypercalcemia. Risk factors should be addressed and treated to prevent recurrence of symptoms and limit the likelihood of progression to chronic pancreatitis. Hypertriglyceridemia is best treated with fibric acid derivatives as first-line agents."},{"block":3,"item":15,"image_alt":"","image_url":"","stem":"A 42-year-old woman comes to the physician because of a 6-month history of progressive loss of peripheral vision. Ophthalmologic examination stiows bitemporal hemianopia with normal fundi and visual acuity. A sagittal T1-weighted MRI of the brain with contrast is shown; the arrow indicates an abnormality. To surgically access and resect the mass via a nasal approach, which of the following sinuses must be traversed?","choices":{"A":"Ethmoid","B":"Frontal","C":"Maxillary","D":"Sphenoid"},"correct":"D","explanation":"This patient's finding of progressive bitemporal hemianopia is consistent with a diagnosis of a pituitary mass lesion. Benign adenomas are the most common neoplasms identified in the pituitary gland, and may secrete hormones, such as prolactin or growth hormone, causing symptoms of hyperpituitarism. More commonly, pituitary mass lesions do not cause hyperpituitarism but instead cause compression of normal pituitary neurons, leading to hypopituitarism and dysfunction of multiple endocrine axes. The pituitary gland rests in the bony sella turcica, just inferior to the optic chiasm. Retinal ganglion cell fibers from the nasal retina, which supply the temporal visual fields, decussate at the chiasm, and are vulnerable to compression by pituitary mass lesions. Since the decussating nasal retinal fibers carry information from the temporal visual fields, the resultant visual field deficit is commonly a bitemporal hemianopia. a finding suggestive of a pituitary mass. Symptomatic pituitary mass lesions that require resection can be surgically approached via the sphenoid sinuses. The sphenoid sinuses are the most posterior of the paranasal sinuses. bordered anteriorly by the nasal cavity, superiorly by the hypophyseal Iossa, and inferiorly by the pterygoid canal and nasopharynx. The sinus is accessed via the nose with osteotomy of the anteroinferior aspect of the sphenoid bone: the thin bone of the superior aspect of the sphenoid sinus is then pierced lo enter the hypophyseal Iossa. Incorrect Answers: A, B, and C. The ethmoid (Choice A) sinus is a complex structure of air cells. located inferior to the frontal bone and anterior cranial Iossa, and medial to the orbit. It does not provide a straightforward access route to the pituitary fossa. The frontal (Choice B) sinus is bordered by the anterior cranial Iossa superiorly and posteriorly: orbit, ethmoid air cells, and nasal cavity inferiorly: and the contra lateral frontal sinus medially. It does not provide a straightforward access route to the pituitary fossa. The maxillary (Choice C) sinus is bordered by the orbit superiorly, maxillary alveolar bone inferiorly, nasal cavity medially, zygomas laterally and anteriorly, and pterygopalatine Iossa and infratemporal Iossa posteriorly. It does not provide a straightforward access route to the pituitary Iossa.","edu_obj":"Pituitary mass lesions can compress the optic chiasm and cause bitemporal hemianopia. Surgical resection of pituitary mass lesions can be accomplished via a transsphenoidal approach. The sinus is accessed via the nose with osteotomy of the anteroinferior aspect of the sphenoid bone; the thin bone of the superior aspect of the sphenoid sinus is then pierced to enter the hypophyseal Iossa."},{"block":3,"item":16,"image_alt":"","image_url":"","stem":"An investigator studying bronchial circulation interrupts this circulat,ion in experimental animals. As a result, which of the following processes is most likely to be affected?","choices":{"A":"Alveolar macrophage production","B":"Clearance of pulmonary edema","C":"Delivery of nutrients to the tracheal wall","D":"Hypoxic pulmonary vasoconstriction","E":"Surfactant production"},"correct":"C","explanation":"Blood flow to the lungs is accomplished via two systems: the bronchial and the pulmonary circulations. The bronchial circulation is a branch of the high-pressure systemic circulation. It delivers oxygenated blood and nutrients to tracheobronchial structures of the conducting zone (eg, the trachea, bronchi, bronchioles. and terminal bronchioles), visceral pleura, and hilar lymph nodes. Respiratory tree structures in the respiratory zone (eg, the respiratory bronchioles and alveolar sacs) derive nutrients from mixed venous blood of the pulmonary circulation and are oxygenated by direct diffusion from air. As with any other branch of the systemic circulation, low PO₂ causes hypoxic vasodilation to help meet the demand of the target tissue. There are usually two left bronchial arteries, which arise from the thoracic aorta, and one right bronchial artery, which usually arises from an intercostal artery. While some venous drainage is carried by bronchial veins. most of it is carried out of the lungs by pulmonary veins. creating a physiologic right-to-left shunt. Occlusion of the bronchial circulation will therefore disrupt oxygen and nutrient delivery to tracheal parenchyma but will not disrupt the special functions carried out by the pulmonary circulation. Incorrect Answers: A, B, D, and E. The pulmonary circulation is a low-pressure system originating from the pulmonary trunk. It delivers deoxygenated blood from the right side of the heart to the lungs. The pulmonary capillary bed interacts with the alveoli for gas exchange and the venous network returns oxygenated blood to the left atrium. Additionally, the pulmonary circulation provides nutrients for lung parenchymal cells in the respiratory bronchioles and alveolar sacs. Thus, disruption of the pulmonary, not bronchial circulation could disrupt alveolar macrophage production (Choice A), as well as surfactant production (Choice E), which is carried out by type II pneumocytes in the alveoli. The high elasticity and permeability of these vessels can predispose them to extravasation of fluid into the interstitial space and alveoli when this low-pressure system cannot overcome the higher pressure of the left atrium downstream. Clearance of pulmonary edema (Choice 8) is performed by absorption of this fluid back into this circulatory bed. A unique feature of the pulmonary circulation is hypoxic pulmonary vasoconstriction (Choice D). In contrast to systemic bronchial circulation. pulmonary vessels constrict in response to low PO₂, shunting deoxygenated blood away from poorly ventilated portions of the lung and toward well-ventilated portions of the lung to maximize gas exchange into the circulation.","edu_obj":"The lungs contain a dual circulatory supply via the bronchial and pulmonary systems. The bronchial system is a branch of the high-pressure systemic circulation that delivers oxygen and nutrients to the tracheobronchial tree to the level of the terminal bronchioles, visceral pleura, and hilar lymph nodes. The pulmonary circulation is a low-pressure system involved in gas exchange with the alveoli, oxygenation of blood, supply of nutrients to specialized alveolar cells, and clearance of pulmonary edema."},{"block":3,"item":17,"image_alt":"","image_url":"","stem":"A 65-year-old man with chronic obstructive pulmonary disease comes to the office because of a 2-week history of progressive shortness of breath. He had smok.ed 1 pack of cigarettes daily for 40 years before quitting 1 year ago. Current medications include albuterol as needed. His respirations are 18/min. Physical examination shows wheezing. Pulmonary function testing shows an FEV 1 that is 55% of predicted value compared with 65% 1 year ago. It is most appropriate to add a drug to this patient's medication regimen that binds to or interferes with which of the following?","choices":{"A":"~-Adrenoreceptors","C":"Leukotriene receptors","D":"Mast cell degranulation","E":"Muscarinic receptors","F":"Phosphodiesterase"},"correct":"E","explanation":"Chronic obstructive pulmonary disease (COPD} is an obstructive lung disease characterized by decreased lung function from a combination of features of chronic bronchitis and/or emphysema. This results in airflow obstruction on expiration, especially in a patient with history of tobacco use. In general, the goals of therapy are to reduce symptom severity, improve quality of life, and prevent exacerbations and hospitalizations. This is achieved with pharmacologic agents that modulate airway tone and inflammatory response, primarily muscarinic antagonists, β-adrenergic agonists, and glucocorticoids. Albuterol is a short-acting β-adrenergic agonist typically employed as a first-line agent for symptom management. If symptoms persist, as for this patient, addition of a short-acting muscarinic antagonist is the next recommended step. Airway smooth muscle tone is increased by cholinergic signaling. Inhibition of muscarinic receptors in the lungs results in smooth muscle relaxation and bronchodilation. Incorrect Answers: A, B, C, D, and F. [3-Adrenoreceptors (Choice A} are stimulated by [3-adrenergic agonists, which are effective in treating symptoms of asthma and COPD as they cause airway smooth muscle relaxation and bronchodilation. This patient is already prescribed a β-adrenergic agonist, and medication targeting muscarinic receptors should be the next step. lnterleukin-1 (IL-1) synthesis (Choice 8) is implicated in the pathogenesis of asthma and COPD as a primary inflammatory mediator that results in airway narrowing over time. Medications that inhibit leukotriene receptors (Choice C }, such as montelukast, are used in the treatment of asthma and allergic rhinitis. but do not have strong evidence yet for improvement in COPD outcomes. Mast cell degranulation (Choice D) is inhibited by antihistamines, commonly used in treatment of allergies and anaphylaxis. They are not typically used for management of asthma or COPD. Phosphodiesterase (Choice F) inhibitors, particularly phosphodiesterase-4 (PDE-4 ), are used in severe, refractory COPD as they decrease airway inflammation and promote smooth muscle relaxation. Roflumilast is an example. These medications are typically reserved for patients who have failed regimens that include short- and long- acting β-adrenergic agonists, muscarinic antagonists, and glucocorticoids.","edu_obj":"Long- and short-acting muscarinic antagonists, β-adrenergic agonists, and glucocorticoids are the mainstays of treatment for chronic obstructive pulmonary disease. Muscarinic antagonists and β-adrenergic agonists promote airway smooth muscle relaxation causing bronchodilation and less resistance to air flow."},{"block":3,"item":18,"image_alt":"","image_url":"","stem":"A 67-year-Old man who is a retired coal miner comes to the physician because of a 2-year history of progressive shortness of breath. He also has had a 23-Kg (50-lb) weight loss during this period. He appears cacheclic. He is 175 cm (5 ft 9 in) tall and now weighs 54 Kg (120 lb); BMI is 18 kg/m2. His temperature is 36.S\"C (98.2°F), pulse is 100/min. respirations are 22/min, and blood pressure is 137/83 mm Hg. Physical examination shows symmetric air entry with no crackles or wheezes. A chest x-ray and pho1om1crographof lung tissue obtained on biopsy are shown The s1ructure indicated by the arrow in 1he photomicrograph most likely represen1s which of the following?","choices":{"A":"Aspergillus species hyphae","B":"Collagen","C":"Fibrinogen","D":"Hyaline membranes","E":"Microabscess"},"correct":"B","explanation":"The patient's presentation and diagnostic studies are consistent with a diagnosis of interstitial lung disease (ILD). ILD encompasses a heterogeneous group of disorders that result in pulmonary fibrosis and progressively impaired lung function. Patients classically present with progressive dyspnea and chronic non-productive cough. The underlying cause is often determined clinically from the patient's presentation, imaging patterns, and exposure history; however, lung biopsy can provide a definitive diagnosis. The photomicrograph shows a silicotic nodule, with the characteristic central spiral appearance from layered, concentric collagen fiber deposition. Surrounding this central region is a less organized, whorled zone containing macrophages, lymphocytes, and loosely formed collagen. These lesions are pathognomonic for silicosis. which commonly affects workers in the mining, sandblasting, glass manufacturing, and foundry industries. Inhaled crystalline silica dust particles are deposited in the terminal bronchioles and alveoli, resulting in macrophage activation and inflammatory changes. Patients are at increased risk for developing pulmonary tuberculosis and primary lung cancer. Incorrect Answers: A, C, D, and E. Aspergillus species hyphae (Choice A) may be seen in invasive aspergillosis, aspergilloma, and allergic bronchopulmonary aspergillosis. These syndromes tend to present with hemoptysis, wheezing, fever, and cough. Fibrinogen (Choice C) is the precursor for fibrin, the primary structural component that makes up clot in coagulation and hemostasis. The photomicrograph shows a rounded lesion of dense, layered collagen fibers, consistent with silicosis. Hyaline membranes (Choice D) are observed in the setting of acute respiratory distress syndrome (ARDS), which is characterized by the rapid onset of diffuse inflammatory lung injury. Histologic examination shows diffuse alveolar damage with leakage of protein-rich material into the alveolar space, lining it with a hyaline membrane. The disease may progress to diffuse interstitial fibrosis. Microabscess (Choice E) on histologic examination appears as fibrosis surrounding pus composed of necrotic tissue debris and microorganisms, typically with a thickened fibrinous outer wall.","edu_obj":"Silicosis is an interstitial lung disease caused by inhalation of crystalline silica dust particles, which are deposited in the terminal bronchioles and alveoli. Silicotic nodules are characterized by a central hyaline core made of concentrically layered collagen fibers, surrounded by a less organized zone of inflammatory cells and loose collagen."},{"block":3,"item":19,"image_alt":"","image_url":"","stem":"A 40-year-old woman with primary pulmonary hypertension comes to the physician for a follow-up examination. Her blood pressure is 190/100 mm Hg. Echocardiography shows a peak pulmonary systolic pressure of 65 mm Hg. Treatment with bosentan is started. This therapy is most likely to result in blockade of the action of which of the following peptides in this patient?","choices":{"A":"Calcitonin gene-related peptide","B":"Endothelin","C":"Neuropeptide Y","D":"Substance P","E":"Urotensin II"},"correct":"B","explanation":"Bosentan is a competitive endothelin-1 antagonist that is used for the treatment of primary pulmonary arterial hypertension. Two clinically relevant subtypes of endothelin receptors are the endothelin A (ETA) and the endothelin B (ETB) receptors. Binding of endothelin-1 to ETA results in vasoconstriction, whereas binding of endothelin-1 to ETB results in production of nitric oxide and vasodilation. In the context of pulmonary arterial hypertension, the aggregate effect of endothelin-1 results in vasoconstriction and an increase in pulmonary vascular resistance. Bosentan competitively antagonizes the binding of endothelin-1 to both ETA and ETB receptors. However, its greater affinity for ETA results in a vasodilatory effect and decreased pulmonary vascular resistance. limiting pulmonary hypertension, and relieving strain on the right side of the heart. Bosentan is hepatotoxic: patients treated with bosentan should be monitored for increases of serum transaminases. Incorrect Answers: A, C, D, and E. Calcitonin gene-related peptide (Choice A) is a ubiquitous neuropeptide involved in neuroendocrine signaling. It is involved in modulation of pancreatic hormone secretion and glucose regulation. Neuropeptide Y (Choice C) is an orexigenic peptide neurotransmitter that is active in many parts of the central nervous system, especially neurons of the sympathetic nervous system and the hypothalamus. Neuropeptide Y signaling is associated with vasoconstriction. modulation of appetite and metabolism. and regulation of circadian rhythms. It is not associated with pulmonary hypertension. Substance P (Choice D) is a peptide neurotransmitter that is involved in nociception in the peripheral nervous system. Though it is observed to have a potent vasodilatory effect when exposed to vascular tissue. ii is not used in the treatment of pulmonary hypertension. Urotensin II (Choice E) is a cyclic peptide and potent vasoconstrictor that is typically associated with cardiovascular and endocrine disease. It is implicated in the pathophysiology of metabolic syndrome, as well as cardiovascular disease, diabetes mellitus, hypertension, and obesity.","edu_obj":"Endothelin receptor antagonists are employed in the treatment of pulmonary arterial hypertension as endothelin-1 induces vasoconstriction in the pulmonary vasculature. Bosentan is a commonly used endothelin receptor antagonist."},{"block":3,"item":20,"image_alt":"","image_url":"","stem":"A previously healthy 59-year-old man comes to the emergency department because of a 1-day history of fever, shortness of breath. and productive cough. He appears to be in moderate distress_ His temperature is 38.4°C (101.1°F), and respirations are 26/min. Pulse oximetry on room air shows an oxygen saturation of 88%. Bronchial breath sounds are heard over the right lung base posteriorly with egophony and increased tactile fremitus. A chest x-ray shows right lower lobe pneumonia. Which of the following mechanisms is the most likely cause of the hypoxia in this patient?","choices":{"A":"Alveolar fibrosis","B":"Hypoventilation","C":"Right-to-left cardiac shunt","D":"Right ventricular failure","E":"Ventilation-perfusion mismatch"},"correct":"E","explanation":"The cause of hypoxemia can be divided into five categories: hypoventilation. low inspired partial pressure of oxygen. right-to-left shunt, ventilation-perfusion mismatch, and diffusion impairment across the alveolar-capillary interface. Identifying the category can help in narrowing the differential diagnosis for the underlying disease state. Clinical history and measurement of the alveolar-arterial (A-a) gradient on arterial blood gas analysis can direct the clinician to the correct category. In this case, the presence of fever, shortness of breath, productive cougl1, and infiltrate on chest x-ray are sufficient for a diagnosis of pneumonia. In pneumonia, the alveolar space and bronchioles become filled with fluid and/or pus. These regions do not participate in gas exchange as they cannot be ventilated. The pulmonary vasculature responds with hypoxic pulmonary vasoconstriction, which restricts blood flow from the hypoxic regions of lung to match areas of sufficient perfusion with areas of sufficient ventilation. In pneumonia and other disease states. this mechanism can be overwhelmed leading to ventilation-perfusion mismatch and subsequent hypoxemia. Incorrect Answers: A, B, C. and D. Alveolar fibrosis (Choice A} can be caused by many diseases due to recurrent inflammatory injury. Fibrosis reduces the total surface area of the alveolar-capillary interface that participates in gas exchange, eventually leading to hypoxemia. This falls into the diffusion impairment category of hypoxemia causes. Hypoventilation (Choice B) results when a patient has an inadequate minute volume to clear carbon dioxide. The increased partial pressure of carbon dioxide in the alveoli decreases the amount of oxygen available for diffusion, resulting in hypoxemia. Diffusion and perfusion are not directly affected. Hypoventilation occurs in patients with central nervous system depression and neuromuscular disease, in which the body's ability to move air in and out of the lungs is impaired. Right-to-left cardiac shunt (Choice C) occurs when deoxygenated venous blood mixes with the systemic circulation without passing through the pulmonary vasculature. resulting in hypoxemia. In pneumonia, perfusion through the lungs is normal, while ventilation is impaired due to airway and alveolar obstruction. Right ventricular failure (Choice D) results in hypoxemia because of reduced cardiac output through the pulmonary vasculature. Hypoxemia results from ventilation- perfusion mismatch. This patient's clinical presentation is more consistent with pneumonia.","edu_obj":"The cause of hypoxemia can be divided into five categories: hypoventilation. low inspired partial pressure of oxygen, right-to-left shunt. ventilation- perfusion mismatch, and diffusion impairment across the alveolar-capillary interface. The alveolar-arterial (A-a) gradient on arterial blood gas analysis is normal in hypoventilation and low inspired oxygen content, and increases in the setting of a shunt, ventilation-perfusion mismatch, and diffusion impairment."},{"block":3,"item":21,"image_alt":"","image_url":"","stem":"A 27-year-old man is brought to the emergency department because of increasingly severe left-sided chest pain during the past 12 hours. The pain worsens on deep inspiration. He was moving furniture when the pain began. His father died of a myocardial infarction at the age of 58 years. His respirations are 18/min. Palpation over the costochondral junction to the left of the sternum reproduces the pain. Cardiac examination shows no abnormalities. Which of the following is the most likely diagnosis?","choices":{"A":"Coronary artery disease","B":"Costochondritis","C":"Pericarditis","D":"Pleurisy","E":"Pulmonary embolism","F":"Rib fracture"},"correct":"B","explanation":"This patient's acute, well-localized chest wall pain with accompanying tenderness to palpation of the affected area is consistent with costochondritis. Costochondritis is a common cause of chest wall pain and involves inflammation of the costochondral or chondrosternal joints of the thoracic rib cage. Costochondritis is a self-limited condition and is usually idiopathic. While patients may present with symptoms that worsen during deep inspiration (due to chest wall expansion during inspiration), localized tenderness to palpation helps to differentiate costochondritis from other causes of pleuritic chest pain. Laboratory studies, x-rays, and ECGs are normal in costochondritis and generally only aid the diagnosis by excluding other potential diagnoses (eg, pneumonia, acute coronary syndrome, pulmonary embolism). Treatment for costochondrilis involves non-steroidal anti-inflammatory medications and physical therapy. Incorrect Answers: A, C, D, E, and F. Coronary artery disease (Choice A) resulting in a myocardial infarction classically presents with left-sided chest pain but would be abnormal in a young patient without predisposing factors. Generally, myocardial infarction does not cause tenderness upon palpation of the chest wall. Pericarditis (Choice C) classically presents with substernal chest pain, which is often pleuritic, worse when lying down, and improves with leaning forward. It can occur secondary to inflammatory, infectious, or malignant conditions. The ribs are not usually tender to palpation. Pleurisy (Choice D). or inflammation of the pleura, can cause chest pain. It can be caused by pneumonia, which presents with signs and symptoms including fever, chills, shortness of breath, productive cough, and tachypnea, all of which are absent in this patient. Pulmonary embolism (Choice E) is characteristically associated with long periods of immobilization such as orthopedic surgery, intensive care unit stay, long drives. and long plane flights, due to the association with deep venous thrombosis formation from venous stasis. Classic symptoms include chest pain and dyspnea; if an infarction has occurred, pleuritic chest pain and hemoptysis may be present. Vital signs are often notable for tachycardia, tachypnea, and hypoxia. Hypotension can be present if the embolus is large enough to obstruct blood flow from the right ventricle. Rib fracture (Choice F) is a common cause of acute chest pain in younger patients, who are more likely to sustain injuries from trauma (eg, car accident, sports). The injured area is tender to external palpation. Rib fractures are rarely spontaneous and are unlikely in a patient who lacks a history of trauma.","edu_obj":"Costochondritis, inflammation of the costochondral or chondrosternal junctions, presents with respirophasic chest pain and focal tenderness to palpation, often in a younger person without risk factors for cardiac, pulmonary, or vascular causes of pain."},{"block":3,"item":22,"image_alt":"","image_url":"","stem":"A 35-year-old womanl;omes to the physician because of a 2-week history of fatigue. Six months ago, she visited family in Brazil, where she was exposed to domestic and farm animals. Physical examination shows no abnormalities except for pallor. Laboratory studies show a hemoglobin concentration of 7.2 g/dl and a hematocrit of 23%. Which of the following is the most likely causal organism?","choices":{"A":"Enterobius vermicu/aris","B":"Necator americanus","C":"Schistosoma mansoni","D":"Taenia solium","E":"Trichuris trichiura"},"correct":"B","explanation":"Hookworm infection is widespread in the developing world and is a common cause of anemia. Infection is typically caused by the parasitic roundworms Ancy/ostoma duodenale and Necator americanus. Juvenile hookworms hatch from eggs in soil and are capable of penetrating intact human skin. Exposure typically occurs while walking barefoot on contaminated soil. Once the hookworm has entered the host, it travels through the bloodstream to the lungs, enters the alveoli, and migrates to the trachea and oropharynx. from where it is swallowed. The worm then enters the gastrointestinal tract, where it matures and lays eggs that are fecally excreted. Patients may be asymptomatic. but signs and symptoms may include fatigue, cough. abdominal pain, nausea, vomiting. diarrhea, and anemia. The diagnosis is confirmed by identification of eggs or adult worms on stool microscopy. Treatment is with oral albendazole. Albendazole binds to beta-tubulin and inhibits microtubule polymerization. This has a variety of vermicidal effects, including prevention of glucose utilization, glycogen depletion, and inhibition of cellular motility and cellular division. Patients with anemia may benefit from oral iron supplementation while the disease process resolves. Incorrect Answers: A, C, D, and E. Enterobius vermicu/aris (Choice A) is a parasitic helminth that causes pinworm infection. Pinworm infection is spread by fecal-oral transmission and can cause intense, typically nocturnal, anal and peri-anal pruritus. Treatment is with albendazole. Schistosoma mansoni (Choice c) is a parasitic flatworm that is responsible for intestinal schistosomiasis. It is transmitted by contact with fresh water contaminated by infected snails. Symptoms may be mild or severe and include abdominal pain, diarrhea. hematochezia, abdominal distension, and bowel obstruction. Treatment is with oral praziquantel. Taenia so/ium (Choice D) is a parasitic tapeworm that causes cysticercosis. Cysticercosis can affect nearly every organ system through larval invasion of tissues. Frequent manifestations include subcutaneous nodules, muscle pain, vision loss, and central nervous system (CNS) symptoms. Involvement of the CNS is known as neurocysticercosis and may present with seizures, headache, and signs of increased intracranial pressure. Treatment is with oral praziquantel or albendazole. Trichuris trichiura (Choice E) is parasitic roundworm that causes trichuriasis, also known as whipworm infection. The organism is endemic to tropical regions throughout the world. Symptoms may include abdominal pain and distension, diarrhea, hematochezia, and iron deficiency anemia. Treatment is with oral ivermectin plus a benzimidazole, such as albendazole or mebendazole.","edu_obj":"Hookworm infection, usually caused by Ancy/ostoma duodena/e or Necator americanus, is widespread in the developing world and is a common cause of anemia. Exposure typically occurs while walking barefoot on contaminated soil. Patients may be asymptomatic, but signs and symptoms may include fatigue, cough, abdominal pain, nausea. vomiting, diarrhea, and anemia. Treatment is with oral albendazole and iron supplementation."},{"block":3,"item":23,"image_alt":"","image_url":"","stem":"A 61-year-old man comes to the physician because of a 3-week history of progressive loss of appetite and difficulty swallowing. His last medical examination was 10 years ago. He has taken calcium carbonate for chronic heartburn and nonsteroidal anti-inflammatory drugs (NSAIDs} for joint aches for the past 10 years. He drinks approximately four to five 12-ounce beers daily. His diet consists primarily of meat and simple carbohydrates. He appears cachectic. Physical examination shows no other abnormalities. Esophagogastroduodenoscopy shows a stricture at the esophagogastric junction. Examination of a biopsy specimen of the esophagus shows adenocarcinoma. Which of the following is the strongest predisposing risk factor for this patient's condition?","choices":{"A":"Alcohol use","B":"Chronic heartburn","C":"Gender","D":"Low-fiber diet","E":"NSAID use"},"correct":"B","explanation":"Chronic heartburn, or gastroesophageal reflux disease (GERO), commonly occurs because of increased intra-abdominal pressure related to obesity or diminished closing pressure of the lower esophageal sphincter. permitting acidic contents of the stomach to reflux into the esophagus. Chronic GERO may cause intestinal metaplasia of the lower esophagus, which predisposes patients to esophageal adenocarcinoma. Esophageal adenocarcinoma typically presents with progressive dysphagia because of the mass effect of the tumor. Initially, the mass is small enough to only obstruct the passage of large, solid foods. As the mass enlarges, passage of all solids becomes affected, along with some or all liquids. Nonspecific signs of malignancy, such as weight loss. are also seen. Diagnosis can be made with upper endoscopy and biopsy. Direct extension of the malignancy or lymphadenopathy surrounding the neighboring structures may also cause symptoms. Esophageal adenocarcinoma may be treated with a combination of chemotherapy, radiation, and surgical resection. Incorrect Answers: A, C. D, and E. Alcohol use (Choice A) is associated with squamous metaplasia of the cells lining the upper esophagus. over time, squamous metaplasia may worsen and lead to the development of squamous cell carcinoma of the esophagus. Squamous cell carcinoma of the esophagus most commonly involves the upper two-thirds of the esophagus. Gender (Choice C) and a low-fiber diet (Choice DJ have not been linked to the development of esophageal adenocarcinoma. NSAID use (Choice E) may cause gastritis but is not recognized as a direct proximate contributor to esophageal adenocarcinoma.","edu_obj":"Chronic heartburn, or gastroesophageal reflux disease, may result in intestinal metaplasia of the lower esophagus and over time may predispose patients to esophageal adenocarcinoma. Patients with esophageal adenocarcinoma present with symptoms of weight loss and progressive dysphagia, and diagnosis is made with upper endoscopy and biopsy."},{"block":3,"item":24,"image_alt":"","image_url":"","stem":"A 57-year-ofd woman with a history of gastroesophageal reflux disease undergoes upper endoscopy. Results show a 4-cm. bulging nodule in the stomach covered with an intact mucosal surface. The mass is subsequently resected. and examination shows that it is contained within the submucosa; it is fleshy and well circumscribed with minimal mucosal alterations. A diagnosis of gastrointestinal stromal tumor is made. Further examination of this tumor is most likely to show which of the following molecular alterations?","choices":{"A":"Activation of the APC/~-catenin pathway","B":"Activation of KIT receptor tyrosine kinase","C":"Mutation of CDH1 (E-cadherin) protein","D":"Translocation of chromosomes 9 and 22","E":"Translocation of chromosomes 11 and 18"},"correct":"B","explanation":"Gastrointestinal stromal tumors (GISTS) are uncommon sarcomatous neoplasms, generally of the stomach and small intestine. that have malignant potential. They arise from the interstitial cells of Cajal, part of the enteric nervous system. Most GISTs arise from a mutation in either KIT or PDGFRA, which are both protooncogenes that when constitutively active, promote uncontrolled cell growth and division via tyrosine kinase pathways. KIT encodes a transmembrane tyrosine kinase that when bound by its ligand, dimerizes and activates several intracellular signaling pathways, including MAP kinase and RAS. Activating mutations of KIT are demonstrated in 85% to 95% of GISTs and do not require the ligand for ongoing constitutive activity. GISTs are more common in adults, with pediatric cases being rare. They generally present with early satiety, nausea, weight loss, and signs of gastrointestinal bleeding, such as anemia, melena, and hematemesis. Large tumors may present with an intestinal obstruction. Once the diagnosis is established, treatment for GISTs generally involves a surgical and medical approach depending on the extent of invasion or spread. Local, early- stage tumors may be cured by surgical excision if they have not spread. If chemotherapy is warranted, KIT and PDGFRA both offer a target, as their constitutively active protein is a tyrosine kinase that can be targeted by small molecule inhibitors such as imatinib, conveying a generally good prognosis. Incorrect Answers: A. C, D, and E. Activation of the APC/p-catenin pathway (Choice A) characterizes the molecular pathophysiology of certain types of colorectal carcinoma. This pathway leads to instability of chromosomes and increased cellular proliferation with some loss of cellular adhesion, two key elements in the transformation of normal to malignant cells. This pathway accounts for approximately 80% to 85% of colorectal carcinoma. Mutation of CDH1 (E-cadherin) protein (Choice C) describes the hereditary autosomal dominant germline mutation associated with hereditary diffuse gastric canoer syndrome. Translocation of chromosomes 9 and 22 (Choice D) describes the pathophysiology seen in certain types of leukemia, notably chronic myelogenous leukemia (CML). The resulting genetic translocation causes the formation of a constitutively active fusion protein, BCR-ABL, which is a tyrosine kinase and growth factor. The tyrosine kinase inhibitor imatinib targets this protein, often resulting in remission of CML. Translocation of chromosomes 11 and 18 (Choice E) has been associated with the development of mucosa-associated lymphoid tissue (MALT) lymphoma and is not known to be associated with GIST development.","edu_obj":"Most Gastrointestinal stromal tumors (GISTs) arise from a mutation in KIT or PDGFRA, which are protooncogenes that promote uncontrolled cell growth and division via tyrosine kinase pathways. If chemotherapy is needed in the treatment of a GIST, the tyrosine kinase activated by these mutations can be targeted by small molecule inhibitors such as imaUnib, which is also used in the treatment of CML."},{"block":3,"item":25,"image_alt":"","image_url":"","stem":"A 42-year-old man with a history of duodenal peptic ulcer disease has the sudden onset of severe epigastric and right upper quadrant abdominal pain. The abdomen is rigid, tightly distended, and hyperresonant. An x-ray of the abdomen shows air under both sides of the diaphragm. Which of the following structures is most likely involved with the patient's ulcer?","choices":{"A":"Ampulla of Valer","B":"Anterior duodenal wall","C":"Celiac plexus","D":"Head of the pancreas","E":"Retroperitoneal portion of the duodenum"},"correct":"B","explanation":"Peptic ulcer disease describes the presence of ulcers in the stomach or duodenum, which classically present with worsening abdominal pain related to consumption (gastric) or lack of consumption (duodenal) of food. Persistent inflammation related to a peptic ulcer can result in complications including fibrosis, stricture. hemorrhage, and perforation. Anterior wall ulcers are associated with a higher risk for perforation, while posterior wall ulcers have an increased risk for hemorrhage given their position near the traversing gastroduodenal artery. Perforation commonly presents with acute abdominal pain, peritonitis, fever, and free air on x-ray and CT scan. This patient's examination with hyperresonance and abdominal distension is suggestive of pneumoperitoneum, or air within the peritoneal cavity. which indicates the perforation likely occurred along the anterior duodenal wall. Incorrect Answers: A, C, D, and E. The ampulla of Vater (Choice A) is where the common bile duct and the main pancreatic duct meet to drain into the duodenum. In pathology, obstruction at the ampulla from gallstone. stricture, or tumor blocks both the common bile duct, predisposing to ascending cholangitis, and the main pancreatic duct. predisposing to acute pancreatitis. The celiac plexus (Choice C) is a network of nerves in the abdomen. It is typically located posterior to the stomach and would not likely be affected by a perforated duodenal ulcer. The head of the pancreas (Choice D) is a potential site of pancreatic cancer. When there is a cancerous mass within the head of the pancreas, it commonly imposes mass effect upon the main pancreatic duct and common bile duct, leading to painless jaundice. The duodenum's first segment is intraperiioneal, but the second through fourth segments are retroperitoneal. A perforated ulcer in the retroperitoneal portion of the duodenum (Choice E) would be unlikely to result in pneumoperitoneum.","edu_obj":"Perforation of a duodenal ulcer is an emergent condition often presenting with acute abdominal pain, peritonitis, fever, and free air on x-ray and CT scan. Given the location of the duodenum at its different segments. perforation of the anterior duodenal wall can result in pneumoperitoneum, while posterior wall ulcers are more commonly associated with hemorrhage from the gastroduodenal artery."},{"block":3,"item":26,"image_alt":"","image_url":"","stem":"A 52-year-old man comes to the physician because of vomiting for 24 hours. He has a 1-week history of chronic constipation with bloating and abdominal pain. He is 183 cm (6 ft) tall and weighs 111 kg (245 lb); BMI is 33 kg/m2. Abdominal examination of the left lower quadrant shows muscle guarding; palpation of this area produces pain. A CT scan of the abdomen shows diverticula. The diverticula are most likely present in which of the following regions of the gastrointestinal system in this patient?","choices":{"A":"Cecum","B":"Descending colon","C":"Ileum","D":"Rectum","E":"Sigmoid colon"},"correct":"E","explanation":"The sigmoid colon is the most common location for diverticula to form. Diverticula are outpouchings of the mucosal and submucosal layers into the muscular layer that occur at weak points in the gut wall where the small arterioles of the vasa recta penetrate. It is hypothesized that abnormal motility in the colon causes increased intraluminal pressure with subsequent herniation of the mucosa through weak points in the colonic wall. This may happen in the sigmoid colon because the diameter of the sigmoid is smaller than other parts of the colon, so abnormal peristalsis in this area causes higher intraluminal pressure compared to other segments. Risk factors for development of diverticula include obesity and a diet high in red meat and low in fiber. Diverticulosis predisposes to lower gastrointestinal (GI) bleeding. It also predisposes to diverticulitis, a bacterial infection of a diverticulum that leads to a local inflammatory response. Diverticulitis presents classically with fever, left lower quadrant abdominal pain, and occasionally with bloody diarrhea. Treatment includes bowel rest, symptomatic control, and antibiotics covering enteric flora. Incorrect Answers: A, B, C, and D. Cecum (Choice A) is the most proximal portion of large bowel, a pouch near the ileum and the ascending colon. It is a less common a site of diverticulosis than the sigmoid. The appendix connects with it; as a result, the cecum can become inflamed in severe, acute appendicitis. Cecal diverticulitis would present with right-sided, not left-sided, abdominal pain and tenderness. The descending colon (Choice B) and the rectum (Choice D) may develop diverticula, but these sites are less common than the sigmoid colon. A Meckel diverticulum is commonly located in the ileum (Choice C), 2 feet proximal to the ileocecal valve. The diverticulum is approximately 2 inches in length. In children, it may serve as a potential lead-point for intussusception or as a site of GI bleeding. Discovery of it in adulthood without preceding pathology would be uncommon.","edu_obj":"Acute diverticulitis is infection and/or inflammation of existing colonic diverticula, which are small outpouchings of the bowel wall, commonly located in the sigmoid colon."},{"block":3,"item":27,"image_alt":"","image_url":"","stem":"A previously healthy 48-year-old woman comes to the emergency department because of a 4-hour history o,f constant abdominal pain and fever. The pain radiates to the right shoulder and is accompanied by nausea and vomiting with no blood. She lakes no medications. She does not smoke cigarettes or drink alcohoL She is in acute distress. Her temperature is 38.2°C (100.8°F). pulse is 104/min, respirations are 22/min. and blood pressure is 142/86 mm Hg. Abdominal examination shows marked tenderness of the right upper quadrant with voluntary guarding. Bowel sounds are decreased. Which of the following responses is expected in this patient on palpation of the right upper quadrant of the abdomen during the respiratory cycle?","choices":{"A":"Decreased pain and expiratory arrest","B":"Decreasedpainanspiratory arrest","C":"Increased pain and expiratory arrest","D":"Increased pain and inspiratory arrest","E":"No change in pain or respirations"},"correct":"D","explanation":"This patient with right upper quadrant pain, vomiting, and fever has a presentation consistent with acute cholecystitis. Acute cholecystitis occurs secondary to obstruction of the cystic duct from a gallstone, which results in subsequent inflammation of the gallbladder wall. It typically presents with fever, abdominal pain, and tenderness to palpation in the right upper quadrant. Increased pain and inspiratory arrest with palpation of the right subcostal area, known as Murphy sign, is present in acute cholecystitis. During inspiration, the abdominal organs are pushed downward, causing the gallbladder to come into contact with the examiner's hand, leading to increased pain, which explains this finding. If gallstones migrate into the common bile duct, obstruction can lead to increased transaminase levels and a cholestatic pattern of liver injury with increased alkaline phosphatase. Right upper quadrant ultrasonography is the first-line diagnostic examination, and shows gallstones, a thickened gallbladder wall, and pericholecystlc fluid. A sonographic Murphy sign may be obtained, which is characterized by pain and tenderness elicited when the gallbladder is compressed by the ultrasound probe, while being visualized on the monitor. Treatment includes intravenous fluids, intravenous antibiotics, and cholecystectomy, in addition to appropriate supportive care with analgesics and antiemetics. Incorrect Answers: A, B, C, and E. Decreased pain and expiratory arrest (Choice A) and increased pain and expiratory arrest (Choice C) would not be expected in a patient with cholecystitis. Inspiration, not expiration, is what causes the gallbladder to come into contact with the examiner's hand, and this leads to the increase in pain. Decreased pain and inspiratory arrest (Choice B) would not be expected in a patient with cholecystitis. Although inspiratory arrest is seen, it occurs because of the increase in pain that is occurring. No change in pain or respirations (Choice E) would not be expected in a patient with cholecystitis.","edu_obj":"Acute cholecystitis is caused by obstruction of the cystic duct by a gallstone, leading to inflammation and subsequent infection of the gallbladder. Presentation typically includes right upper quadrant pain, nausea, vomiting, and fever. Increased pain and inspiratory arrest with palpation of the right subcostal area, known as Murphy Sign. is present in acute cholecystitis."},{"block":3,"item":28,"image_alt":"","image_url":"","stem":"A 25-year-old man is brought to the emergency department by ambulance 2 hours after the sudden onset of severe midepigastric abdominal pain. He vomited a small amount of bloody fluid shortly after the pain began. En route. his pulse is 150/min, and blood pressure is 80/40 mm Hg. Perforation of the duodenum is suspected. Which of the following sets of abdominal physical findings is most consistent with this diagnosis?","choices":{"A":"Absent bowel sounds, rigid abdominal wall. tenderness and guarding throughout","B":"Active bowel sounds, distention. right lower quadrant tenderness and rebound","C":"Hyperactive bowel sounds, soft abdomen, no tenderness","D":"Hypoactive bowel sounds, distention. tenderness and guarding in the left lower quadrant","E":"Normal bowel sounds, enlarged tender liver. positive fluid wave"},"correct":"A","explanation":"This patient with an acute onset of severe abdominal pain. vomiting, tachycardia, and hypotension has a presentation consistent with a perforated abdominal viscus. When perforation occurs, bowel contents leak into the peritoneal cavity leading to widespread inflammation and translocation of bacteria into an otherwise sterile space. Patients with peritonitis often display characteristic examination findings of rebound tenderness, guarding, and abdominal wall rigidity. As inflammation progresses, a secondary ileus can occur, leading to hypoactive or absent bowel sounds. Upright chest and abdominal x-ray classically demonstrate free air under the diaphragm. If the patient is stable and diagnosis is uncertain, an abdominal CT scan can be obtained. Management in the emergency department includes resuscitation with crystalloid and early administration of broad-spectrum antibiotics. Perforated viscus with resultant peritonitis is a surgical emergency requiring exploratory laparotomy: surgical consultation should be obtained at the time a diagnosis of peritonitis is suspected. Incorrect Answers: B, C, D, and E. Active bowel sounds, distention, right lower quadrant tenderness and rebound (Choice B) describe findings that may be seen in a patient with unruptured, acute appendicitis. Appendicitis also merits early surgical consultation and antibiotics. as appendectomy is curative if inflammation and infection remain contained within the appendix. Hyperactive bowel sounds, soft abdomen, no tenderness (Choice C) describe findings that may be seen in a patient with gastroenteritis. Gastroenteritis generally arises from viral or bacterial infection and is often self-limited. Protracted cases, or those arising from invasive or inflammatory pathogens (eg, S. typht) may require treatment with antibiotics. Supportive care is often all that is required in mild, viral cases. Hypoactive bowel sounds, distention, tenderness and guarding in the left lower quadrant (Choice D) describe findings that may be seen in a patient with diverticulitis. Diverticulitis is inflammation or infection of colonic diverticula and is generally treated with oral antibiotics and symptom control in uncomplicated cases. Normal bowel sounds, enlarged tender liver, positive fluid wave (Choice E) describe findings that may be seen in a patient with acute hepatitis. A positive fluid wave is seen in patients with ascites which occurs secondary to portal hypertension.","edu_obj":"Perforated abdominal viscus is a surgical emergency. Presentation includes severe abdominal pain, vomiting, and potential hemodynamic instability. Physical examination may disclose peritoneal signs such as rebound tenderness, guarding, and abdominal wall rigidity. Early surgical consultation is imperative for definitive management."},{"block":3,"item":29,"image_alt":"","image_url":"","stem":"A 31-year-old man is admitted to the hospital because of flank and abdomi11alpain. A CT scan of the abdomen shows an aneurysm of the proximal portion of the superior mesenteric artery. This aneurysm is most likely to compress and impede venous blood flow from which of the following organs?","choices":{"A":"Left kidney","B":"Liver","C":"Right kidney","D":"Right suprarenal (adrenal) gland","E":"Spleen"},"correct":"A","explanation":"The left renal vein courses just inferior to the origin of the superior mesenteric artery (SMA) from the abdominal aorta before draining into the inferior vena cava (IVC). Compression of the left renal vein can occur when the angle between the SMA and aorta is abnormally small, or in the setting of a structural anomaly of the SMA such as aneurysm, as seen in this patient. Clinical manifestations include hematuria, flank pain, and orthostatic proteinuria. The left gonadal vein drains into the left renal vein distal to the point of compression. Thus, males can present with a left-sided varicocele or left testicular pain. Diagnosis can be confirmed with Doppler ultrasonography, CT angiography, or MR angiography. Children and adolescents can often be treated conservatively with observation, as the condition may resolve with further growth. ACE inhibitors can reduce orthostatic proteinuria. Adults and those with vascular anomalies may require surgical intervention to transpose or bypass the vein, or repair the anomaly, respectively. Compression of the renal vein by the SMA should not be confused with SMA syndrome, in which the duodenum is compressed between the SMA and aorta resulting in a proximal small bowel obstruction. Incorrect Answers: B, C, D, and E. Liver (Choice B) is incorrect, as the hepatic veins emerge from the posterior surface of the liver and drain into the IVC. Local external compression of these vessels is not commonly seen because of their anatomic location and large caliber. Hepatic venous outflow obstruction can be caused by thrombosis (Budd-Chiari syndrome) and presents with right upper quadrant pain, jaundice, hepatosplenomegaly, ascites, and increased serum liver enzymes. Right kidney (Choice C) is incorrect, as the right renal vein drains directly into the IVC without passing near the SMA. Obstruction can present similarly to left renal vein obstruction with hematuria and flank pain. However, it is more commonly caused by thrombosis rather than external compression. The right suprarenal (adrenal) gland (Choice D) is incorrect, as the associated vein drains directly into the IVC without passing near the SMA. Clinically significant isolated compression of this vein is rare. The spleen (Choice E) is incorrect as its vein courses superior to the origin of the SMA before joining with the superior mesenteric vein to form the hepatic portal vein. Obstruction can occur in the setting of pancreatic necrosis from acute or chronic pancreatitis as adjacent perivenous inflammation can cause thrombosis. Presentation can include features of left-sided portal hypertension, such as splenomegaly and gastric varices in the setting of normal liver enzymes.","edu_obj":"The left renal vein can be externally compressed as it passes between the SMA and abdominal aorta. Such compression can present with hematuria, flank pain, and orthostatic proteinuria, as well as a left-sided varicocele."},{"block":3,"item":30,"image_alt":"","image_url":"","stem":"During an experiment, a drug that specifically dilates the efferent arterioles of the kidney is infused into an experimental animal. Which of the following sets of renal changes is most likely to occur in response to the drug?","choices":{"A":"↑ / ↑ / ↑","B":"↑ / ↑ / ↔","C":"↑ / ↔ / ↓","D":"↔ / ↔ / ↓","E":"↔ / ↓ / ↔","F":"↓ / ↑ / ↑","G":"↓ / ↔ / ↔","H":"↓ / ↓ / ↓"},"correct":"H","explanation":"Each nephron of the kidney contains a glomerulus, a network of capillaries where blood is filtered across capillary walls into the Bowman capsule; this filtrate subsequently proceeds into the renal tubules and eventually the collecting duct. Blood enters the glomerulus via an afferent arteriole, then exits via an efferent arteriole, which carries filtered blood away from the glomerulus. The efferent arteriole's relative state of vasoconstriction or vasodilation affects the glomerular pressure and thus filtration within the glomerular capillaries. When the efferent arteriole constricts, blood flow is slowed, vascular resistance is increased, and the filtration fraction is increased. Increased filtration fraction in turn increases the amount of solute reaching the proximal tubule, which thus increases proximal tubule reabsorption. Dilation of the efferent arteriole has an opposite effect, resulting in a decreased filtration fraction and proximal tubule reabsorption secondary to decreased vascular resistance. Renal blood flow changes proportionate to the glomerular filtration rate and increases in renal blood flow result in an increase in renal O₂ consumption. Dilation of the efferent arteriole decreases glomerular filtration rate, renal blood flow, and renal O₂ consumption.

Incorrect Answers: A, B, C, D, E, F, and G.

Dilation of the efferent arterioles of the kidney causes decreased, not increased proximal tubule reabsorption (Choices A, B, and C), or unchanged proximal tubule reabsorption (Choices D and E). Renal O₂ consumption and filtration fraction decreases, not increases, because of efferent arteriole dilation (Choice F).","edu_obj":"The efferent arteriole's relative state of vasoconstriction or vasodilation affects the glomerular pressure and thus filtration within the glomerular capillaries. Efferent arteriole dilation results in decreased proximal tubule reabsorption, renal o 2 consumption, and filtration fraction."},{"block":3,"item":31,"image_alt":"","image_url":"","stem":"An experimental animal receives a carbonic anhydrase inhibitor. One hour later, which of the following sets of changes in plasma is most likely in this animal?","choices":{"A":"↑ / ↑ / ↑","B":"↑ / ↑ / ↓","C":"↑ / ↓ / ↓","D":"↑ / ↓ / ↑","E":"↓ / ↓ / ↓","F":"↓ / ↓ / ↑","G":"↓ / ↑ / ↓","H":"↓ / ↑ / ↑"},"correct":"E","explanation":"Carbonic anhydrase is an enzyme present in erythrocytes that catalyzes the conversion of carbon dioxide and water to bicarbonate (HCO₃⁻) and hydrogen ions (H⁺). H⁺ binds to hemoglobin and modulates the unloading and loading of oxygen while HCO₃⁻ is exchanged out of the cell for chloride via a chloride/bicarbonate pump located on the cell surface. A deficiency in carbonic anhydrase activity leads to lower levels of intracellular bicarbonate, which would result in an influx of bicarbonate into the cell, resulting in decreased serum bicarbonate and a metabolic acidosis with a decreased pH. To counteract this, a respiratory alkalosis with resultant decreased PCO₂ will result.

Incorrect Answers: A, B, C, D, F, G, and H.

Carbonic anhydrase inhibition will lead to a decrease, not an increase of serum bicarbonate levels (Choices A, B, C, and D). A decrease in serum bicarbonate levels leads to a metabolic acidosis, not metabolic alkalosis (Choices A, D, F, and H). A metabolic acidosis results in a compensatory respiratory alkalosis (partial pressure of carbon dioxide decreases, not increases, Choices A, B, G, and H).","edu_obj":"Carbonic anhydrase is an enzyme present in erythrocytes that catalyzes the conversion of carbon dioxide and water to bicarbonate (HC0 3-) and hydrogen ions (H+). Carbonic anhydrase inhibition will lead lo a metabolic acidosis and compensatory respiratory alkalosis."},{"block":3,"item":32,"image_alt":"","image_url":"","stem":"A 30-year-old Asian American man comes to the physician because of a 4-day history of blood in his urine. He had an upper respiratory tract infection that resolved 3 weeks ago. His temperature is 37.4°C (99.4°F). pulse is 82/min, and blood pressure is 160/90 mm Hg. Physical examination shows no abnormalities. Urinalysis shows RBCs that are too numerous to count and 2+ protein. A 24-hour urine protein collection shows 1200 mg. A renal biopsy specimen shows mesangial proliferation with rare crescents, mesangial lgA. C3, few lgG deposits. and electron-dense deposits in vessel walls and mesangium. Which of the following best describes the pathogenesis of this patient's disease?","choices":{"A":"Anti-glomerular basement membrane antibodies to type IV collagen","B":"Antineutrophil cytoplasmic antibodies with epithelial proliferation","C":"Dysfunctional type IV collagen resulting in defective glomerular basement membrane synthesis","D":"Immune dysfunction resulting in visceral epithelial cell injury and loss of glomerular polyanions","E":"Increased lgA synthesis, mesangial lgA ~trapment, and alternate complement pathway activation"},"correct":"E","explanation":"Increased lgA synthesis, mesangial lgA entrapment, and alternate complement pathway activation are associated with the development of lgA nephropathy. lgA nephropathy is commonly seen in patients following respiratory infection, or less commonly, gastrointestinal tract infections, when there is an increase in synthesis and secretion of lgA antibodies at mucosa! sites. In lgA nephropathy, deposition of lgA in the renal mesangium triggers the activation of the complement pathway and glomerulonephritis may ensue. Clinically, patients present with gross or microscopic hematuria, and urinalysis discloses red cell casts and proteinuria. Diagnosis is made with immunohistochemical staining of renal biopsy specimens demonstrating lgA deposition in the glomerular mesangium. Initial treatment involves management of associated hypertension and immunosuppressive therapy may be considered for patients at high risk for progression to renal failure. Incorrect Answers: A, B, C, and D. Anti-glomerular basement membrane antibodies to type IV collagen (Choice A) are associated with Goodpasture syndrome. Patients may present with hemoptysis. hematuria, and hypertension. as a result of antibodies targeting collagen type IV in the pulmonary capillaries and glomerular basement membranes. Complications include rapidly progressive, crescentic glomerulonephritis and pulmonary hemorrhage. Antineutrophil cytoplasmic antibodies with epithelial proliferation (Choice B) are associated with granulomatosis with polyangiitis (GPA. formerly Wegener granulomatosis). a systemic necrotizing granulomatous vasculitis that affects small and medium vessels. It is associated with c-ANCA antibodies and primarily affects the sinopulmonary tract, kidneys, and skin. Patients may present with recurrent sinusitis, otitis media, mastoiditis, nasal ulcerations with epistaxis, hemoptysis, cough, hematuria, glomerulonephritis, and purpura. Dysfunctional type IV collagen resulting in defective glomerular basement membrane synthesis (Choice C) is associated with Alport syndrome. Alport syndrome is a rare disease, which is associated with progressive renal failure, sensorineural hearing loss, and ocular abnormalities. Immune dysfunction resulting in visceral epithelial cell injury and loss of glomerular polyanions (Choice D) is associated with minimal change disease. Minimal change disease commonly affects the pediatric population and may be triggered by a recent viral infection or immune stimulus. Patients may present with edema, foamy or dark- colored urine, hypoalbuminemia, proteinuria, hypogammaglobulinemia, and compensatory hyperlipidemia.","edu_obj":"lgA nephropathy commonly occurs following respiratory infections when there is increased lgA production and secretion at mucosa! surfaces. lgA deposition in the renal mesangium triggers complement activation and glomerulonephritis may ensue. Urinalysis typically discloses hematuria, red cell casts, and proteinuria, while diagnosis is made by irnmunohistochernical staining to show lgA deposition in the glomerular rnesangiurn."},{"block":3,"item":33,"image_alt":"","image_url":"","stem":"A 62-year-old man is admitted to the intensive care unit after having a myocardial infarction. During the next 36 hours, his serum creatinine concentration increases to 3.9 mg/dl and his urine outRUt decreases. Three days later. he develops polyuria. At the time of discharge from the hospital, his serum creatinine concentration is 2.6 mg/dl. Which of the followin\:I is the most likely cause of this patient's episode of acute kidney injury?","choices":{"A":"Acute papillary necrosis","B":"Acute tubular necrosis","C":"Atheroembolic renal disease with acute renal infarction","D":"Hypertensive nephrosclerosis","E":"Volume overload"},"correct":"B","explanation":"Decreased urinary output following a likely episode of hypotension in the setting of cardiac ischemia is consistent with a diagnosis of acute tubular necrosis (ATN). The cells of the proximal convoluted tubule, which are responsible for a large portion of ion resorption from the glomerular filtrate, are highly metabolically active and therefore are especially sensitive to ischemic injury. ATN progresses through an initial oliguric phase, which may last for several weeks before recovery, and is followed by a subsequent polyuric phase. lschemic ATN may occur secondary to any type of shock state. In this patient. a myocardial infarction likely led to cardiogenic shock and hypotension. impairing renal perfusion. Cardiogenic, obstructive, hypovolemic, and distributive shock etiologies can all result in renal hypoperfusion. ATN may also occur secondary to nephrotoxic exposures such as heavy metals, antibiotics, and toxic alcohols. Urinalysis typically discloses muddy brown casts. Incorrect Answers: A, C, D, and E. Acute papillary necrosis (Choice A) occurs following ischemic, inflammatory, infectious, or toxin-mediated damage to the renal papilla and describes the sloughing and loss of the papillae, including substructures such as the distal collecting tubule. It can be triggered by infections (eg, acute pyelonephritis), diabetes mellitus, sickle cell disease, or NSAIDs. It typically presents with hematuria and acute flank pain. Atheroembolic renal disease with acute renal infarction (Choice C) can cause acute flank and back pain, nausea. and vomiting. It would typically present with hematuria. Hypertensive nephrosclerosis (Choice D) can lead to chronic renal failure. Chronic kidney disease is more common in older patients after years of underlying hypertension; it presents with gradually increasing baseline creatinine. as opposed to an abrupt increase followed by normalization or decline. Volume overload (Choice E), such as in acute or chronic congestive heart failure. can also lead to reduced renal perfusion and acute kidney injury. Volume overload can present with lower extremity edema. pulmonary crackles. and increased jugular venous pressure. none of which are seen in this patient.","edu_obj":"Acute tubular necrosis frequently results from ischemic injury to the nephron and is characterized by damage to the proximal convoluted tubule. Sloughing of tubular cells leads to the formation of muddy brown casts. Acute tubular necrosis presents initially with oliguria before progressing to polyuria when the cells regenerate."},{"block":3,"item":34,"image_alt":"","image_url":"","stem":"A 33-year-old woman comes to the emergency department because of a 4-day history of progressive shortness of breath that is worse at night. Five days ago, she had an uncomplicated vaginal delivery of a female newborn at term. Her respirations are 22/min. Bilateral crackles are heard on auscultation of the chest. Cardiac examination shows the point of maximal impulse to be displaced laterally and an S 3 gallop. An ECG shows sinus tachycardia and nonspecific ST-T segment and T- wave changes. Echocardiography shows a left ventricular ejection fraction of 30%, global hypokinesis, and mild mitral regurgitation. Which of the following is the most likely diagnosis?","choices":{"A":"Cardiomyopathy","B":"Coronary artery disease","C":"Hypertensive heart disease","D":"Pulmonary embolism","E":"Valvular heart disease"},"correct":"A","explanation":"Heart failure with reduced ejection fraction is a common clinical syndrome encountered in medical practice. Patients typically present with progressive dyspnea, orthopnea, and lower extremity swelling. Physical examination findings include elevated jugular venous pressure, peripheral edema, ascites, hepatojugular reflux, pulmonary crackles, and an s3 or s4 gallop. There are many causes of new onset decompensated heart failure, including ischemic heart disease, nonischemic cardiomyopathy, severe valvulopathy, pericardia! disease, tachyarrhythmias, and infections. Initial workup should focus on evaluating for these causes with routine laboratory studies, cardiac biomarkers, ECG, chest x-ray, and echocardiography. An ejection fraction less than 50% is considered reduced. This patient presents with orthopnea, pulmonary crackles, displaced point of maximal impulse, an s3 gallop, and echocardiographic evidence of global cardiac dysfunction. Given that this patient recently delivered a healthy, full- term newborn, postpartum cardiomyopathy is the most likely cause of her symptoms. Postpartum cardiomyopathy most commonly develops between 36 weeks' gestation and up to 1 month after delivery. Risk factors for development include increased age, hypertension during pregnancy, and multiple gestations. Many patients later recover cardiac function but may require ongoing medical management for persistent dysfunction. Incorrect Answers: B, C, D, and E Coronary artery disease (Choice B) may be associated with ischemic cardiomyopathy. Although it is often asymptomatic, coronary artery disease may cause anginal symptoms or lead to an acute coronary syndrome. Acute coronary syndromes classically present with chest pain radiating to the shoulder or jaw, associated with dyspnea, nausea, and diaphoresis. Prolonged cardiac ischemia from coronary artery disease can lead to ischemic cardiomyopathy and decompensated heart failure. However, this patient has no risk factors for the development of coronary artery disease and no history of cardiac events, making ischemic cardiomyopathy less likely. Hypertensive heart disease (Choice C) can result in decompensated heart failure. It more commonly causes heart failure with preserved ejection fraction and impaired diastolic function due to hypertrophy of the ventricle. However, this requires long-standing high blood pressure and would be unlikely in this young, otherwise healthy patient. Pulmonary embolism (Choice D) classically presents with acute onset shortness of breath, chest pain, and tachycardia, often in combination with signs of a lower extremity deep venous thrombosis, such as edema or erythema. Large pulmonary emboli can cause cardiac dysfunction, although this dysfunction is more commonly right-sided than global. Thus, despite pregnant women being at higher risk for thrombotic complications, pulmonary embolism is less likely than cardiomyopathy. Valvular heart disease (Choice E) can cause decompensated heart failure if severe or acute. Commonly, clinically significant valvular disease can be auscultated on physical examination. It will be evident on echocardiography. This patient only has mild mitral regurgitation, making this an unlikely cause of her symptoms.","edu_obj":"Postpartum cardiomyopathy presents after 36 weeks' gestation and up to 1 month after delivery. It most commonly presents with the symptoms and signs of decompensated heart failure, such as progressive dyspnea, orthopnea, lower extremity swelling, peripheral edema, pulmonary crackles, and an s3 gallop. Evaluation should include routine laboratory studies, cardiac biomarkers, ECG, chest x-ray, and echocardiography with an ejection fraction less than 50% considered reduced. Many patients recover cardiac function but may require ongoing medical management for persistent dysfunction."},{"block":3,"item":35,"image_alt":"","image_url":"","stem":"A 27-year-old woman who has had type 1 diabetes mellitus for 10 years delivers a plethoric, large newborn weighing 5 kg (11 lb). Eighteen hours after delivery, the newborn develops hypoglycemia. Which of the following is the best explanation for the hypoglycemia?","choices":{"A":"Glucagon secretion by pancreatic a cells is decreased in the newborn","B":"HepaUc enzymes for gluconeogenesis are increased in the newborn","C":"Hepatic glycogen content is depleted in the newborn","D":"Insulin secretion by pancreatic J3cells is increased in the newborn","E":"Maternal insulin crossed the placenta"},"correct":"D","explanation":"Excessive fetal exposure to glucose and insulin in utero can cause macrosomia, neonatal respiratory distress syndrome or hyaline membrane disease, and hypoglycemia in the newborn. Human placental lactogen produced by the placenta increases maternal insulin resistance. This leads

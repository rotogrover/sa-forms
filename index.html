  const container = document.getElementById('questionList');
  if (!filtered.length) {
    container.innerHTML = '<div class="empty"><p>No questions match your filter.</p></div>';
    return;
  }
  container.innerHTML = filtered.map(renderQuestion).join('');
}

function renderQuestion(q) {
  const key      = qKey(q);
  const chosen   = answered[key] || null;
  const isReveal = revealed[key] || false;
  const correct  = q.correct && !q.correct.startsWith('[');

  // Choices HTML
  const choiceLetters = Object.keys(q.choices).sort();
  const choicesHTML = choiceLetters.map(letter => {
    let cls = 'choice';
    if (isReveal) {
      if (letter === q.correct) cls += ' correct';
      else if (letter === chosen && letter !== q.correct) cls += ' wrong';
    } else if (letter === chosen) {
      cls += ' selected';
    }
    return `<button class="${cls}" onclick="selectChoice('${key}','${letter}')" ${isReveal?'disabled':''}>
      <span class="choice-letter">${letter}.</span>
      <span>${escHtml(q.choices[letter])}</span>
    </button>`;
  }).join('');

  // Image HTML
  const imageHTML = q.image_url ? `
    <figure class="q-image">
      <img src="${q.image_url}" alt="${escHtml(q.image_alt)}" loading="lazy">
      <figcaption>${escHtml(q.image_alt)}</figcaption>
    </figure>` : '';

  // Answer section
  let answerHTML = '';
  if (isReveal) {
    const badge = correct
      ? `<span class="answer-badge correct">Correct Answer: ${q.correct}</span>`
      : `<span class="answer-badge not-available">Answer not in source file</span>`;
    
    const expl = q.explanation
      ? `<div class="expl-block"><div class="expl-label">Explanation</div>${formatText(q.explanation)}</div>`
      : '';
    
    const edu = q.edu_obj
      ? `<div class="edu-block"><div class="expl-label">Educational Objective</div>${formatText(q.edu_obj)}</div>`
      : '';

    answerHTML = `<div class="answer-section visible">${badge}${expl}${edu}</div>`;
  } else {
    answerHTML = `<div class="answer-section"></div>`;
  }

  // Action buttons
  let actionsHTML;
  if (!isReveal) {
    actionsHTML = `
      <div class="q-actions">
        <button class="btn btn-primary" onclick="reveal('${key}')">Show Answer</button>
        <button class="btn btn-secondary" onclick="skip('${key}')">Skip</button>
      </div>`;
  } else {
    actionsHTML = `
      <div class="q-actions">
        <button class="btn btn-outline" onclick="reset('${key}')">Reset</button>
      </div>`;
  }

  return `
  <div class="q-card" id="card-${key}">
    <div class="q-header">
      <span>Block ${q.block} — Question ${q.item}</span>
      <span class="q-badge">${choiceLetters.length} choices${q.image_url ? ' · 🔬 Image' : ''}</span>
    </div>
    <div class="q-body">
      ${imageHTML}
      <div class="q-stem">${formatText(q.stem)}</div>
      <div class="choices">${choicesHTML}</div>
      ${actionsHTML}
      ${answerHTML}
    </div>
  </div>`;
}

function escHtml(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function formatText(text) {
  if (!text) return '';
  // Convert markdown bold **text** to <strong>
  let t = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Convert line breaks
  t = t.replace(/

/g, '</p><p>').replace(/
/g, '<br>');
  return '<p>' + t + '</p>';
}

function selectChoice(key, letter) {
  if (revealed[key]) return;
  answered[key] = letter;
  // Re-render just this card
  const q = ALL_QUESTIONS.find(q => qKey(q) === key);
  if (!q) return;
  const card = document.getElementById('card-' + key);
  if (card) card.outerHTML = renderQuestion(q);
}

function reveal(key) {
  revealed[key] = true;
  const q = ALL_QUESTIONS.find(q => qKey(q) === key);
  if (!q) return;
  const card = document.getElementById('card-' + key);
  if (card) card.outerHTML = renderQuestion(q);
  updateProgress();
}

function skip(key) {
  reveal(key);
}

function reset(key) {
  delete revealed[key];
  delete answered[key];
  const q = ALL_QUESTIONS.find(q => qKey(q) === key);
  if (!q) return;
  const card = document.getElementById('card-' + key);
  if (card) card.outerHTML = renderQuestion(q);
  updateProgress();
}

// Init
filterQuestions();
</script>

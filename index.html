) results in a left-to-right shunt with abnormal flow of blood from the left atrium to the right atrium, resulting in relative volume overload of the right atrium and ventricle, which presents as a fixed. split S2, and low-grade physiologic ejection murmur on cardiac auscultation. Bicuspid aortic valve with stenosis (Choice BJ presents with a crescendo-decrescendo systolic murmur, best heard at the upper right sternal border, and radiates to the carotid arteries. Patients with a congenital bicuspid aortic valve typically present early in adulthood; however, a midsystolic click is more consistent with mitral valve prolapse. Patent foramen ovale (Choice D) is a common atrial septa I defect resulting from failure of the fetal right-to-left shunt to close completely. A patent fora men ova le that persists into adulthood is a risk factor for arterial thromboembolic disease. Cardiac auscultation may reveal a subtle diastolic murmur. Tricuspid regurgitation (Choice E) classically shows a holosystolic mum,ur best heard in the left lower sternal border and may result from severe pulmonary hypertension or infective endocarditis in the setting of intravenous drug use.","edu_obj":"Mitral valve prolapse is a structural disease of the mitral valve leaflets resulting in abnormal displacement, movement. and thickening of the leaflets. It is classically associated with a midsystolic click and the presence of mitral regurgitation."},{"block":1,"item":46,"image_alt":"","image_url":"","stem":"A 38-year-old woman comes to the physician because she has not had a menstrual period for 3 months. She also has had increased facial and chest hair growth over the past 2 months. She is 170 cm (5 ft 7 in) tall and weighs 64 kg (141 lb); BMI is 22 kg/m2. Her pulse is 80/min, and blood pressure is 140/78 mm Hg. Physical examination shows hirsutism and vaginal atrophy. Her serum testosteromr concentration is 400 ng/dl (N=15-60), and measurement of urine collection of 17- ketosteroids is 10 mg/24 h. Ultrasonography of the pelvis shows a normaf:sized left ovary and a right ovarian mass. Which of the following is the most likely diagnosis?","choices":{"A":"Germ cell tumor","B":"Granulosa tumor","C":"Polycystic ovarian disease","D":"Sertoli-Leydig tumor","E":"Thecoma"},"correct":"D","explanation":"This patient is presenting with clinical signs and symptoms of virilization, the condition in which females develop male features due to increased concentrations of androgens. These features include hirsutism, or the presence of unwanted hair in a male distribution. increased muscle mass. pubic hair, clitoromegaly, and vaginal atrophy. and are confirmed by her increased testosterone concentration. Testosterone may be increased in the setting of a hormone-secreting ovarian tumor. polycystic ovary syndrome, hypersecretion of androgens by the adrenal gland. or an adrenal tumor. When evaluating virilization and hirsutism, ii is critical to measure the concentrations of testosterone and 17-ketosteroids; the latter is made by the adrenal gland and helps to narrow the differential diagnosis. In this case. because testosterone is increased while the 17-ketosteroids are within normal limits, the cause likely has an ovarian source. This is further supported by the presence of a right ovarian mass on ultrasonography. A Sertoli-Leydig cell tumor is a rare. androgen-producing, ovarian sex-cord stromal tumor. It is a neoplastic proliferation of the cells that give rise to the specialized gonadal stroma surrounding the granulosa and theca cells in females and Sertoli and Leydig cells in males. These proliferating cells have the capacity for differentiation into many cell types, including Sertoli-Leydig cells, which secrete testosterone. Incorrect Answers: A, B, C, and E. Germ cell tumors (Choice A) are rare and may be benign or malignant tumors that consist of germ cells. most commonly in the ovaries or testes. They present more commonly in females aged 10 to 30 years and include mature teratomas. dysgerminomas, embryonal carcinomas. and other tumors. While these tumors can be hormonally active. they more commonly secrete human chorionic gonadotropin. which would not cause the virilization seen in this patient Granulosa tumor (Choice B) is a malignant sex-cord stromal tumor. It produces female sex hormones. which often result in abnormal uterine bleeding. The virilization that this patient is experiencing is more likely secondary to testosterone release from a Sertoli-Leydig cell tumor. Polycystic ovarian disease (Choice C) presents with menstrual irregularities, signs of androgen excess. obesity, insulin resistance, and polycystic ovaries on ultrasonography. While this patient does have signs of androgen excess with an increased testosterone concentration, she does not exhibit obesity or evidence of polycystic ovaries. Rather. she has a right ovarian mass. making an androgen-secreting Sertoli-Leydig cell tumor more likely. Thecoma (Choice E) is a rare. most commonly benign, tumor of the ovary. When present, it commonly has estrogenic effects, which may lead to irregular menstrual bleeding. It would not explain this patient's increased testosterone concentrations and virilization.","edu_obj":"A Sertoli-Leydig cell tumor is a rare, androgen-producing, ovarian sex-cord stromal tumor that may cause precocious puberty or virilization. Hirsutism, or the presence of unwanted hair in a male distribution, increased muscle mass, pubic hair, clitoromegaly, and vaginal atrophy are features of virilization."},{"block":1,"item":47,"image_alt":"","image_url":"","stem":"A 60-year-old man comes to the physician because of a 6-month history of increasing hoarseness. He has smoked 2 packs of cigarettes daily for 40 years. Laryngoscopic examination shows a mass consistent with a malignant neoplasm in the larynx. involving the right vestibular fold. This neoplasm is most likely to metastasize initially to which of the following groups of lymph nodes?","choices":{"A":"Cervical","B":"Mediastinal -tJ","C":"Submandibular","D":"Submental","E":"Supraclavicular"},"correct":"A","explanation":"Laryngeal neoplasms can present with hoarseness, vocal changes, persistent cough, stridor, or dysphagia. Primary risk factors include human papillomavirus infection and tobacco use. The majority of laryngeal neoplasms are squamous cell carcinoma. Lesions located in the supraglottic region are likely to induce dysphagia, whereas hoarseness is an early symptom of lesions located in the glottic region due to involvement of the vocal cords. The diagnosis is established by direct tumor visualization, which may be accomplished with laryngoscopy. The cervical lymph nodes are a common location for metastases from head and neck cancers such as laryngeal carcinoma. CT or PET scan may be useful for characterizing metastatic disease. Early-stage laryngeal carcinoma has a good prognosis. but locally advanced or metastatic disease can be more difficult to treat. Treatment involves surgical excision, including neck dissection, radiotherapy, and/or chemotherapy. Incorrect Answers: B, C, D. and E. Mediastinal (Choice B) lymph node metastasis is typically associated with malignancies of the trunk, such as lung cancer and melanoma. Mediastinal lymph node involvement is particularly important in determining the prognosis of non-small cell lung cancer. Submandibular (Choice C) and submental (Choice D) lymph nodes comprise Level I of the anatomic lymph node levels of the neck. While spread of head and neck cancers to these lymph nodes is not as common as it is to cervical lymph nodes. these nodes are commonly among those excised during a modified radical neck dissection for the treatment of locally advanced head and neck cancer. supraclavicular (Choice E) Iympl1 node involvement is classically seen in metastatic gastric cancer, though it can also occur in the spread of other sub-diaphragmatic malignancies, such as renal, gonadal, and gastrointestinal cancers. The supraclavicular nodes on the left are known as Virchow nodes.","edu_obj":"Laryngeal neoplasms can present with hoarseness. vocal changes, persistent cough, stridor, or dysphagia. Primary risk factors include human papillomavirus infection and tobacco use. The cervical lymph nodes are a common location for metastasis from laryngeal cancer and other head and neck neoplasms."},{"block":1,"item":48,"image_alt":"","image_url":"","stem":"A 49-year-Old woman with poorly controlled hypertension comes to the emergency department because of a 2-day history of progressive shortness of breath. Current medications are amtodipine. clonidine. enalaprit. hydrochtorothiazide. and metoprotol. She has not taken any of her medications for 5 days because she ran out and could not afford to refill her prescriptions. Her pulse is 98/min, respirations are 32/min, and blood pressure is 240/120 mm Hg. Pulse oximetry on room air shows an oxygen saturation of 86%. Physical examinalion shows no significant ankle edema. Bilateral crackles are heard over all lung fields. Cardiac examination shows a loud S 4 . A chest x-ray shows pulmonary edema. An ECG Is shown. Which of the following Is the most likely mechanism of this patient's congestive heart failure?","choices":{"A":"Atrial fibrillation","B":"Cardiac tamponade","C":"Diastolic dysfunction","D":"Dilated cardiomyopathy","E":"Myocardial ischemia","F":"Papillary muscle rupture"},"correct":"C","explanation":"This patient with poorly-controlled hypertension, progressive dyspnea, and chest x-ray showing pulmonary edema has symptoms of decompensated heart failure. Based on the presence of an s4 heart sound on auscultation. she likely has underlying diastolic dysfunction. In patients with longstanding uncontrolled hypertension, the cardiac myocytes undergo hypertrophy in response to the chronic increase in afterload. This ventricular hypertrophy and increased muscle mass lead to increased stiffness and decreased compliance of the left ventricle. making it more difficult to fill. An s4 gallop is a heart sound that occurs in late diastole during atrial contraction. It is associated with increased atrial pressure and ventricular hypertrophy as the left atrium attempts to overcome a stiff and noncompliant left ventricle. Patients with decompensated heart failure can present with multiple symptoms. In left heart failure, patients may present with dyspnea and orthopnea, and often have rales on lung auscultation caused by pulmonary edema from increased left-heart pressure. In advanced cases, or during times of exacerbation, patients may present with decreased peripheral perfusion and cardiogenic shock. In right heart failure, patients may present with peripheral edema, jugular venous distension (JVD), and hepatic congestion Incorrect Answers: A, B, D, E, and F. Atrial fibrillation (Choice A) is seen as irregularly irregular RR intervals without discernible P waves on ECG. When symptomatic, patients may present with palpitations. fatigue, lightheadedness, and dyspnea. An s4 heart sound and pulmonary crackles more likely suggest diastolic dystunction and pulmonary edema as a cause of the symptoms. Cardiac tamponade (Choice B) classically presents with hypotension, jugular venous distension. and muffied heart sounds (Beck triad). ECG may show electrical alternans and low voltage of the QRS complexes. Cardiac tamponade results from rapid and/or excessive accumulation of fluid within the pericardia! space impairing right ventricular diastolic filling. Because the diastolic dysfunction in tamponade is right-sided, not left-sided. lung sounds are clear in these patients. Dilated cardiomyopathy (Choice D) and myocardial ischemia (Choice E) both cause systolic dysfunction in addition to any potential diastolic dysfunction. Clinical presentation can be like that of a patient with diastolic dysfunction with dyspnea, pulmonary edema, peripheral edema, and JVD. However, in cases of systolic dysfunction, an s3 (not an s4) heart sound may be present due to increased ventricular filling pressures, which is usually seen in the setting of volume overload. Papillary muscle rupture (Choice F) can occur as a complication of myocardial infarction and results in acute mitral regurgitation. This classically occurs 2 to 7 days following a myocardial infarction and presents with acute onset of dyspnea and pulmonary edema due to increased backflow of blood, and potential cardiogenic shock due to decrease of forward flow. A holosystolic murmur can be heard on auscultation.","edu_obj":"Longstanding uncontrolled hypertension can lead to diastolic dysfunction. This occurs secondary to ventricular hypertrophy leading to decreased compliance and reduced ventricular filling. An s4 heart sound may be heard on auscultation. Patients can present with dyspnea, orthopnea, fatigue, and peripheral edema if right heart dysfunction and/or hypervolemia are also present."},{"block":1,"item":49,"image_alt":"","image_url":"","stem":"A 6-year-old boy is admitted to the hospital because of an 8-hour history of fever. headache. and nausea. Administration of intravenous (IV) fluids and empiric antibiotics is started pending culture results. A lumbar puncture is done, and a photomicrograph of a Gram stain of cerebrospinal fluid is shown. During the next 24 hours. he develops bleeding from his gums and from all IV puncture sites. He is intubated for respiratory failure, and norepinephrine is administered for blood pressure support. The most likely cause of this patient's new symptoms is which of the following infection-related complications?","choices":{"A":"Adrenal hemorrhage","E":"Toxic epidermal necrolysis"},"correct":"A","explanation":"This patient's signs and symptoms of fever, headache, and nausea with gram-negative diplococci in his cerebrospinal fluid (CSF) are consistent with meningococcal disease caused by Neisseria meningitidis. N meningitidis is a gram-negative diplococcus that can lead to meningitis and may rapidly progress to septic shock. The organism is transmissible by respiratory droplets. Findings of meningococcal meningitis include fever, altered mental status. headache, and meningeal signs such as neck stiffness and presence of a Brudzinski or Kernig sign. Meningococcemia frequently causes disseminated intravascular coagulation (DIC). a systemic disorder characterized by the widespread activation of the clotting cascade and resulting in microthrombi formation. thrombocytopenia, and bleeding complications due to consumption of platelets and clotting factors. DIC presents with a characteristic petechial rash, as well as bleeding from mucous membranes and venipuncture sites. Additionally, severe cases of meningococcal disease may lead to bilateral adrenal gland hemorrhage, a condition known as Waterhouse-Friderichsen syndrome. Adrenal insufficiency develops rapidly and presents with hypotension. hyperkalemia, hyponatremia. and hypoglycemia due to deficiency of aldosterone and glucocorticoids. The diagnosis of meningococcal disease is confirmed by culture of blood or CSF. Treatment includes supportive therapy and broad-spectrum antibiotics, typically with a tllird- generation cephalosporin. DIC is treated with transfusion of fresh frozen plasma or cryoprecipitate. while adrenal insufficiency requires supplementation of glucocorticoids in addition to vasopressor support. Meningococcal disease causes substantial morbidity and mortality even with appropriate therapy. although infection may be prevented with meningococcal vaccine. Incorrect Answers: B. C, D. and E. Cerebral edema (Choice B) may occur in the setting of bacterial meningitis or secondary to other inflammatory. hemodynamic, or ischemic insults. While cerebral edema may lead to headache, obtundation, nausea. vomiting. and cranial nerve or neurologic deficits. it does not typically cause hypotension. In fact, cerebral edema and accompanying increased intracranial pressure are more likely to present with hypertension, as well as bradycardia and irregular breathing, known as the Cushing triad. Congestive heart failure (Choice C) is incorrect. While patients with meningococcemia may present with hypotension. this is caused by septic shock rather than cardiogenic shock. Pulmonary embolism (Choice D) is incorrect. While DIC is defined by widespread activation of the clotting cascade, this tends to present with microthrombi and diffuse bleeding rather than macroscopic thrombosis. Toxic epidermal necrolysis (Choice E) is a life-threatening adverse cutaneous reaction, often a drug reaction. Features such as skin pain, sloughing, or mucosal involvement are suggestive of toxic epidermal necrolysis. Frequently implicated drugs include sulfa and beta-lactam antibiotics as well as anticonvulsants, including carbamazepine. lamotrigine. phenytoin. and valproic acid.","edu_obj":"Meningococcal disease is caused by the gram-negative diplococcus Neisseria meningitidis and may present with severe clinical manifestations, including meningitis, sepsis, disseminated intravascular coagulation, and bilateral adrenal hemorrhage, also known as Waterhouse-Friderichsen syndrome. Adrenal insufficiency presents with hypotension. hyperkalemia, hyponatremia. and hypoglycemia due to deficiency of aldosterone and glucocorticoids. Meningococcal disease causes substantial morbidity and mortality even with appropriate therapy, althougt1 infection may be prevented with meningococcal vaccine."},{"block":1,"item":50,"image_alt":"","image_url":"","stem":"A 43-year-old woman comes to the physician because of a 2-month history of intermittent abdominal pain. The pain occurs after fatty meals and is localized to the right upper quadrant. Ultrasonography of the abdomen shows cholelithiasis. The patient elects to begin a trial of ursodiol therapy before considering operative treatment. Which of the following is the primary mechanism of action of this medication?","choices":{"A":"Decreased cholesterol secretion into bile","B":"Enhanced cholesterol absorption","C":"Enhanced hepatic cholesterol synthesis ~","D":"Inhibition of bile acid synthesis","E":"Inhibition of 3-HMG-CoA"},"correct":"A","explanation":"The classic presentation of cholelithiasis is intermittent right upper quadrant pain and nausea that is worse with eating in a middle-aged female. Cholesterol gallstones are the most common type of gallstones. and risk factors for their development include obesity. advanced age, estrogen therapy, rapid weight loss, and Crohn disease. Inhibition of biliary cholesterol secretion is achieved by the use of ursodeoxycholic acid (ursodiol). a medication used to treat biliary colic. primary biliary cirrhosis. and 1ntrahepat1ccholestas1s ot pregnancy. In patients who have atypical symptoms that are not det1rnt1velyattributable to gallstones, improvement with ursod10!suggests that cholecystectomy may be beneficial, but in patients with classic biliary colic, as in this patient, ursodiol is considered a second line to surgery. It works by reducing cholesterol secretion from the liver by 40% to 60%, and thereby reducing the cholesterol content of the bile. It also reduces the amount of cholesterol absorbed in the gut. As most gallstones are made of cholesterol, with a minority formed from heme because of chronic hemolysis, gradually reducing the amount of cholesterol in the bile prevents formation of new cholesterol gallstones. Incorrect Answers: B, C, D. and E. Enhanced cholesterol absorption (Choice B) and enhanced hepatic cholesterol synthesis (Choice C) would both increase the risk for formation of cholesterol gallstones by increasing serum cholesterol levels. This could lead to worsening of this patient's condition. Inhibition of bile acid synthesis (Choice D) would increase the risk for formation of cholesterol gallstones. The fibrates are a class of medications that inhibit the rate limiting enzyme in bile acid synthesis, cholesterol 7-a-hydroxylase. Reduction of bile acid synthesis leads to bile that is supersaturated with cholesterol, making it more likely for stones to precipitate. Inhibition of 3-HMG-CoA (Choice E) is the mechanism of statin drugs. HMG-CoA reductase catalyzes the rate limiting step in cholesterol biosynthesis, thereby resulting in reduced intrahepatic levels of cholesterol. There is evidence that patients taking a statin may be at lower risk for developing gallstones, but statins are not currently used for this purpose.","edu_obj":"Ursodiol decreases the cholesterol content of bile and thereby prevents the formation of cholesterol gallstones. It is considered second-line therapy when compared to cholecystectomy in patients with cholelithiasis who present with classic biliary colic."},{"block":2,"item":1,"image_alt":"Block 2 Q1 — Axial MRI of normal brain with labeled regions A–E","image_url":"https://drive.google.com/uc?id=REPLACE_B2Q1_FILE_ID","stem":"A 58-year-old woman comes to the physician because of a 2-month history of intense pain on the right side of her body. She describes the pain as a constant, burning sensation of variable intensity. Over-the-counter medications have not resolved her pain. Six months ago, she sustained a cerebral infarction accompanied by loss of sensation over the right side. Neurologic examination shows loss of sensation to light touch and proprioception on the right side. Light touch of the skin elicits pain. No motor deficits were detected. The most likely cause of this patient's condition is a lesion in which of the following labeled areas in the MRI of a normal brain?","choices":{"A":"(Caudate nucleus)","B":"(Internal capsule)","C":"(Thalamus)","D":"(Broca's convolution)","E":"(Primary visual cortex, occipital lobe)"},"correct":"C","explanation":"Choice C identifies the thalamus, a gray matter region with diverse roles including relaying sensory and motor information and mediating alertness. The spinothalamic tract, which mediates the sensation of pain, feeds into the thalamus. Cerebrovascular accidents (CVAs) occur because of ischemic or hemorrhagic loss of blood supply to the brain. If the thalamus is infarcted, patients may lose the ability to accurately interpret sensory information, and if the spinothalamic tract is affected, may also experience a centralized poststroke pain syndrome called thalamic pain syndrome. Thalamic pain syndrome may occur in the acute poststroke phase or months or years after a stroke. It is characterized by an initial loss of sensation or paresthesia followed by burning pain with allodynia. These sensory symptoms typically involve the entire contralateral half of the body, but in some cases are poorly localized. Treatment may involve pharmacological strategies (eg, tricyclic antidepressants, anticonvulsants) and nonpharmacologic strategies (eg, physical therapy, cognitive-behavioral therapy). Incorrect Answers: A, B, D, and E. Choice A identifies the caudate nucleus. The caudate nucleus is a basal ganglia structure located directly lateral to the lateral ventricles that modulates motor control along with higher order functions, such as learning, memory, motivation, and emotion. Lesions of the caudate nucleus lead to disinhibition and agitation. Choice B identifies the internal capsule. The internal capsule primarily contains the descending corticospinal tract, though it also contains axons of various additional pathways. Internal capsule lacunar infarcts may present with purely motor deficits. Choice D identifies the Broca convolution. In a CVA, lesions involving this area can result in expressive (Broca) aphasia. Choice E identifies the primary visual cortex in the occipital lobe. The role of this brain area is to process visual information, not light touch, proprioception, or pain.","edu_obj":"Thalamic pain syndrome is a centralized poststroke pain syndrome caused by a thalamic infarction characterized by loss of sensation, burning pain, and allodynia. These sensory symptoms typically involve the entire contralateral half of the patient's body, but in some cases, are poorly localized."},{"block":2,"item":2,"image_alt":"","image_url":"","stem":"A homeless 30-year-old man who Is living In a shelter Is brought to the emergency department because of a 2-day history of cough productive of bloody sputum. A chest x-ray shows a cavitary lesion in the right upper lobe and calcifications in the right hilum. An acid-fast smear of sputum is positive. Sputum is inoculated into mycobacterial culture media. Which of the following best represents the expected time before positive culture results will be available?","choices":{"A":"Less than 24 hours","B":"2-3 days","C":"4-7 days","D":"2-5 weeks","E":"4-6 months"},"correct":"D","explanation":"Mycobacterium tuberculosis is a slow-growing organism transmitted via respiratory secretions. It causes tuberculosis, which presents with systemic symptoms including fever, night sweats, and weight loss, as well as pulmonary symptoms such as cough and hemoptysis. The slow growth and evasion of immune defenses result in the disease presenting with primary, latent, and reactivation patterns. While uncommon in the developed world. tuberculosis remains prevalent among patients who are homeless, incarcerated, or immunocompromised. The diagnosis of pulmonary tuberculosis requires isolation of M. tuberculosis from sputum cultures. However, given the slow-growing nature of M. tuberculosis, sputum cultures do not yield results for several weeks. Other diagnostic tests, such as interferon gamma release assays and chest x-rays, may provide useful clinical information while culture results are pending. The chest x-ray ln reactivation tuberculosis classically shows cavitary lesions in the apices of the lung, with possible evidence of a Ghon complex (pulmonary calcified granulomas and hilar adenopathy) from a prior primary tuberculous infection. It is typically necessary to begin empiric antibiotic treatment prior to confirmatory culture results in patients suspected of having tuberculosis. Active disease is treated primarily with a combination of rifampin, isoniazid, pyrazinamide, and ethambutol. Incorrect Answers: A, B, C, and E. Less than 24 hours (Choice A) is the appropriate time frame for results of an interferon gamma release assay. 2-3 days (Choice B) is the appropriate time frame for the interpretation of a tuberculin sKin test. Tuberculin sKin testing is appropriate for screening for prior exposure to tuberculosis in asymptomatic patients. 4--7 days (Choice C) is incorrect. While many bacterial and fungal cultures produce results within days, M. tuberculosis is not generally detectable on culture media for several weeks. 4-6 months (Choice E) is incorrect. While M. tuberculosis is slow-growing, most culture protocols can detect the organism at a maximum of 6-8 weeks.","edu_obj":"Tuberculosis is a contagious respiratory illness caused by Mycobacterium tuberculosis. The diagnosis of pulmonary tuberculosis requires isolation of M. tuberculosis from sputum cultures. However, given the slow-growing nature of M. tuberculosis, sputum cultures do not yield results for several weeks. II is typically necessary to begin empiric treatment prior to confirmatory culture results."},{"block":2,"item":3,"image_alt":"","image_url":"","stem":"A 41-year-old man has the acute onset of abdominal pain caused by a calculus at the right ureterovesical junction. The pain is most likely to radiate to which of the following locations on the right?","choices":{"A":"Costovertebral angle","B":"Upper quadrant of the abdomen","C":"Groin","D":"Lower leg","E":"Foot                    <]"},"correct":"C","explanation":"Nephrolithiasis or ureterolithiasis describes the formation of calculi within the urinary collecting system, ot11erwiseknown as kidney or ureteral stones. Calcium oxalate stones are the most common type (making up generally 80% of all urinary tract calculi). though calcium phosphate, struvite, uric acid, and proteinaceous stones (eg. cystine) are also seen. Diagnosis is through non-contrast CT scan of the abdomen and pelvis. Treatment varies depending on the size, location, and complicating features. Small, uncomplicated stones often pass without intervention, whereas large, obstructing, or infected stones may require antibiotics, surgical removal, ureteral stenting, or percutaneous nephrostomy. There are three common sites where ureteral stones lodge caused by narrowing in the ureter: the ureteropelvic junction, where the ureter crosses the iliac vessels. and the ureterovesical junction. Sensory fibers that innervate the ureters enter the spinal cord at T12 through L2, and pain from the ureter is referred to those dermatomes around the groin. Incorrect Answers: A, B. D, and E. Pain at the costovertebral angle (Choice A) would be more suggestive of pyelonephritis, with inflammation and infection of the Kidney itself. Pyelonephritis commonly presents with fever, flank pain, and costovertebral angle tenderness. Pain in this location could occur from nephrolithiasis if the stone were obstructing with resultant hydronephrosis. Pain that radiates to the upper quadrant of the abdomen (Choice B) typically is caused by cholecystitis, cholelithiasis, pancreatitis, or gastritis. Pain that radiates to the lower leg or foot (Choices D and E) is often caused by pathologies that affect the L4, L5. and S1 dermatomes, such as sciatica.","edu_obj":"Sensory nerves from T 12 to L2 innervate the ureters. Pain associated with ureterolithiasis is commonly referred to those dermatomal areas around the groin."},{"block":2,"item":4,"image_alt":"","image_url":"","stem":"A 35-year-old man is admitted to the hospital because of confusion, indifference, and lethargy for 3 months. Ophthalmologic examination shows sluggish pupillary responses and horizontal nystagmus; neither eye moves past the midline on lateral gaze. A Romberg test is positive, and his gait is severely ataxic. He develops hemorrhaging from esophageal varices and dies 5 days later. The brain at autopsy Is shown in the photograph. Which of the following is the most likely diagnosis?","choices":{"A":"Central pontine myelinolysis","B":"Hepatic encephalopathy","C":"Hepatolenticular degeneration (Wilson disease)","D":"Ruptured cerebral aneurysm","E":"Traumatic Injury","F":"Wernicke encephalopathy"},"correct":"F","explanation":"The photograph of this patient's brain shows atrophy of the mammillary bodies. which is consistent with Wernicke encephalopathy. The presence of esophageal varices. a sign of cirrhosis. supports this diagnosis. Patients with alcohol use disorder typically develop a significant thiamine (vitamin B 1) deficiency due to poor nutritional intake, thiamine malabsorption, and impaired cellular utilization of thiamine. Over time. thiamine deficiency can result in damage and atrophy of the mammillary bodies, which manifests as Wernicke encephalopathy. To prevent Wernicke encephalopathy, all patients with sustained heavy alcohol use should be given oral thiamine supplementation, and patients presenting with acute intoxication should be given parenteral thiamine. The typical clinical presentation of Wernicke encephalopathy is a triad of altered mental status (as manifested in this patient's confusion and apathy), ophthalmoplegia (along with nystagmus), and ataxia (limb ataxia can be associated with balance difficulties as manifested in a positive Romberg sign). The symptoms of Wernicke encephalopathy are reversible but increase the risk for developing Wernicke-Korsakoff syndrome if not immediately treated with high-dose parenteral thiamine. Wernicke-Korsakoff syndrome is an irreversible condition that features psychosis, anterograde and retrograde amnesia, and the consequent tendency to confabulate, or verbalize false stories or memories. to compensate for the inability to remember. Incorrect Answers: A, B, C, D, and E. Central pontine myelinolysis (Choice A), which results from rapid correction of hyponatremia. typically involves demyelination of the corticospinal and corticobulbar tracts. This can result in acute, irreversible quadriparesis or quadriplegia, dysarthria, dysphagia, and/or confusion. This patient shows confusion but not motor weakness. Additionally, there is no history of rapid correction of hyponatremia. Hepatic encephalopathy (Choice B) presents with confusion or stupor along with neurologic symptoms such as cortical blindness, asterixis, tremor. myoclonus, and frontal release signs. Ophthalmoplegia with nystagmus would be atypical. Hepatolenticular degeneration (Wilson disease) (Choice C) results from impaired metabolism of copper and causes neuropsychologic impairment including parkinsonism, ataxia, dementia, or hallucinations, in addition to liver disease. Though patients may show Kayser-Fleischer rings (copper deposition around the iris). ophthalmoplegia with nystagmus would be atypical. Additionally, parkinsonism is not typically associated with Wernicke encephalopathy. Ruptured cerebral aneurysm (Choice D) and traumatic injury (Choice E) can lead to hemorrhagic strokes or subarachnoid hemorrhages. Patients commonly present with the acute onset of headache and, in the case of hemorrhagic strokes, focal neurologic deficits. This patient presented without a headache and with an insidious onset of a triad of neurologic deficits consistent with Wernicke encephalopathy.","edu_obj":"Alcohol use disorder can lead to thiamine (vitamin B1) deficiency. This causes Wernicke encephalopathy, characterized by encephalopathy, ataxia, and ophthalmoplegia. Diagnosis of Wernicke encephalopathy is clinical, and it should be rapidly treated with intravenous administration of thiamine to avoid progression to Wernicke-Korsakoff syndrome."},{"block":2,"item":5,"image_alt":"","image_url":"","stem":"A 30-year-old woman is brought to the physician because of a 2-day history of double vision and deviation of the eyes. Her symptoms began 24 hours after a motor vehicle collision. Physical examination shows left ptosis, and the left eye has developed a \"down and out\" location. Which of the following is most likely to occur in this patient when light is shined into the right eye?","choices":{"A":"Constriction / Constriction","B":"Constriction / No change","C":"Constriction / Marcus Gunn sign","D":"No change / No change","E":"Dilation / Constriction","F":"Dilation / No change","G":"Dilation / Marcus Gunn sign"},"correct":"B","explanation":"This patient presents with findings consistent with a deficit involving the oculomotor nerve. The oculomotor nerve is responsible for motor innervation of the levator palpebrae superioris; the superior, medial, and inferior rectus muscles; as well as the inferior oblique muscle. Deficits of the oculomotor nerve present with ptosis, exotropia, and hypotropia, colloquially referred to as \"down and out\" eye position. Additionally, the oculomotor nerve plays an important role in the efferent branch of the pupillary light response. Following light stimulation of retinal photoreceptors, retinal ganglion cells communicate the light response via the optic nerve to the midbrain. Interneurons synapse with the Edinger-Westphal nuclei, located in the rostral midbrain. Each Edinger-Westphal nucleus projects efferent pupillomotor axons to the ciliary ganglion within the posterior orbit via axons that travel on the surface of the ipsilateral oculomotor nerve. The oculomotor nerve is vulnerable to injury along its course either by trauma or aneurysmal compression as it crosses the posterior communicating artery. From the ciliary ganglion, the short ciliary nerves provide motor innervation to the iris sphincter. Left oculomotor nerve injury, found in this patient, will result in abolition of the left efferent pupillary arc, loss of the left direct pupillary light response (ie, when light is shone in the left eye, the left pupil will not constrict, although the right consensual response remains intact), as well as the left consensual light response (ie, when light is shone in the right eye, the right pupil will constrict but the left will not).

Incorrect Answers: A, C, D, E, F, and G.

Choice A, constriction of both pupils, indicates a normal pupillary light response. Given this patient's evidence of oculomotor nerve injury, a normal pupillary response is not expected.

Marcus Gunn pupillary phenomenon (Choices C and G), also known as a relative afferent pupillary defect (rAPD), is indicative of a unilateral or asymmetric response to light stimulation. An rAPD frequently indicates a unilateral or asymmetric optic neuropathy, glaucoma, or retinal pathology. Optic neuropathy may occur because of trauma, optic nerve compression, ischemia, metabolic disorders, or inflammatory or demyelinating disease. An rAPD is detected by the swinging flashlight test. A normal test is characterized by prompt constriction of each pupil as the flashlight is moved from one eye to the other. Dilation of one pupil as the light is quickly moved from the other eye indicates an abnormal response (an rAPD) in the eye whose pupil dilates. While optic nerve injury produces an rAPD, oculomotor nerve injury does not.

Choice D, bilaterally nonreactive pupils, is nonspecific and may occur in elderly patients, patients with pupillary scarring caused by uveitis, or patients using opioid analgesics. It is not likely to be observed in the setting of traumatic oculomotor nerve injury.

Choices E and F indicate an abnormal pupillary response in which the right pupil dilates in response to direct stimulation with bright light, indicating a right afferent pupillary defect. This may occur in the setting of retinal pathology of the right eye or trauma to the right optic nerve. Given this patient's normal right eye examination, left oculomotor nerve injury, and lack of other history, a right afferent pupillary defect is not expected.","edu_obj":"The oculomotor nerve supplies motor innervation to the levator palpebrae superioris; the superior, medial, and inferior rectus muscles: and the inferior oblique muscle. Deficits of the oculomotor nerve present with ptosis, exotropia, and hypotropia. The oculomotor nerve mediates the efferent arc of the pupillary light response. Injury to the oculomotor nerve may lead to unilateral loss of the direct and consensual pupillary light response."},{"block":2,"item":6,"image_alt":"","image_url":"","stem":"A 57-year-old woman with hypertension and hyperlipidemia comes to the physician for a follow-up examination. She has smoked 1 pack of cigarettes daily for the past 40 years. When the physician asks the patient if she is interested in quitting smoking, she replies that she might like to quit sometime in the next 6 months. but she feels ambivalent about giving up her \"crutch.\" This patient is most likely at which of the following stages of change?","choices":{"A":"Precontemplation","B":"Contemplation","C":"Preparation","D":"Action","E":"Maintenance"},"correct":"B","explanation":"In this scenario. the patient is considering quitting smoking but is indecisive about whether she is ready to take action. which is consistent with the contemplation stage. The stages of behavioral change are used to define a patient's readiness to change a health-related behavior, such as substance use, diet, or exercise habits. In sequential order, the stages of behavioral change are precontemplation. contemplation. preparation, action. maintenance, and termination. Physicians aim to move patients through these stages over time with an interview technique called motivational interviewing. Motivational interviewing involves using open-ended, nonjudgmental questions to help the patient explore their reasons for wanting to change or maintain the habit Incorrect Answers: A, C, D. and E. Patients in the precontemplation stage (Choice A) are not interested in changing their habit and may not see their detrimental habit as a problem This patient believes her habits may create health problems and is considering change. which means she has surpassed the precontemplation stage. Patients in the preparation stage (Choice C) have committed to making a change and are ready to discuss strategies and resources to help them make the change. For example, a patient may research nicotine replacement therapies and set a quit date. This patient knows she should change her habit but is not ready to set a specific quit date. In the action stage (Choice D). patients start to take steps to change their behavior. For example, a patient may start cutting back on cigarettes or quit smoking entirely. After the action stage, the patient begins maintenance (Choice E) to sustain the behavioral change. Patients in this stage strategize how to cope with temptation to return to the old habit. For example, a patient may join a support group to assist with maintaining their improved behavior choice.","edu_obj":"The contemplation stage of behavioral change refers to ambivalence about changing a behavior, in which the patient knows their behavior is detrimental but is not yet prepared to make plans to change."},{"block":2,"item":7,"image_alt":"","image_url":"","stem":"A 9-year-old girl is brought to the physician because of a 6-day history of abnormal movements of the left side of her face and left arm. The movements are involuntary and present only when she is awake. In addition, she has developed spontaneous outbursts of crying. She has received all of the scheduled childhood Immunizations. Her temperature is 37.7°C (99.9°F), pulse is 80/min, respirations are 17/min, and blood pressure is 100/70 mm Hg. Physical examination shows Intermittent grimacing and tongue fasciculations. When asked to squeeze the physician's lingers using her left hand. the pressure of the grip fluctuates continuously. A grade 2/6, systolic murmur Is heard over the mitral focus. Neurologic examination shows abrupt. nonrhythmic. involuntary movements of the left upper extremity and hand. There is no sensory loss or involvement of the pyramidal tract. Which of the following is the most likely diagnosis?","choices":{"A":"Brain abscess","B":"Conversion disorder","C":"Hepatolenticular degeneration (Wilson disease)","D":"Huntington disease","E":"Sydenham chorea"},"correct":"E","explanation":"This patient likely has Sydenham chOrea, which is a manifestation of basal ganglia inflammation. The combination of choreiform movements and a systolic murmur over the mitral focus suggests a diagnosis of rheumatic fever, a complication of group A Streptococcus infection. In acute rheumatic fever, streptococcal infection promotes immune cross-reactivity with neuronal and cardiac cell membrane proteins and the deposition of immune complexes in the joints and soft tissues. The binding of antibodies to basal ganglia neurons results in choreiform movements (involuntary, random, irregular movements) of the face, trunk, and extremities that may be more prominent on one side of the body. Sydenham chorea is a latent manifestation of acute rheumatic fever and may occur months after the initial streptococcal infection. Sydenham chorea may occur as an isolated manifestation of acute rheumatic fever or in conjunction with arthritis, carclitis (which may manifest with mitral regurgitation), erythema marginatum, and/or subcutaneous nodules. Neuropsychiatric symptoms such as emotional !ability and obsessive-compulsive disorder (a disorder associated with basal ganglia pathology) may also occur. As such, patients with Sydenham chorea should undergo ecl1ocardiography to evaluate for carditis. The treatment of acute rheumatic fever involves nonsteroidal anti-inflammatory drugs and penicillin to ensure the eradication of group A Streptococcus. Sydenham chorea is typically self-limited, but severe and impairing neuropsychiatric symptoms may be managed with antipsychotic or anliconvulsant medication. Incorrect Answers: A, B, C, and D. Brain abscess (Choice A) typically presents with headache, fever, and focal neurologic deficits. This patient does not report a headache and has no fever. Additionally, there is a systolic murmur over the mitral focus, consistent with mitral regurgitation as a manifestation of carditis. Conversion disorder (Choice B), or functional neurological symptom disorder. involves acute neurologic symptoms such as sensory or motor dysfunction that are not fully explained by objective findings on physical examination or imaging. This patient's symptoms and physical examination findings are instead consistent wit11a Known disease. Hepatolenticular degeneration (Wilson disease) (Choice C) is caused by decreased ceruloplasmin concentrations, which cause excess copper to accumulate both inside and outside the liver. While the presentation is varied, some degree of liver disease is almost always seen at the time of diagnosis, which this patient does not show Copper may deposit in the basal ganglia or diffusely in the brain. Neurologic symptoms include dysarthria, gait abnormalities, dystonia, tremor, parkinsonism, chorea, or athetosis. Mitral regurgitation would be atypical. Huntington disease (Choice D) presents with the insidious onset of psychiatric and cognitive symptoms, followed by motor symptoms (chorea, hypotonia, dystonia, loss of voluntary control of movements), commonly in midlife. This young patient instead presents with the acute onset of chorea and physical examination signs of carditis.","edu_obj":"Group A streptococcal pharyngitis can be complicated with acute rheumatic fever, which may present with Sydenham chorea, carditis, arthritis, erythema marginatum, and/or subcutaneous nodules due to immune cross-reactivity. The binding of antibodies to basal ganglia neurons results in choreiform movements (involuntary, random, irregular movements) of the face, trunk. and extremities. and may also lead to mood !ability and obsessive-compulsive disorder."},{"block":2,"item":8,"image_alt":"","image_url":"","stem":"A 5-year-old boy wilh..p 4-day history of perianal itching is diagnosed with plnworms. Albendazole treatment is initiated. Which of the following best describes the mechanism of action M this drug?","choices":{"A":"Alteration of the cytoskeleton by binding to tubulin","B":"Depolarization of the myoneural junction","C":"Inhibition of the cytochrome P450-dependent demethylation system","D":"Inhibition of DNA and RNA synthesis","E":"Inhibition of monoamine oxidase"},"correct":"A","explanation":"Pinworm infection occurs due to ingestion of the parasitic helminth Enterobius vermicularis. The organism reproduces in the human gastrointestinal traci and is spread by fecal-oral transmission. The eggs hatch in the small intestine several weeks following ingestion. Adult pinworms migrate to the colon and rectum and deposit eggs on the anus and perianal skin. Worm migration and egg deposition produce intense anal pruritus. which is characteristically nocturnal. Scratching the affected area facilitates transmission of eggs throughout the surrounding environment. Pinworm infection is treated with anti-helminthic agents, such as albendazole or mebendazole. Albendazole binds to tubulin and inhibits microtubule polymerization. This has a variety of vermicidal effects, including prevention of glucose utilization, glycogen depletion, and inhibition of cellular motility and cellular division. Incorrect Answers: B, C, D, and E. Depolarization of ihe myoneural junction (Choice B) results in release of acetylcholine from neural end plates and causes muscular contraction. Several antihelminthic agents, including ivermectin, target the myoneural junction by opening ligand-gated chloride channels, resulting in cell membrane hyperpolarization and inhibition of acetylcholine release. Inhibition of the cytochrome P450-dependent demethylation system (Choice C) inhibits formation of ergosterol, which is part of the fungal cell membrane, from lanosterol and characterizes the mechanism of action of lluconazole. Inhibition of DNA and RNA synthesis (Choice D) describes the mechanism of action of purine and pyrimidine inhibitors, such as flucytosine. Flucytosine is used to treat systemic fungal infections. especially cryptococcal meningitis in combination with amphotericin B. Inhibition of monoamine oxidase (Choice E) is the mechanism of action of monoamine oxidase inhibitors (MAOls), which reduce monoamine oxidase's enzymatic degradation of biogenic amines, and thereby increase synaptic concentrations of serotonin. dopamine, norepinephrine, and epinephrine. MAOls are effective for treating depression and anxiety but are typically used only after other agents have failed due to their unfavorable side effect profile, including risk for serotonin syndrome.","edu_obj":"Pinworm infection occurs due to ingestion of the parasitic helminth Enterobius vermicularis and is characterized by intense, typically nocturnal, anal/perianal pruritus. Treatment is with albendazole, an antihelminthic drug that binds to tubulin and inhibits microtubule polymerization."},{"block":2,"item":9,"image_alt":"","image_url":"","stem":"A 27-year-old man comes to the physician because of a 2-month history of difficulty swallowing, and episodes of vomiting and substemal chest pain. He has had a 6.8- kg (15-lb) weight loss during this period. Use of over-the-counter antacids has not relieved his symptoms. He is 183 cm (6 ft) tall and weighs 73 kg (161 lb); BMI is 22 kg/m2. An upper GI barium swallow shows a dilated esophagus with constriction at the gastroesophageal junction. There is no peristalsis in the esophagus; however. there are peristaltic waves in the stomach and small intestine. The most likely cause of his condition is a lesion of which of the following structures that affect the lower esophagus?","choices":{"A":"Enteric ganglia","B":"Greater splanchnic nerve","C":"Nucleus ambiguus","D":"Phrenic nerve","E":"Superior mesenteric ganglion"},"correct":"A","explanation":"The enteric ganglia refer to the myenteric plexus (Auerbach plexus) associated with peristalsis of the esophagus and relaxation of the lower esophageal sphincter (LES) and the submucosal plexus (Meissner plexus). Achalasia is an esophageal dysmotility disorder resulting from damage to neurons derived from the myenteric plexus. It manifests as dysphagia, odynophagia. weight loss, halitosis, and regurgitation of undigested food. Destruction of nerves in the myenteric plexus impairs local nitric oxide production. prevents smooth muscle relaxation. and disproportionately affects inhibitory neurons. which function to relax the LES. An increase in LES pressure and dysfunctional peristalsis causes gradual dilation of the esophagus with retention of food, leading to dysphagia and regurgitation. It is diagnosed with a barium swallow (barium esophagography) and esophageal manometry. On barium esophagography, achalasia classically appears as a dilated esophagus with distal tapering at the LES. Treatment of achalasia includes pneumatic dilation or injection of botulinum toxin to relax the LES. Incorrect Answers: B. C, D. and E. The greater splanchnic nerve (Choice B) receives branches from the sympathetic ganglia of T5 to T9. traverses through the diaphragm. and terminates at the celiac ganglia. The greater splanchnic nerve provides signaling to the foregut, which inhibits motility and secretions of the duodenum, stomach. and distal esophagus, but does not play a role in the development of achalasia. The nucleus ambiguus (Choice C) is found in the medulla and is associated with motor functions involved in swallowing and speech. It provides motor fibers to both the vagus nerve and glossopharyngeal nerve, which help to innervate the muscles of the soft palate, larynx, and pharyngeal constrictor muscles. The phrenic nerve (Choice D) originates from C3 to C5 and provides motor innervation to the diaphragm and sensory innervation to the mediastinal pleura and the pericardium. Phrenic nerve injury can occur during cardiothoracic surgery or thoracic or cervical trauma and can lead to diaphragmatic paralysis. The superior mesenteric ganglion (Choice E) innervates the jejunum, ileum, ascending colon, and transverse colon. Injury to the superior mesenteric ganglion is not associated with the development of achalasia.","edu_obj":"The enteric ganglia provide innervation to the muscular layer of the gut and promote both peristalsis and lower esophageal sphincter (LES) relaxation. Destruction of the myenteric plexus may lead to achalasia, which manifests as dysphagia, odynophagia, weight loss. halitosis, and regurgitation of undigested food. It is diagnosed with a barium swallow, which shows a dilated esophagus with distal tapering at the LES. Treatment includes pneumatic dilation or botulinum toxin injections to relax the LES."},{"block":2,"item":10,"image_alt":"","image_url":"","stem":"A 27-year-old man comes to the physician with his 25-year-old wife because of a 5-year history of inability to conceive. He has no history of major medical illness. analysis shows a sperm count of 0.8 million/ml (N>20 million). Ultrasonography of the scrotum shows bilateral abnormalities that cause increased temperature within the scrotu°I Which of the following additional findings is most likely In this patient?","choices":{"A":"Absence of the scrotal ligaments","B":"Cryptorchidism","C":"Obstruction of the ductus deferens","D":"Testicular torsion","E":"Varicocele"},"correct":"E","explanation":"A varicocele refers to dilated veins of the pampiniform plexus caused by increased venous pressure. Varicoceles are commonly located on the left side due to increased resistance to venous flow as the left gonadal vein drains into the left renal vein. On the right side, the right gonadal vein drains directly into the inferior vena cava and is less likely to become obstructed. The dilation of the pampiniform plexus causes a bluish appearance of the overlying skin. Palpation of the dilated plexus discloses varicosities, which are often described as having a vermiform (worm-like) feeling. Unlike a hydrocele, which is caused by failure of the processus vaginalis to close leading to accumulation of fluid around the testicle, varicocele will not transilluminate with application of light to the scrotum. Infertility is a potential complication of varicoceles, as the dilated veins result in increased temperature of the testicle, which impairs spermatogenesis. Treatment for varicoceles may require surgical embolization or ligation to manage infertility. Incorrect Answers: A, B. C, and D. Absence of the scrotal ligaments (Choice A) may contribute to impaired testicular thermoregulation and infertility but is less likely a cause than a varicocele. The scrotal ligament is a remnant of the gubernaculum and anchors the testis to the inferior aspect of the scrotum. Cryptorchidism (Choice B) is the failure of one or both testes to descend into the scrotum. An undescended testis may be found anywhere along the typical path of descent and. if left uncorrected for a prolonged duration, will cause infertility due to suboptimal spermatogenesis from increased temperature of the testicle. In this patient. both testes are palpated in the scrotum. Obstruction of the ductus deferens (Choice C) may occur secondary to scarring in the setting of sexually transmitted infection. or in the setting of cystic fibrosis. Testicular torsion (Choice D) occurs when the testicle twists on the spermatic cord resulting in subsequent loss of testicular blood supply. Patients typically present with acute, severe testicular pain, swelling, and erythema. Infertility may ensue due to infarction if blood flow is not restored.","edu_obj":"A varicocele refers to dilated veins of the pampiniform plexus caused by increased venous pressure. Infertility is a potential complication of varicoceles, as the dilated veins result in increased temperature of the testicle, which impairs spermatogenesis."},{"block":2,"item":11,"image_alt":"","image_url":"","stem":"A 27-year-old woman comes to the office because of a 6-month history of progressive numbness and weakness that are more prominent in her legs than in her arms. Vital signs are within normal limits. Neurologic examination shows weakness of hand grasp and dorsiflexion and plantar flexion of the lower extremities. Sensation in all four extremities is diffusely diminished. To avoid motor dysfunction, the most appropriate next step in diagnosis is obtaining a biopsy specimen from which of the following peripheral nerves?","choices":{"A":"Deep fibular (peroneal)","B":"Femoral","C":"Obturator","D":"Sura!","E":"Tibial"},"correct":"D","explanation":"Peripheral neuropathy may be caused by a wide variety of conditions, including diabetes mellitus, hypothyroidism, vasculitis, sarcoidosis, HIV/AIDS, syphilis, Lyme disease, leprosy, pyridoxine or cobalamin deficiency, medication toxicity, multiple sclerosis, or Guillain-Barre syndrome, among others. The initial evaluation of peripheral neuropathy includes laboratory evaluation. nerve conduction studies, and nerve biopsy. Nerve biopsy is typically performed on nerves with purely sensory function to reduce toss of motor function following the procedure. The sural nerve is derived from branches of the tibial and common fibular nerves and supplies sensory innervation to the lateral aspect of the ankle and foot. It provides no motor innervation, and for this reason, is commonly selected for nerve biopsy. Incorrect Answers: A, B, C, and E. The deep fib Lolar(peroneal) nerve (Choice A) provides motor innervation to the anterior extensor muscles of the leg and foot, along with sensory innervation to the webbing between the first and second toes. Injury to or biopsy of this nerve will result in foot drop. The femoral nerve (Choice B) arises from the lumbar plexus and provides motor innervation to the anterior compartment of the thigh, including the quadriceps, sartorius, and pectineus. It also provides sensory innervation to the anterior and lateral aspects of the thigh. The obturator nerve (Choice C) arises from the sacral plexus and provides sensory innervation to the medial thigh, as well as motor innervation to the leg adductors, including the adductor longus, adductor brevis, adductor magnus, gracitis. and obturator externus. The tibial nerve (Choice E) supplies motor innervation to the posterior compartment of the lower leg and the intrinsic muscles of the foot. It supplies sensation to the plantar surface of the foot. An injury to or biopsy of the tibial nerve would compromise strength of toe flexion and ankle plantar flexion.","edu_obj":"Nerve biopsy is helpful for the diagnosis of peripheral neuropathy, which has a broad differential diagnosis. Biopsy is typically performed on nerves with purely sensory function to reduce toss of motor function. The surat nerve is derived from branches of the tibial and common fibular nerves and supplies sensory innervation to the lateral aspect of the ankle and foot. It provides no motor innervation, and for this reason, is commonly selected for nerve biopsy."},{"block":2,"item":12,"image_alt":"","image_url":"","stem":"A 32-year-old man comes to a medical clinic in Santiago, Chile, because of a 6-week history of persistent pain and swelling of his right arm that began after he fell while hiking. Two months ago, he began an extended solo backpacking trip through a remote part of the Andes Mountains. He splinted the arm with a stick. His food supply has been limited to saltine crackers, peanut butter, and processed cheese spread. Today, an x-ray of the right upper extremity shows a poorly formed callus and nonunion of the fracture ends. This patient most likely has decreased function of which of the following proteins?","choices":{"A":"Alkaline phosphatase","B":"Histidine deaminase","C":"Matrix metalloproteinase","D":"Neutrophil elastase","E":"Prolyl 4-hydroxylase"},"correct":"E","explanation":"Vitamin C (ascorbic acid) is a water-soluble antioxidant that is involved in tissue repair and collagen synthesis, facilitating the hydroxylation of praline and lysine by prolyl 4- hydroxylase. Vitamin C is required for the enzymatic conversion of dopamine to norepinephrine and for iron absorption. It is an essential nutrient found in fruits (eg, citrus) and vegetables. Collagen synthesis begins in the rough endoplasmic reticulum of fibroblasts with translation of collagen chains, which are glycine and praline rich. Prolyl hydroxylase, in a reaction requiring vitamin Casa coenzyme, hydroxylates praline and lysine residues. This step, along with glycosylation, forms alpha-chains through disulfide bridging plus hydrogen bonding. Procollagen is exocytosed. where it forms tropocollagen after removal of the terminal ends. It is cross-linked extracellularly in a reaction that requires copper. Collagen has a high tensile strength and is a vital structural component of connective tissues, including blood vessels, muscles, and bone. Deficiency in vitamin C leads to scurvy, which presents with signs and symptoms of impaired collagen synthesis including swollen, bleeding gums. easy bruising and bleeding (eg. hemarthrosis), petechiae, perifollicular hemorrhages, impaired wound healing. and short, fragile curly hair. In this case, the patient's poor bone healing in the setting of a deficient diet suggests the diagnosis of scurvy caused by impaired collagen synthesis. It is reversible, and treatment is with supplemental oral or parenteral vitamin C. Incorrect Answers: A, B, C, and D. Alkaline phosphatase (Choice A) is an enzyme present in bile ductules and bone. It plays a role in bone mineralization by osteoblasts. though the exact mechanism is unknown. Acquired deficiency has not been well characterized in this scenario. Congenital deficiency leads to hypophosphatasia, characterized by defective skeletal mineralization leading to rickets or osteomalacia. Histidine deaminase (Choice B ), more commonly referred to as histidine ammonia-lyase or histidase. catalyzes the first step of the degradation of histidine. Acquired deficiency has not been described in this scenario. Congenital deficiency can be inherited in an autosomal recessive fashion and causes histidinemia, a common inborn error of metabolism that is usually asymptomatic. Matrix metalloproteinases (Choice C) are enzymes that lyse proteins using a chelated metal ion cofactor. a process implicated in the breakdown of the extracellular matrix. They are essential for the remodeling of collagen that occurs during wound healing. They are also implicated in the breakdown of bone and cartilage tissues. Degradation of type II collagen by matrix metalloproteases is a key step in the pathophysiology of osteoarthritis. Acquired deficiency has not been described in this scenario. Neutrophil elastase (Choice D) plays a role in localized inflammatory response. Inherited dysfunction causes cyclic neutropenia, a rare immunodeficiency syndrome characterized by recurrent episodes of neutropenia and infection. It should not be confused with a 1-antitrypsin deficiency, an inherited disorder that is characterized by upregulation of neutrophil elastase and consequent tissue damage in the lungs and liver. leading to panlobular emphysema and cirrhosis.","edu_obj":"Vitamin c (ascorbic acid) is an antioxidant and coenzyme in the synthesis of collagen via prolyl hydroxylase. Deficiency is common in persons having diets poor in fruits and vegetables, and results in scurvy, which presents with blood vessel fragility (ie, easy bruising. petechiae, perifollicular hemorrhage), impaired wound and bone healing, and disordered hair growth."},{"block":2,"item":13,"image_alt":"","image_url":"","stem":"A 31-year-old nulligravid woman comes to the physician because she and her husband have not been able to conceive for the past 3 years. Her husband has been evaluated, and no problems were found. She has an intact hypothalamic-pituitary-ovarian axis, and her serum estrogen concentration is within the reference range. Clomiphene therapy is started. Which of the following effects is most likely to occur in this patient?","choices":{"A":"Decreased contractile activity of the uterine myometrium","B":"Decrea~ inhibitory estrogen feedback on the pituitary gland","C":"Facilitationof blastocystimplantation","D":"Increased pulsatile release of prolactin","E":"Increased survival of the corpus luteum"},"correct":"B","explanation":"Clomiphene is a selective estrogen receptor modulator. a class that exhibits a mix of agonist or antagonist effects on the estrogen receptor in different tissues. Clomiphene binds the estrogen receptors in the pituitary gland, blocking the negative feedback from circulating estrogen and thus has an antiestrogenic effect. As a result of decreased negative feedback, the pituitary gland increases the production of follicle-stimulating hormone (FSH) and luteinizing hormone (LH). FSH and LH are integral in the process of ovulation and implantation. At the start of !he follicular phase, just after menses occurs. FSH increases lo support a developing ovarian follicle. As !he follicle increases in size, ii requires less support and FSH decreases slighlly until ovulation occurs. Ovulation is accompanied by a rapid surge in FSH and LH; this marks !he transition from the follicular phase to the luteal phase. FSH then rapidly subsides and increases slowly through the luteal phase as it prepares to support another ovarian follicle at the start of the following cycle. LH remains low through the follicular phase until ii surges and triggers ovulation. This marks !he transition to !he luteal phase, named for the presence of the corpus luteum. The corpus luteum is the structure that remains after a follicle ruptures and ovulation occurs. It produces estrogen and progesterone, which support the secretory endometrium and allow for implantation to occur. If implantation occurs. the corpus luteum is maintained by human chorionic gonadotropin and continues to produce progesterone. If implantation does not occur. the corpus luteum shrinks and eventually becomes a fibrous remnant called the corpus albicans. With the increased production of FSH and LH induced by clomiphene, both ovulation and implantation are facilitated. Incorrect Answers: A, C, D, and E. Decreased contractile activity of the uterine myometrium (Choice A) is caused by tocolytic agents, such as terbutaline and nifedipine. Tocolysis is commonly attempted to inhibit preterm labor to allow additional time for fetal maturation or corticosteroid treatment (for fetal lung maturity). Decreased contractile activity of the myometrium is not an action of clomiphene. Facilitation of blaslocyst implantation (Choice C) is an important aspect of embryo development. Part of !his depends on the health of !he uterine lining, which can be affected by overall maternal health, as well as estrogen and progesterone concentrations. While a downstream effect of clomiphene is improved implantation, the primary mechanism of action of clomiphene is a decreased inhibitory estrogen feedback effect on the pituitary gland. Increased pulsatile release of prolactin (Choice D) would negatively affect fertility. Prolactin inhibits estrogen, which can consequenlly decrease ovulation and endometrial development. Increased concentrations of prolactin thus often lead to amenorrhea. Increased survival of the corpus luteum (Choice El is already accomplished by implantation of the embryo, as the embryo secretes human chorionic gonadotropin that supports the corpus luteum. Eventually, the placenta can secrete its own progesterone, and the corpus luteum is no longer needed to maintain the pregnancy. Increasing the survival of the corpus luteum without a successful implantation would not improve fertility.","edu_obj":"Clorniphene is a selective estrogen receptor modulator that exhibits antiestrogenic effects on the pituitary gland. By blocking the negative feedback of estrogen on the pituitary gland, the production of follicle-stimulating hormone and luteinizing hormone is increased, supporting ovulation and implantation."},{"block":2,"item":14,"image_alt":"","image_url":"","stem":"During a clinical study of the sickle cell allele, an investigator finds a frequency of 1/20 among African Americans and a frequency of 1/200 among Americans of Hispanic descent. Which of the following genetic mechanisms originally produced this stratification of allele frequency?","choices":{"A":"Assortatlve mating","B":"Balanced polymorphism","C":"Founder effect","D":"Gene flow","E":"Heterozygote advantage"},"correct":"E","explanation":"Heterozygote advantage describes the unique condition in genetics in which the phenotype expressed by the heterozygote confers increased fitness relative to both the dominant and recessive homozygote conditions. Individuals with the sickle cell trait, also called carriers, possess one normal allele coding for hemoglobin beta protein and one abnormal allele. Red blood cells with the abnormal hemoglobin beta deform into a sickle-like shape in low oxygen conditions. PaUents with two copies of the recessive abnormal allele develop sickle cell disease, characterized by anemia. vaso-occlusive crisis, and other complications such as early cerebrovascular accidents. Disadvantageous recessive alleles are expected to decrease over time in a population as individuals with the recessive trait are expected to have poor survival. In this case, the continued presence of the allele at high frequencies. especially in two genetically separate populations, suggests that the heterozygous state provides a significant survival advantage for those populations and has allowed the recessive allele to persist. In fact, individuals who are carriers of the sickle cell allele demonstrate resistance to malarial infection. which is a major cause of morbidity and mortality in much of the world. Incorrect Answers: A, B, C, and D. Assortative mating (Choice A) is a nonrandom type of mating in which individuals select partners based on specific phenotypes that are similar or dissimilar to their own. This tends to skew a population toward more homozygous individuals than would be expected if mating occurred purely by chance. Balanced polymorphism (Choice B) describes the presence of multiple phenotypic variations of a trait within a population. Sickle cell trait is an example of both balanced polymorphism and heterozygote advantage; however. heterozygote advantage is the specific mechanism by which the balanced polymorphism of sickle cell trait is maintained. Founder effect (Choice C) describes the reduction in genetic diversity that can occur when a subgroup of a population becomes genetically separated from the rest of the population. It is a type of genetic drift that can significantly alter the frequency of certain alleles relative to the original population. Gene flow (Choice D) refers to the introduction of new alleles into a population due to migration from a genetically separate population. If the rate of gene flow is high enough, the two populations will merge into a single genetic population.","edu_obj":"Heterozygote advantage is the genetic mechanism by which certain disadvantageous recessive alleles persist in a population because the heterozygous phenotype has a survival advantage relative to the dominant and recessive homozygous phenotypes. Sickle cell trait is a common example."},{"block":2,"item":15,"image_alt":"","image_url":"","stem":"A 14-year-old boy is brought to the office for a health maintenance examination. He tells the physician that he is concerned about a small lump that he noticed under his left breast 2 months ago. His vital signs are within normal limits. He is at the 50th percentile for height and 75th percentile for weight. Physical examination shows a 2.5-cm, mildly tender, rubbery mass under the left areola. His sexual maturity rating (SMR) is 2 for genital and pubic hair development. The remainder of the examination shows no other abnormalities. Which of the following is the most likely diagnosis?","choices":{"A":"Breast cancer","B":"Costochondrltis","C":"Physiologic gynecomastia","D":"Sebaceous cyst","E":"Seminiferous tubule dysgenesis (Klinefelter syndrome)"},"correct":"C","explanation":"Physiologic, or pubertal, gynecomastia refers to an increase in the amount of glandular breast tissue in males and is common during puberty. Pubertal gynecomastia is caused by a disruption in the normal balance of androgens and estrogens and is common in boys aged 12 to 14 years. The increased levels of estrogen are due to conversion of androstenedione and testosterone to estrone and estradiol. Patients may present with a tender, unilateral or bilateral mass behind the nipple. On palpation. gynecomastia is generally small, rubbery, freely mobile, and well-circumscribed, as in this patient. Laboratory studies will be normal in pubertal gynecomastia but could be used to delineate other causes of gynecomastia. These other causes include medications (eg, spironolactone. ketoconazole, antiandrogen therapy}, liver cirrhosis, germ cell tumors, hypogonadism, and thyroid dysfunction. Physiologic gynecomastia typically self-resolves, but medical and surgical options exist for symptomatic patients, such as aromatase inhibitors and liposuction. Incorrect Answers: A, B, D, and E. Breast cancer (Choice A) is uncommon in pubescent boys. It is much more common in postmenopausal women. Symptoms include a breast lump, which may be associated with skin changes and nipple discharge. Physical examination would disclose a hard, adherent mass with irregular borders, rather than the benign mass felt in this patient. Costochondritis (Choice B) is a musculoskeletal cause of anterior chest wall pain. It is caused by inflammation in the joints of the chest where the ribs meet the sternum, most commonly in response to trauma or excessive exercise. Pl1ysical examination would disclose tenderness on palpation of the chest wall; a palpable mass would not be expected. Sebaceous cysts (Choice D) are a common type of cutaneous cyst that contain squamous epithelium. They are most commonly found on the trunk and face, and are typically well-circumscribed lesions with a central punctum. They are generally painless unless they become infected. This patient's tender subareolar mass is more likely secondary to physiologic gynecomastia. Seminiferous tubule dysgenesis (Klinefelter syndrome) (Choice E) is a genetic form of hypogonadotropic hypogonadism caused by an XXY genotype. While symptoms include gynecomastia, patients with Klinefelter syndrome also commonly present with testicular atrophy, tall stature, and long extremities, which this patient does not exhibit.","edu_obj":"Physiologic, or pubertal, gynecomastia is caused by a relative increase in estrogens in pubescent boys, commonly those aged 12 to 14 years. Patients will present with a tender. unilateral or bilateral mass behind the nipple. On palpation, the mass is small, rubbery. mobile. and well-circumscribed. Most cases of pubertal gynecomastia spontaneously resolve without intervention."},{"block":2,"item":16,"image_alt":"","image_url":"","stem":"An investigator is studying the effects of camitine depletion In an experimental mouse model. The mice are fed a camitine-deficient diet, and it is hypothesized that this will result in hepatocytes undergoing either autophagy or apoptosis. Which of the following is the most appropriate marker to identify autophagic cells in this study?","choices":{"A":"Activation of caspase 3","B":"Activation of caspase 8","C":"Formation of isolation membranes","D":"Recruitment of Fas-associated death domains","E":"Release of cytochrome c"},"correct":"C","explanation":"Autophagy involves the regulated digestion of intracellular proteins using lysosomes and autophagosomes. II is a part of cell turnover in states of both normal physiology and in pathology. Increased autophagy can occur under conditions of cellular damage, infiammation, or in states of nutrient deprivation. In contrast to apoptosis, which results in orderly. programmed cellular death, autophagy allows for the orderly degradation and recycling of intracellular components to manage cellular stress and promote homeostasis and survival. During the initial stages of autophagy, a double-layered lipid membrane, known as an isolation membrane (or phagophore), envelops the intracellular components targeted for autophagy, forming an autophagosome. Once enveloped, these components are delivered to a lysosome. Fusion of the autophagosome and lysosome forms an autolysosome. Within the autolysosome, hydrolytic enzymes degrade the contents. The degraded cellular components are then released into the cytosol, where they become available for cellular metabolism. Incorrect Answers: A, B, D, and E. Activation of caspase 3 (Choice A) and caspase 8 (Choice B) occurs following stimulation by Fas-associated death domains (FADD) and results in potentiation of the caspase cascade. Caspase 8 is an initiator caspase that in tum activates caspase 3. Caspase activation produces the hallmarks of apoptosis, including degradation of cellular proteins and DNA, cytoskeletal elements, and cell membrane blebbing. Recruitment of Fas-associated death domains (Choice D) occurs following activation of the Fas receptor. FADD serves as an adapter protein that activates caspases, triggering apoptosis. Release of cytochrome c (Choice E) occurs during apoptosis following BAX and BAK-induced permeability of the mitochondrial membrane. Once present in the cytoplasm. cytochrome c plays an important role in the activation of caspases via interaction with Apaf (apoptotic protease activating factors).","edu_obj":"Alitophagy involves the regulated digestion of intracellular proteins using lysosomes and autophagosomes. Autophagy manages cellular stress and promotes homeostasis and survival. The central process of the autophagy pathway involves fusion of an autophagosome, which forms following envelopment of cellular components by an isolation membrane, with a lysosome."},{"block":2,"item":17,"image_alt":"","image_url":"","stem":"A 45-year-old man with HIV infection comes to the office because of a 6-week history of swelling near the left side of his neck. His most recent CD4+ T-lymphocyte count was 42/mm 3 (N500), and plasma HIV viral load was 55.000 copies/ml. He currently takes no medications. His temperature is 38.0°C (100.4°F), pulse is 72/min. respirations are 12/min. and blood pressure is 120/81 mm Hg. Physical examination shows a left supraclavicular mass. Immunohistochemical staining of a biopsy specimen of the mass confirms the presence of the causal virus's DNA and replication within lymphoma cells but not in nearby normal cells. Which of the following is the most likely explanation for the tumor formation?","choices":{"A":"Chronic immune activation of B lymphocytes","B":"Chronic immune activation of T lymphocytes","C":"Inhibition of B-lymphocyte tumor surveillance","D":"Inhibition of T-lymphocyte tumor surveillance","E":"Malignant transformation of B lymphocytes","F":"Malignant transformation of T lymphocytes"},"correct":"E","explanation":"Patients with HIV infection have increased risk for malignancies caused by oncogenic viruses such as Epstein-Barr (EB) virus. EB virus infects B lymphocytes through CD21 and can persist inside the cell
